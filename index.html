                    {l:'Revenue',   v:fM(cur.rev),        c:T.accent},
                    {l:'GOP',       v:`${cur.gopMgn.toFixed(1)}%`, c:cur.gopMgn>=30?T.green:T.yellow},
                    {l:'NOP',       v:fM(cur.nop),        c:cur.nop>=0?T.green:T.red},
                    {l:'Curr.Ratio',v:`${(ratios.cr!=null?ratios.cr:0).toFixed(2)}x`, c:ratios.cr>=1.5?T.green:ratios.cr>=1?T.yellow:T.red},
                    {l:'ROA',       v:`${(ratios.roa!=null?ratios.roa:0).toFixed(1)}%`, c:ratios.roa>=5?T.green:T.yellow},
                  ].map(k=>(
                    <div key={k.l} style={{background:T.bg,borderRadius:6,padding:'8px 10px',border:`1px solid ${T.border}`,textAlign:'center'}}>
                      <div style={{fontSize:9,color:T.muted,marginBottom:3,letterSpacing:1}}>{k.l}</div>
                      <div style={{fontSize:13,fontWeight:700,color:k.c,fontFamily:"'JetBrains Mono',monospace"}}>{k.v}</div>
                    </div>
                  ))}
                </div>

                {execSaved[periodKey] && (
                  <div style={{marginTop:10,fontSize:10,color:T.muted,fontFamily:"'JetBrains Mono',monospace",
                    padding:'6px 10px',background:`${T.green}08`,borderRadius:6,border:`1px solid ${T.green}20`}}>
                    ✓ Custom summary saved — this version will be used in board reports for {periodLabel}.
                  </div>
                )}
              </Card>
            </div>
          )}

          {/* ══ TAB: KEY INSIGHTS ══ */}
          {activeTab==='insights' && (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="r-grid-2">
              {insights.map((ins,i)=>(
                <div key={i} style={{background:`${sevColor[ins.sev]}07`,borderTop:`1px solid ${sevColor[ins.sev]}25`,borderBottom:`1px solid ${sevColor[ins.sev]}25`,borderLeft:`1px solid ${sevColor[ins.sev]}25`,borderRight:`1px solid ${sevColor[ins.sev]}25`,
                  borderRadius:10,padding:'14px 16px',borderLeft:`3px solid ${sevColor[ins.sev]}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <span style={{fontSize:15}}>{sevIcon[ins.sev]}</span>
                    <span style={{color:sevColor[ins.sev],fontSize:9,fontFamily:"'JetBrains Mono',monospace",letterSpacing:2,fontWeight:700}}>
                      {ins.cat.toUpperCase()}
                    </span>
                  </div>
                  <div style={{color:T.text,fontSize:12,fontWeight:600,marginBottom:6}}>{ins.title}</div>
                  <div style={{color:T.sub,fontSize:11,lineHeight:1.65}}>{ins.msg}</div>
                </div>
              ))}
            </div>
          )}

          {/* ══ TAB: RISK DETECTION ══ */}
          {activeTab==='risks' && (
            <div>
              <Card style={{marginBottom:12,padding:'12px 16px'}}>
                <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
                  {['CRITICAL','HIGH','MEDIUM','LOW'].map(l=>{
                    const n = risks.filter(r=>r.level===l).length;
                    return (
                      <div key={l} style={{display:'flex',alignItems:'center',gap:8}}>
                        <div style={{width:10,height:10,borderRadius:'50%',background:riskColor[l]}}/>
                        <span style={{fontSize:10,color:T.muted,fontFamily:"'JetBrains Mono',monospace"}}>{l}: <strong style={{color:riskColor[l]}}>{n}</strong></span>
                      </div>
                    );
                  })}
                </div>
              </Card>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {risks.map((r,i)=>{
                  const c = riskColor[r.level] || T.accent;
                  return (
                    <div key={i} style={{background:`${c}08`,borderTop:`1px solid ${c}25`,borderBottom:`1px solid ${c}25`,borderLeft:`1px solid ${c}25`,borderRight:`1px solid ${c}25`,borderRadius:10,
                      padding:'14px 16px',display:'flex',gap:14,alignItems:'flex-start',borderLeft:`4px solid ${c}`}}>
                      <span style={{fontSize:20,marginTop:2}}>{r.icon}</span>
                      <div style={{flex:1}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                          <span style={{color:T.text,fontSize:12,fontWeight:700}}>{r.title}</span>
                          <span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,padding:'2px 8px',
                            borderRadius:4,background:`${c}18`,color:c,border:`1px solid ${c}30`}}>{r.level}</span>
                        </div>
                        <div style={{color:T.sub,fontSize:11,lineHeight:1.6}}>{r.detail}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

                    {/* ══ TAB: RECOMMENDATIONS ══ */}
          {activeTab==='recs' && (
            <div style={{display:'flex',flexDirection:'column',gap:12}}>

              {/* AI Toast Notification */}
              {actionToast && (
                <div style={{padding:'10px 16px',borderRadius:8,background:T.green,color:'#fff',
                  fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,
                  boxShadow:'0 4px 20px rgba(0,0,0,0.3)'}}>
                  {actionToast}
                </div>
              )}

              {/* AI-Generated Suggested Actions */}
              {suggestedActions.length > 0 && (
                <div>
                  <div style={{color:T.muted,fontSize:9,letterSpacing:3,fontFamily:"'JetBrains Mono',monospace",
                    textTransform:'uppercase',marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
                    <div style={{width:14,height:2,background:T.red}}/>
                    AI Detected Issues — {suggestedActions.length} Suggested Actions
                  </div>
                  {suggestedActions.map((action, i) => {
                    const pc = action.priority==='Critical'?T.red:action.priority==='High'?T.orange||'#F97316':action.priority==='Medium'?T.yellow:T.accent;
                    return (
                      <Card key={i} style={{padding:'14px 18px',borderLeft:`3px solid ${pc}`,marginBottom:10}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                          <div style={{flex:1}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5,flexWrap:'wrap'}}>
                              <span style={{color:T.text,fontSize:13,fontWeight:700}}>{action.title}</span>
                              <span style={{fontSize:9,padding:'2px 8px',borderRadius:3,fontWeight:700,
                                fontFamily:"'JetBrains Mono',monospace",background:`${pc}15`,color:pc,border:`1px solid ${pc}30`}}>
                                {action.priority.toUpperCase()}
                              </span>
                              <span style={{fontSize:9,padding:'2px 8px',borderRadius:3,
                                fontFamily:"'JetBrains Mono',monospace",background:`${T.accent}12`,color:T.accent}}>
                                {action.kpi}
                              </span>
                            </div>
                            <div style={{fontSize:10,color:T.muted,fontFamily:"'JetBrains Mono',monospace",
                              marginBottom:8,padding:'3px 8px',background:`${pc}08`,borderRadius:4,display:'inline-block'}}>
                              ⚡ Trigger: {action.trigger}
                            </div>
                          </div>
                        </div>
                        <div style={{fontSize:11,color:T.sub,lineHeight:1.7,marginBottom:10,
                          padding:'8px 10px',background:T.bg,borderRadius:7,border:`1px solid ${T.border}`}}>
                          {action.description}
                        </div>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                          <div style={{display:'flex',gap:14,fontSize:10,color:T.muted,flexWrap:'wrap'}}>
                            <span>👤 <strong style={{color:T.sub}}>{action.responsible}</strong></span>
                            <span>📅 <strong style={{color:T.sub}}>{action.deadline}</strong></span>
                            <span>🔗 KPI: <strong style={{color:T.accent}}>{action.kpi}</strong></span>
                          </div>
                          <button onClick={() => handleCreateAction(action)}
                            style={{padding:'7px 16px',borderRadius:6,border:'none',
                              background:'linear-gradient(135deg,#00D4FF,#00BFA6)',
                              color:'#060D0F',fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",
                              cursor:'pointer',letterSpacing:0.5,
                              boxShadow:'0 2px 8px rgba(0,212,255,0.3)'}}>
                            ✦ Create Action
                          </button>
                        </div>
                      </Card>
                    );
                  })}
                </div>
              )}

              {/* Strategic Recommendations */}
              <div style={{color:T.muted,fontSize:9,letterSpacing:3,fontFamily:"'JetBrains Mono',monospace",
                textTransform:'uppercase',marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:14,height:2,background:T.accent}}/>
                Strategic Recommendations
              </div>
              {recommendations.map((rec,i)=>{
                const c = prioColor[rec.priority] || T.accent;
                return (
                  <Card key={i} style={{padding:'14px 18px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <span style={{fontSize:20}}>{rec.icon}</span>
                        <span style={{color:T.text,fontSize:13,fontWeight:700}}>{rec.area}</span>
                      </div>
                      <span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,padding:'3px 10px',
                        borderRadius:4,background:`${c}18`,color:c,border:`1px solid ${c}30`}}>
                        {rec.priority} PRIORITY
                      </span>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:8}}>
                      {rec.actions.map((act,j)=>(
                        <div key={j} style={{display:'flex',gap:10,alignItems:'flex-start',
                          padding:'8px 10px',background:T.bg,borderRadius:7,border:`1px solid ${T.border}`}}>
                          <span style={{color:c,fontSize:12,fontWeight:700,minWidth:18}}>{j+1}.</span>
                          <span style={{color:T.sub,fontSize:11,lineHeight:1.65}}>{act}</span>
                        </div>
                      ))}
                    </div>
                  </Card>
                );
              })}
            </div>
          )}
          {/* ══ TAB: AI DEEP ANALYSIS ══ */}
          {activeTab==='ai' && (
            <div>
              {aiLoading && (
                <Card style={{textAlign:'center',padding:'40px 0'}}>
                  <div style={{fontSize:32,marginBottom:12}}>🤖</div>
                  <div style={{color:T.accent,fontFamily:"'JetBrains Mono',monospace",fontSize:12,marginBottom:6}}>AI sedang menganalisis data keuangan…</div>
                  <div style={{color:T.muted,fontSize:10}}>Memproses {Object.keys(cur||{}).length} data points dengan konteks USALI + Makro Indonesia</div>
                </Card>
              )}
              {!aiLoading && !aiInsight && (
                <Card style={{textAlign:'center',padding:'40px 20px'}}>
                  <div style={{fontSize:40,marginBottom:12}}>🤖</div>
                  <div style={{color:T.text,fontSize:14,fontWeight:700,marginBottom:8}}>AI Deep Analysis</div>
                  <div style={{color:T.muted,fontSize:12,lineHeight:1.7,marginBottom:20}}>
                    Klik <strong style={{color:T.accent}}>🤖 AI Deep Analysis</strong> untuk mendapatkan analisis mendalam<br/>
                    dari AI berbasis data keuangan aktual GDS + konteks makro Indonesia.
                  </div>
                  <button onClick={fetchAIInsight}
                    style={{padding:'10px 24px',borderRadius:8,border:'none',fontSize:12,fontWeight:700,
                      fontFamily:"'JetBrains Mono',monospace",cursor:'pointer',
                      background:'linear-gradient(135deg,#00D4FF,#8B5CF6)',color:'#fff'}}>
                    🤖 Mulai AI Analysis
                  </button>
                </Card>
              )}
              {!aiLoading && aiInsight && !aiInsight._error && (
                <div>
                  {/* Header */}
                  <div style={{background:`${aiInsight.overall_health==='STRONG'||aiInsight.overall_health==='EXCELLENT'?T.green:aiInsight.overall_health==='WEAK'||aiInsight.overall_health==='CRITICAL'?T.red:T.yellow}12`,
                    border:`1px solid ${aiInsight.overall_health==='STRONG'||aiInsight.overall_health==='EXCELLENT'?T.green:aiInsight.overall_health==='WEAK'||aiInsight.overall_health==='CRITICAL'?T.red:T.yellow}30`,
                    borderRadius:10,padding:'16px 20px',marginBottom:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
                      <div style={{flex:1}}>
                        <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>
                          🤖 AI ANALYSIS · {periodLabel} {aiInsight._mode==='live'?'· Live AI':'· Estimasi'}
                        </div>
                        <div style={{color:T.text,fontSize:14,fontWeight:700,lineHeight:1.5}}>{aiInsight.headline}</div>
                      </div>
                      <div style={{display:'flex',gap:8,alignItems:'center'}}>
                        {[['Health',aiInsight.overall_health],['Risk',aiInsight.risk_level],['Outlook',aiInsight.outlook]].map(([l,v])=>{
                          const c = ['STRONG','EXCELLENT','LOW','POSITIVE'].includes(v)?T.green:['WEAK','CRITICAL','HIGH','NEGATIVE'].includes(v)?T.red:T.yellow;
                          return <div key={l} style={{textAlign:'center',background:`${c}15`,border:`1px solid ${c}30`,borderRadius:8,padding:'6px 10px'}}>
                            <div style={{fontSize:8,color:T.muted,fontFamily:"'JetBrains Mono',monospace",marginBottom:2}}>{l}</div>
                            <div style={{fontSize:10,fontWeight:700,color:c,fontFamily:"'JetBrains Mono',monospace"}}>{v}</div>
                          </div>;
                        })}
                      </div>
                    </div>
                  </div>

                  {/* CFO Message */}
                  <Card style={{marginBottom:12,borderLeft:`3px solid ${T.accent}`}}>
                    <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginBottom:8}}>💼 PESAN CFO</div>
                    <div style={{color:T.text,fontSize:12,lineHeight:1.8,fontStyle:'italic'}}>{aiInsight.cfo_message}</div>
                  </Card>

                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}} className="r-grid-2">
                    {/* Key Findings */}
                    <Card>
                      <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>🔍 TEMUAN UTAMA</div>
                      {(aiInsight.key_findings||[]).map((f,i)=>(
                        <div key={i} style={{display:'flex',gap:8,padding:'7px 0',borderBottom:`1px solid ${T.border}`}}>
                          <span style={{color:T.accent,fontWeight:700,fontSize:11,minWidth:18}}>{i+1}.</span>
                          <span style={{color:T.sub,fontSize:11,lineHeight:1.6}}>{f}</span>
                        </div>
                      ))}
                    </Card>
                    {/* Root Causes */}
                    <Card>
                      <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>⚙️ AKAR MASALAH</div>
                      {(aiInsight.root_causes||[]).map((r,i)=>(
                        <div key={i} style={{display:'flex',gap:8,padding:'7px 0',borderBottom:`1px solid ${T.border}`}}>
                          <span style={{color:T.red,fontWeight:700,fontSize:11,minWidth:18}}>▸</span>
                          <span style={{color:T.sub,fontSize:11,lineHeight:1.6}}>{r}</span>
                        </div>
                      ))}
                    </Card>
                  </div>

                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="r-grid-2">
                    {/* Quick Wins */}
                    <Card>
                      <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>⚡ QUICK WINS (&lt;30 HARI)</div>
                      {(aiInsight.quick_wins||[]).map((q,i)=>(
                        <div key={i} style={{display:'flex',gap:8,padding:'7px 10px',marginBottom:6,
                          background:`${T.green}08`,borderRadius:6,border:`1px solid ${T.green}20`}}>
                          <span style={{color:T.green,fontWeight:700,fontSize:12}}>✓</span>
                          <span style={{color:T.sub,fontSize:11,lineHeight:1.6}}>{q}</span>
                        </div>
                      ))}
                    </Card>
                    {/* Strategic Priorities */}
                    <Card>
                      <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>🎯 PRIORITAS STRATEGIS</div>
                      {(aiInsight.strategic_priorities||[]).map((s,i)=>(
                        <div key={i} style={{display:'flex',gap:8,padding:'7px 0',borderBottom:`1px solid ${T.border}`}}>
                          <span style={{color:T.yellow,fontWeight:700,fontSize:11,minWidth:18}}>{i+1}.</span>
                          <span style={{color:T.sub,fontSize:11,lineHeight:1.6}}>{s}</span>
                        </div>
                      ))}
                    </Card>
                  </div>

                  {kpiHealth.score && (
                    <Card style={{marginTop:12}}>
                      <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginBottom:8}}>📊 KPI HEALTH INTEGRATION</div>
                      <div style={{display:'flex',alignItems:'center',gap:12}}>
                        <div style={{fontSize:28,fontWeight:800,color:kpiHealth.score>=75?T.green:kpiHealth.score>=50?T.yellow:T.red,fontFamily:"'JetBrains Mono',monospace"}}>{kpiHealth.score}%</div>
                        <div style={{color:T.sub,fontSize:11,lineHeight:1.6}}>
                          Overall KPI Health Score dari KPI Scorecard module.<br/>
                          {kpiHealth.health&&`${kpiHealth.health.okCount} KPI hijau, ${kpiHealth.health.warnCount} kuning, ${kpiHealth.health.redCount} merah dari ${kpiHealth.health.allCount} total KPI.`}
                        </div>
                      </div>
                    </Card>
                  )}

                  <div style={{textAlign:'right',marginTop:8}}>
                    <button onClick={fetchAIInsight}
                      style={{padding:'6px 14px',borderRadius:6,border:`1px solid ${T.border}`,background:'none',
                        color:T.muted,fontSize:10,fontFamily:"'JetBrains Mono',monospace",cursor:'pointer'}}>
                      ↻ Refresh Analysis
                    </button>
                  </div>
                </div>
              )}
              {aiInsight&&aiInsight._error&&(
                <Card style={{textAlign:'center',padding:'24px'}}>
                  <div style={{color:T.red,fontSize:12}}>⚠️ {aiInsight._error}</div>
                  <button onClick={fetchAIInsight} style={{marginTop:12,padding:'6px 14px',borderRadius:6,
                    border:`1px solid ${T.accent}`,background:'none',color:T.accent,fontSize:10,cursor:'pointer'}}>
                    Coba Lagi
                  </button>
                </Card>
              )}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ── Classify signal based on value & thresholds ──
function classifySignal(key, value) {
  const rules = {
    biRate:      v => v <= 5.5 ? 'Positive' : v <= 6.0 ? 'Stable' : v <= 6.5 ? 'Caution' : 'Risk',
    inflation:   v => v <= 2.5 ? 'Positive' : v <= 3.5 ? 'Stable' : v <= 4.5 ? 'Caution' : 'Risk',
    usdIdr:      v => v <= 15500 ? 'Positive' : v <= 16000 ? 'Stable' : v <= 16500 ? 'Caution' : 'Risk',
    gdp:         v => v >= 5.5 ? 'Positive' : v >= 4.5 ? 'Stable' : v >= 3.0 ? 'Caution' : 'Risk',
    consConf:    v => v >= 130 ? 'Positive' : v >= 110 ? 'Stable' : v >= 90 ? 'Caution' : 'Risk',
    fuel:        v => v <= 3.0 ? 'Positive' : v <= 5.0 ? 'Stable' : v <= 8.0 ? 'Caution' : 'Risk',
    intlArr:     v => v >= 15 ? 'Positive' : v >= 8 ? 'Stable' : v >= 0 ? 'Caution' : 'Risk',
    domTravel:   v => v >= 10 ? 'Positive' : v >= 5 ? 'Stable' : v >= 0 ? 'Caution' : 'Risk',
    natOcc:      v => v >= 65 ? 'Positive' : v >= 55 ? 'Stable' : v >= 45 ? 'Caution' : 'Risk',
    surabayaAdr: v => v >= 8 ? 'Positive' : v >= 4 ? 'Stable' : v >= 0 ? 'Caution' : 'Risk',
    revpar:      v => v >= 8 ? 'Positive' : v >= 4 ? 'Stable' : v >= 0 ? 'Caution' : 'Risk',
    supply:      v => v <= 2.0 ? 'Positive' : v <= 4.0 ? 'Stable' : v <= 7.0 ? 'Caution' : 'Risk',
  };
  const fn = rules[key];
  if (!fn) return 'Stable';
  return fn(value);
}

function classColor(cls, T) {
  return cls==='Positive'?T.green : cls==='Stable'?T.accent : cls==='Caution'?T.yellow : T.red;
}
function classBg(cls, T) {
  const c = classColor(cls,T);
  return `${c}12`;
}
function classBorder(cls, T) {
  const c = classColor(cls,T);
  return `${c}30`;
}
function classIcon(cls) {
  return cls==='Positive'?'✅' : cls==='Stable'?'🔵' : cls==='Caution'?'⚠️' : '🔴';
}

// ── Mini sparkline using SVG ──
function MiniSparkline({data, color, width=120, height=36}) {
  if (!data || data.length < 2) return null;
  const vals = data.map(d=>d.v);
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const range = max - min || 1;
  const pts = vals.map((v,i)=>{
    const x = (i/(vals.length-1))*(width-4)+2;
    const y = height-2 - ((v-min)/range)*(height-4);
    return `${x},${y}`;
  }).join(' ');
  const lastV = vals[vals.length-1];
  const prevV = vals[vals.length-2];
  const isUp = lastV >= prevV;
  const lineColor = isUp ? color : '#EF4444';
  return (
    <svg width={width} height={height} style={{display:'block'}}>
      <polyline points={pts} fill="none" stroke={lineColor} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" opacity="0.8"/>
      {/* last dot */}
      {(() => {
        const lx = parseFloat(pts.split(' ').pop().split(',')[0]);
        const ly = parseFloat(pts.split(' ').pop().split(',')[1]);
        return <circle cx={lx} cy={ly} r="2.5" fill={lineColor}/>;
      })()}
    </svg>
  );
}

        d = {

          {key:'supply',    l:'New Supply (Rooms)',  v:String(d.supply),   unit:'%', display:(d.supply>=0?'+':'')+d.supply.toFixed(1)+'%',  trend:trendDir(d.supply,   base.hospitality[2].num), note:d.notes?.supply   ||base.hospitality[2].note, src:d.sources?.supply   ||'Colliers',      num:d.supply},
        ],

]}`;

    try {
      const isLocal = ['file:','content:','about:','null'].includes(window.location.protocol) || !window.location.hostname;
      if (isLocal) {
        setNews([
          {category:'Currency',    headline:'Rupiah Melemah ke 16.947 per Dolar AS',        summary:'Nilai tukar rupiah menyentuh 16.947 per USD pada 20 Maret 2026, tertekan penguatan indeks dolar global dan ketidakpastian pasar.',            impact:'caution',  relevance:'Biaya impor FF&E, minuman impor, dan spare parts GDS naik signifikan. Pertimbangkan local sourcing.'},
          {category:'Monetary',    headline:'Bank Indonesia Tahan Suku Bunga di 5,75%',     summary:'BI mempertahankan suku bunga acuan di 5,75% dalam RDG Maret 2026 untuk menjaga stabilitas nilai tukar dan pertumbuhan.',                      impact:'neutral',  relevance:'Biaya kredit hotel tidak berubah. ROI arrangement dan capex dapat direncanakan dengan asumsi rate saat ini.'},
          {category:'Economic',    headline:'Inflasi Indonesia Turun ke 1,65% di Feb 2026',  summary:'BPS melaporkan inflasi Februari 2026 sebesar 1,65% YoY, turun dari 2,18% — terendah dalam 4 tahun terakhir.',                               impact:'positive', relevance:'Biaya bahan baku domestik dan upah terkendali. Favorable untuk maintain margin F&B GDS.'},
          {category:'Tourism',     headline:'Wisman ke Jawa Timur Tumbuh 18,2% di Q1 2026', summary:'Kemenparekraf mencatat pertumbuhan wisatawan mancanegara ke Jawa Timur 18,2% YoY di Q1 2026, didorong segmen MICE dan leisure.',             impact:'positive', relevance:'Demand kamar dan F&B GDS berpotensi naik. Window untuk push ADR dan premium package.'},
          {category:'Hospitality', headline:'ADR Hotel Surabaya Naik 7,3% di Q1 2026',      summary:'Laporan STR menunjukkan Average Daily Rate hotel bintang 4-5 di Surabaya naik 7,3% YoY, didorong pemulihan korporat.',                       impact:'positive', relevance:'GDS dapat manfaatkan momentum untuk rate increase bertahap tanpa kehilangan daya saing.'},
          {category:'Energy',      headline:'Tarif Listrik Komersial Naik 6% Efektif April', summary:'PLN mengumumkan penyesuaian tarif listrik segmen komersial rata-rata 6% efektif 1 April 2026 seiring kenaikan harga energi global.',           impact:'caution',  relevance:'Biaya utility GDS akan naik. Rekomendasikan audit energi per departemen, target efisiensi 10%.'},

    window.__GDS_MACRO_CAUT      = cautCount;

  }, [signals, lastUpdate, sentiment, posCount, riskCount, cautCount]);

  useEffect(() => {
    if (news) window.__GDS_MACRO_NEWS = news;
  }, [news]);

  const TAB_STYLE = (active) => ({
    padding:'6px 14px', borderRadius:6, border:'none', cursor:'pointer',
    fontSize:11, fontWeight:700, fontFamily:"'JetBrains Mono',monospace",
    background: active ? T.accent : T.border,
    color: active ? '#060D0F' : T.muted,
    transition:'all 0.15s',

  return (
    <div>
      {/* ── Header ── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:12}}>

          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>MACRO RADAR</div>
          <div style={{color:T.muted,fontSize:11}}>
            External economic intelligence · {lastUpdate ? `Last Updated: ${lastUpdate}` : 'Baseline · Mar 2026'}
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{display:'flex',gap:4}}>

              </button>

          </div>
          <button onClick={handleUpdate} disabled={loading}
            style={{padding:'8px 16px',borderRadius:6,border:'none',
              background:loading?T.border:T.secondary,color:loading?T.muted:'#fff',
              cursor:loading?'not-allowed':'pointer',fontSize:12,fontWeight:700,
              fontFamily:"'JetBrains Mono',monospace",display:'flex',alignItems:'center',gap:6}}>
            {loading ? '⟳ Refreshing…' : (['file:','content:','about:','null'].includes(window.location.protocol)||!window.location.hostname ? '↻ Refresh Estimates' : '↻ Live Update AI')}
          </button>
        </div>
      </div>

      {/* ── Error Banner ── */}
      {updateError && (
        <div style={{background:`${T.red}18`,border:`1px solid ${T.red}40`,borderRadius:8,padding:'10px 14px',
          marginBottom:12,display:'flex',alignItems:'center',gap:8,color:T.red,fontSize:11}}>
          <span style={{fontSize:14}}>⚠️</span>
          <span>{updateError}</span>
          <button onClick={()=>setUpdateError(null)} style={{marginLeft:'auto',background:'none',border:'none',
            color:T.red,cursor:'pointer',fontSize:13,fontWeight:700}}>✕</button>
        </div>

      {/* ── Alert Threshold Banner ── */}
      {(() => {
        const alerts = allItems.filter(s => s.cls === 'Risk' || s.cls === 'Caution');
        if (!alerts.length) return null;
        return (
          <div style={{background:`${T.yellow}12`,border:`1px solid ${T.yellow}35`,borderRadius:8,
            padding:'10px 14px',marginBottom:12}}>

              <span style={{fontSize:12}}>🔔</span>
              <span style={{color:T.yellow,fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",letterSpacing:0.5}}>

              </span>

      })()}

      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:10,marginBottom:16}} className="r-grid-5">
        {[
          {l:'Positive Signals', v:posCount,  c:T.green,       icon:'✅'},
          {l:'Caution Signals',  v:cautCount, c:T.yellow,      icon:'⚠️'},
          {l:'Risk Signals',     v:riskCount, c:T.red,         icon:'🔴'},

              <button onClick={()=>setNewsError(null)} style={{marginLeft:'auto',background:'none',border:'none',color:T.red,cursor:'pointer',fontWeight:700}}>✕</button>
            </div>
          )}
          {newsLoading && !news && (
            <div style={{textAlign:'center',padding:'40px',color:T.muted,fontSize:12}}>⟳ Mengambil berita terkini…</div>
          )}
          {news && (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="r-grid-2">
              {news.map((item,i)=>{
                const impactC = item.impact==='positive'?T.green:item.impact==='caution'?T.yellow:item.impact==='risk'?T.red:T.accent;
                const catIcon = item.category==='Currency'?'💱':item.category==='Monetary'?'🏦':item.category==='Tourism'?'✈️':item.category==='Hospitality'?'🏨':item.category==='Energy'?'⚡':'📊';
                return (
                  <div key={i} style={{background:T.card,borderTop:`1px solid ${T.border}`,borderBottom:`1px solid ${T.border}`,borderLeft:`1px solid ${T.border}`,borderRight:`1px solid ${T.border}`,borderRadius:10,
                    padding:'14px 16px',borderLeft:`3px solid ${impactC}`}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                      <span style={{fontSize:14}}>{catIcon}</span>
                      <span style={{color:T.muted,fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",
                        padding:'2px 6px',borderRadius:3,background:`${impactC}18`,color:impactC,
                        textTransform:'uppercase',letterSpacing:0.5}}>{item.category}</span>
                      <span style={{marginLeft:'auto',fontSize:9,padding:'2px 6px',borderRadius:3,
                        background:`${impactC}15`,color:impactC,fontWeight:700,textTransform:'uppercase',
                        fontFamily:"'JetBrains Mono',monospace"}}>{item.impact}</span>
                    </div>
                    <div style={{color:T.text,fontSize:12,fontWeight:700,lineHeight:1.4,marginBottom:6}}>{item.headline}</div>
                    <div style={{color:T.sub,fontSize:11,lineHeight:1.55,marginBottom:8}}>{item.summary}</div>
                    <div style={{background:`${impactC}0F`,border:`1px solid ${impactC}25`,borderRadius:6,
                      padding:'7px 10px'}}>
                      <div style={{color:T.muted,fontSize:9,fontWeight:700,letterSpacing:0.5,marginBottom:3}}>💡 RELEVANSI GDS</div>
                      <div style={{color:impactC,fontSize:10,lineHeight:1.5}}>{item.relevance}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Footer */}
      <div style={{textAlign:'center',color:T.muted,fontSize:10,marginTop:14,fontFamily:"'JetBrains Mono',monospace",
        padding:'8px',borderTop:`1px solid ${T.border}`}}>
        {lastUpdate ? `Last Updated: ${lastUpdate}` : 'Baseline data · Mar 2026'} · Macro Radar · Indicative intelligence for management use only
      </div>
    </div>
  );
}



// ══════════════════════════════════════════════════════════════════
// GENERATE REPORT HTML — Board-quality financial report
// ══════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════
// generateReportHTML — Professional board report generator
// selSections: array of section IDs, or 'board' for full pack
// ══════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════
// FINANCIAL ACTION TRACKER MODULE
// ══════════════════════════════════════════════════════════════════
window.__GDS_ACTIONS = window.__GDS_ACTIONS || [];

const ACTION_KPIS = ['Revenue','Payroll Ratio','GOP Margin','NOP Margin','Cash Flow','Cost of Sales','Occupancy','ADR','RevPAR','Current Ratio','D/E Ratio'];
const ACTION_PRIORITIES = ['Critical','High','Medium','Low'];
const ACTION_STATUSES = ['Open','In Progress','Completed'];

const STATUS_COLOR = {
  'Open':        '#EF4444',
  'In Progress': '#EAB308',
  'Completed':   '#22C55E',
};
const PRIORITY_COLOR = {
  'Critical': '#EF4444',
  'High':     '#F97316',
  'Medium':   '#EAB308',
  'Low':      '#00D4FF',
};

function ActionTrackerPage({ currentUser }) {
  const [actions,    setActions]    = useState(window.__GDS_ACTIONS || []);
  const [lang] = React.useContext(LangContext); // i18n re-render trigger
  const [modal,      setModal]      = useState(null); // 'add'|'edit'|'delete'|'view'
  const [selected,   setSelected]   = useState(null);
  const [filterStatus, setFilterStatus] = useState('All');
  const [filterPriority, setFilterPriority] = useState('All');
  const [filterKPI,    setFilterKPI]    = useState('All');
  const [searchQ,    setSearchQ]    = useState('');
  const [sortField,  setSortField]  = useState('deadline');
  const [toast,      setToast]      = useState(null);
  const [activeView, setActiveView] = useState('board'); // 'board'|'list'|'dashboard'

  const emptyForm = {
    title:'', description:'', kpi:'Revenue', responsible:'', priority:'High',
    deadline:'', status:'Open', notes:'', source:'Manual',
  };
  const [form, setForm] = useState({...emptyForm});

  // Role access: MASTER & OWNER can do everything; GM can add/edit; HOD read-only
  const role = currentUser?.role || 'HOD';
  const canAdd    = ['MASTER','OWNER','GM'].includes(role);
  const canEdit   = ['MASTER','OWNER','GM'].includes(role);
  const canDelete = ['MASTER','OWNER'].includes(role);

  const persist = (updated) => {
    window.__GDS_ACTIONS = updated;
    // Also persist to storage API if available
    if (typeof window.storage !== 'undefined') {
      window.storage.set('gds_actions', JSON.stringify(updated), false).catch(()=>{});
    }
    window.__GDS_ACTIONS_REF = updated;  // report generator reads this
    setActions([...updated]);
  };

  // Load from storage on mount
  React.useEffect(() => {
    if (typeof window.storage !== 'undefined') {
      window.storage.get('gds_actions', false).then(r => {
        if (r && r.value) {
          try {
            const saved = JSON.parse(r.value);
            if (Array.isArray(saved) && saved.length > 0) {
              window.__GDS_ACTIONS = saved;
              setActions(saved);
            }
          } catch(e) {}
        }
      }).catch(()=>{});
    }
  }, []);

  const showToast = (msg, type='success') => {
    setToast({msg,type}); setTimeout(()=>setToast(null),2800);
  };

  const openAdd = (prefill={}) => {
    setForm({...emptyForm, ...prefill, id: Date.now(), createdAt: new Date().toLocaleDateString('id-ID')});
    setModal('add');
  };

  const handleSave = () => {
    if (!form.title.trim()) { showToast('Judul action wajib diisi','error'); return; }
    if (!form.responsible.trim()) { showToast('Responsible person wajib diisi','error'); return; }
    if (!form.deadline) { showToast('Deadline wajib diisi','error'); return; }
    if (modal==='add') {
      const newActions = [...actions, {...form, id:Date.now(), createdAt:new Date().toLocaleDateString('id-ID')}];
      persist(newActions); showToast('Action berhasil ditambahkan');
    } else {
      const updated = actions.map(a => a.id===selected.id ? {...form} : a);
      persist(updated); showToast('Action berhasil diupdate');
    }
    setModal(null); setSelected(null);
  };

  const handleDelete = () => {
    persist(actions.filter(a=>a.id!==selected.id));
    showToast('Action dihapus','info'); setModal(null); setSelected(null);
  };

  const updateStatus = (id, status) => {
    persist(actions.map(a => a.id===id ? {...a, status, completedAt: status==='Completed'?new Date().toLocaleDateString('id-ID'):undefined} : a));
  };

  // Filter & sort
  const today = new Date(); today.setHours(0,0,0,0);
  const isOverdue = (a) => a.status!=='Completed' && a.deadline && new Date(a.deadline) < today;

  const filtered = useMemo(() => {
    return actions
      .filter(a => filterStatus==='All' || a.status===filterStatus)
      .filter(a => filterPriority==='All' || a.priority===filterPriority)
      .filter(a => filterKPI==='All' || a.kpi===filterKPI)
      .filter(a => !searchQ || a.title.toLowerCase().includes(searchQ.toLowerCase()) || a.responsible.toLowerCase().includes(searchQ.toLowerCase()))
      .sort((a,b) => {
        if (sortField==='deadline') return (a.deadline||'9999') > (b.deadline||'9999') ? 1:-1;
        if (sortField==='priority') return ACTION_PRIORITIES.indexOf(a.priority) - ACTION_PRIORITIES.indexOf(b.priority);
        return 0;
      });
  }, [actions, filterStatus, filterPriority, filterKPI, searchQ, sortField]);

  // Dashboard counts
  const counts = useMemo(() => ({
    total:     actions.length,
    open:      actions.filter(a=>a.status==='Open').length,
    inProgress:actions.filter(a=>a.status==='In Progress').length,
    completed: actions.filter(a=>a.status==='Completed').length,
    overdue:   actions.filter(a=>isOverdue(a)).length,
    critical:  actions.filter(a=>a.priority==='Critical'&&a.status!=='Completed').length,
  }), [actions]);

  const completionRate = actions.length ? Math.round(counts.completed/actions.length*100) : 0;

  const CARD_STYLE = (active) => ({
    padding:'6px 14px', borderRadius:6, border:'none', cursor:'pointer',
    fontSize:11, fontWeight:700, fontFamily:"'JetBrains Mono',monospace",
    background: active ? T.accent : T.border,
    color: active ? '#060D0F' : T.muted,
  });

  const INPUT_STYLE = {
    width:'100%', background:T.bg, border:`1px solid ${T.border}`, borderRadius:6,
    padding:'8px 10px', color:T.text, fontSize:12, fontFamily:'inherit', outline:'none',
    boxSizing:'border-box',
  };
  const LABEL_STYLE = {color:T.muted, fontSize:9, letterSpacing:2, textTransform:'uppercase', fontFamily:"'JetBrains Mono',monospace", marginBottom:5, display:'block'};

  // ── Board view columns ─────────────────────────────────────────
  const boardCols = ACTION_STATUSES.map(status => ({
    status,
    items: filtered.filter(a=>a.status===status),
    color: STATUS_COLOR[status],
  }));

  return (
    <div>
      {/* Toast */}
      {toast && (
        <div style={{position:'fixed',top:20,right:24,zIndex:9999,padding:'10px 18px',borderRadius:8,
          background:toast.type==='error'?T.red:toast.type==='info'?T.accent:T.green,
          color:'#fff',fontSize:12,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,
          boxShadow:'0 4px 20px rgba(0,0,0,0.3)',animation:'slideIn 0.2s ease'}}>
          {toast.msg}
        </div>
      )}

      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{t('act_title')}</div>
          <div style={{color:T.muted,fontSize:11,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <span>Insights → Actions → Results · {counts.total} total · {completionRate}% completed</span>
            <span style={{fontSize:9,padding:'2px 7px',borderRadius:4,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,
              background:role==='MASTER'?`${T.accent}20`:role==='OWNER'?`${T.green}20`:role==='GM'?`${T.yellow}20`:`${T.border}`,
              color:role==='MASTER'?T.accent:role==='OWNER'?T.green:role==='GM'?T.yellow:T.muted,
              border:`1px solid ${role==='MASTER'?T.accent+'30':role==='OWNER'?T.green+'30':T.border}`}}>
              {role} · {canAdd?'Can Add':'Read Only'}{canDelete?' · Can Delete':''}
            </span>
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          {['dashboard','board','list'].map(v=>(
            <button key={v} style={CARD_STYLE(activeView===v)} onClick={()=>setActiveView(v)}>
              {v==='dashboard'?'📊':v==='board'?'🗂':'📋'} {v.charAt(0).toUpperCase()+v.slice(1)}
            </button>
          ))}
          {canAdd && (
            <button onClick={()=>openAdd()}
              style={{padding:'8px 16px',borderRadius:7,border:'none',
                background:'linear-gradient(135deg,#00D4FF,#00BFA6)',color:'#060D0F',
                fontSize:12,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",cursor:'pointer'}}>
              + New Action
            </button>
          )}
        </div>
      </div>

      {/* ══ DASHBOARD VIEW ══ */}
      {activeView==='dashboard' && (
        <div>
          {/* KPI Strip */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:10,marginBottom:16}} className="r-grid-4">
            {[
              {l:'Total',    v:counts.total,     c:T.accent},
              {l:'Open',     v:counts.open,      c:T.red},
              {l:'In Progress',v:counts.inProgress,c:T.yellow},
              {l:'Completed',v:counts.completed, c:T.green},
              {l:'Overdue',  v:counts.overdue,   c:'#F97316'},
              {l:'Critical', v:counts.critical,  c:T.red},
            ].map(k=>(
              <div key={k.l} style={{background:T.card,borderTop:`2px solid ${k.c}`,borderBottom:`1px solid ${T.border}`,borderLeft:`1px solid ${T.border}`,borderRight:`1px solid ${T.border}`,borderRadius:8,padding:'12px 14px'}}>
                <div style={{fontSize:9,color:T.muted,letterSpacing:1,textTransform:'uppercase',fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>{k.l}</div>
                <div style={{fontSize:22,fontWeight:700,color:k.c,fontFamily:"'JetBrains Mono',monospace"}}>{k.v}</div>
              </div>
            ))}
          </div>

          {/* Progress bar */}
          <Card style={{marginBottom:14,padding:'14px 18px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <span style={{color:T.text,fontSize:12,fontWeight:700}}>Tingkat Penyelesaian</span>
              <span style={{color:T.green,fontSize:16,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{completionRate}%</span>
            </div>
            <div style={{height:10,background:T.border,borderRadius:5,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${completionRate}%`,borderRadius:5,
                background:'linear-gradient(90deg,#00D4FF,#22C55E)',transition:'width 0.5s'}}/>
            </div>
            <div style={{display:'flex',gap:16,marginTop:10,flexWrap:'wrap'}}>
              {ACTION_STATUSES.map(s=>{
                const n=actions.filter(a=>a.status===s).length;
                const pct=actions.length?Math.round(n/actions.length*100):0;
                return <span key={s} style={{fontSize:10,color:STATUS_COLOR[s],fontFamily:"'JetBrains Mono',monospace"}}>
                  {s}: {n} ({pct}%)
                </span>;
              })}
            </div>
          </Card>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="r-grid-2">
            {/* By KPI */}
            <Card style={{padding:'14px 16px'}}>
              <SectionTitle>ACTIONS BY KPI</SectionTitle>
              {ACTION_KPIS.filter(k=>actions.some(a=>a.kpi===k)).map(kpi=>{
                const total=actions.filter(a=>a.kpi===kpi).length;
                const done=actions.filter(a=>a.kpi===kpi&&a.status==='Completed').length;
                return (
                  <div key={kpi} style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span style={{fontSize:10,color:T.sub}}>{kpi}</span>
                      <span style={{fontSize:10,color:T.muted,fontFamily:"'JetBrains Mono',monospace"}}>{done}/{total}</span>
                    </div>
                    <div style={{height:5,background:T.border,borderRadius:3,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${total?done/total*100:0}%`,background:T.green,borderRadius:3}}/>
                    </div>
                  </div>
                );
              })}
              {!actions.some(()=>true) && <div style={{color:T.muted,fontSize:11,textAlign:'center',padding:'20px 0'}}>Belum ada actions</div>}
            </Card>

            {/* By Priority */}
            <Card style={{padding:'14px 16px'}}>
              <SectionTitle>PRIORITY BREAKDOWN</SectionTitle>
              {ACTION_PRIORITIES.map(p=>{
                const open=actions.filter(a=>a.priority===p&&a.status!=='Completed').length;
                const done=actions.filter(a=>a.priority===p&&a.status==='Completed').length;
                const c=PRIORITY_COLOR[p];
                return (
                  <div key={p} style={{display:'flex',alignItems:'center',gap:12,padding:'7px 0',borderBottom:`1px solid ${T.border}`}}>
                    <div style={{width:10,height:10,borderRadius:'50%',background:c,flexShrink:0}}/>
                    <span style={{flex:1,fontSize:11,color:T.sub}}>{p}</span>
                    <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:c,fontWeight:700}}>{open} open</span>
                    <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:T.green}}>{done} done</span>
                  </div>
                );
              })}
            </Card>
          </div>

          {/* ── AI Suggested Actions panel ── */}
          {(() => {
            const aiActions = (typeof window !== 'undefined' && window.__GDS_AI_INSIGHTS) ? 
              (window.__GDS_AI_RISKS||[]).filter(r=>r.level==='CRITICAL'||r.level==='HIGH').slice(0,3) : [];
            const sugActs = typeof window !== 'undefined' && window.__GDS_ACTIONS_SUGGESTED ? 
              window.__GDS_ACTIONS_SUGGESTED.slice(0,4) : [];
            if (!sugActs.length && !aiActions.length) return null;
            return (
              <Card style={{marginTop:12,padding:'14px 18px'}}>
                <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:14,height:2,background:T.accent}}/>
                  🤖 AI SUGGESTED ACTIONS — dari AI Analysis
                </div>
                {sugActs.length > 0 ? sugActs.map((a,i) => {
                  const pc = a.priority==='Critical'?T.red:a.priority==='High'?T.orange||'#F97316':T.yellow;
                  const alreadyAdded = actions.some(x=>x.title===a.title);
                  return (
                    <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                      padding:'8px 10px',marginBottom:6,background:T.bg,borderRadius:7,
                      borderTop:`1px solid ${T.border}`,borderBottom:`1px solid ${T.border}`,borderRight:`1px solid ${T.border}`,borderLeft:`3px solid ${pc}`}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,color:T.text,fontWeight:600}}>{a.title}</div>
                        <div style={{fontSize:9,color:T.muted,fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{a.kpi} · {a.priority} · {a.responsible}</div>
                      </div>
                      {canAdd && !alreadyAdded ? (
                        <button onClick={()=>{
                          const newA = {...a,id:Date.now(),createdAt:new Date().toLocaleDateString('id-ID'),status:'Open',source:'AI Analysis'};
                          persist([...actions, newA]);
                          showToast('AI action ditambahkan ke tracker');
                        }} style={{padding:'4px 10px',borderRadius:5,border:'none',
                          background:T.accent,color:'#060D0F',fontSize:9,fontWeight:700,
                          fontFamily:"'JetBrains Mono',monospace",cursor:'pointer',whiteSpace:'nowrap',marginLeft:8}}>
                          + Adopt
                        </button>
                      ) : alreadyAdded ? (
                        <span style={{fontSize:9,color:T.green,fontFamily:"'JetBrains Mono',monospace",marginLeft:8}}>✓ Added</span>
                      ) : null}
                    </div>
                  );
                }) : (
                  <div style={{color:T.muted,fontSize:11,textAlign:'center',padding:'12px 0'}}>
                    Run AI Analysis → Run Analysis to generate suggested actions
                  </div>
                )}
              </Card>
            );
          })()}

          {/* Overdue alert */}
          {counts.overdue>0 && (
            <div style={{marginTop:12,padding:'12px 16px',background:`${T.red}0d`,borderRadius:9,
              borderTop:`1px solid ${T.red}30`,borderBottom:`1px solid ${T.red}30`,borderRight:`1px solid ${T.red}30`,borderLeft:`3px solid ${T.red}`}}>
              <div style={{color:T.red,fontSize:12,fontWeight:700,marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>
                ⚠ {counts.overdue} Action Overdue
              </div>
              {actions.filter(a=>isOverdue(a)).map(a=>(
                <div key={a.id} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',
                  borderBottom:`1px solid ${T.red}15`,fontSize:11,color:T.sub}}>
                  <span>{a.title}</span>
                  <span style={{color:T.red,fontFamily:"'JetBrains Mono',monospace"}}>{a.deadline} · {a.responsible}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ══ BOARD VIEW ══ */}
      {activeView==='board' && (
        <div>
          {/* Filters */}
          <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
            <input placeholder="🔍 Cari action..." value={searchQ} onChange={e=>setSearchQ(e.target.value)}
              style={{...INPUT_STYLE, width:'100%', padding:'6px 10px'}}/>
            {[
              {label:'Status', val:filterStatus, set:setFilterStatus, opts:['All',...ACTION_STATUSES]},
              {label:'Priority',val:filterPriority,set:setFilterPriority,opts:['All',...ACTION_PRIORITIES]},
            ].map(f=>(
              <select key={f.label} value={f.val} onChange={e=>f.set(e.target.value)}
                style={{...INPUT_STYLE,width:'auto',padding:'6px 10px'}}>
                {f.opts.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
            ))}
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}} className="r-grid-3">
            {boardCols.map(col=>(
              <div key={col.status}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                  padding:'8px 12px',background:`${col.color}15`,borderRadius:'8px 8px 0 0',
                  borderTop:`1px solid ${col.color}30`,borderBottom:`1px solid ${col.color}30`,borderLeft:`1px solid ${col.color}30`,borderRight:`1px solid ${col.color}30`,borderBottom:'none',marginBottom:0}}>
                  <span style={{color:col.color,fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{col.status.toUpperCase()}</span>
                  <span style={{color:col.color,fontSize:12,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{col.items.length}</span>
                </div>
                <div style={{background:T.bg,borderTop:`2px solid ${col.color}`,borderBottom:`1px solid ${T.border}`,borderLeft:`1px solid ${T.border}`,borderRight:`1px solid ${T.border}`,
                  borderRadius:'0 0 8px 8px',minHeight:200,padding:8,display:'flex',flexDirection:'column',gap:8}}>
                  {col.items.length===0 && (
                    <div style={{textAlign:'center',color:T.muted,fontSize:10,padding:'20px 0',fontFamily:"'JetBrains Mono',monospace"}}>
                      No actions
                    </div>
                  )}
                  {col.items.map(a=>(
                    <div key={a.id} style={{background:T.card,borderTop:`1px solid ${isOverdue(a)?T.red:T.border}`,borderBottom:`1px solid ${isOverdue(a)?T.red:T.border}`,borderLeft:`1px solid ${isOverdue(a)?T.red:T.border}`,borderRight:`1px solid ${isOverdue(a)?T.red:T.border}`,

// Legacy compatibility: aggregate new granular fields → old field names
// Used by pnl() which reads the old field names
function normalizeTB(tb) {
  const t = {...tb};

  // ── PAYROLL: separate pure salary from allowances ─────────────────
  // Sub-accounts -010/-020 = Salary+Wages; -030 to -090 = Allowances
  // For each dept, compute pure pay and allowances separately
  const deptMap = {
    foPay:['600'], hkPay:['602'], fnbPay:['610'],
    laundryPay:['630'], spaPay:['640'], transportPay:['650'],
    agPay:['660'], hrdPay:['670'], smPay:['680'], pomecPay:['690'],
  };
  // If granular sub-account data not in TB, use existing aggregated fields
  // roomsPay = foPay + hkPay (pure salary only)
  if (!t.roomsPay && (t.foPay !== undefined || t.hkPay !== undefined)) {
    t.roomsPay    = (t.foPay||0) + (t.hkPay||0);      // pure salary
    t.roomsAllow  = (t.foAllow||0) + (t.hkAllow||0);  // allowances
    t.roomsOther  = (t.foOther||0) + (t.hkOther||0);
  } else if (!t.roomsPay) {
    t.roomsPay = 0; t.roomsAllow = 0; t.roomsOther = 0;
  }

  // minorPay aggregation
  if (t.minorPay === undefined) {
    t.minorPay   = (t.laundryPay||0) + (t.spaPay||0) + (t.transportPay||0);
    t.minorAllow = (t.laundryAllow||0) + (t.spaAllow||0) + (t.transportAllow||0);
    t.minorOther = (t.laundryOther||0) + (t.spaOther||0) + (t.transportOther||0);
    t.cosMinor   = (t.cosMinor||0) + (t.cosLaundry||0) + (t.cosSpa||0) + (t.cosTransport||0);
    t.minor      = (t.minor||0) + (t.laundryRev||0) + (t.spaRev||0) + (t.transportRev||0);
  } else {
    // already set — check if minor revenue needs aggregation
    const subRevs = (t.laundryRev||0) + (t.spaRev||0) + (t.transportRev||0);
    if (subRevs > 0 && (t.minor||0) < subRevs + 0.001) {
      t.minor    = (t.minor||0) + subRevs;
      t.cosMinor = (t.cosMinor||0) + (t.cosLaundry||0) + (t.cosSpa||0) + (t.cosTransport||0);
    }
  }

  // Ensure allowance fields exist for overhead depts
  if (!t.agAllow)    t.agAllow    = 0;
  if (!t.hrdAllow)   t.hrdAllow   = 0;
  if (!t.smAllow)    t.smAllow    = 0;
  if (!t.pomecAllow) t.pomecAllow = 0;

  return t;
}
