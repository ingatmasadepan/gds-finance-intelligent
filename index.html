// Usage: t('nav_overview') → 'Overview' or 'Ikhtisar'
let _lang = 'en';

function initLang() {
  // Read saved preference, default to Indonesian for GDS FIP
  const saved = (typeof localStorage !== 'undefined') && localStorage.getItem('gds_lang');
  _lang = saved || 'id';
}
// Auto-initialise on script load
initLang();

// Expose lang globally so generateReportHTML can read current lang
function getCurrentLang() { return _lang; }

function setLang(lang) {
  _lang = lang;
  localStorage.setItem('gds_lang', lang);
}

function getLang() { return _lang; }

function t(key) {
  const entry = TRANSLATIONS[key];
  if (!entry) return key; // fallback: return key itself
  // Use current language — falls back to English if translation missing
  return entry[_lang] || entry['en'] || entry['id'] || key;
}

function tInsight(enText, idText) {
  var _l = (typeof getCurrentLang !== 'undefined' ? getCurrentLang() : (window.getCurrentLang ? window.getCurrentLang() : 'en'));
  return _l === 'id' ? idText : enText;
}

function buildSuggestedActions(cur, bs, ratios, macro, bud) {
  // cr and de may be passed via ratios or computed here
  if (!cur) return [];
  var { cr, de, revVsBud, revVsPrior } = ratios || {};
  var actions = [];

  // 1. Low GOP Margin
  if (cur.gopMgn < 30) {
    actions.push({
      id: 'act-gop-' + Date.now(),
      title: 'Improve Gross Operating Profit Margin',
      description: 'GOP margin at ' + cur.gopMgn.toFixed(1) + '% — below 30% target. Review departmental cost structure, identify quick-win savings in overhead and non-essential spend, and implement revenue upsell initiatives.',
      kpi: 'GOP Margin',
      responsible: 'General Manager',
      priority: cur.gopMgn < 20 ? 'Critical' : 'High',
      status: 'Open',
      source: 'AI Analysis',
      trigger: 'GOP ' + cur.gopMgn.toFixed(1) + '% < 30% target',
    });
  }

  // 2. Negative NOP
  if (cur.nop < 0) {
    actions.push({
      id: 'act-nop-' + Date.now(),
      title: 'Address Net Operating Loss',
      description: 'Net Operating Profit negative at ' + (cur.nop * 1000).toFixed(1) + 'M. Non-operating charges (' + (cur.deprTotal * 1000).toFixed(1) + 'M depr + ' + (cur.mgmtFee * 1000).toFixed(1) + 'M fees) exceed GOP. Negotiate fee schedule and defer non-critical capex.',
      kpi: 'NOP Margin',
      responsible: 'Financial Controller',
      priority: 'Critical',
      status: 'Open',
      source: 'AI Analysis',
      trigger: 'NOP negative: ' + (cur.nop * 1000).toFixed(1) + 'M',
    });
  }

  // 3. Revenue below budget
  if (revVsBud != null && revVsBud < -5) {
    actions.push({
      id: 'act-bud-' + Date.now(),
      title: 'Revenue Recovery — Close Budget Gap',
      description: 'Revenue ' + Math.abs(revVsBud).toFixed(1) + '% below budget. Review pricing strategy, activate OTA promotions, target MICE and corporate accounts to close the gap.',
      kpi: 'Revenue',
      responsible: 'Revenue Manager',
      priority: Math.abs(revVsBud) > 15 ? 'High' : 'Medium',
      status: 'Open',
      source: 'AI Analysis',
      trigger: 'Revenue vs Budget: ' + revVsBud.toFixed(1) + '%',
    });
  }

  // 4. High payroll ratio
  if (cur.payRat > 35) {
    actions.push({
      id: 'act-pay-' + Date.now(),
      title: 'Reduce Payroll Ratio to Below 35%',
      description: 'Payroll ratio at ' + cur.payRat.toFixed(1) + '% — above 35% benchmark. Implement flex staffing model, review overtime, align headcount to occupancy bands.',
      kpi: 'Payroll Ratio',
      responsible: 'HR Manager',
      priority: cur.payRat > 42 ? 'Critical' : cur.payRat > 38 ? 'High' : 'Medium',
      status: 'Open',
      source: 'AI Analysis',
      trigger: 'Payroll ' + cur.payRat.toFixed(1) + '% > 35%',
    });
  }

  // 5. High overhead ratio
  if (cur.ovhdRat > 28) {
    actions.push({
      id: 'act-ovhd-' + Date.now(),
      title: 'Overhead Cost Reduction Initiative',
      description: 'Overhead ratio at ' + cur.ovhdRat.toFixed(1) + '% — above 25% target. Audit Admin & General, Sales & Marketing, and Engineering expenses. Identify deferrable items.',
      kpi: 'GOP Margin',
      responsible: 'Department Heads',
      priority: cur.ovhdRat > 35 ? 'High' : 'Medium',
      status: 'Open',
      source: 'AI Analysis',
      trigger: 'Overhead ' + cur.ovhdRat.toFixed(1) + '% > 25%',
    });
  }

  // 6. Liquidity risk
  if (cr < 1.3) {
    actions.push({
      id: 'act-liq-' + Date.now(),
      title: 'Strengthen Working Capital Position',
      description: 'Current ratio ' + cr.toFixed(2) + 'x — below 1.5x target. Accelerate AR collection, review advance deposit drawdowns, defer non-critical capex.',
      kpi: 'Current Ratio',
      responsible: 'Financial Controller',
      priority: cr < 1.0 ? 'Critical' : 'High',
      status: 'Open',
      source: 'AI Analysis',
      trigger: 'Current Ratio ' + cr.toFixed(2) + 'x < 1.3x',
    });
  }

  // 7. High leverage
  if (de > 2.5) {
    actions.push({
      id: 'act-lev-' + Date.now(),
      title: 'Reduce Financial Leverage',
      description: 'D/E ratio at ' + de.toFixed(2) + 'x — elevated. Prioritise debt repayment from operating cash flows, review financing structure with ownership.',
      kpi: 'D/E Ratio',
      responsible: 'Financial Controller',
      priority: de > 4 ? 'High' : 'Medium',
      status: 'Open',
      source: 'AI Analysis',
      trigger: 'D/E ' + de.toFixed(2) + 'x > 2.5x',
    });
  }

  // 8. Revenue below prior year
  if (revVsPrior != null && revVsPrior < -5) {
    actions.push({
      id: 'act-rev-' + Date.now(),
      title: 'Improve Room Revenue Performance',
      description: 'Revenue declined ' + Math.abs(revVsPrior).toFixed(1) + '% vs prior year. Review pricing strategy, increase OTA channel presence, activate loyalty and direct booking promotions to recover ADR and occupancy.',
      kpi: 'Revenue',
      responsible: 'Revenue Manager',
      priority: 'High',
      status: 'Open',
      source: 'AI Analysis',
      trigger: 'Revenue YoY: ' + revVsPrior.toFixed(1) + '%',
    });
  }

  // Set unique deadlines (30/60/90 days from now)
  var today = new Date();
  actions.forEach(function(a, i) {
    var days = a.priority === 'Critical' ? 14 : a.priority === 'High' ? 30 : a.priority === 'Medium' ? 60 : 90;
    var dl = new Date(today.getTime() + days * 24 * 3600 * 1000);
    a.deadline = dl.toISOString().slice(0, 10);
    a.createdAt = today.toLocaleDateString('id-ID');
    a.id = Date.now() + i;
  });

  return actions;
}


function generateReportHTML(selPeriod, selSubPeriod, selReport, theme, execSummaryText, selSections) {

  // ── 0. Resolve global refs (supports both eval-scope and window-scope) ─
  var TB           = window.__TB_REF           || {};
  var BUD26        = window.BUD26_REF          || {};
  var BS_SNAPSHOTS = window.BS_SNAPSHOTS_REF   || {};
  var ANN          = window.ANN_REF            || {};
  var FORECAST_SC  = window.FORECAST_SC_REF    || null;
  var pnl          = window.pnl               || function(){return {};};
  var aggKeys      = window.aggKeys            || function(){return {};};
  var annPnl       = window.annPnl            || function(){return {};};
  var bsCalc       = window.bsCalc            || function(){return {};};
  var ML           = window.ML                || [];
  var mKeys24      = window.mKeys24           || [];
  var mKeys25      = window.mKeys25           || [];
  var mKeys26_ytd  = window.mKeys26_ytd       || [];
  var MON_YEARS    = window.MON_YEARS         || ['2026','2025','2024'];
  var getKeys      = window.getKeys           || function(yr,p){return [];};
  var snapKey      = window.snapKey           || function(){return 'dec25';};
  var prevSnapKey  = window.prevSnapKey       || function(){return 'dec24';};

  // ── 1. Period resolution — mirrors module logic exactly ──────────
  // Uses same getKeys(), snapKey(), prevSnapKey() as PLPage/BSPage/CFPage
  var yr=selPeriod;
  var period=selSubPeriod||'full'; // map selSubPeriod → module-style period string
  var isAnn=!MON_YEARS.includes(yr);

  // Current period keys — identical to module getKeys()
  var keys=isAnn?null:getKeys(yr,period);

  // Current period data — same as module cur
  var d=isAnn?annPnl(parseInt(yr)):(keys&&keys.length?aggKeys(keys):annPnl(parseInt(yr)));

  // ── Prior year same period — identical to PLPage prior useMemo ──
  var py=String(parseInt(yr)-1);
  var dp=null;
  if(isAnn){
    dp=parseInt(py)>=2013?annPnl(parseInt(py)):null;
  } else {
    // Mirror PLPage exactly:
    // full/ytd 2026 → aggKeys(mKeys25)  [full year 2025]
    // full/ytd 2025 → aggKeys(mKeys24)  [full year 2024]
    // m1 2026       → aggKeys(['2025-01'])
    // m2 2026       → aggKeys(['2025-02'])
    // mN 2025/2024  → aggKeys(['YYYY-MM'])
    // qN 2025/2024  → aggKeys(quarter keys from prior year)
    if(period==='full'||period==='ytd'){
      if(yr==='2026') dp=aggKeys(mKeys25);
      else if(yr==='2025') dp=aggKeys(mKeys24);
      else dp=parseInt(py)>=2013?annPnl(parseInt(py)):null;
    } else if(MON_YEARS.includes(py)){
      var priorKeys=getKeys(py,period);
      dp=(priorKeys&&priorKeys.length)?aggKeys(priorKeys):null;
      if(!dp) dp=parseInt(py)>=2013?annPnl(parseInt(py)):null;
    } else {
      dp=parseInt(py)>=2013?annPnl(parseInt(py)):null;
    }
  }

  // ── YTD data (Jan → current period) for P&L YTD section ─────────
  var ytd=null, ytdLy=null;
  if(yr==='2026'&&keys&&keys.length){
    // YTD = all months from Jan to current period
    var ytdKeys=[];
    for(var mi=1;mi<=keys.length;mi++){var mk='2026-'+(mi<10?'0':'')+mi; if(TB[mk])ytdKeys.push(mk);}
    ytd=ytdKeys.length?aggKeys(ytdKeys):d;
    // LY YTD = same months in 2025
    var ytdLyKeys=ytdKeys.map(function(k){return k.replace('2026','2025');}).filter(function(k){return TB[k];});
    ytdLy=ytdLyKeys.length?aggKeys(ytdLyKeys):null;
  } else {
    ytd=d; ytdLy=dp;
  }

  // ── Balance sheet keys — using snapKey/prevSnapKey same as BSPage ─
  var bsK=snapKey(yr,period);
  var bsP=prevSnapKey(yr,period);
  var latestSnap26=(function(){var ml=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];var s=ml.map(function(m){return m+'26';}).filter(function(k){return BS_SNAPSHOTS[k];});return s.length?s[s.length-1]:'feb26';})();var bs=bsCalc(BS_SNAPSHOTS[bsK]||BS_SNAPSHOTS[latestSnap26]);
  var bsp=bsCalc(BS_SNAPSHOTS[bsP]||BS_SNAPSHOTS['dec25']);

  // ── Budget — same as PLPage/BudgetPage bud logic ─────────────────
  // Only 2026 has BUD26 data; use same keys as current period
  var bud=null;
  if(yr==='2026'&&keys&&keys.length){
    var budValid=keys.filter(function(k){return BUD26[k];});
    bud=budValid.length?aggKeys(budValid,BUD26):null;
  }

  // ── 2. Sections ────────────────────────────────────────────────
  var sec=selSections&&selSections.length?selSections:(
    selReport==='board'?['exec','dashboard','revenue','cost','pl','bs','cf','kpi','forecast','macro']:
    selReport==='pl'?['exec','pl']:selReport==='bs'?['exec','bs']:selReport==='cf'?['exec','cf']:
    selReport==='kpi'?['exec','kpi']:selReport==='budget'?['exec','budget']:
    selReport==='forecast'?['exec','forecast']:selReport==='macro'?['exec','macro']:['exec','pl']);
  var has=function(s){return sec.indexOf(s)>=0;};

  // ── 3. Theme ───────────────────────────────────────────────────
  var D=theme==='dark';
  // Fix 1: True print-friendly light theme (McKinsey/BCG/Deloitte style)
  // Light = white paper, dark readable text, professional consulting look
  var C={
    bg:   D?'#060D0F':'#ffffff',
    page: D?'#0B1118':'#f5f6f8',
    card: D?'#0D1520':'#ffffff',
    bdr:  D?'#1A2535':'#dee2e6',
    txt:  D?'#E2E8F0':'#0d1117',
    sub:  D?'#94A3B8':'#2d3748',
    mut:  D?'#4A5568':'#64748b',
    acc:  D?'#00D4FF':'#0052cc',
    sec:  D?'#00B4A0':'#00695c',
    grn:  D?'#22C55E':'#186e3b',
    red:  D?'#EF4444':'#b91c1c',
    yel:  D?'#EAB308':'#7c5900',
    hdr:  D?'#060A10':'#172b4d',
    pur:  D?'#8B5CF6':'#5243aa',
    orn:  D?'#F97316':'#c2410c',
    cvr1: D?'#060A0F':'#0d1b36',
    cvr2: D?'#0A1525':'#1e3a6e',
  };
  // Fix 3: Correct logo — dark logo for dark theme, clear/light logo for light/PDF
  // Logo by PAGE BACKGROUND (not theme):

  function svgBarChart(data, opts){
    // data: [{label, value, color?, budget?}]
    var w=opts.w||520,h=opts.h||180,pad=opts.pad||{l:44,r:12,t:16,b:32};
    var cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
    var vals=data.map(function(d){return d.value;}); 
    var budVals=data.filter(function(d){return d.budget!=null;}).map(function(d){return d.budget;});
    var allVals=vals.concat(budVals);
    var mn=Math.min(0,Math.min.apply(null,allVals)), mx=Math.max.apply(null,allVals.concat([0.001]));
    var rng=mx-mn||1;
    var bw=Math.max(4,Math.floor(cw/data.length*0.55));
    var bw2=Math.max(3,Math.floor(bw*0.5));
    var zeroY=pad.t+ch*(1-(-mn/rng));

    var bars='',labels='',gridLines='',budBars='';
    // Grid lines
    for(var gi=0;gi<=4;gi++){
      var gy=pad.t+ch*(gi/4);
      var gv=mx-(rng*gi/4);
      gridLines+='<line x1="'+pad.l+'" y1="'+gy+'" x2="'+(pad.l+cw)+'" y2="'+gy+'" stroke="'+C.bdr+'" stroke-width="0.5" stroke-dasharray="2,3"/>';
      gridLines+='<text x="'+(pad.l-4)+'" y="'+(gy+4)+'" text-anchor="end" font-size="8" fill="'+C.mut+'">'+fV(gv)+'</text>';
    }

    data.forEach(function(item,i){
      var x=pad.l+(i/data.length)*cw+(cw/data.length/2)-(bw/2);
      var barH=Math.abs(item.value/rng)*ch;
      var by=item.value>=0?zeroY-barH:zeroY;
      var col=item.color||(item.value>=0?C.acc:C.red);
      bars+='<rect x="'+x+'" y="'+by+'" width="'+bw+'" height="'+Math.max(1,barH)+'" fill="'+col+'" rx="2" opacity="0.88"/>';

      if(item.budget!=null){
        var bly=pad.t+ch*(1-(item.budget-mn)/rng);

  function svgLineChart(series, opts){
    // series: [{label, color, data:[{x,y}]}]
    var w=opts.w||520,h=opts.h||160;
    // Fix syntax
    var pl=44,pr=12,pt=16,pb=28;
    if(opts.pad){pl=opts.pad.l||44;pr=opts.pad.r||12;pt=opts.pad.t||16;pb=opts.pad.b||28;}
    var cw=w-pl-pr, ch=h-pt-pb;
    var allY=[];
    series.forEach(function(s){s.data.forEach(function(p){allY.push(p.y);});});
    var mn=Math.min(0,Math.min.apply(null,allY)), mx=Math.max.apply(null,allY.concat([0.001]));
    var rng=mx-mn||1;
    var xCount=series[0]?series[0].data.length:1;
    var gridLines='',paths='',dots='',xlabels='';

    for(var gi=0;gi<=4;gi++){
      var gy=pt+ch*(gi/4);
      var gv=mx-(rng*gi/4);
      gridLines+='<line x1="'+pl+'" y1="'+gy+'" x2="'+(pl+cw)+'" y2="'+gy+'" stroke="'+C.bdr+'" stroke-width="0.5" stroke-dasharray="2,3"/>';
      gridLines+='<text x="'+(pl-4)+'" y="'+(gy+3)+'" text-anchor="end" font-size="8" fill="'+C.mut+'">'+fP(gv)+'</text>';
    }

    series.forEach(function(s){
      if(!s.data.length)return;
      var pts=s.data.map(function(p,i){
        var x=pl+(i/(xCount-1||1))*cw;
        var y=pt+ch*(1-(p.y-mn)/rng);
        return{x:x,y:y,label:p.x};
      });
      var d2='M'+pts.map(function(p){return p.x+','+p.y;}).join(' L');
      paths+='<path d="'+d2+'" fill="none" stroke="'+s.color+'" stroke-width="2" stroke-linejoin="round"/>';

    });

    return '<svg width="'+w+'" height="'+h+'" style="overflow:visible">'+

  function svgPieChart(slices, opts){
    // slices: [{label,value,color}]
    var w=opts.w||200,h=opts.h||200,cx=opts.cx||(w/2),cy=opts.cy||(h/2),r=opts.r||78;
    var total=slices.reduce(function(a,s){return a+Math.abs(s.value);},0)||1;

      var x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
      var x2=cx+r*Math.cos(end),y2=cy+r*Math.sin(end);
      var lf=pct>0.5?1:0;
      if(pct<0.005){angle=end;return;}
      paths+='<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 '+lf+',1 '+x2+','+y2+' Z" fill="'+s.color+'" opacity="0.9" stroke="'+C.bg+'" stroke-width="1.5"/>';

      '</svg>';
  }

  function svgWaterfall(items, opts){
    // items: [{label,value,isTotal?}]

      var gy=pt+ch*(gi/3);

    computed.forEach(function(item,i){
      var cx2=pl+(i+0.5)*(cw/n);

      var barBot=pt+ch*(1-(Math.min(item.start,item.end)-minV)/rng);

      bars+='<rect x="'+(cx2-bw/2)+'" y="'+barTop+'" width="'+bw+'" height="'+barH+'" fill="'+col+'" rx="2" opacity="0.9"/>';

      vals+='<text x="'+cx2+'" y="'+(barTop-4)+'" text-anchor="middle" font-size="8" font-weight="700" fill="'+col+'">'+fV(item.value)+'</text>';
      if(i<computed.length-1&&!item.isTotal){
        var nextX=pl+(i+1.5)*(cw/n)-bw/2;
        var lineY=pt+ch*(1-(item.end-minV)/rng);
        connectors+='<line x1="'+(cx2+bw/2)+'" y1="'+lineY+'" x2="'+nextX+'" y2="'+lineY+'" stroke="'+C.bdr+'" stroke-width="1" stroke-dasharray="3,2"/>';

      '<line x1="'+pl+'" y1="'+pt+'" x2="'+pl+'" y2="'+(pt+ch)+'" stroke="'+C.bdr+'" stroke-width="1"/>'+

  function svgHBar(items, opts){
    // items: [{label,value,max,color,benchmark?}]
    var w=opts.w||420,h=opts.h||(items.length*32+20);
    var pl=opts.pl||110,pr=20,pt=10,bh=16,gap=16;
    var cw=w-pl-pr;
    var bars='',labels='',vals='',bench='';
    items.forEach(function(item,i){
      var y=pt+i*(bh+gap);
      var pct=Math.min(1,item.value/Math.max(item.max,0.001));
      var col=item.color||C.acc;
      labels+='<text x="'+(pl-8)+'" y="'+(y+bh/2+4)+'" text-anchor="end" font-size="9" fill="'+C.sub+'">'+item.label+'</text>';
      bars+='<rect x="'+pl+'" y="'+y+'" width="'+cw+'" height="'+bh+'" fill="'+C.bdr+'" rx="3"/>';
      bars+='<rect x="'+pl+'" y="'+y+'" width="'+(pct*cw)+'" height="'+bh+'" fill="'+col+'" rx="3" opacity="0.85"/>';
      vals+='<text x="'+(pl+pct*cw+6)+'" y="'+(y+bh/2+4)+'" font-size="9" font-weight="700" fill="'+col+'">'+fP(item.value)+'</text>';
      if(item.benchmark!=null){
        var bx=pl+(Math.min(1,item.benchmark/Math.max(item.max,0.001))*cw);
        bench+='<line x1="'+bx+'" y1="'+(y-3)+'" x2="'+bx+'" y2="'+(y+bh+3)+'" stroke="'+C.yel+'" stroke-width="1.5" stroke-dasharray="3,2"/>';
      }
    });
    return '<svg width="'+w+'" height="'+h+'" style="overflow:visible">'+labels+bars+bench+vals+'</svg>';
  }

      '<div class="card"><div class="card-title">Monetary & Economic Signals</div>'+rs.slice(0,4).map(function(s){

          '<span style="font-size:10px;color:'+C.sub+'">'+il.t+'</span></div></div>';

  // ── 20. ASSEMBLE ──────────────────────────────────────────────
  return '<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8"/>\n'+
    '<meta name="viewport" content="width=device-width,initial-scale=1"/>\n'+

    cover+'\n<div class="page">\n'+
    tocH+execH+dashH+revH+costH+plH+bsH+cfH+kpiH+budH+fcH+actH+macH+
    '\n'+footer()+'\n</div>\n'+
    '<script>window.onload=function(){setTimeout(function(){window.print();},800);};<\/script>\n'+
    '</body>\n</html>';
}

function pnl(d) {

    roomsPay:0,fnbPay:0,minorPay:0,deptPay:0,

    agOther:0,hrdOther:0,smOther:0,pomecOther:0,energy:0,ovhdOther:0,

    incentFee:0,mgmtFee:0,capexRes:0,landTax:0,insur:0,

  // Cost of Sales (support both old & new field names)
  const cosFnb   = (d.cosFnb !== undefined && d.cosFnb !== null ? d.cosFnb : (d.cos||0)*0.85);
  const cosMinor  = (d.cosMinor !== undefined && d.cosMinor !== null ? d.cosMinor : (d.cos||0)*0.10);
  const cosOther  = d.cosOther  || 0;
  const cos       = cosFnb + cosMinor + cosOther;

  // Dept Payroll — pure salary+wages only (allowances moved to Other Expense)
  const roomsPay  = d.roomsPay  || 0;  // pure salaries
  const fnbPay    = d.fnbPay    || 0;
  const minorPay  = d.minorPay  || 0;
  const deptPay   = roomsPay + fnbPay + minorPay || (d.deptPay||0);
  // Allowances (Meal, Medical, THR, Jamsostek) — classified as Other Expense
  const roomsAllow= d.roomsAllow|| 0;
  const fnbAllow  = d.fnbAllow  || 0;
  const minorAllow= d.minorAllow|| 0;
  const agAllow   = d.agAllow   || 0;
  const hrdAllow  = d.hrdAllow  || 0;
  const smAllow   = d.smAllow   || 0;
  const pomecAllow= d.pomecAllow|| 0;

  // Dept Other (support both old & new)
  // Dept Other includes allowances reclassified from payroll
  const roomsOther = (d.roomsOther||0) + (d.roomsAllow||0);
  const fnbOther   = (d.fnbOther||0)   + (d.fnbAllow||0);
  const minorOther = (d.minorOther||0) + (d.minorAllow||0);
  const deptOther  = roomsOther + fnbOther + minorOther || (d.deptOther||0);

  // Overhead Payroll
  const agPay    = d.agPay    || 0;
  const hrdPay   = d.hrdPay   || 0;
  const smPay    = d.smPay    || 0;
  const pomecPay = d.pomecPay || 0;
  const ovhdPay  = agPay+hrdPay+smPay+pomecPay || (d.ovhdPay||0);

  // Overhead Other
  const agOther    = d.agOther    || 0;
  const hrdOther   = d.hrdOther   || 0;
  const smOther    = d.smOther    || 0;
  const pomecOther = d.pomecOther || 0;
  const energy     = d.energy     || 0;
  // Overhead Other includes allowances reclassified from payroll
  const ovhdOther  = agOther+hrdOther+smOther+pomecOther+energy
    + (d.agAllow||0)+(d.hrdAllow||0)+(d.smAllow||0)+(d.pomecAllow||0)
    || (d.ovhdOther||0);

  // Dept Profit & GOP
  const roomsProfit  = (d.rooms||0) - roomsPay - roomsOther;
  const fnbProfit    = (d.fnb||0)   - cosFnb   - fnbPay   - fnbOther;
  const minorProfit  = (d.minor||0) - cosMinor  - minorPay - minorOther;
  const otherProfit  = (d.otherinc||0) - cosOther;
  const deptProfit   = roomsProfit + fnbProfit + minorProfit + otherProfit;
  const gop          = deptProfit - ovhdPay - ovhdOther;

  // Non-Operating (individual lines)
  const incentFee  = d.incentFee  || 0;
  const mgmtFee    = d.mgmtFee    || 0;
  const capexRes   = d.capexRes   || 0;
  const landTax    = d.landTax    || 0;
  const insur      = d.insur      || 0;
  const depr       = (d.depr !== undefined && d.depr !== null ? d.depr : (d.deprTotal||0)*0.97);
  const amor       = (d.amor !== undefined && d.amor !== null ? d.amor : (d.deprTotal||0)*0.03);
  const deprTotal  = depr + amor;
  const interest   = d.interest   || 0;
  const roi        = d.roi        || 0;
  const roiSub     = d.roiSub     || 0;
  const propMgmt   = d.propMgmt   || 0;
  const sinkFund   = d.sinkFund   || 0;
  const ownExp     = d.ownExp     || 0;
  const forex      = d.forex      || 0;
  const gainLoss   = d.gainLoss   || 0;
  const otherNonOp = d.otherNonOp || 0;
  const taxCur     = (d.taxCur !== undefined ? d.taxCur : (d.tax||0));
  const taxDef     = d.taxDef     || 0;
  const nonOp = incentFee+mgmtFee+capexRes+landTax+insur+deprTotal+interest+roi+roiSub+propMgmt+sinkFund+ownExp+forex+gainLoss+otherNonOp;
  const nop   = gop - nonOp - taxCur - taxDef;

  return {
    ...d, rev, cos, cosFnb, cosMinor, cosOther,
    roomsPay, fnbPay, minorPay, deptPay,
    roomsOther, fnbOther, minorOther, deptOther,
    agPay, hrdPay, smPay, pomecPay, ovhdPay,
    agOther, hrdOther, smOther, pomecOther, energy, ovhdOther,
    roomsProfit, fnbProfit, minorProfit, otherProfit, deptProfit, gop,
    incentFee, mgmtFee, capexRes, landTax, insur,
    depr, amor, deprTotal, interest, roi, roiSub, propMgmt,
    sinkFund, ownExp, forex, gainLoss, otherNonOp, taxCur, taxDef,
    nonOp, nop,
    gopMgn:  rev>0 ? gop/rev*100  : 0,
    nopMgn:  rev>0 ? nop/rev*100  : 0,
    cosRat:  (d.fnb||0)>0 ? cosFnb/(d.fnb||0)*100 : 0,  // F&B CoS / F&B Revenue (USALI)
    payRat:  rev>0 ? (deptPay+ovhdPay)/rev*100 : 0,
    ovhdRat: rev>0 ? (ovhdPay+ovhdOther)/rev*100 : 0,
    roomsMix:rev>0 ? (d.rooms||0)/rev*100 : 0,
    fnbMix:  rev>0 ? (d.fnb||0)/rev*100 : 0,
    utlRat: rev>0 ? ovhdOther/rev*100 : 0,
    mntRat: rev>0 ? deptOther/rev*100 : 0,

  // Fixed Assets

  const netF     = fixG + accD;

  if(n===undefined||n===null||isNaN(n)) return '-';

  // 1 decimal if not whole, 0 if whole
  const dec = (a % 1 < 0.05 || a % 1 >= 0.95) ? 0 : 1;
  const fixed = dec === 1 ? Math.floor(a * 10) / 10 : Math.round(a);
  // Format with Indonesian thousand separator (.) and decimal (,)
  const parts = fixed.toFixed(dec).split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  const s = (parts.length > 1 && parts[1] !== '0' ? parts[0] + ',' + parts[1] : parts[0]) + 'M';

function snapKey(y, p) {
  const ML2=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  if(y==='2026'){
    if(p.startsWith('m')){
      const mi=parseInt(p.slice(1))-1;
      return ML2[mi]+'26';
    }
    // For YTD/full/quarter: return latest available 2026 snapshot
    const latest26=mKeys26_ytd.filter(k=>window.TB&&window.TB[k]).pop();
    if(latest26){const mi=parseInt(latest26.split('-')[1])-1;return ML2[mi]+'26';}
    // Fallback: latest snapshot present in BS_SNAPSHOTS for 2026
    const snaps26 = ML2.map((_,i)=>ML2[i]+'26').filter(k=>window.BS_SNAPSHOTS_REF&&window.BS_SNAPSHOTS_REF[k]);
    return snaps26.length ? snaps26[snaps26.length-1] : 'feb26';
  }
  if(MON_YEARS.includes(y)){
    const mi = p.startsWith('m') ? parseInt(p.slice(1))-1 : 11;
    if(p==='full') return ML2[11]+y.slice(2);
    if(p.startsWith('q')) {
      const qEnd = {q1:2,q2:5,q3:8,q4:11}[p];
      return ML2[qEnd]+y.slice(2);
    }
    return ML2[mi]+y.slice(2);
  }
  const yrMap={'2013':'dec13','2014':'dec14','2015':'dec15','2016':'dec16',
    '2017':'dec17','2018':'dec18','2019':'dec19','2020':'dec20',
    '2021':'dec21','2022':'dec22','2023':'dec23'};
  return yrMap[y]||'dec23';
}

function prevSnapKey(y, p) {
  const ML2=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  if(y==='2026'){
    if(p==='m1') return 'dec25';
    if(p.startsWith('m')){
      const mi=parseInt(p.slice(1))-1;
      return mi===0?'dec25':ML2[mi-1]+'26';
    }
    // For YTD/full/quarter: always return 'dec25' (opening balance of 2026)
    // CF and BS delta must start from year-opening, not a mid-year snapshot
    return 'dec25';
  }
  if(MON_YEARS.includes(y)){
    const mi = p.startsWith('m') ? parseInt(p.slice(1))-1 : 11;
    if(p==='full'||p==='q4'){
      const py=String(parseInt(y)-1);
      return snapKey(py,'full');
    }
    if(p.startsWith('q')){
      const qPrevEnd={q2:2,q3:5,q4:8}[p];
      if(qPrevEnd!==undefined) return ML2[qPrevEnd]+y.slice(2);
      return snapKey(String(parseInt(y)-1),'full');
    }
    if(mi===0) return snapKey(String(parseInt(y)-1),'full');
    return ML2[mi-1]+y.slice(2);
  }
  const py=String(parseInt(y)-1);
  const yrMap={'2012':null,'2013':'dec13','2014':'dec14','2015':'dec15','2016':'dec16',
    '2017':'dec17','2018':'dec18','2019':'dec19','2020':'dec20',
    '2021':'dec21','2022':'dec22','2023':'dec23'};
  return yrMap[py]||null;
}

function DashboardPage({ tbVersion=0 }) {
  // tbVersion increments on every data save/import — triggers full recalc
  const [syncFlash, setSyncFlash] = React.useState(false);
  React.useEffect(() => {
    if (tbVersion > 0) {
      setSyncFlash(true);
      const t = setTimeout(() => setSyncFlash(false), 3000);
      return () => clearTimeout(t);
    }
  }, [tbVersion]);
  const [yr, setYr]           = useState('2026');
  const [lang] = React.useContext(LangContext); // i18n re-render trigger
  const [period, setPeriod]   = useState(()=>getLatestPeriod('2026'));
  const [activeTab, setActiveTab] = useState('overview');

  // ── Exec Summary editable state ──────────────────────────────
  const [execText,    setExecText]    = useState('');
  const [execEdited,  setExecEdited]  = useState('');
  const [execSavedD,  setExecSavedD]  = useState({});
  const [execEditMode,setExecEditMode]= useState(false);
  const periodKeyD = `${yr}-${period}`;

  // ── Period resolution ─────────────────────────────────────────
  const isMonthly = MON_YEARS.includes(yr);
  const isMonth   = isMonthly && period.startsWith('m');

  const cur = useMemo(() => getCur(yr, period), [yr, period]);

  const prv = useMemo(() => {
    if (!isMonthly) {
      const prevYr = parseInt(yr) - 1;
      return prevYr >= 2013 ? annPnl(prevYr) : null;
    }
    if (period==='full'||period==='ytd') {
      if(yr==='2025') return aggKeys(mKeys24);
      if(yr==='2024') return annPnl(2023);
      if(yr==='2026') return aggKeys(mKeys25);
    }
    const base = yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;
    const mi   = parseInt(period.replace('m','')) - 1;
    if(mi===0){
      const pk = yr==='2025'?mKeys24:yr==='2026'?mKeys25:null;
      return pk?pnl(TB[pk[11]]||{}):null;
    }
    const pk2 = base[mi-1];
    return pk2&&TB[pk2]?pnl(TB[pk2]):null;
  }, [yr, period, isMonthly]);

  const bsNowKey = useMemo(()=>{
    if(!isMonthly){
      const m={'2013':'dec13','2014':'dec14','2015':'dec15','2016':'dec16','2017':'dec17',
        '2018':'dec18','2019':'dec19','2020':'dec20','2021':'dec21','2022':'dec22','2023':'dec23'};
      return m[yr]||'dec23';
    }
    return snapKey(yr,period);
  },[yr,period,isMonthly,tbVersion]);
  const bsPrvKey2 = useMemo(()=>prevSnapKey(yr,period),[yr,period,tbVersion]);
  const bs  = useMemo(()=>bsCalc(BS_SNAPSHOTS[bsNowKey]||{}),[bsNowKey]);
  const bsp = useMemo(()=>bsCalc(BS_SNAPSHOTS[bsPrvKey2]||{}),[bsPrvKey2]);

  const budPeriod = isMonth&&yr==='2026'?`2026-${String(parseInt(period.replace('m',''))).padStart(2,'0')}`:null;
  const bud = useMemo(()=>budPeriod&&BUD26[budPeriod]?pnl(BUD26[budPeriod]):null,[budPeriod]);

  const chg = (a,b)=>(b&&Math.abs(b)>0.0001)?(a-b)/Math.abs(b)*100:null;
  const safe = n=>(n===undefined||n===null||isNaN(n)||!isFinite(n))?0:n;

  // ── Prior year same period (for YoY comparisons) ─────────────
  const priorYr = useMemo(() => {
    const py = String(parseInt(yr) - 1);
    const pKeys = MON_YEARS.includes(py) ? getKeys(py, period) : null;
    if (pKeys && pKeys.length) return aggKeys(pKeys);
    if (parseInt(py) >= 2013) return annPnl(parseInt(py));
    return null;
  }, [yr, period]);

  // ── CF (read-only, derived from BS delta) ────────────────────
  const cf = useMemo(() => {
    if (!cur || !bs || !bsp) return null;
    const dARtrade = (bs.arTrade||bs.ar||0) - (bsp.arTrade||bsp.ar||0);
    const dAROther = (bs.arOther||0) - (bsp.arOther||0);
    const dInv     = (bs.inv||0)  - (bsp.inv||0);
    const dPre     = (bs.prepaid||0) - (bsp.prepaid||0);
    const dDeferTax= (bs.deferTax||0) - (bsp.deferTax||0);
    const dAdvPmt  = (bs.advPmt||0)   - (bsp.advPmt||0);
    const dAP      = (bs.apTrade||bs.ap||0) - (bsp.apTrade||bsp.ap||0);
    const dTax     = (bs.taxPay||0)  - (bsp.taxPay||0);
    const dAccExp  = (bs.accExp||0)  - (bsp.accExp||0);
    const dAdvDep  = (bs.advDep||0)  - (bsp.advDep||0);
    const dProv    = (bs.provision||0) - (bsp.provision||0);
    const wcNet = -dARtrade - dAROther - dInv - dPre - (dDeferTax+dAdvPmt)
                 + dAP + dTax + dAccExp + dAdvDep + dProv;
    const ops   = (cur.nop||0) + (cur.deprTotal||0) + wcNet;
    const capex = -(bs.fixG - bsp.fixG);
    const fin   = (bs.affiliated||bs.ltD||0) - (bsp.affiliated||bsp.ltD||0);
    const net   = ops + capex + fin;
    const cashDelta = (bs.cashAll||bs.cash||0) - (bsp.cashAll||bsp.cash||0);
    return { ops, capex, fin, net, cashEnd: bs.cashAll||bs.cash||0, cashStart: bsp.cashAll||bsp.cash||0, cashDelta };
  }, [cur, bs, bsp]);

  // ── Macro signals — live from MacroPage via window globals ───
  const macro = useMemo(() => {
    const src  = (typeof window !== 'undefined' && window.__GDS_MACRO_SIGNALS) || null;
    const m    = src&&src.monetary    || [];
    const t    = src&&src.tourism     || [];
    const e    = src&&src.economic    || [];
    const h    = src&&src.hospitality || [];
    return {
      biRate:     (m[0]&&m[0].num)  || 5.75,
      inflation:  (m[1]&&m[1].num)  || 1.65,
      usdIdr:     (m[2]&&m[2].num)  || 16947,
      intlArr:    (t[0]&&t[0].num)  || 18.2,
      domTravel:  (t[1]&&t[1].num)  || 8.5,
      natOcc:     (t[2]&&t[2].num)  || 62.4,
      gdp:        (e[0]&&e[0].num)  || 5.11,
      consConf:   (e[1]&&e[1].num)  || 121.1,
      fuel:       (e[2]&&e[2].num)  || 6.0,
      revpar:     (h[1]&&h[1].num)  || 9.1,
      sentiment:  (typeof window !== 'undefined' && window.__GDS_MACRO_SENTIMENT) || 'Neutral',
      posCount:   (typeof window !== 'undefined' && window.__GDS_MACRO_POS)  || 0,
      riskCount:  (typeof window !== 'undefined' && window.__GDS_MACRO_RISK) || 0,
      cautCount:  (typeof window !== 'undefined' && window.__GDS_MACRO_CAUT) || 0,
      lastUpdate: (typeof window !== 'undefined' && window.__GDS_MACRO_UPDATED) || null,
      biDisp:     (m[0]&&m[0].display) || '5.75%',
      cpiDisp:    (m[1]&&m[1].display) || '1.65%',
      idrDisp:    (m[2]&&m[2].display) || '16,947',
    };
  }, [yr, period, tbVersion]);

  // ── Key ratios ────────────────────────────────────────────────
  const cr  = bs.tCL > 0 ? bs.tCA / bs.tCL : 99;
  const qr  = bs.tCL > 0 ? (bs.cash + bs.ar) / bs.tCL : 99;
  const de  = bs.tEq > 0 ? bs.tL / bs.tEq : 0;
  const roa = bs.tA  > 0 ? safe(cur.nop) / bs.tA * 100 : 0;
  const revVsPrior = priorYr ? chg(safe(cur.rev), safe(priorYr.rev)) : null;
  const gopDelta   = priorYr ? safe(cur.gopMgn) - safe(priorYr.gopMgn) : null;
  const revVsBud   = bud ? chg(safe(cur.rev), safe(bud.rev)) : null;

  // ── Trend data ────────────────────────────────────────────────
  const trendKeys = useMemo(()=>{
    if(yr==='2026') return [...mKeys25.slice(-10),...mKeys26_ytd];
    if(yr==='2025') return mKeys25;
    return mKeys24;
  },[yr,tbVersion]);

  const trendData = useMemo(()=>trendKeys.map(k=>{
    if(!TB[k]) return null;
    const d=pnl(TB[k]);
    const occ=TB[k].occ>100&&TB[k].avail>0?TB[k].occ/TB[k].avail*100:(TB[k].occ>0&&TB[k].occ<=100?TB[k].occ:0);
    return {name:k.slice(0,7),rev:safe(d.rev),gop:safe(d.gop),nop:safe(d.nop),rooms:safe(d.rooms),payRat:safe(d.payRat),occ:safe(occ)};
  }).filter(Boolean),[trendKeys]);

  const waterfallData = useMemo(()=>[
    {name:'Revenue',    value:safe(cur.rev),          type:'start'},
    {name:'F&B Cost',   value:-safe(cur.cos),          type:'neg'},
    {name:'Dept Pay',   value:-safe(cur.deptPay),      type:'neg'},
    {name:'Dept Other', value:-safe(cur.deptOther),    type:'neg'},
    {name:'Ovhd Pay',   value:-safe(cur.ovhdPay),      type:'neg'},
    {name:'Ovhd Other', value:-safe(cur.ovhdOther),    type:'neg'},
    {name:'GOP',        value:safe(cur.gop),           type:'sub'},
    {name:'Non-Op',     value:-safe(cur.nonOp),        type:'neg'},
    {name:'NOP',        value:safe(cur.nop),           type:'end'},
  ],[cur]);

  const pieData = useMemo(()=>[
    {name:'F&B Cost',   value:safe(cur.cos),       color:'#00BFA6'},
    {name:'Dept Pay',   value:safe(cur.deptPay),   color:'#00D4FF'},
    {name:'Dept Other', value:safe(cur.deptOther), color:'#8B5CF6'},
    {name:'Ovhd Pay',   value:safe(cur.ovhdPay),   color:'#F97316'},
    {name:'Ovhd Other', value:safe(cur.ovhdOther), color:'#EAB308'},
    {name:'Non-Op',     value:safe(cur.nonOp),     color:'#EC4899'},
  ].filter(e=>e.value>0),[cur]);

  const revMixData = useMemo(()=>[
    {name:'Rooms', value:safe(cur.rooms),    color:'#00D4FF'},
    {name:'F&B',   value:safe(cur.fnb),      color:'#00BFA6'},
    {name:'Minor', value:safe(cur.minor),    color:'#8B5CF6'},
    {name:'Other', value:safe(cur.otherinc), color:'#EAB308'},
  ].filter(e=>e.value>0),[cur]);

  const monthlyBar = useMemo(()=>{
    const base=yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:yr==='2024'?mKeys24:null;
    if(!base) return [];
    return base.map((k,i)=>{
      if(!TB[k]) return {name:ML[i]||k.slice(5,7),rev:0,gop:0,nop:0};
      const d=pnl(TB[k]);
      return {name:ML[i]||k.slice(5,7),rev:safe(d.rev),gop:safe(d.gop),nop:safe(d.nop)};
    });
  },[yr,tbVersion]);

  const yoyData = useMemo(()=>['2023','2024','2025'].map(y=>{
    const d=annPnl(parseInt(y));
    return {yr:y,rev:safe(d.rev),gop:safe(d.gop),nop:safe(d.nop),gopMgn:safe(d.gopMgn),nopMgn:safe(d.nopMgn)};

  const periodLabel = useMemo(()=>{

  const occKey = isMonth?`${yr}-${String(parseInt(period.replace('m',''))).padStart(2,'0')}`:null;
  const occData = occKey&&TB[occKey]?TB[occKey]:null;
  const occPct  = occData ? (occData.occ>100&&occData.avail>0 ? occData.occ/occData.avail*100 : (occData.occ>0&&occData.occ<=100 ? occData.occ : null)) : null;
  const arrVal  = occData?occData.arr:null;

  // ── DYNAMIC RISK ALERTS ───────────────────────────────────────
  const alerts = useMemo(()=>{
    const a=[];
    const gopMgn = safe(cur.gopMgn);

    else if(payRat > 35)   a.push({t:'warn',   cat:'Payroll',   m:`Payroll ratio elevated: ${fP(payRat)} — above 35% benchmark. Monitor staffing efficiency.`});
    if(cr < 1.0)           a.push({t:'danger', cat:'Liquidity', m:`Liquidity risk: current ratio ${cr.toFixed(2)}x. Current liabilities exceed current assets.`});
    else if(cr < 1.3)      a.push({t:'warn',   cat:'Liquidity', m:`Tight liquidity: current ratio ${cr.toFixed(2)}x. Limited buffer for unplanned outflows.`});
    if(de > 3.5)           a.push({t:'warn',   cat:'Leverage',  m:`High leverage: D/E ${de.toFixed(2)}x. Monitor debt service coverage at current GOP levels.`});
    if(revVsBud !== null && revVsBud < -10)
                           a.push({t:'warn',   cat:'Budget',    m:`Revenue ${Math.abs(revVsBud).toFixed(1)}% below budget. Corrective action needed on rate strategy.`});
    if(occPct !== null && occPct < 40)
                           a.push({t:'warn',   cat:'Occupancy', m:`Low occupancy: ${occPct.toFixed(1)}%. Demand stimulation and yield management recommended.`});
    if(macro.usdIdr > 16500)
                           a.push({t:'warn',   cat:'FX Risk',   m:`USD/IDR at ${macro.usdIdr.toLocaleString('id-ID')} — elevated FX pressure on imported costs.`});
    if(a.length===0)       a.push({t:'ok',     cat:'All Clear', m:`All key financial indicators within acceptable ranges — ${periodLabel}.`});
    return a;
  },[cur, bs, cr, de, revVsBud, occPct, macro, periodLabel]);

  // ── FINANCIAL HEALTH SUMMARY ──────────────────────────────────
  const healthScores = useMemo(()=>{
    const gopMgn = safe(cur.gopMgn);
    const nopMgn = safe(cur.nopMgn);
    const payRat = safe(cur.payRat);
    return [
      {
        cat: 'Profitability',
        icon: '📊',
        status: gopMgn >= 35 && nopMgn >= 5 ? 'Healthy' : gopMgn >= 25 || nopMgn >= 0 ? 'Moderate' : 'Weak',
        detail: `GOP ${fP(gopMgn)} · NOP ${fP(nopMgn)}`,
      },
      {
        cat: 'Liquidity',
        icon: '💧',
        status: cr >= 1.5 ? 'Healthy' : cr >= 1.0 ? 'Moderate' : 'Weak',
        detail: `CR ${cr.toFixed(2)}x · Cash ${fM(bs.cash)}`,
      },
      {
        cat: 'Leverage',
        icon: '⚖️',
        status: de < 1.5 ? 'Healthy' : de < 3.0 ? 'Moderate' : 'Weak',
        detail: `D/E ${de.toFixed(2)}x · ROA ${fP(roa)}`,
      },
      {
        cat: 'Efficiency',
        icon: '⚙️',
        status: payRat <= 32 && safe(cur.ovhdRat) <= 22 ? 'Healthy' : payRat <= 38 ? 'Moderate' : 'Weak',
        detail: `Payroll ${fP(payRat)} · Ovhd ${fP(safe(cur.ovhdRat))}`,
      },
    ];
  }, [cur, bs, cr, de, roa]);

  const healthColor = s => s==='Healthy' ? T.green : s==='Moderate' ? T.yellow : T.red;
  const healthBg    = s => s==='Healthy' ? `${T.green}12` : s==='Moderate' ? `${T.yellow}12` : `${T.red}12`;

  // ── CASH POSITION INDICATOR ───────────────────────────────────
  const cashStatus = useMemo(() => {
    const cashChg = bsp.cash > 0 ? (bs.cash - bsp.cash) / bsp.cash * 100 : 0;
    const opsOk   = cf ? cf.ops > 0 : true;
    if (cr >= 1.5 && opsOk && cashChg >= -5)  return { label: 'Cash Position Healthy',       color: T.green,  icon: '✅', detail: `${fM(bs.cash)} · ${cashChg >= 0 ? '+' : ''}${cashChg.toFixed(1)}% vs prior` };
    if (cr >= 1.0 && cashChg >= -15)           return { label: 'Cash Position Stable',        color: T.yellow, icon: '🟡', detail: `${fM(bs.cash)} · ${cashChg >= 0 ? '+' : ''}${cashChg.toFixed(1)}% vs prior` };
    return                                            { label: 'Cash Position Under Pressure', color: T.red,    icon: '🔴', detail: `${fM(bs.cash)} · ${cashChg >= 0 ? '+' : ''}${cashChg.toFixed(1)}% vs prior` };
  }, [bs, bsp, cf, cr]);

  // ── FORECAST OUTLOOK ─────────────────────────────────────────
  const forecastOutlook = useMemo(() => {
    const src = (typeof window !== 'undefined' && window.__GDS_FORECAST_OUTLOOK) || null;
    if (src) return src;
    // Derive from FORECAST_SC if available
    const base = (FORECAST_SC && FORECAST_SC['A_Base']) ? FORECAST_SC['A_Base'] : null;
    if (base && base[0]) {
      const f = base[0];
      return `Forecast (Base scenario) indicates full-year 2026 revenue of ${fM(f.rev)} with GOP margin of ${f.gopPct}% and occupancy target of ${f.occ}%. ` +
        `${f.occ > 55 ? 'Revenue recovery expected in H2 2026 driven by seasonal demand patterns and improving tourism trends.' : 'Cautious outlook — monitor occupancy build and ADR performance against budget targets.'}`;
    }
    return `Forecast engine projects moderate revenue recovery in H2 2026 based on seasonal patterns. International tourism growth (+${macro.intlArr}%) and Surabaya market RevPAR improvement support the outlook.`;
  }, [macro]);

  // ── CHART INSIGHT LABELS ─────────────────────────────────────
  const waterfallInsight = useMemo(() => {
    if (!cur) return '';
    const revChgStr = revVsPrior != null ? ` Revenue ${revVsPrior >= 0 ? 'grew' : 'declined'} ${Math.abs(revVsPrior).toFixed(1)}% vs prior year.` : '';
    const roomsDom  = safe(cur.roomsMix) > 65 ? 'Room revenue is the dominant driver' : 'F&B and ancillary revenue contribute meaningfully to the mix';
    const costNote  = safe(cur.payRat) > 38 ? 'Elevated payroll ratio is compressing GOP margin.' : safe(cur.gopMgn) < 30 ? 'Overhead costs are pressuring GOP below 30% target.' : 'Cost structure broadly in line — GOP within target range.';
    return `${roomsDom} at ${fP(safe(cur.roomsMix))} of total revenue.${revChgStr} ${costNote}`;
  }, [cur, revVsPrior]);

  const monthlyInsight = useMemo(() => {
    if (!monthlyBar.length) return '';
    const maxRev = monthlyBar.reduce((a,b)=>b.rev>a.rev?b:a, {rev:0,name:''});
    const minRev = monthlyBar.filter(m=>m.rev>0).reduce((a,b)=>b.rev<a.rev?b:a, {rev:Infinity,name:''});
    if (!maxRev.name || !minRev.name || minRev.rev === Infinity) return '';
    return `Peak revenue month: ${maxRev.name} (${fM(maxRev.rev)}). Lowest: ${minRev.name} (${fM(minRev.rev)}). Seasonal pattern visible — target higher-revenue months for yield management.`;
  }, [monthlyBar]);

  // ── EXEC SUMMARY BUILDER ──────────────────────────────────────
  const buildExec = useCallback(() => {
    if (!cur) return '';
    // Read from AI Analysis module if available
    // Load AI summaries from localStorage on first read
if(typeof window!=='undefined'&&!window.__GDS_AI_SUMMARY_LOADED){
  try{const s=JSON.parse(localStorage.getItem('gds_ai_summaries')||'{}');window.__GDS_AI_SUMMARY=Object.assign(s,window.__GDS_AI_SUMMARY||{});window.__GDS_AI_SUMMARY_LOADED=true;}catch(e){}
}
const aiText = typeof window !== 'undefined' && window.__GDS_AI_SUMMARY && window.__GDS_AI_SUMMARY[periodKeyD];
    if (aiText) return aiText;

    const liqCond  = cr >= 1.5 ? 'healthy' : cr >= 1.0 ? 'adequate' : 'tight';
    const gopCond  = safe(cur.gopMgn) >= 35 ? 'strong' : safe(cur.gopMgn) >= 25 ? 'moderate' : 'pressured';
    const revDir   = revVsPrior != null ? (revVsPrior >= 0 ? `grew ${revVsPrior.toFixed(1)}%` : `declined ${Math.abs(revVsPrior).toFixed(1)}%`) : 'was recorded';
    const budLine  = revVsBud != null ? ` Revenue ${revVsBud >= 0 ? 'exceeded' : 'missed'} budget by ${Math.abs(revVsBud).toFixed(1)}%.` : '';
    return (
      `Grand Darmo Suite recorded total revenue of ${fM(safe(cur.rev))} for ${periodLabel} — ` +
      `rooms ${fM(safe(cur.rooms))} (${safe(cur.roomsMix).toFixed(0)}%), F&B ${fM(safe(cur.fnb))} (${safe(cur.fnbMix).toFixed(0)}%). ` +
      `Revenue ${revDir} versus prior period.${budLine} ` +
      `Gross Operating Profit: ${fM(safe(cur.gop))} — a ${gopCond} ${safe(cur.gopMgn).toFixed(1)}% margin. ` +
      `${gopDelta != null ? `GOP margin ${gopDelta >= 0 ? 'improved' : 'declined'} ${Math.abs(gopDelta).toFixed(1)}pp vs prior. ` : ''}` +
      `Net Operating Profit: ${fM(safe(cur.nop))} (${safe(cur.nopMgn).toFixed(1)}% margin). ` +
      `Liquidity is ${liqCond} with current ratio ${cr.toFixed(2)}x and cash ${fM(bs.cash)}. ` +
      `D/E ratio ${de.toFixed(2)}x — ${de < 1.5 ? 'conservative leverage' : 'moderate leverage, monitor debt service'}. ` +
      `BI rate ${macro.biRate}%, USD/IDR ${macro.usdIdr.toLocaleString('id-ID')} — ${macro.usdIdr > 16200 ? 'FX pressure warrants cost monitoring' : 'macro environment broadly stable'}.`
    );
  }, [cur, bs, bsp, priorYr, bud, cr, de, macro, periodLabel, periodKeyD, revVsPrior, revVsBud, gopDelta]);

  useEffect(() => {
    const text = buildExec();
    setExecText(text);
    if (execSavedD[periodKeyD]) {
      setExecEdited(execSavedD[periodKeyD]);
    } else {
      setExecEdited(text);
    }
    setExecEditMode(false);
  }, [periodKeyD]);

  const handleSaveExecD = () => {
    setExecSavedD(prev => ({ ...prev, [periodKeyD]: execEdited }));
    setExecEditMode(false);
    if (typeof window !== 'undefined') {
      window.__GDS_AI_SUMMARY = window.__GDS_AI_SUMMARY || {};
      window.__GDS_AI_SUMMARY[periodKeyD] = execEdited;
    }
  };

  // ── Alert color helpers ───────────────────────────────────────
  const AC  = {danger:'#EF4444', warn:'#EAB308', ok:'#10B981'};
  const AB  = {danger:'rgba(239,68,68,0.08)', warn:'rgba(234,179,8,0.08)', ok:'rgba(16,185,129,0.08)'};
  const AIc = {danger:'⚠', warn:'⚡', ok:'✓'};

  // ── TAB BUTTON ────────────────────────────────────────────────
  const TAB = (k, l) => (
    <button key={k} onClick={()=>setActiveTab(k)}
      style={{padding:'6px 16px',borderRadius:6,border:'none',
        background:activeTab===k?T.accent:'transparent',color:activeTab===k?'#060D0F':T.sub,
        cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>
      {l}
    </button>
  );

  // ────────────────────────────────────────────────────────────────
  // RENDER
  // ────────────────────────────────────────────────────────────────
  // Guard: if cur is null (no data for selected period), show minimal UI
  if(!cur) return (
    <div style={{padding:40,textAlign:'center',color:T.muted}}>
      <div style={{fontSize:24,marginBottom:12}}>📊</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>No data available for this period</div>
      <div style={{fontSize:10,marginTop:8,color:T.border}}>Select a period with available data</div>
    </div>
  );

  return (
    <div>
      {/* ── Sync flash ── */}
      {syncFlash && (
        <div style={{position:'fixed',top:60,left:'50%',transform:'translateX(-50%)',zIndex:9999,
          padding:'8px 20px',borderRadius:20,background:'#22C55E',color:'#fff',
          fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",

          ↻ Data refreshed — all modules updated
        </div>
      )}
      {/* ── HEADER ── */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'Inter',sans-serif"}}>{t('dash_title')}</div>
          <div style={{color:T.muted,fontSize:11,marginTop:2}}>Grand Darmo Suite · Surabaya · {periodLabel}</div>
        </div>
        <PeriodSel yr={yr} setYr={v=>{setYr(v);setPeriod(MON_YEARS.includes(v)?'full':'full');}} period={period} setPeriod={setPeriod} years={YEAR_RANGE}/>
      </div>

      <Card style={{marginBottom:12,padding:'16px 20px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>

                    {l:'NOP',           v:cur.nop,    pct:safe(cur.nopMgn), bv:bud?.nop,   pv:prv?.nop,   c:safe(cur.nop)>=0?T.green:T.red, bold:true},
                  ].map((r,i)=>{

                          fontFamily:"'Inter',sans-serif",whiteSpace:'nowrap'}}>
                          {r.l.trim()}
                        </td>
                        <td style={{padding:'9px 14px',textAlign:'right',
                          color:r.c,fontWeight:r.bold?700:500,
                          fontFamily:"'JetBrains Mono',monospace",fontSize:r.bold?13:12,
                          whiteSpace:'nowrap'}}>
                          {r.l.includes('Ratio')||r.l.includes('%')?fP(r.v):fM(r.v)}
                        </td>
                        <td style={{padding:'9px 14px',textAlign:'right',
                          color:T.muted,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>
                          {r.pct!=null?fP(r.pct):'—'}
                        </td>
                        <td style={{padding:'9px 14px',textAlign:'right',
                          color:T.muted,fontFamily:"'JetBrains Mono',monospace",fontSize:11,
                          whiteSpace:'nowrap'}}>
                          {r.bv!=null?fM(r.bv):'—'}
                        </td>
                        <td style={{padding:'9px 14px',textAlign:'right',
                          color:variance!=null?(variance>=0?T.green:T.red):T.muted,
                          fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:600,
                          whiteSpace:'nowrap'}}>
                          {variance!=null?(variance>=0?'+':'')+fM(variance):'—'}
                        </td>
                        <td style={{padding:'9px 14px',textAlign:'right',whiteSpace:'nowrap'}}>
                          {vsP!=null?(
                            <span style={{
                              display:'inline-flex',alignItems:'center',gap:2,
                              fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",
                              color:vsP>=0?T.green:T.red,
                              background:vsP>=0?`${T.green}12`:`${T.red}12`,
                              padding:'2px 7px',borderRadius:5,
                              borderTop:`1px solid ${vsP>=0?`${T.green}25`:`${T.red}25`}`,
                              borderBottom:`1px solid ${vsP>=0?`${T.green}25`:`${T.red}25`}`,
                              borderLeft:`1px solid ${vsP>=0?`${T.green}25`:`${T.red}25`}`,
                              borderRight:`1px solid ${vsP>=0?`${T.green}25`:`${T.red}25`}`}}>
                              {vsP>=0?'↑':'↓'} {Math.abs(vsP).toFixed(1)}%
                            </span>
                          ):'—'}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}



function PLPage({ tbVersion=0 }) {
  const [yr,setYr]         = useState('2026');
  const [period,setPeriod] = useState(()=>getLatestPeriod('2026'));
  const c=T.card, brd=T.border, ac=T.accent, sc=T.secondary, tx=T.text, mu=T.muted, sb=T.sub;

  const isAnnual = parseInt(yr) < 2024;

  // ── Period options ───────────────────────────────────────────────
  const periodOptions = useMemo(()=>{
    if(isAnnual) return [{v:'full',l:`Full Year ${yr}`}];
    const mKeys = yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;
    const opts=[{v:'full',l:`Full Year ${yr}`},{v:'ytd',l:`YTD ${yr}`}];
    mKeys.forEach((k,i)=>{ if(TB[k]) opts.push({v:`m${i+1}`,l:ML[i]+' '+yr}); });
    const qMap={Q1:[0,1,2],Q2:[3,4,5],Q3:[6,7,8],Q4:[9,10,11]};
    Object.entries(qMap).forEach(([q,idxs])=>{
      const qKeys=idxs.map(i=>`${yr}-${String(i+1).padStart(2,'0')}`).filter(k=>TB[k]);
      if(qKeys.length===3) opts.push({v:q.toLowerCase(),l:`${q} ${yr}`});
    });
    return opts;
  },[yr,isAnnual,tbVersion]);

  const handleYrChange = (v)=>{ setYr(v); setPeriod('full'); };

  // ── Keys to aggregate ────────────────────────────────────────────
  const keys = useMemo(()=>{
    if(isAnnual) return null;
    const mKeys = yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;
    if(period==='full'||period==='ytd') return mKeys.filter(k=>TB[k]);
    if(period==='q1') return mKeys.slice(0,3).filter(k=>TB[k]);
    if(period==='q2') return mKeys.slice(3,6).filter(k=>TB[k]);
    if(period==='q3') return mKeys.slice(6,9).filter(k=>TB[k]);
    if(period==='q4') return mKeys.slice(9,12).filter(k=>TB[k]);
    const mi=parseInt(period.replace('m',''))-1;
    return [mKeys[mi]].filter(k=>k&&TB[k]);
  },[yr,period,isAnnual,tbVersion]);

  const cur = useMemo(()=>{
    if(isAnnual) return annPnl(parseInt(yr));
    return keys&&keys.length>0?aggKeys(keys):null;
  },[yr,keys,isAnnual,tbVersion]);

  // ── Budget ───────────────────────────────────────────────────────
  const bud = useMemo(()=>{
    if(yr!=='2026') return null;
    const bKeys = (period==='full'||period==='ytd')?mKeys26_ytd.filter(k=>BUD26[k]):
                  period.startsWith('m')?[`2026-${String(parseInt(period.slice(1))).padStart(2,'0')}`]:null;
    if(!bKeys) return null;
    const valid=bKeys.filter(k=>BUD26[k]);
    return valid.length?aggKeys(valid,BUD26):null;
  },[yr,period,tbVersion]);

  // ── Prior period ─────────────────────────────────────────────────
  const prior = useMemo(()=>{
    const pyear=parseInt(yr)-1;
    if(isAnnual) return pyear>=2013?annPnl(pyear):null;
    if(period==='full'||period==='ytd'){
      if(parseInt(yr)===2025) return aggKeys(mKeys24);
      if(parseInt(yr)===2026) return aggKeys(mKeys25);
      return pyear>=2013?annPnl(pyear):null;
    }
    if(period.startsWith('m')&&parseInt(yr)>=2025){
      const mi=parseInt(period.replace('m',''))-1;
      const priorKey=`${pyear}-${String(mi+1).padStart(2,'0')}`;
      return TB[priorKey]?aggKeys([priorKey]):null;
    }
    return null;
  },[yr,period,isAnnual,tbVersion]);

  // ── Trend data ────────────────────────────────────────────────────
  const trendKeys = yr==='2024'?mKeys24:yr==='2025'?mKeys25:mKeys26_ytd;

  const marginTrend = useMemo(()=>{
    if(isAnnual) return [];
    return trendKeys.filter(k=>TB[k]).map((k,i)=>{
      const d=pnl(TB[k]);
      const b=BUD26[k]?pnl(BUD26[k]):null;
      return {
        name:ML[i],
        gopMgn:+d.gopMgn.toFixed(1),
        nopMgn:+d.nopMgn.toFixed(1),
        budGopMgn:b?+b.gopMgn.toFixed(1):null,
        budNopMgn:b?+b.nopMgn.toFixed(1):null,
      };
    });
  },[yr,isAnnual,tbVersion]);

  const revTrend = useMemo(()=>{
    if(isAnnual){
      return Object.entries(ANN).filter(([y])=>parseInt(y)<=parseInt(yr)).slice(-8).map(([y,d])=>{
        const v=pnl(d); return {name:y,rev:+v.rev.toFixed(3),gop:+v.gop.toFixed(3),nop:+v.nop.toFixed(3)};
      });
    }
    return trendKeys.filter(k=>TB[k]).map((k,i)=>{
      const d=pnl(TB[k]);
      return {name:ML[i],rev:+d.rev.toFixed(3),gop:+d.gop.toFixed(3),nop:+d.nop.toFixed(3)};
    });
  },[yr,isAnnual,tbVersion]);


  const showBud   = !!bud;
  const showPrior = !!prior;
  if(!cur) return (<div style={{padding:40,textAlign:'center',color:T.muted,fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>No data available for this period</div>);

  // ── P&L plRows ──────────────────────────────────────────────────────

  // ── Revenue Mix ───────────────────────────────────────────────────
  const revMix = [
    {l:'Rooms',       v:cur.rooms,    pct:cur.rev>0?cur.rooms/cur.rev*100:0,     color:ac},
    {l:'F&B',         v:cur.fnb,      pct:cur.rev>0?cur.fnb/cur.rev*100:0,       color:sc},
    {l:'Minor Ops',   v:cur.minor,    pct:cur.rev>0?cur.minor/cur.rev*100:0,     color:T.yellow},
    {l:'Other Inc.',  v:cur.otherinc, pct:cur.rev>0?cur.otherinc/cur.rev*100:0,  color:T.purple||'#8B5CF6'},
  ];
  const revMixChart = revMix.map(r=>({name:r.l, value:+r.pct.toFixed(1)}));

  // ── Cost Ratios ────────────────────────────────────────────────────
  // CoS & Dept → dibagi revenue dept terkait; Overhead → total rev
  const _deptRev  = cur.rooms + cur.fnb + cur.minor;
  const _cosRev   = cur.fnb + cur.minor + cur.otherinc;
  // Benchmarks: USALI 11th Ed. + STR Indonesia 4-star city hotel
  const costRatios = [
    {l:'CoS F&B / F&B Rev',      v:cur.fnb>0?cur.cosFnb/cur.fnb*100:0,          tgt:30, warn:33, inv:true, color:T.red,              note:'% F&B Rev'},
    {l:'Dept Payroll / Dept Rev', v:_deptRev>0?cur.deptPay/_deptRev*100:0,       tgt:40, warn:50, inv:true, color:T.yellow,           note:'% Dept Rev'},
    {l:'Dept Other / Dept Rev',   v:_deptRev>0?cur.deptOther/_deptRev*100:0,     tgt:20, warn:28, inv:true, color:T.orange||'#F97316',note:'% Dept Rev'},
    {l:'Overhead Payroll',        v:cur.rev>0?cur.ovhdPay/cur.rev*100:0,          tgt:10, warn:13, inv:true, color:T.yellow,           note:'% Total Rev'},
    {l:'Overhead Other',          v:cur.rev>0?cur.ovhdOther/cur.rev*100:0,        tgt:15, warn:20, inv:true, color:T.orange||'#F97316',note:'% Total Rev'},
  ];

  // ── Margin benchmark ──────────────────────────────────────────────
  const margins = {
    actual:  {gop:cur.gopMgn,  nop:cur.nopMgn},
    budget:  bud?{gop:bud.gopMgn,  nop:bud.nopMgn}:null,
    prior:   prior?{gop:prior.gopMgn, nop:prior.nopMgn}:null,
  };

  // ── Profit bridge ─────────────────────────────────────────────────
  const bridge = bud ? [
    {l:'Revenue Variance',     v:cur.rev-bud.rev,            pos:true},
    {l:'CoS Variance',         v:-(cur.cos-bud.cos),         pos:false},
    {l:'Dept Payroll Var.',    v:-(cur.deptPay-bud.deptPay), pos:false},
    {l:'Dept Other Var.',      v:-(cur.deptOther-bud.deptOther), pos:false},
    {l:'Overhead Payroll Var.',v:-(cur.ovhdPay-bud.ovhdPay), pos:false},
    {l:'Overhead Other Var.',  v:-(cur.ovhdOther-bud.ovhdOther), pos:false},
    {l:'GOP Variance (Net)',   v:cur.gop-bud.gop,            pos:true, bold:true},
    {l:'Below-Line Var.',      v:-(cur.deprTotal-bud.deprTotal)-(cur.incentFee-bud.incentFee)-(cur.mgmtFee-bud.mgmtFee), pos:false},
    {l:'NOP Variance (Net)',   v:cur.nop-bud.nop,            pos:true, bold:true},
  ] : null;

  // ── Variance driver insight ───────────────────────────────────────
  const insight = useMemo(()=>{
    if(!bud) return null;
    const revVar    = cur.rev  - bud.rev;
    const gopVar    = cur.gop  - bud.gop;
    const nopVar    = cur.nop  - bud.nop;
    const payVar    = cur.deptPay - bud.deptPay;
    const cosVar    = cur.cos  - bud.cos;
    const ovhVar    = (cur.ovhdPay+cur.ovhdOther) - (bud.ovhdPay+bud.ovhdOther);

    const revPct  = bud.rev>0?(revVar/bud.rev*100):0;
    const gopPct  = bud.gop!==0?(gopVar/Math.abs(bud.gop)*100):0;
    const nopPct  = bud.nop!==0?(nopVar/Math.abs(bud.nop)*100):0;

    const lines = [];

    // Revenue
    if(Math.abs(revPct)>1){
      const main = cur.rooms-bud.rooms < cur.fnb-bud.fnb ? 'room revenue' : 'F&B revenue';
      lines.push(`Revenue ${revVar>=0?'exceeded':'missed'} budget by ${fM(Math.abs(revVar))} (${Math.abs(revPct).toFixed(1)}%), primarily driven by ${revVar>=0?'stronger':'weaker'} ${main}.`);
    } else {
      lines.push(`Revenue is on track vs budget (${revPct>=0?'+':''}${revPct.toFixed(1)}% variance).`);
    }

    // Costs
    if(Math.abs(payVar/Math.max(bud.deptPay,0.001)*100)>3){
      lines.push(`Dept payroll ${payVar>0?'overran':'saved'} budget by ${fM(Math.abs(payVar))} — ${payVar>0?'review staffing vs occupancy':'efficiency gain'}.`);
    }
    if(Math.abs(cosVar/Math.max(bud.cos,0.001)*100)>3){
      lines.push(`Cost of sales ${cosVar>0?'above':'below'} budget by ${fM(Math.abs(cosVar))}.`);
    }
    if(Math.abs(ovhVar/Math.max(bud.ovhdPay+bud.ovhdOther,0.001)*100)>3){
      lines.push(`Overhead ${ovhVar>0?'exceeded':'came under'} budget by ${fM(Math.abs(ovhVar))}.`);
    }

    // GOP impact
    lines.push(`Net impact on GOP: ${gopVar>=0?'+':''}${fM(gopVar)} (${gopPct>=0?'+':''}${gopPct.toFixed(1)}% vs budget). NOP: ${nopVar>=0?'+':''}${fM(nopVar)} (${nopPct>=0?'+':''}${nopPct.toFixed(1)}%).`);

    if(cur.nop<0 && bud.nop>0) lines.push(`⚠ Budget targeted positive NOP. Actual result is a loss — below-the-line charges amplified the revenue shortfall.`);

  const periodLabel = (periodOptions.find(o=>o.v===period)||{}).l || period;

          {row.l}
        </td>
        <td style={{padding:`${row.sep?'9px':'5px'} 12px`,textAlign:'right',
          color:row.bold?(row.v>=0?T.green:T.red):tx,fontWeight:row.bold?700:400,
          fontFamily:"'JetBrains Mono',monospace",fontSize:row.bold?12:11}}>
          {fC(row.v)}
        </td>
        <td style={{padding:'5px 10px',textAlign:'right',color:mu,fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>
          {row.pct!=null?`${Math.abs(row.pct).toFixed(1)}%`:''}
        </td>
        {showBud&&<td style={{padding:'5px 12px',textAlign:'right',color:sb,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>
          {row.b!=null?fC(row.b):'-'}
        </td>}
        {showBud&&<td style={{padding:'5px 10px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontSize:11,
          color:varBud!=null?(budOk?T.green:T.red):mu,fontWeight:row.bold?700:400}}>
          {varBud!=null?fC(varBud):'-'}
        </td>}
        {showPrior&&<td style={{padding:'5px 12px',textAlign:'right',color:sb,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>
          {row.p!=null?fC(row.p):'-'}
        </td>}
        {showPrior&&<td style={{padding:'5px 10px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontSize:11,
          color:varPrior!=null?(varPrior>=0?T.green:T.red):mu}}>
          {varPrior!=null?`${varPrior>=0?'+':''}${varPrior.toFixed(1)}%`:'-'}
        </td>}
      </tr>
    );
  };



  return (
    <div style={{padding:24}}>

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontSize:18,fontWeight:700,color:tx,fontFamily:"'JetBrains Mono',monospace"}}>
            PROFIT &amp; LOSS STATEMENT
          </div>
          <div style={{fontSize:11,color:mu,marginTop:2}}>
            {isAnnual?`Annual ${yr}`:`${periodLabel} · Rp Milyar`}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:c,border:`1px solid ${brd}`,color:tx,padding:'6px 10px',borderRadius:6,fontSize:12,cursor:'pointer',outline:'none'}}>
            {['2026','2025','2024','2023','2022','2021','2020','2019','2018','2017','2016','2015','2014','2013'].map(y=>
              <option key={y} value={y}>{y}</option>)}
          </select>
          {!isAnnual&&(
            <select value={period} onChange={e=>setPeriod(e.target.value)}
              style={{background:c,border:`1px solid ${brd}`,color:tx,padding:'6px 10px',borderRadius:6,fontSize:12,cursor:'pointer',outline:'none'}}>
              {periodOptions.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>

        </div>
      </div>

          {l:'GOP',           v:fC(cur.gop),   color:cur.gop>=0?T.green:T.red, sub:`${cur.gopMgn.toFixed(1)}% margin`},

                  <th style={{padding:'10px 12px',textAlign:'right',color:mu,fontWeight:600,fontSize:9,textTransform:'uppercase',letterSpacing:1,fontFamily:"'JetBrains Mono',monospace"}}>ACTUAL</th>
