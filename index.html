// ── Detect period from filename ───────────────────────────────────
function detectPeriodFromFilename(name) {
  const upper = name.toUpperCase();
  // Patterns: TB_2026_01, TB_202601, 2026-01, Jan2026, January2026
  const patterns = [
    /TB[_\-]?(\d{4})[_\-]?(\d{2})/i,
    /(\d{4})[_\-](\d{2})/,
    /(\d{4})(\d{2})(?!\d)/,
  ];
  for (const p of patterns) {
    const m = name.match(p);
    if (m) {
      const yr = m[1], mo = m[2].padStart(2,'0');
      if (parseInt(yr) >= 2013 && parseInt(yr) <= 2030 && parseInt(mo) >= 1 && parseInt(mo) <= 12) {
        return { year: yr, month: mo, key: `${yr}-${mo}`, label: `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1]} ${yr}` };
      }
    }
  }
  // Month name patterns
  const months = {jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
  for (const [mn, mo] of Object.entries(months)) {
    const re = new RegExp(`(${mn}\\w*)[\\.\\s_\\-]*(\\d{4})|(\\d{4})[\\.\\s_\\-]*(${mn}\\w*)`, 'i');
    const m = name.match(re);
    if (m) {
      const yr = m[2]||m[3];
      return { year: yr, month: mo, key: `${yr}-${mo}`, label: `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1]} ${yr}` };
    }
  }
  return null;
}

// ── Parse CSV ─────────────────────────────────────────────────────
function parseCSV(text) {
  // Proper CSV parser — handles quoted fields with embedded commas
  function splitCSVLine(line) {
    const result = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; } // escaped quote
        else inQ = !inQ;
      } else if ((ch === ',' || ch === ';' || ch === '\t') && !inQ) {
        result.push(cur.trim()); cur = '';
      } else {
        cur += ch;
      }
    }
    result.push(cur.trim());
    return result;
  }
  const lines = text.trim().split(/\r?\n/);
  if (!lines.length) return [];
  const headers = splitCSVLine(lines[0]).map(h => h.replace(/^\"|"$/g,'').toLowerCase().trim());
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = splitCSVLine(line);
    const row = {};
    headers.forEach((h, i) => { row[h] = vals[i] !== undefined ? vals[i].replace(/^\"|"$/g,'') : ''; });
    return row;
  });
}
// ── Parse number from string ──────────────────────────────────────
// Handles: integers, decimals, scientific notation (5.68e+8 → 568000000),
//          accounting negatives (126,478.73) → positive debit value,
//          comma-separated thousands, spaces, SheetJS CSV output formats
function parseNum(v) {
  if (v===undefined||v===null||v==='') return 0;
  let s = String(v).trim();
  // Accounting format parentheses: (1,234.56) → -1234.56  
  if (s.startsWith('(') && s.endsWith(')')) s = '-' + s.slice(1,-1);
  // Remove thousand-separator commas and whitespace
  s = s.replace(/,/g,'').replace(/\s/g,'');
  // parseFloat handles scientific notation natively: 5.68e+8 → 568000000
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

// ── Map rows → TB data object ─────────────────────────────────────
function mapRowsToTB(rows, effectivePeriod) {
  const ACCT_RE = /^\d{3}-\d{2}-\d{3,}$/;
  let codeCol = null, debitCol = null, creditCol = null, descCol = null;

  // Strategy 1: named headers
  const firstKeys = Object.keys(rows[0] || {}).map(k => k.toLowerCase());
  const findNamed = (...cands) => { for(const c of cands){ const f=firstKeys.find(k=>k.includes(c)); if(f) return f; } return null; };
  if (firstKeys.some(k => ['account','kode','code','acc'].some(c => k.includes(c)))) {
    codeCol   = findNamed('account no','account','kode','code','acc','no','nomor');
    debitCol  = findNamed('net change','total debit','debit','dr','debet','net');
    creditCol = findNamed('total credit','credit','cr','kredit');
    descCol   = findNamed('desc','description','name','keterangan','nama','uraian');
  }

  // Strategy 2: SheetJS numeric-keyed rows
  if (!codeCol) {
    const colAcctCount = {}, colNumCount = {};
    const sampleRows = rows.slice(0, Math.min(rows.length, 600));
    sampleRows.forEach(row => {
      Object.entries(row).forEach(([col, val]) => {
        const s = String(val || '').trim();
        if (ACCT_RE.test(s)) colAcctCount[col] = (colAcctCount[col]||0) + 1;
        if (/^\d{4,}(\.\d+)?$/.test(s) && parseFloat(s) > 100) colNumCount[col] = (colNumCount[col]||0) + 1;
      });
    });
    const acctEntries = Object.entries(colAcctCount).sort((a,b)=>b[1]-a[1]);
    if (acctEntries.length > 0) codeCol = acctEntries[0][0];
    const numEntries = Object.entries(colNumCount)
      .filter(([col]) => col !== codeCol)
      .sort((a,b) => parseInt(a[0])-parseInt(b[0]));
    if (codeCol) {
      const codeColIdx = parseInt(codeCol);
      descCol = String(codeColIdx + 1);
      const numAfterCode = numEntries.filter(([col])=>parseInt(col)>codeColIdx);
      if (numAfterCode.length >= 1) debitCol  = numAfterCode[0][0];
      if (numAfterCode.length >= 2) creditCol = numAfterCode[1][0];
      if (codeCol === '1') { debitCol = '14'; creditCol = '11'; } // VHP TB: col14=Net Change, col11=Total Credit
    }
  }

  if (!codeCol) return { tb:{}, totalDebit:0, totalCredit:0, unmapped:[] };

  // Parse number preserving sign — VHP uses parentheses for negatives: (6,580,523.05)
  const parseNumSigned = (v) => {
    if (v === null || v === undefined || v === '') return 0;
    const s = String(v).replace(/[,\s]/g,'').replace(/^\((.+)\)$/, '-$1');
    const n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  };

  const BS_PREFIXES = new Set([
    '110','111','112','113','120','121','122','130','140','141','142',
    '150','160','170','180','190','193','200','210','220','230','240',
    '250','260','270','280','290','300','310','320','330','340','350',
  ]);

  // BS account → snapshot accumulator field mapping (GDS VHP account structure)
  const BS_SNAP_MAP = {
    // ── CURRENT ASSETS ─────────────────────────────────────────
    '110': 'cash110',    // Cash on hand (petty cash)
    '111': 'bank111',    // Bank accounts
    '112': 'clear112',   // Cash clearance accounts
    '113': 'stInv',      // Short-term investments (deposito)
    '120': 'arTrade',    // Trade receivables
    '121': 'arOther',    // Other receivables
    '122': 'arOther',    // Other receivables
    '130': 'inv',        // Inventories
    '140': 'prepaid',    // Prepaid expenses
    '141': 'deferTax',   // Deferred Income Tax (141)
    '142': 'deferTax',   // Deferred Tax other
    '150': 'advPmt',     // Advance Payments
    '160': 'advPmt',     // Other advance payments
    // ── FIXED ASSETS ───────────────────────────────────────────
    '170': 'fixG',       // Fixed assets gross
    '180': '_accDRaw',   // Accum. depreciation (will be signed below)
    // ── INTANGIBLE ASSETS ──────────────────────────────────────
    '190': '_intang190', // Will be split by sub-account suffix below
    // ── OTHER ASSETS ───────────────────────────────────────────
    '193': 'otherAssets', // 193-14-040 Deferred Income Taxes – Assets
    '191': 'otherAssets', '192': 'otherAssets', '194': 'otherAssets',
    // ── LIABILITIES ────────────────────────────────────────────
    '210': 'affiliated', // Affiliated payable (PT.GDS Mgmt Fee)
    '220': 'ap',         // Accounts Payable — Trade
    '230': 'accExp',     // Accrued Expenses
    '240': 'advDep',     // Advance Deposits from guests
    '250': 'taxPay',     // Tax Payable
    '260': '_ltDebt',    // Deferred income / LT
    '270': 'consign',    // Consignment A/P (Other Liabilities)
    '280': '_ltDebt2',   // Other LT liabilities
    '290': 'provision',  // Provisions (Other Liabilities)
    // ── EQUITY ─────────────────────────────────────────────────
    '300': 'pic',        // Paid-in capital
    '310': '_re310',     // RE bucket — will be split by sub-account below
    '320': 'pic',        // Additional paid-in capital
    '330': 're',         '340': 're', '350': 're',
  };
  // Detect ending balance column: VHP numeric-key = col17, named-header = search
  const endBalCol = codeCol === '1' ? '17'
    : (findNamed && findNamed('ending balance','end bal','ending','saldo akhir')) || null;
  const bsSnap = {};

  let totalDebit = 0, totalCredit = 0;
  const tb = {};
  const unmapped = [];

  rows.forEach(row => {
    let code   = codeCol ? String(row[codeCol]||'').trim() : '';
    const desc = descCol ? String(row[descCol]||'').trim() : '';
    if (!code || code.length < 3) return;
    if (/^\d+$/.test(code)) return;

    const debitAbs  = Math.abs(parseNumSigned(debitCol  ? row[debitCol]  : 0));
    const creditAbs = Math.abs(parseNumSigned(creditCol ? row[creditCol] : 0));
    totalDebit  += debitAbs;
    totalCredit += creditAbs;

    const pfx3 = code.length >= 3 ? code.substring(0, 3) : '';
    if (BS_PREFIXES.has(pfx3)) {
      // Extract ending balance for BS snapshot
      if (endBalCol && row[endBalCol] !== undefined && row[endBalCol] !== '') {
        const endBal = parseNumSigned(row[endBalCol]) / 1e9;
        // Special handling for 190 (Intangible Assets): split gross vs accum amort
        if (pfx3 === '190') {
          const sub4 = code.substring(4,5); // 5th char after '190-'
          if (sub4 === '5' || code.includes('-14-5')) {
            bsSnap.intangG = (bsSnap.intangG || 0) + endBal;   // 190-14-5xx = gross
          } else if (sub4 === '9' || code.includes('-14-9')) {
            bsSnap.intangA = (bsSnap.intangA || 0) + endBal;   // 190-14-9xx = accum amort (neg)
          } else {
            bsSnap.otNA = (bsSnap.otNA || 0) + endBal;
          }
        } else if (pfx3 === '180') {
          // Accumulated Depreciation — accumulate as _accDRaw (will be negative)
          bsSnap._accDRaw = (bsSnap._accDRaw || 0) + endBal;
        } else if (pfx3 === '310') {
          // Retained Earnings breakdown — split by sub-account
          // 310-14-010 = Retained Earning base
          // 310-14-020 = Current Year Earning
          // 310-14-030 = Prior Year Adjustment
          // 310-14-040 = P&L Current Period
          if (code.includes('-010') || code.endsWith('010')) {
            bsSnap.reBase    = (bsSnap.reBase    || 0) + endBal;
          } else if (code.includes('-020') || code.endsWith('020')) {
            bsSnap.reCurYear = (bsSnap.reCurYear || 0) + endBal;
          } else if (code.includes('-030') || code.endsWith('030')) {
            bsSnap.rePriorAdj= (bsSnap.rePriorAdj|| 0) + endBal;
          } else if (code.includes('-040') || code.endsWith('040')) {
            bsSnap.rePnL     = (bsSnap.rePnL     || 0) + endBal;
          } else {
            bsSnap._re310    = (bsSnap._re310     || 0) + endBal;
          }
        } else {
          const snapField = BS_SNAP_MAP[pfx3];
          if (snapField) {
            bsSnap[snapField] = (bsSnap[snapField] || 0) + endBal;
          }
        }
      }
      return;
    }

    // Net change value (signed) — this is the key value for all P&L accounts
    const netChange = parseNumSigned(debitCol ? row[debitCol] : 0);

    // ── 800-xx-xxx non-operating ─────────────────────────────
    if (pfx3 === '800') {
      const field = TB_800_MAP[code] || 'otherNonOp';
      // Use signed net change directly:
      // positive = expense (debit > credit), negative = income (credit > debit)
      tb[field] = (tb[field] || 0) + netChange / 1e9;
      return;
    }

    // ── 900-xx-xxx statistics ────────────────────────────────
    if (pfx3 === '900') {
      const STAT_MAP = {
        '900-14-060': 'avail',
        '900-14-110': 'occ',
        '900-14-290': 'arr',
        '900-14-320': 'fbCover',
      };
      const statField = STAT_MAP[code];
      if (statField) {
        const rawVal = Math.abs(netChange);
        if (rawVal > 0) tb[statField] = rawVal;
      }
      return;
    }

    // ── Standard P&L mapping ─────────────────────────────────
    // Check if this is an allowance sub-account (reclassified to Other Expense)
    const accSuffix = code.split('-').pop();
    const allowField = TB_ALLOW_DEPT_MAP[pfx3];
    if (allowField && TB_ALLOW_SUFFIXES.has(accSuffix)) {
      // Allowance sub-account → accumulate to allowance field
      tb[allowField] = (tb[allowField] || 0) + netChange / 1e9;
    } else {
      const mapping = TB_FIELD_MAP[pfx3];
      if (mapping) {
        tb[mapping] = (tb[mapping] || 0) + netChange / 1e9;
      } else if (code && desc) {
        unmapped.push({ code, desc, debit: debitAbs, credit: creditAbs });
      }
    }
  });

  // Post-process OCC: convert room count → percentage
  if (tb.avail && tb.avail > 0 && tb.occ && tb.occ > 1) {
    tb.occ = Math.round(tb.occ / tb.avail * 1000) / 10;
  }

  // ── Post-process BS snapshot: compute composite fields ──────────
  if (Object.keys(bsSnap).length > 2) {
    const ML2b = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const mo   = parseInt(effectivePeriod ? effectivePeriod.month : '1') - 1;
    const yr2  = (effectivePeriod && effectivePeriod.year) ? effectivePeriod.year.slice(2) : '26';
    const prevKey  = mo === 0 ? 'dec'+(parseInt(yr2)-1||25) : ML2b[mo-1]+yr2;
    const prevSnap = (window.BS_SNAPSHOTS_REF && window.BS_SNAPSHOTS_REF[prevKey]) || null;

    // ── Cash & Bank (110/111/112 separately) ────────────────────
    bsSnap.cash110  = bsSnap.cash110  || 0;
    bsSnap.bank111  = bsSnap.bank111  || 0;
    bsSnap.clear112 = bsSnap.clear112 || 0;
    bsSnap.cashOnly = bsSnap.cash110 + bsSnap.bank111 + bsSnap.clear112;
    bsSnap.cashBank = bsSnap.bank111;
    bsSnap.stInv    = bsSnap.stInv || 0;
    bsSnap.cash     = bsSnap.cashOnly + bsSnap.stInv;  // total cash+investments (legacy field)

    // ── Receivables ──────────────────────────────────────────────
    bsSnap.arTrade  = bsSnap.arTrade || 0;
    bsSnap.arOther  = bsSnap.arOther || 0;
    bsSnap.ar       = bsSnap.arTrade + bsSnap.arOther;

    // ── Other Current Assets ─────────────────────────────────────
    bsSnap.prepaid  = bsSnap.prepaid || 0;
    bsSnap.deferTax = bsSnap.deferTax || 0;  // 141 Deferred Income Tax
    bsSnap.advPmt   = bsSnap.advPmt  || 0;  // 150 Advance Payments
    bsSnap.pre      = bsSnap.prepaid;        // legacy alias

    // ── accD — use actual 180-xxx values from TB (they are negative/credit-normal) ──
    // _accDRaw was accumulated from 180-14-xxx accounts which are credit balances (negative)
    const rawAccD   = bsSnap._accDRaw || 0;
    const prevAccD  = prevSnap ? (prevSnap.accD || 0) : 0;
    const monthDepr = (tb.depr || 0) + (tb.amor || 0);
    if (rawAccD < 0) {
      bsSnap.accD = rawAccD;                        // 180-xxx correctly parsed as negative
    } else if (prevAccD < 0 && monthDepr > 0) {
      bsSnap.accD = prevAccD - monthDepr;           // derive: prior + monthly depr
    } else {
      bsSnap.accD = rawAccD !== 0 ? -Math.abs(rawAccD) : 0;
    }

    // ── Intangible Assets ────────────────────────────────────────
    bsSnap.intangG   = bsSnap.intangG   || 0;  // 190-14-5xx gross
    bsSnap.intangA   = bsSnap.intangA   || 0;  // 190-14-9xx accum amort (negative)
    bsSnap.netIntang = bsSnap.intangG + bsSnap.intangA;
    bsSnap.otNA      = bsSnap.intangG;          // legacy (gross intangible)

    // ── Liabilities ──────────────────────────────────────────────
    bsSnap.apTrade   = bsSnap.ap        || 0;
    bsSnap.accExp    = bsSnap.accExp    || 0;
    bsSnap.advDep    = bsSnap.advDep    || 0;
    bsSnap.taxPay    = bsSnap.taxPay    || 0;
    bsSnap.consign   = bsSnap.consign   || 0;  // 270 Consignment AP
    bsSnap.provision = bsSnap.provision || 0;  // 290 Provision
    bsSnap.affiliated= bsSnap.affiliated || 0; // 210 PT.GDS Mgmt Fee
    bsSnap.dTMgmt    = bsSnap.affiliated;      // legacy alias
    bsSnap.cLTD      = bsSnap.consign;         // legacy alias
    bsSnap.acc       = bsSnap.accExp;          // legacy alias

    // ── Other Assets (193) ───────────────────────────────────────
    bsSnap.otherAssets = bsSnap.otherAssets || 0;  // 193 Deferred Tax Assets

    // ── RE breakdown ─────────────────────────────────────────────
    bsSnap.reBase     = bsSnap.reBase     || 0;  // 310-010 Retained Earning
    bsSnap.reCurYear  = bsSnap.reCurYear  || 0;  // 310-020 Current Year Earning
    bsSnap.rePriorAdj = bsSnap.rePriorAdj || 0;  // 310-030 Prior Year Adjustment
    bsSnap.rePnL      = bsSnap.rePnL      || 0;  // 310-040 P&L Current Period

    // ── RE ───────────────────────────────────────────────────────
    if (!bsSnap.re && bsSnap._re310 !== undefined) {
      bsSnap.re = bsSnap._re310;
    }

    // Clean up raw accumulator keys
    ['_accDRaw','_re310','_ltDebt','_ltDebt2','_intang190_gross','_intang190_accum'].forEach(k => delete bsSnap[k]);
  }

  // Normalize: aggregate granular dept fields into legacy fields pnl() expects
  const tbNorm = normalizeTB(tb);

  return { tb: tbNorm, bsSnap, totalDebit, totalCredit, unmapped };
}

// ── Validate balance ──────────────────────────────────────────────
function validateBalance(totalDebit, totalCredit) {
  const diff = Math.abs(totalDebit - totalCredit);
  const threshold = Math.max(totalDebit, totalCredit) * 0.001; // 0.1% tolerance
  return { balanced: diff <= threshold, diff, totalDebit, totalCredit };
}

function TBImportPage({ currentUser, onImportDone }) {
  const [step,         setStep]         = useState('upload');   // upload|preview|confirm|result
  const [lang] = React.useContext(LangContext); // i18n re-render trigger
  const [file,         setFile]         = useState(null);
  const [fileName,     setFileName]     = useState('');
  const [fileSize,     setFileSize]     = useState(0);
  const [rawRows,      setRawRows]      = useState([]);
  const [parsedTB,     setParsedTB]     = useState(null);
  const [validation,   setValidation]   = useState(null);
  const [detectedPeriod, setDetectedPeriod] = useState(null);
  const [manualYear,   setManualYear]   = useState('2026');
  const [manualMonth,  setManualMonth]  = useState(String(new Date().getMonth()+1).padStart(2,'0'));
  const [useManual,    setUseManual]    = useState(false);
  const [periodConflict, setPeriodConflict] = useState(false);
  const [conflictChoice, setConflictChoice] = useState(null); // 'replace'|'cancel'
  const [importing,    setImporting]    = useState(false);
  const [importLog,    setImportLog]    = useState(window.__GDS_TB_IMPORT_LOG || []);
  const [parseError,   setParseError]   = useState('');
  const [unmapped,     setUnmapped]     = useState([]);
  const [dragOver,     setDragOver]     = useState(false);
  const [activeTab,    setActiveTab]    = useState('import');   // import|history|mapping

  const ML12 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const effectivePeriod = useMemo(() => {
    if (useManual || !detectedPeriod) {
      const key = `${manualYear}-${manualMonth}`;
      return { year: manualYear, month: manualMonth, key, label: `${ML12[parseInt(manualMonth)-1]} ${manualYear}` };
    }
    return detectedPeriod;
  }, [useManual, manualYear, manualMonth, detectedPeriod]);

  // Re-check period conflict whenever effectivePeriod changes (e.g. user overrides manually)
  useEffect(() => {
    if (step === 'preview' || step === 'confirm') {
      const tbRef = window.__TB_REF;
      const exists = !!(tbRef && tbRef[effectivePeriod.key]);
      setPeriodConflict(exists);
      setConflictChoice(null);
    }
  }, [effectivePeriod.key, step]);
  const processFile = useCallback(async (f) => {
    setParseError('');
    setStep('upload');
    setFile(f);
    setFileName(f.name);
    setFileSize(f.size);

    const detected = detectPeriodFromFilename(f.name);
    setDetectedPeriod(detected);
    setUseManual(!detected);

    try {
      const text = await f.text();
      let rows = [];

      if (f.name.toLowerCase().endsWith('.csv') || f.type.includes('csv')) {
        rows = parseCSV(text);
      } else if (f.name.match(/\.xlsx?$/i)) {
        // For XLS/XLSX: try parsing as CSV first (some tools export xlsx as csv)
        // Real XLSX needs SheetJS — try to use it if available
        if (typeof XLSX !== 'undefined') {
          const ab = await f.arrayBuffer();
          const wb = XLSX.read(ab, {type:'array'});
          const ws = wb.Sheets[wb.SheetNames[0]];
          // Use sheet_to_json with header:1 → array of arrays (no header assumption)
          const aoaRaw = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
          // Find the header row: scan for row containing 'Account No'
          let hdrIdx = -1;
          for (let ri = 0; ri < Math.min(aoaRaw.length, 400); ri++) {
            const rowVals = aoaRaw[ri].map(v => String(v||'').toLowerCase().trim());
            if (rowVals.some(v => v === 'account no' || v === 'account' || v === 'kode akun')) {
              hdrIdx = ri; break;
            }
          }
          if (hdrIdx >= 0) {
            const hdrs = aoaRaw[hdrIdx].map(v => String(v||'').toLowerCase().trim());
            rows = aoaRaw.slice(hdrIdx + 1).map(rowArr => {
              const obj = {};
              hdrs.forEach((h, ci) => { obj[h] = rowArr[ci] !== undefined ? String(rowArr[ci]) : ''; });
              return obj;
            });
          } else {
            // Fallback: use sheet_to_csv
            const csv = XLSX.utils.sheet_to_csv(ws);
            rows = parseCSV(csv);
          }
        } else {
          // Fallback: try as text
          rows = parseCSV(text);
          if (!rows.length) {
            setParseError('File Excel memerlukan library SheetJS. Coba export sebagai CSV terlebih dahulu.');
            return;
          }
        }
      } else {
        rows = parseCSV(text);
      }

      if (!rows.length) {
        setParseError('File tidak dapat dibaca atau kosong. Pastikan format kolom benar.');
        return;
      }

      setRawRows(rows);
      const { tb, bsSnap, totalDebit, totalCredit, unmapped: um } = mapRowsToTB(rows, detected || {year: manualYear, month: manualMonth});
      tb.__bsSnap = bsSnap; // attach for use in handleImport
      setParsedTB(tb);
      setUnmapped(um);
      const val = validateBalance(totalDebit, totalCredit);
      setValidation(val);

      // Check period conflict — use window.__TB_REF which points to actual TB object
      const pKey = detected ? detected.key : `${manualYear}-${manualMonth}`;
      const tbRef = window.__TB_REF;
      const exists = !!(tbRef && tbRef[pKey]);
      setPeriodConflict(exists);
      setConflictChoice(null);
      setStep('preview');
    } catch(err) {
      setParseError('Error membaca file: ' + err.message);
    }
  }, [manualYear, manualMonth]);

  const handleDrop = useCallback((e) => {
    e.preventDefault();
    setDragOver(false);
    const f = e.dataTransfer.files[0];
    if (f) processFile(f);
  }, [processFile]);

  const handleFileInput = (e) => {
    const f = e.target.files[0];
    if (f) processFile(f);
  };

  // ── Import execution ──────────────────────────────────────────
  const handleImport = () => {
    // If conflict exists but user chose cancel → do not proceed
    if (periodConflict && conflictChoice === 'cancel') return;
    // If conflict exists and user hasn't chosen yet → auto-proceed as revisi
    // (they already confirmed by clicking "Import Sekarang")
    setImporting(true);

    setTimeout(() => {
      try {
        const pKey = effectivePeriod.key;
        const tbData = { ...parsedTB };

        // TB is in eval() closure — window.__TB_REF holds the same object reference
        const tbTarget = window.__TB_REF;

        // Preserve operational metrics (avail/occ/arr):
        // If TB file contains these values (900-14-xxx), use them directly.
        // If not parsed from file, keep existing data (for re-imports / corrections).
        if (tbTarget && tbTarget[pKey]) {
          if (!tbData.avail)   tbData.avail   = tbTarget[pKey].avail;
          if (!tbData.occ)     tbData.occ     = tbTarget[pKey].occ;
          if (!tbData.arr)     tbData.arr     = tbTarget[pKey].arr;
          if (!tbData.fbCover) tbData.fbCover = tbTarget[pKey].fbCover;
        }
        // Ensure sinkFund is 0 if not present (legacy field, no longer used)
        if (!tbData.sinkFund) tbData.sinkFund = 0;

        // Mutate the actual TB object directly — same object all modules read from
        if (tbTarget) {
          tbTarget[pKey] = tbData;
        }
        window.TB = tbTarget || {};

        // Auto-generate BS snapshot from imported TB's ending balances
        // This allows BSPage/CFPage/DashboardPage to work for newly imported periods
        const snapRef = window.BS_SNAPSHOTS_REF;
        if (snapRef && parsedTB.__bsSnap && Object.keys(parsedTB.__bsSnap).length > 3) {
          const ML2=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
          const mo = parseInt(effectivePeriod.month) - 1;
          const snapKeyNew = ML2[mo] + effectivePeriod.year.slice(2);
          const snap = { ...parsedTB.__bsSnap };

          // ── Sanity check before saving ─────────────────────────────
          // accD must be negative (contra-asset). If positive, re-derive from prior+depr.
          if (snap.accD >= 0) {
            const prevKey2 = mo === 0 ? 'dec'+(parseInt(effectivePeriod.year.slice(2))-1||25)
                                      : ML2[mo-1]+effectivePeriod.year.slice(2);
            const prevSnap2 = snapRef[prevKey2] || null;
            const prevAccD2 = prevSnap2 ? (prevSnap2.accD || 0) : 0;
            const monthDepr = (tbData.depr || 0) + (tbData.amor || 0);
            snap.accD = prevAccD2 < 0 && monthDepr > 0 ? prevAccD2 - monthDepr : -Math.abs(snap.accD || 0);
          }
          // cash must be positive and reasonable (> 0.1B for GDS)
          if (!snap.cash || snap.cash < 0.05) {
            snap.cash = (snap.cashBank || 0) + (snap.stInv || 0) + (snap._cashHand || 0.02);
          }

          snapRef[snapKeyNew] = snap;
          console.log('[GDS] BS snapshot saved:', snapKeyNew, {
            cash: snap.cash?.toFixed(3), accD: snap.accD?.toFixed(3),
            fixG: snap.fixG?.toFixed(3), netF: snap.fixG && snap.accD ? (snap.fixG + snap.accD).toFixed(3) : '?'
          });
        }

        // Log the import
        const logEntry = {
          id:          Date.now(),
          company:     'Grand Darmo Suite by Amithya',
          period:      effectivePeriod.label,
          periodKey:   effectivePeriod.key,
          fileName:    fileName,
          user:        (currentUser&&currentUser.name) || 'System',
          role:        (currentUser&&currentUser.role) || '—',
          timestamp:   new Date().toLocaleString('id-ID', {dateStyle:'short',timeStyle:'short'}),
          rows:        rawRows.length,
          balanced:    (validation&&validation.balanced),
          totalDebit:  (validation&&validation.totalDebit),
          totalCredit: (validation&&validation.totalCredit),
          action:      periodConflict ? 'REVISI' : 'NEW',
          status:      'SUCCESS',
        };
        window.__GDS_TB_IMPORT_LOG = [logEntry, ...(window.__GDS_TB_IMPORT_LOG||[])].slice(0,50);
        setImportLog([...window.__GDS_TB_IMPORT_LOG]);

        // Trigger recalculation — fires onImportDone callback which increments recalcKey in App
        window.__GDS_RECALC_PERIOD = effectivePeriod.key;
        // Update window.mKeys26_ytd so plain-JS sections (e.g. _gdsPLR) see the new period
        window.mKeys26_ytd = ['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06',
                              '2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'];
        setImporting(false);
        setStep('result');
        setTimeout(() => {
          if (onImportDone) onImportDone();
        }, 50);
      } catch(err) {
        setImporting(false);
        setParseError('Import gagal: ' + err.message);
        setStep('preview');
      }
    }, 1200);
  };

  const handleReset = () => {
    setStep('upload');
    setFile(null);
    setFileName('');
    setRawRows([]);
    setParsedTB(null);
    setValidation(null);
    setDetectedPeriod(null);
    setParseError('');
    setUnmapped([]);
    setConflictChoice(null);
    setPeriodConflict(false);
  };

  // ── UI helpers ────────────────────────────────────────────────
  const safe = n => (n===undefined||n===null||isNaN(n))?0:n;
  const fB = n => { const a=Math.abs(n)*1000; return n<0?`(${a>=1?a.toFixed(1)+'M':(a*1000).toFixed(0)+'K'})`:(a>=1?a.toFixed(1)+'M':(a*1000).toFixed(0)+'K'); };
  const fIDR = n => { const a=Math.abs(n); return (a>=1e9?(a/1e9).toFixed(2)+'B':a>=1e6?(a/1e6).toFixed(1)+'M':a>=1e3?(a/1e3).toFixed(0)+'K':a.toFixed(0))+' IDR'; };

  const TAB = (k,l,ic) => (
    <button onClick={()=>setActiveTab(k)}
      style={{padding:'7px 16px',borderRadius:6,border:'none',cursor:'pointer',
        fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",
        background:activeTab===k?T.accent:T.border,
        color:activeTab===k?'#060D0F':T.muted}}>
      {ic} {l}
    </button>
  );

  const STEP_INDICATOR = () => {
    const steps = [
      {k:'upload',  n:1, l:'Upload File'},
      {k:'preview', n:2, l:'Preview & Validate'},
      {k:'confirm', n:3, l:'Confirm Import'},
      {k:'result',  n:4, l:'Done'},
    ];
    const idx = steps.findIndex(s=>s.k===step);
    return (
      <div style={{display:'flex',alignItems:'center',gap:0,marginBottom:20}}>
        {steps.map((s,i)=>(
          <React.Fragment key={s.k}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",flexShrink:0,
                background:i<idx?T.green:i===idx?T.accent:T.border,
                color:i<=idx?'#060D0F':T.muted}}>
                {i<idx?'✓':s.n}
              </div>
              <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:i===idx?T.text:i<idx?T.green:T.muted,whiteSpace:'nowrap'}}>{s.l}</span>
            </div>
            {i<steps.length-1 && (
              <div style={{flex:1,height:2,background:i<idx?T.green:T.border,margin:'0 8px',minWidth:16}}/>
            )}
          </React.Fragment>
        ))}
      </div>
    );
  };

  // ════════════════════════════════════════════════════════════════
  // RENDER
  // ════════════════════════════════════════════════════════════════
  return (
    <div>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{t('tb_title')}</div>
          <div style={{color:T.muted,fontSize:11}}>Data ingestion · CSV / Excel · Auto period detection · Validation</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          {TAB('import','Import','📥')}
          {TAB('history','Import History','📋')}
          {TAB('mapping','Account Mapping','🗂')}
        </div>
      </div>

      {/* ══ TAB: IMPORT ══ */}
      {activeTab==='import' && (
        <div style={{display:'grid',gridTemplateColumns:'3fr 2fr',gap:16}} className="r-grid-2">
          {/* LEFT: Main import flow */}
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <STEP_INDICATOR/>

            {/* ── STEP: UPLOAD ── */}
            {step==='upload' && (
              <Card>
                <div style={{color:T.muted,fontSize:9,letterSpacing:3,fontFamily:"'JetBrains Mono',monospace",marginBottom:14,textTransform:'uppercase',display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:14,height:2,background:T.accent}}/>Upload Trial Balance File
                </div>

                {/* Drop zone */}
                <div
                  onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                  onDragLeave={()=>setDragOver(false)}
                  onDrop={handleDrop}
                  style={{border:`2px dashed ${dragOver?T.accent:T.border}`,borderRadius:12,
                    padding:'40px 24px',textAlign:'center',cursor:'pointer',transition:'all 0.2s',
                    background:dragOver?`${T.accent}08`:T.bg,marginBottom:14}}
                  onClick={()=>document.getElementById('tb-file-input').click()}>
                  <div style={{fontSize:40,marginBottom:12}}>📂</div>
                  <div style={{color:T.text,fontSize:13,fontWeight:600,marginBottom:6}}>
                    {dragOver ? 'Lepaskan file di sini…' : 'Drag & drop file Trial Balance'}
                  </div>
                  <div style={{color:T.muted,fontSize:11,marginBottom:16}}>
                    atau klik untuk pilih file
                  </div>
                  <div style={{display:'flex',justifyContent:'center',gap:8}}>
                    {['.xlsx','.xls','.csv'].map(ext=>(
                      <span key={ext} style={{padding:'3px 10px',borderRadius:4,background:`${T.accent}15`,
                        color:T.accent,fontSize:10,fontFamily:"'JetBrains Mono',monospace",border:`1px solid ${T.accent}30`}}>
                        {ext}
                      </span>
                    ))}
                  </div>
                  <input id="tb-file-input" type="file" accept=".xlsx,.xls,.csv,.txt"
                    style={{display:'none'}} onChange={handleFileInput}/>
                </div>

                {/* Period override */}
                <div style={{background:T.bg,borderRadius:8,padding:'14px 16px',border:`1px solid ${T.border}`}}>
                  <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginBottom:10,textTransform:'uppercase'}}>Period Manual (jika tidak terdeteksi otomatis)</div>
                  <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
                    <select value={manualYear} onChange={e=>setManualYear(e.target.value)}
                      style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'7px 10px',
                        color:T.text,fontSize:11,fontFamily:"'JetBrains Mono',monospace",outline:'none'}}>
                      {['2026','2025','2024','2023','2022','2021','2020'].map(y=><option key={y} value={y}>{y}</option>)}
                    </select>
                    <select value={manualMonth} onChange={e=>setManualMonth(e.target.value)}
                      style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'7px 10px',
                        color:T.text,fontSize:11,fontFamily:"'JetBrains Mono',monospace",outline:'none'}}>
                      {ML12.map((m,i)=><option key={i+1} value={String(i+1).padStart(2,'0')}>{m}</option>)}
                    </select>
                    <span style={{color:T.muted,fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>
                      → {ML12[parseInt(manualMonth)-1]} {manualYear}
                    </span>
                  </div>
                </div>

                {parseError && (
                  <div style={{marginTop:10,padding:'10px 14px',background:`${T.red}10`,borderRadius:7,
                    border:`1px solid ${T.red}30`,color:T.red,fontSize:11}}>
                    ⚠ {parseError}
                  </div>
                )}

                {/* Format guide */}
                <div style={{marginTop:14,padding:'12px 14px',background:`${T.accent}06`,borderRadius:8,border:`1px solid ${T.border}`}}>
                  <div style={{color:T.accent,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginBottom:8,textTransform:'uppercase'}}>Format Kolom yang Didukung</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}} className="r-grid-2">
                    {[
                      ['Kode Akun','code / account / kode / no'],
                      ['Keterangan','desc / name / keterangan / uraian'],
                      ['Debit','debit / dr / debet'],
                      ['Credit','credit / cr / kredit'],
                    ].map(([k,v])=>(
                      <div key={k} style={{fontSize:10}}>
                        <span style={{color:T.accent,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{k}: </span>
                        <span style={{color:T.muted}}>{v}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{marginTop:8,fontSize:9,color:T.muted}}>
                    💡 Nama file: <span style={{fontFamily:"'JetBrains Mono',monospace",color:T.sub}}>TB_2026_01.xlsx</span> atau <span style={{fontFamily:"'JetBrains Mono',monospace",color:T.sub}}>Jan2026.csv</span> → periode terdeteksi otomatis
                  </div>
                </div>
              </Card>
            )}

            {/* ── STEP: PREVIEW ── */}
            {step==='preview' && parsedTB && (
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                {/* Period detection banner */}
                <Card style={{padding:'14px 16px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
                    <div>
                      <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginBottom:4,textTransform:'uppercase'}}>
                        {detectedPeriod&&!useManual?'✅ Period Auto-Detected':'📅 Periode Manual'}
                      </div>
                      <div style={{color:T.text,fontSize:16,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{effectivePeriod.label}</div>
                      <div style={{color:T.muted,fontSize:10,marginTop:2}}>Key: {effectivePeriod.key} · File: {fileName}</div>
                    </div>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                      {detectedPeriod && (
                        <button onClick={()=>setUseManual(p=>!p)}
                          style={{padding:'5px 12px',borderRadius:5,border:`1px solid ${T.border}`,
                            background:useManual?`${T.accent}15`:'none',
                            color:useManual?T.accent:T.muted,fontSize:9,fontFamily:"'JetBrains Mono',monospace",cursor:'pointer'}}>
                          {useManual?'Gunakan Deteksi Otomatis':'Override Manually'}
                        </button>
                      )}
                      {useManual && (
                        <div style={{display:'flex',gap:6}}>
                          <select value={manualYear} onChange={e=>setManualYear(e.target.value)}
                            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:5,padding:'5px 8px',color:T.text,fontSize:10,fontFamily:"'JetBrains Mono',monospace",outline:'none'}}>
                            {['2026','2025','2024','2023'].map(y=><option key={y} value={y}>{y}</option>)}
                          </select>
                          <select value={manualMonth} onChange={e=>setManualMonth(e.target.value)}
                            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:5,padding:'5px 8px',color:T.text,fontSize:10,fontFamily:"'JetBrains Mono',monospace",outline:'none'}}>
                            {ML12.map((m,i)=><option key={i+1} value={String(i+1).padStart(2,'0')}>{m}</option>)}
                          </select>
                        </div>
                      )}
                    </div>
                  </div>
                </Card>

                {/* Validation result */}
                <Card style={{padding:'14px 16px',border:`1px solid ${(validation&&validation.balanced)?T.green:T.red}40`,background:(validation&&validation.balanced)?`${T.green}06`:`${T.red}06`}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
                    <div style={{display:'flex',alignItems:'center',gap:12}}>
                      <span style={{fontSize:24}}>{(validation&&validation.balanced)?'✅':'⚠️'}</span>
                      <div>
                        <div style={{color:(validation&&validation.balanced)?T.green:T.accent,fontSize:13,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>
                          {(validation&&validation.balanced)?'Trial Balance Balanced':'TB: Selisih Debit/Kredit Normal (P&L accounts)'}
                        </div>
                        <div style={{color:T.muted,fontSize:10,marginTop:2}}>
                          Debit: {fIDR((validation&&validation.totalDebit)||0)} · Credit: {fIDR((validation&&validation.totalCredit)||0)}
                          {!(validation&&validation.balanced) && ` · Selisih: ${fIDR((validation&&validation.diff)||0)}`}
                        </div>
                      </div>
                    </div>
                    <div style={{display:'flex',gap:8,fontSize:12,color:T.muted,fontFamily:"'JetBrains Mono',monospace"}}>
                      <span>{rawRows.length} baris data</span>
                      {unmapped.length>0 && <span style={{color:T.yellow}}>· {unmapped.length} unmapped accounts</span>}
                    </div>
                  </div>
                  {!(validation&&validation.balanced) && (
                    <div style={{marginTop:10,padding:'8px 12px',background:`${T.red}10`,borderRadius:6,
                      border:`1px solid ${T.red}25`,fontSize:10,color:T.red}}>
                      ℹ D/K difference is normal for hotel TB — P&L accounts don't balance by design. Data is safe to import.
                    </div>
                  )}
                </Card>

                {/* Period conflict */}
                {periodConflict && (
                  <div style={{padding:'14px 16px',background:`${T.yellow}0d`,borderRadius:10,
                    border:`1px solid ${T.yellow}40`}}>
                    <div style={{color:T.yellow,fontSize:12,fontWeight:700,marginBottom:8,fontFamily:"'JetBrains Mono',monospace"}}>
                      ⚡ Periode {effectivePeriod.label} Sudah Ada
                    </div>
                    <div style={{color:T.sub,fontSize:11,marginBottom:12}}>
                      Data untuk periode ini sudah tersedia di sistem. Pilih tindakan:
                    </div>
                    <div style={{display:'flex',gap:8}}>
                      <button onClick={()=>setConflictChoice('replace')}
                        style={{padding:'8px 16px',borderRadius:6,border:`2px solid ${conflictChoice==='replace'?T.accent:T.border}`,
                          background:conflictChoice==='replace'?`${T.accent}15`:'none',
                          color:conflictChoice==='replace'?T.accent:T.sub,
                          fontSize:11,fontFamily:"'JetBrains Mono',monospace",cursor:'pointer',fontWeight:700}}>
                        🔄 Revisi / Replace Data
                      </button>
                      <button onClick={()=>setConflictChoice('cancel')}
                        style={{padding:'8px 16px',borderRadius:6,border:`2px solid ${conflictChoice==='cancel'?T.red:T.border}`,
                          background:conflictChoice==='cancel'?`${T.red}10`:'none',
                          color:conflictChoice==='cancel'?T.red:T.sub,
                          fontSize:11,fontFamily:"'JetBrains Mono',monospace",cursor:'pointer',fontWeight:700}}>
                        ✕ Batalkan Import
                      </button>
                    </div>
                  </div>
                )}

                {/* P&L preview from parsed data */}
                <Card>
                  <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginBottom:12,textTransform:'uppercase'}}>Preview Data P&L Terdeteksi</div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:12}} className="r-grid-4">
                    {[
                      {l:'Room Revenue',   v:safe(parsedTB.rooms),     c:T.accent},
                      {l:'F&B Revenue',    v:safe(parsedTB.fnb),       c:T.accent},
                      {l:'Total Revenue',  v:safe(parsedTB.rooms)+safe(parsedTB.fnb)+safe(parsedTB.minor)+safe(parsedTB.otherinc), c:T.green},
                      {l:'Dept Payroll',   v:safe(parsedTB.deptPay),   c:T.red},
                      {l:'Cost of Sales',  v:safe(parsedTB.cos),       c:T.red},
                      {l:'Overhead Pay',   v:safe(parsedTB.ovhdPay),   c:T.red},
                    ].map(k=>(
                      <div key={k.l} style={{background:T.bg,borderRadius:6,padding:'10px 12px',border:`1px solid ${T.border}`}}>
                        <div style={{fontSize:9,color:T.muted,marginBottom:3,letterSpacing:1,textTransform:'uppercase'}}>{k.l}</div>
                        <div style={{fontSize:14,fontWeight:700,color:k.c,fontFamily:"'JetBrains Mono',monospace"}}>{fB(k.v)}</div>
                      </div>
                    ))}
                  </div>
                  {unmapped.length>0 && (
                    <details style={{marginTop:8}}>
                      <summary style={{color:T.yellow,fontSize:10,fontFamily:"'JetBrains Mono',monospace",cursor:'pointer',padding:'6px 0'}}>
                        ⚠ {unmapped.length} Unmapped Accounts (klik untuk lihat)
                      </summary>
                      <div style={{maxHeight:160,overflowY:'auto',marginTop:8}}>
                        <table style={{width:'100%',borderCollapse:'collapse',fontSize:10}}>
                          <thead>
                            <tr style={{background:T.border}}>
                              {['Kode','Keterangan','Debit','Credit'].map(h=>(
                                <th key={h} style={{padding:'5px 8px',textAlign:h==='Kode'||h==='Keterangan'?'left':'right',
                                  color:T.muted,fontFamily:"'JetBrains Mono',monospace",fontSize:9}}>{h}</th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {unmapped.slice(0,20).map((u,i)=>(
                              <tr key={i} style={{borderBottom:`1px solid ${T.border}`}}>
                                <td style={{padding:'4px 8px',color:T.yellow,fontFamily:"'JetBrains Mono',monospace"}}>{u.code||'—'}</td>
                                <td style={{padding:'4px 8px',color:T.sub,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}}>{u.desc||'—'}</td>
                                <td style={{padding:'4px 8px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",color:T.muted}}>{fIDR(u.debit)}</td>
                                <td style={{padding:'4px 8px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",color:T.muted}}>{fIDR(u.credit)}</td>
                              </tr>
                            ))}
                            {unmapped.length>20&&<tr><td colSpan={4} style={{padding:'4px 8px',color:T.muted,fontSize:9}}>... dan {unmapped.length-20} lainnya</td></tr>}
                          </tbody>
                        </table>
                      </div>
                    </details>
                  )}
                </Card>

                {/* Action buttons */}
                <div style={{display:'flex',gap:10}}>
                  <button onClick={handleReset}
                    style={{padding:'10px 20px',borderRadius:7,border:`1px solid ${T.border}`,
                      background:'none',color:T.muted,fontSize:11,fontFamily:"'JetBrains Mono',monospace",cursor:'pointer'}}>
                    ← Upload Ulang
                  </button>
                  <button
                    disabled={periodConflict&&conflictChoice==='cancel'}
                    onClick={()=>setStep('confirm')}
                    style={{flex:1,padding:'10px 20px',borderRadius:7,border:'none',
                      background:(periodConflict&&conflictChoice==='cancel')?T.border:T.accent,
                      color:(periodConflict&&conflictChoice==='cancel')?T.muted:'#060D0F',
                      fontSize:12,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",
                      cursor:(periodConflict&&conflictChoice==='cancel')?'not-allowed':'pointer'}}>
                    Lanjut ke Konfirmasi →
                  </button>
                </div>
                {periodConflict && conflictChoice==='cancel' && (
                  <div style={{textAlign:'center',color:T.red,fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>Import dibatalkan. Upload file baru untuk melanjutkan.</div>
                )}
              </div>
            )}

            {/* ── STEP: CONFIRM ── */}
            {step==='confirm' && (
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <Card style={{border:`1px solid ${T.accent}30`}}>
                  <div style={{color:T.accent,fontSize:12,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",marginBottom:16}}>
                    Konfirmasi Import Trial Balance
                  </div>
                  {[
                    ['Perusahaan', 'Grand Darmo Suite by Amithya'],
                    ['Periode', effectivePeriod.label],
                    ['File', fileName],
                    ['Ukuran File', fileSize>1024*1024?(fileSize/1024/1024).toFixed(1)+' MB':(fileSize/1024).toFixed(0)+' KB'],
                    ['Total Baris Data', rawRows.length.toLocaleString()],
                    ['Status Neraca', (validation&&validation.balanced)?'✅ Balanced':'⚠️ Not Balanced'],
                    ['Unmapped Accounts', unmapped.length>0?`⚠ ${unmapped.length} akun`:'✅ Semua terpetakan'],
                    ['Tindakan', periodConflict ? '🔄 Revise Existing Existing' : '✨ Create New Period'],
                    ['Imported by', `${(currentUser&&currentUser.name)||'—'} (${(currentUser&&currentUser.role)||'—'})`],
                    ['Waktu', new Date().toLocaleString('id-ID')],
                  ].map(([k,v])=>(
                    <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                      padding:'8px 0',borderBottom:`1px solid ${T.border}`}}>

    {id:'forecast', name:'Forecast',        icon:'📡',desc:'Scenario-based projections'},
    {id:'macro',    name:'Macro Report',    icon:'🌍',desc:'External environment'},
    {id:'custom',   name:'Custom',          icon:'⚙', desc:'Select sections below'},
  ];

  const handleReportChange = (id) => {
    setSelReport(id);
    const presets = {board:ALL_SECTIONS,pl:['exec','revenue','pl'],bs:['exec','bs'],
      cf:['exec','cf'],kpi:['exec','kpi'],forecast:['exec','forecast'],macro:['exec','macro']};
    if(id!=='custom') setSelectedSections(presets[id]||ALL_SECTIONS);
  };

  const toggleSection = (id) => setSelectedSections(prev => prev.includes(id)?prev.filter(s=>s!==id):[...prev,id]);

  const subPeriodOpts = useMemo(() => {
    const yr=selPeriod;
    if(parseInt(yr)<2024) return [{v:'full',l:`Full Year ${yr}`}];
    if(yr==='2026'){
  const moOpts=mKeys26_ytd.filter(k=>TB[k]).map((k,i)=>({v:'m'+(i+1),l:ML[i]+' 2026'}));
  return [{v:'ytd',l:'YTD 2026'},...moOpts];
}
    const months=ML.map((m,i)=>{const k=`${yr}-${String(i+1).padStart(2,'0')}`;return TB[k]?{v:`m${i+1}`,l:`${m} ${yr}`}:null;}).filter(Boolean);
    return [{v:'full',l:`Full Year ${yr}`},{v:'q1',l:`Q1 ${yr}`},{v:'q2',l:`Q2 ${yr}`},{v:'q3',l:`Q3 ${yr}`},{v:'q4',l:`Q4 ${yr}`},...months];
  }, [selPeriod, tbVersion]);

  const handleYrChange = (v) => { setSelPeriod(v); setSelSubPeriod(v==='2026'?'ytd':'full'); setSummaryDirty(false); };
  const periodKey = `${selPeriod}_${selSubPeriod}`;

  useEffect(() => {
    const yr=selPeriod,sp=selSubPeriod,isAnn=parseInt(yr)<2024;
    let keys2;
    if(isAnn) keys2=null;
    else if(yr==='2026') keys2=sp==='ytd'?mKeys26_ytd.filter(k=>TB[k]):sp.startsWith('m')?[`2026-${String(parseInt(sp.slice(1))).padStart(2,'0')}`]:mKeys26_ytd.filter(k=>TB[k]);
    else if(sp==='full') keys2=yr==='2025'?mKeys25:mKeys24;
    else if(sp.startsWith('q')){const qn=parseInt(sp.slice(1)),base=(qn-1)*3;keys2=[1,2,3].map(i=>`${yr}-${String(base+i).padStart(2,'0')}`).filter(k=>TB[k]);}
    else keys2=[`${yr}-${sp.slice(1).padStart(2,'0')}`];
    const d2=isAnn?annPnl(parseInt(yr)):(keys2&&keys2.length?aggKeys(keys2):annPnl(parseInt(yr)));
    // bsK: use the latest available 2026 snapshot key, fallback to feb26
    const latest2026snap = (()=>{const ML2=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];const avail=ML2.map(m=>m+'26').filter(k=>BS_SNAPSHOTS[k]);return avail.length?avail[avail.length-1]:'feb26';})();
    const bsK=yr==='2026'?(sp.startsWith('m')?`${['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'][parseInt(sp.slice(1))-1]}26`:latest2026snap):`dec${yr.slice(2)}`;
    const bs2=bsCalc(BS_SNAPSHOTS[bsK]||BS_SNAPSHOTS[latest2026snap]);
    const bud2=(yr==='2026'&&keys2)?aggKeys(keys2,BUD26):null;
    const cr2=bs2.tCA/Math.max(bs2.tCL,0.001),de2=bs2.tL/Math.max(bs2.tEq,0.001),roa2=d2.nop/Math.max(bs2.tA,0.001)*100;
    const budVP=bud2?((d2.rev-bud2.rev)/Math.max(bud2.rev,0.001)*100):null;
    const getLabel=()=>{if(yr==='2026'){if(sp==='ytd'||sp==='full'){const last=mKeys26_ytd.filter(k=>TB[k]).pop();return last?'YTD Jan–'+ML[parseInt(last.split('-')[1])-1]+' 2026':'YTD 2026';}if(sp.startsWith('m'))return ML[parseInt(sp.slice(1))-1]+' 2026';}if(sp==='full')return'Full Year '+yr;if(sp.startsWith('q'))return'Q'+sp.slice(1)+' '+yr;return ML[parseInt(sp.slice(1))-1]+' '+yr;};
    const pl2=getLabel();
    const fM2=(v)=>{if(!v&&v!==0)return'—';const a=Math.abs(v)*1000;const s=a>=1?a.toFixed(1)+'M':(a*1000).toFixed(0)+'K';return v<0?'('+s+')':s;};
    const fP2=(v)=>(!v&&v!==0)?'—':v.toFixed(1)+'%';
    // Pull AI insights + KPI health if available
    const aiInsights = (typeof window !== 'undefined' && window.__GDS_AI_INSIGHTS) || [];
    const aiRisks    = (typeof window !== 'undefined' && window.__GDS_AI_RISKS)    || [];
    const kpiScore   = (typeof window !== 'undefined' && window.__GDS_KPI_SCORE)   || null;
    const kpiHealth  = (typeof window !== 'undefined' && window.__GDS_KPI_HEALTH)  || null;
    const ms = (typeof window !== 'undefined' && window.__GDS_MACRO_SIGNALS) || null;
    const bi  = ms&&ms.monetary?ms.monetary[0].display:'5.75%';
    const idr = ms&&ms.monetary?ms.monetary[2].display:'16,947';
    const sent = (typeof window !== 'undefined' && window.__GDS_MACRO_SENTIMENT)||'Neutral';
    const critRisks = aiRisks.filter(r=>r.level==='CRITICAL'||r.level==='HIGH');

    const auto=
      `Grand Darmo Suite by Amithya mencatat total revenue ${fM2(d2.rev)} untuk ${pl2}, `+
      `dengan GOP ${fM2(d2.gop)} (margin ${fP2(d2.gopMgn)}) dan Net Operating Profit ${fM2(d2.nop)} (${fP2(d2.nopMgn)}). `+
      (budVP!==null?`Revenue ${budVP>=0?'melampaui':'di bawah'} budget sebesar ${Math.abs(budVP).toFixed(1)}%. `:'')+
      `Payroll ratio ${fP2(d2.payRat)} (${d2.payRat<35?'dalam target':'di atas benchmark 35%'}). `+

  function openAdd() {
    setForm({ username:'', password:'', name:'', role:'GM', active:true });
    setModal('add');
    setShowPw(false);
  }

  function openEdit(u) {
    setSelected(u);
    setForm({ username:u.username, name:u.name, role:u.role, active:u.active });
    setModal('edit');
  }

  function openPassword(u) {
    setSelected(u);
    setForm({ password:'' });
    setModal('password');
    setShowPw(false);
  }

  function openDelete(u) {
    setSelected(u);
    setModal('delete');
  }

  function handleAdd() {
    if (!form.username.trim() || !form.password.trim() || !form.name.trim()) {
      showToast('Semua field wajib diisi.', 'error'); return;
    }
    if (users.find(u => u.username === form.username.trim())) {
      showToast('Username sudah dipakai.', 'error'); return;
    }
    if (form.password.length < 6) {
      showToast('Password minimal 6 karakter.', 'error'); return;
    }
    const newUser = {
      id: 'u' + Date.now(),
      username:  form.username.trim().toLowerCase(),
      password:  form.password,
      name:      form.name.trim(),
      role:      form.role,
      active:    true,
      createdAt: new Date().toISOString().slice(0,10),
    };
    persist([...users, newUser]);
    setModal(null);
    showToast(`User "${newUser.username}" berhasil ditambahkan.`);
  }

  function handleEdit() {
    if (!form.name.trim()) { showToast('Nama tidak boleh kosong.', 'error'); return; }
    if (selected.username === currentUser.username && form.role !== 'MASTER') {
      showToast('Tidak bisa mengubah role akun sendiri.', 'error'); return;
    }
    const updated = users.map(u => u.id === selected.id
      ? { ...u, name:form.name.trim(), role:form.role, active:form.active }
      : u
    );
    persist(updated);
    setModal(null);
    showToast('User berhasil diupdate.');
  }

  function handlePassword() {
    if (form.password.length < 6) {
      showToast('Password minimal 6 karakter.', 'error'); return;
    }
    const updated = users.map(u => u.id === selected.id ? { ...u, password:form.password } : u);
    persist(updated);
    setModal(null);
    showToast(`Password "${selected.username}" berhasil diganti.`);
  }

  function handleDelete() {
    if (selected.username === currentUser.username) {
      showToast('Tidak bisa menghapus akun sendiri.', 'error'); setModal(null); return;
    }
    persist(users.filter(u => u.id !== selected.id));
    setModal(null);
    showToast(`User "${selected.username}" dihapus.`);
  }

  function toggleActive(u) {
    if (u.username === currentUser.username) { showToast('Tidak bisa menonaktifkan akun sendiri.', 'error'); return; }
    const updated = users.map(x => x.id === u.id ? { ...x, active: !x.active } : x);
    persist(updated);
    showToast(`${u.username} ${!u.active ? 'diaktifkan' : 'dinonaktifkan'}.`);
  }

  const inp = {
    background: T.bg, border:`1px solid ${T.border}`, borderRadius:6,
    color: T.text, padding:'9px 12px', fontSize:12, width:'100%',
    fontFamily:"'JetBrains Mono',monospace", outline:'none',
  };
  const btn = (color, bg) => ({
    background: bg||'transparent', border:`1px solid ${color}`, borderRadius:6,
    color, padding:'7px 14px', fontSize:11, cursor:'pointer',
    fontFamily:"'JetBrains Mono',monospace", fontWeight:600,
  });

  return (
    <div>
      {/* Toast */}
      {toast && (
        <div style={{ position:'fixed', top:20, right:24, zIndex:9999, background: toast.type==='error'?T.red:T.green, color:'#fff', padding:'10px 20px', borderRadius:8, fontSize:12, fontFamily:"'JetBrains Mono',monospace", boxShadow:'0 4px 20px rgba(0,0,0,0.4)' }}>
          {toast.type==='error' ? '✕ ' : '✓ '}{toast.msg}
        </div>
      )}

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
        <div>
          <div style={{ color:T.text, fontSize:18, fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>User Management</div>
          <div style={{ color:T.muted, fontSize:11, marginTop:4 }}>{users.length} user terdaftar · Disimpan di browser</div>
        </div>
        <button onClick={openAdd} style={{ ...btn(T.accent), background:`${T.accent}22`, padding:'9px 20px', fontSize:12 }}>
          + Tambah User
        </button>
      </div>

      {/* Role Legend */}
      <div style={{ display:'flex', gap:8, marginBottom:20, flexWrap:'wrap' }}>
        {ROLES.map(r => (
          <div key={r} style={{ display:'flex', alignItems:'center', gap:6, background:T.card, border:`1px solid ${T.border}`, borderRadius:6, padding:'5px 12px' }}>
            <div style={{ width:8, height:8, borderRadius:'50%', background:ROLE_COLORS[r] }}/>
            <span style={{ color:T.sub, fontSize:10, fontFamily:"'JetBrains Mono',monospace" }}>{r}</span>
            <span style={{ color:T.muted, fontSize:9 }}>— {ROLE_PAGES[r].length} modul</span>
          </div>
        ))}
      </div>

      {/* User Table */}
      <Card style={{ padding:0, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ borderBottom:`1px solid ${T.border}` }}>
              {['USERNAME','NAMA','ROLE','STATUS','DIBUAT','AKSI'].map(h => (
                <th key={h} style={{ padding:'12px 16px', textAlign:'left', color:T.muted, fontSize:9, letterSpacing:2, fontFamily:"'JetBrains Mono',monospace", fontWeight:600 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {users.map((u, i) => (
              <tr key={u.id} style={{ borderBottom: i<users.length-1?`1px solid ${T.border}`:'none', background: u.username===currentUser.username?`${T.accent}08`:'transparent' }}>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <div style={{ width:28, height:28, borderRadius:6, background:`${ROLE_COLORS[u.role]}22`, borderTop:`1px solid ${ROLE_COLORS[u.role]}44`,borderBottom:`1px solid ${ROLE_COLORS[u.role]}44`,borderLeft:`1px solid ${ROLE_COLORS[u.role]}44`,borderRight:`1px solid ${ROLE_COLORS[u.role]}44`, display:'flex', alignItems:'center', justifyContent:'center', color:ROLE_COLORS[u.role], fontSize:11, fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>
                      {u.username[0].toUpperCase()}
                    </div>
                    <span style={{ color:T.text, fontSize:12, fontFamily:"'JetBrains Mono',monospace", fontWeight:600 }}>
                      {u.username}
                      {u.username===currentUser.username && <span style={{ color:T.accent, fontSize:9, marginLeft:6 }}>▶ ANDA</span>}
                    </span>
                  </div>
                </td>
                <td style={{ padding:'13px 16px', color:T.sub, fontSize:12, fontFamily:"'Inter',sans-serif" }}>{u.name}</td>
                <td style={{ padding:'13px 16px' }}>
                  <Chip color={ROLE_COLORS[u.role]}>{u.role}</Chip>
                </td>
                <td style={{ padding:'13px 16px' }}>
                  <div onClick={() => toggleActive(u)} style={{ cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5, background: u.active?`${T.green}22`:`${T.red}22`, border:`1px solid ${u.active?T.green:T.red}44`, borderRadius:20, padding:'3px 10px' }}>
                    <div style={{ width:6, height:6, borderRadius:'50%', background: u.active?T.green:T.red }}/>
                    <span style={{ color: u.active?T.green:T.red, fontSize:9, fontFamily:"'JetBrains Mono',monospace", fontWeight:600 }}>{u.active?'AKTIF':'NONAKTIF'}</span>
                  </div>
                </td>
                <td style={{ padding:'13px 16px', color:T.muted, fontSize:10, fontFamily:"'JetBrains Mono',monospace" }}>{u.createdAt}</td>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', gap:6 }}>
                    <button onClick={() => openEdit(u)} style={{ ...btn(T.accent), padding:'4px 10px', fontSize:10 }} title="Edit profil">✎ Edit</button>
                    <button onClick={() => openPassword(u)} style={{ ...btn(T.yellow), padding:'4px 10px', fontSize:10 }} title="Ganti password">🔑 PW</button>
                    {u.username !== currentUser.username && (
                      <button onClick={() => openDelete(u)} style={{ ...btn(T.red), padding:'4px 10px', fontSize:10 }} title="Hapus user">✕</button>
                    )}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>

      <div style={{ marginTop:12, color:T.muted, fontSize:10, fontFamily:"'JetBrains Mono',monospace" }}>
        ⓘ Data user tersimpan di localStorage browser ini. Bersih saat clear browser data.
      </div>

      {/* ── MODAL ───────────────────────────────── */}
      {modal && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000 }}>
          <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:12, padding:28, width:'100%', maxWidth:'90vw' }}>

            {/* ADD USER */}
            {modal === 'add' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'JetBrains Mono',monospace", marginBottom:20 }}>+ Tambah User Baru</div>
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>USERNAME</div>
                  <input style={inp} value={form.username} onChange={e=>setForm({...form,username:e.target.value.toLowerCase().replace(/\s/g,'')})} placeholder="cth: finance_mgr" />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>NAMA LENGKAP</div>
                  <input style={inp} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="cth: Budi Santoso" />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>PASSWORD</div>
                  <div style={{ position:'relative' }}>
                    <input style={inp} type={showPw?'text':'password'} value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Min. 6 characters" />
                    <button onClick={()=>setShowPw(!showPw)} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:T.muted, cursor:'pointer', fontSize:12 }}>{showPw?'🙈':'👁'}</button>
                  </div>
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>ROLE & AKSES MODUL</div>
                  <select style={inp} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                    {ROLES.map(r=><option key={r} value={r}>{r} — {ROLE_PAGES[r].length} modul</option>)}
                  </select>
                  <div style={{ color:T.muted, fontSize:10, marginTop:5 }}>Akses: {ROLE_PAGES[form.role].join(', ')}</div>
                </div>
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleAdd} style={{ ...btn(T.accent), background:`${T.accent}22` }}>Simpan User</button>
              </div>
            </>}

            {/* EDIT USER */}
            {modal === 'edit' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'JetBrains Mono',monospace", marginBottom:20 }}>✎ Edit User — {(selected&&selected.username)}</div>
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>NAMA LENGKAP</div>
                  <input style={inp} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>ROLE</div>
                  <select style={inp} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}
                    disabled={(selected&&selected.username) === currentUser.username}>
                    {ROLES.map(r=><option key={r} value={r}>{r} — {ROLE_PAGES[r].length} modul</option>)}
                  </select>
                  <div style={{ color:T.muted, fontSize:10, marginTop:5 }}>Akses: {ROLE_PAGES[form.role].join(', ')}</div>
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:8, letterSpacing:1 }}>STATUS</div>
                  <div style={{ display:'flex', gap:10 }}>
                    {[true,false].map(v=>(
                      <button key={String(v)} onClick={()=>setForm({...form,active:v})}
                        style={{ ...btn(v?T.green:T.red), background:form.active===v?(v?`${T.green}22`:`${T.red}22`):'transparent', flex:1 }}>
                        {v?'✓ AKTIF':'✕ NONAKTIF'}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleEdit} style={{ ...btn(T.accent), background:`${T.accent}22` }}>Simpan Perubahan</button>
              </div>
            </>}

            {/* CHANGE PASSWORD */}
            {modal === 'password' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'JetBrains Mono',monospace", marginBottom:6 }}>🔑 Ganti Password</div>
              <div style={{ color:T.muted, fontSize:11, marginBottom:20 }}>User: <span style={{ color:T.accent }}>{(selected&&selected.username)}</span></div>
              <div>
                <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>PASSWORD BARU</div>
                <div style={{ position:'relative' }}>
                  <input style={inp} type={showPw?'text':'password'} value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Min. 6 characters" autoFocus />
                  <button onClick={()=>setShowPw(!showPw)} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:T.muted, cursor:'pointer', fontSize:12 }}>{showPw?'🙈':'👁'}</button>
                </div>
                {form.password.length > 0 && form.password.length < 6 && (
                  <div style={{ color:T.red, fontSize:10, marginTop:4 }}>Too short — minimum 6 characters</div>
                )}
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handlePassword} style={{ ...btn(T.yellow), background:`${T.yellow}22` }}>Ganti Password</button>
              </div>
            </>}

            {/* DELETE */}
            {modal === 'delete' && <>
              <div style={{ color:T.red, fontSize:15, fontWeight:700, fontFamily:"'JetBrains Mono',monospace", marginBottom:8 }}>✕ Hapus User</div>
              <div style={{ color:T.sub, fontSize:12, marginBottom:20, lineHeight:1.6 }}>
                Yakin hapus user <span style={{ color:T.accent, fontFamily:"'JetBrains Mono',monospace" }}>{(selected&&selected.username)}</span> ({(selected&&selected.name)})?<br/>
                <span style={{ color:T.red, fontSize:11 }}>Tindakan ini tidak bisa dibatalkan.</span>
              </div>
              <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleDelete} style={{ ...btn(T.red), background:`${T.red}22` }}>Ya, Hapus</button>
              </div>
            </>}

          </div>
        </div>
      )}
    </div>
  );
}

class GDSErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {hasError: false, error: null}; }
  static getDerivedStateFromError(error) { return {hasError: true, error}; }
  componentDidCatch(error, info) { console.error('GDS Error:', error, info); }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{padding:24,background:'#1a0000',color:'#ff6b6b',fontFamily:"'JetBrains Mono',monospace",fontSize:11,minHeight:'100vh'}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12,color:'#ff4444'}}>⚠ Component Error</div>
          <div style={{background:'#2a0000',padding:12,borderRadius:6,whiteSpace:'pre-wrap',wordBreak:'break-all',maxHeight:300,overflow:'auto'}}>
            {this.state.error && this.state.error.toString()}
          </div>
          <button onClick={()=>this.setState({hasError:false,error:null})}
            style={{marginTop:16,padding:'8px 16px',background:'#333',color:'#fff',border:'none',borderRadius:6,cursor:'pointer'}}>
            ↺ Try Again
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}


function App() {
  const [user,setUser]=useState(null);
  const [dark,setDark]=useState(true);
  const [page,setPage]=useState('dashboard');
  const [sideOpen, setSideOpen] = React.useState(false);
  const [recalcKey, setRecalcKey] = React.useState(0);
  const [lang, switchLang] = useLang();
  const handleImportDone = React.useCallback(() => {
    setRecalcKey(k => k + 1);
  }, []);
  React.useEffect(() => {
    // All module save events trigger global recalc
    const bump = () => setRecalcKey(k => k + 1);
    const events = ['gds-forecast-saved','gds-budget-saved','gds-tb-imported','gds-macro-updated'];
    events.forEach(e => window.addEventListener(e, bump));
    return () => events.forEach(e => window.removeEventListener(e, bump));
  }, []);

  // Track last update time for freshness indicator
  const [lastUpdated, setLastUpdated] = React.useState(null);
  React.useEffect(() => {
    const markUpdated = () => setLastUpdated(new Date().toLocaleTimeString('id-ID'));
    const events = ['gds-forecast-saved','gds-budget-saved','gds-tb-imported','gds-macro-updated'];
    events.forEach(e => window.addEventListener(e, markUpdated));
    return () => events.forEach(e => window.removeEventListener(e, markUpdated));
  }, []);
  T = dark?DARK:LIGHT;

  if(!user) return (
    <LangContext.Provider value={[lang, switchLang]}>
      <LoginPage onLogin={u=>{setUser(u);setPage(u.pages[0]||'dashboard');}}/>
    </LangContext.Provider>
  );

  const pageMap = {
    dashboard:<GDSErrorBoundary><DashboardPage tbVersion={recalcKey}/></GDSErrorBoundary>,
    pl:<GDSErrorBoundary><PLPage tbVersion={recalcKey}/></GDSErrorBoundary>,
    bs:<GDSErrorBoundary><BSPage tbVersion={recalcKey}/></GDSErrorBoundary>,
    cf:<GDSErrorBoundary><CFPage tbVersion={recalcKey}/></GDSErrorBoundary>,
    budget:<GDSErrorBoundary><RunningPLPage tbVersion={recalcKey}/></GDSErrorBoundary>,
    kpi:<GDSErrorBoundary><KPIPage tbVersion={recalcKey}/></GDSErrorBoundary>,
    forecast:<GDSErrorBoundary><ForecastPage tbVersion={recalcKey}/></GDSErrorBoundary>,
    ai:<GDSErrorBoundary><AIPage tbVersion={recalcKey}/></GDSErrorBoundary>,
    macro:<GDSErrorBoundary><MacroPage tbVersion={recalcKey}/></GDSErrorBoundary>,
    reports:<GDSErrorBoundary><ReportsPage dark={dark} tbVersion={recalcKey}/></GDSErrorBoundary>,
    tbimport:<GDSErrorBoundary><TBImportPage currentUser={user} onImportDone={handleImportDone}/></GDSErrorBoundary>,
    actions:<GDSErrorBoundary><ActionTrackerPage currentUser={user}/></GDSErrorBoundary>,
    users:<GDSErrorBoundary><UserManagementPage currentUser={user}/></GDSErrorBoundary>,
  };

  return (
    <LangContext.Provider value={[lang, switchLang]}>
    <div style={{display:'flex',background:T===DARK?'#0B0F14':'#F5F7FB',minHeight:'100vh',color:T.text,fontFamily:"'Inter',sans-serif",position:'relative'}}>
      {/* Premium dark atmosphere */}
      {dark && (
        <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,overflow:'hidden'}}>
          <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse 70% 50% at 85% 5%,rgba(124,124,255,0.07) 0%,transparent 55%)'}}/>
          <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse 50% 40% at 5% 95%,rgba(0,212,255,0.05) 0%,transparent 55%)'}}/>
          <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse 40% 30% at 50% 50%,rgba(0,191,166,0.02) 0%,transparent 70%)'}}/>
        </div>
      )}
      {/* Mobile overlay */}
      <div className={sideOpen?'gds-overlay show':'gds-overlay'} onClick={()=>setSideOpen(false)}/>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

        .gds-card-ocean:hover{border-color:${dark?'rgba(0,200,212,0.2)':T.border}!important;}
        input[type=range]{height:4px;cursor:pointer}
        select option{background:${T.card};color:${T.text}}

        /* ── BASE LAYOUT ─────────────────────────────────────── */
        .gds-sidebar{
          width:220px;min-width:220px;flex-shrink:0;
          transition:transform 0.25s ease;
          z-index:300;
        }
        .gds-overlay{
          display:none;position:fixed;inset:0;
          background:rgba(0,0,0,0.65);
          z-index:299;

        .gds-main{

          padding:20px 24px;
          background:${T.bg};
          -webkit-overflow-scrolling:touch;

        /* Hamburger hidden on desktop */
