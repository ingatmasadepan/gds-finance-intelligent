function BSPage({ tbVersion=0 }) {
  const [yr, setYr]         = useState('2026');
  const [period, setPeriod] = useState(()=>getLatestPeriod('2026'));

  // ── Period options — built from available BS_SNAPSHOTS for 2026 ────
  const periodOpts = useMemo(() => {
    if (yr === '2026') {
      const ML2=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
      // Include a month option if EITHER TB data OR BS snapshot exists for it
      const available = ML2.map((m, i) => {
        const tbKey   = `2026-${String(i+1).padStart(2,'0')}`;
        const snapKey2= m + '26';
        const hasData = (window.TB && window.TB[tbKey]) || BS_SNAPSHOTS[snapKey2];
        return hasData ? {v:`m${i+1}`, l:`${ML[i]} 2026`} : null;
      }).filter(Boolean);
      // Mark latest as (Latest)
      if (available.length) available[available.length-1].l += ' (Latest)';
      return available.length ? available : [{v:'m1',l:'Jan 2026'},{v:'m2',l:'Feb 2026 (Latest)'}];
    }
    if (MON_YEARS.includes(yr)) return [
      {v:'full', l:`Dec ${yr} (Year-End)`},
      {v:'q1',   l:`Q1 ${yr} (Mar)`},
      {v:'q2',   l:`Q2 ${yr} (Jun)`},
      {v:'q3',   l:`Q3 ${yr} (Sep)`},
      {v:'q4',   l:`Q4 ${yr} (Dec)`},
      ...Array.from({length:12},(_,i)=>({v:`m${i+1}`,l:`${ML[i]} ${yr}`})),
    ];
    return [{v:'full', l:`Dec ${yr}`}];
  }, [yr, tbVersion]);

  const handleYrChange = (v) => {
    setYr(v);
    setPeriod(v === '2026' ? getLatestPeriod('2026') : 'full');
  };

  // ── Snapshot keys ─────────────────────────────────────────────────
  const snapK = useMemo(() => snapKey(yr, period),     [yr, period]);
  const prevK = useMemo(() => prevSnapKey(yr, period), [yr, period]);

  const bs  = useMemo(() => { const ML2=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec']; const latest26=ML2.map(m=>m+'26').filter(k=>BS_SNAPSHOTS[k]).pop()||'feb26'; return bsCalc(BS_SNAPSHOTS[snapK] || BS_SNAPSHOTS[latest26]); }, [snapK]);
  const prv = useMemo(() => bsCalc(BS_SNAPSHOTS[prevK] || BS_SNAPSHOTS['dec25']), [prevK]);

  // ── Revenue for efficiency metrics (read-only via getCur) ─────────
  const rev = useMemo(() => getCur(yr, period), [yr, period]);

  // ── Balance validation ────────────────────────────────────────────
  const balanceDiff  = Math.abs(bs.tA - (bs.tL + bs.tEq));
  const isBalanced   = balanceDiff < 0.005;
  const balanceErrMsg = isBalanced ? null :
    `Assets ${fM(bs.tA)} ≠ L+E ${fM(bs.tL + bs.tEq)} · Diff: ${fM(balanceDiff)}`;

  // ── Working Capital analysis ──────────────────────────────────────
  const wc     = bs.tCA  - bs.tCL;
  const wcPrv  = prv.tCA - prv.tCL;
  const wcDiff = wc - wcPrv;

  const wcComponents = [
    {l:'Accounts Receivable', asset:true,  v:bs.ar,        p:prv.ar,        color:T.accent},
    {l:'Inventories',         asset:true,  v:bs.inv,       p:prv.inv,       color:T.secondary},
    {l:'Prepaid & Others',    asset:true,  v:bs.pre,       p:prv.pre,       color:T.yellow},
    {l:'Accounts Payable',    asset:false, v:bs.ap,        p:prv.ap,        color:T.red},
    {l:'Accrued Expenses',    asset:false, v:bs.acc,       p:prv.acc,       color:T.orange||'#F97316'},
  ];

  // WC insight: find biggest driver
  const wcInsight = useMemo(() => {
    const drivers = wcComponents.map(c => {
      const net = c.asset ? (c.v - c.p) : -(c.v - c.p); // positive = wc improvement
      return {l: c.l, net};
    }).sort((a,b) => Math.abs(b.net) - Math.abs(a.net));
    const top = drivers[0];
    if (!top || Math.abs(top.net) < 0.001) return 'Working capital movement is minimal vs prior period.';
    const dir = top.net >= 0 ? 'improved' : 'declined';
    const side = (wcComponents.find(c=>c.l===top.l)||{}).asset ? 'asset' : 'liability';
    return `Working capital ${dir} by ${fM(Math.abs(wcDiff))} vs prior. Primary driver: ${top.l} ${top.net>=0?'decreased':'increased'} (${side}-side movement).`;
  }, [snapK, prevK]);

  // ── Asset efficiency ──────────────────────────────────────────────
  const assetTurnover = rev.rev > 0 && bs.tA > 0   ? rev.rev / bs.tA   : null;
  const fixedATurnover= rev.rev > 0 && bs.netF > 0  ? rev.rev / bs.netF : null;
  const receivablesDays = rev.rev > 0 ? bs.ar / (rev.rev / (period.startsWith('m')?1:period.startsWith('q')?3:12) / 30) : null;

  // ── Leverage ──────────────────────────────────────────────────────
  const debtRatio     = bs.tA   > 0 ? bs.tL  / bs.tA  : 0;
  const debtToEquity  = bs.tEq  > 0 ? bs.tL  / bs.tEq : 0;
  const equityRatio   = bs.tA   > 0 ? bs.tEq / bs.tA  : 0;
  const leverageLabel = debtRatio < 0.40 ? {l:'Low Leverage',    c:T.green}
                      : debtRatio < 0.65 ? {l:'Moderate Leverage',c:T.yellow}
                      :                    {l:'High Leverage',    c:T.red};

  // Capital structure insight
  const capStructInsight = useMemo(() => {
    const clPct = bs.tL > 0 ? (bs.tCL / bs.tL * 100) : 0;
    const ltPct = 100 - clPct;
    const eqPct = equityRatio * 100;
    if (clPct > 70) return `Capital structure is dominated by short-term liabilities (${clPct.toFixed(0)}% of total liab.), which may increase liquidity pressure.`;
    if (eqPct > 55) return `Strong equity position (${eqPct.toFixed(0)}% of assets) provides a solid financial cushion with low external dependency.`;
    if (debtRatio > 0.6) return `Leverage is elevated — debt represents ${(debtRatio*100).toFixed(0)}% of assets. Monitor debt service capacity closely.`;
    return `Balanced capital structure: equity ${eqPct.toFixed(0)}% of assets, short-term liab. ${clPct.toFixed(0)}% of total liabilities.`;
  }, [snapK]);

  // Liquidity movement insight
  const crNow = bs.tCL > 0 ? bs.tCA / bs.tCL : 0;
  const crPrv = prv.tCL > 0 ? prv.tCA / prv.tCL : 0;
  const qrNow = bs.tCL > 0 ? (bs.cash + bs.ar) / bs.tCL : 0;
  const qrPrv = prv.tCL > 0 ? (prv.cash + prv.ar) / prv.tCL : 0;
  const liqInsight = useMemo(() => {
    const crDir = crNow > crPrv ? 'improved' : crNow < crPrv ? 'declined' : 'unchanged';
    const qrDir = qrNow > qrPrv ? 'improved' : qrNow < qrPrv ? 'declined' : 'unchanged';
    const cashDir = bs.cash > prv.cash ? 'increased' : bs.cash < prv.cash ? 'decreased' : 'unchanged';
    return `Current ratio ${crDir} to ${crNow.toFixed(2)}x (prior: ${crPrv.toFixed(2)}x). Quick ratio ${qrDir} to ${qrNow.toFixed(2)}x. Cash position ${cashDir} by ${fM(Math.abs(bs.cash-prv.cash))}.`;
  }, [snapK, prevK]);

  // ── Asset mix ─────────────────────────────────────────────────────
  const assetMix = [
    {l:'Cash & Equiv',     v:bs.cash, pct:bs.tA>0?bs.cash/bs.tA*100:0,  color:T.accent},
    {l:'Receivables',      v:bs.ar,   pct:bs.tA>0?bs.ar/bs.tA*100:0,    color:T.secondary},
    {l:'Inventories',      v:bs.inv,  pct:bs.tA>0?bs.inv/bs.tA*100:0,   color:T.purple||'#8B5CF6'},
    {l:'Net Fixed Assets', v:bs.netF, pct:bs.tA>0?bs.netF/bs.tA*100:0,  color:T.orange||'#F97316'},
    {l:'Prepaid & Other',  v:bs.pre+bs.otNA, pct:bs.tA>0?(bs.pre+bs.otNA)/bs.tA*100:0, color:T.muted},
  ];

  // ── Capital structure mix ─────────────────────────────────────────
  const capMix = [
    {l:'Current Liab',   v:bs.tCL,  pct:(bs.tL+bs.tEq)>0?bs.tCL/(bs.tL+bs.tEq)*100:0,  color:T.red},
    {l:'Long-term Debt', v:bs.ltD,  pct:(bs.tL+bs.tEq)>0?bs.ltD/(bs.tL+bs.tEq)*100:0,  color:T.yellow},
    {l:'Equity',         v:bs.tEq,  pct:(bs.tL+bs.tEq)>0?bs.tEq/(bs.tL+bs.tEq)*100:0,  color:T.green},
  ];

  // ── CFO Ratios ────────────────────────────────────────────────────
  const ratios = [
    {l:'Current Ratio',    v:crNow.toFixed(2)+'x',           ok:crNow>1.5,            tgt:'>1.5x', prev:crPrv.toFixed(2)+'x'},
    {l:'Quick Ratio',      v:qrNow.toFixed(2)+'x',           ok:qrNow>1.0,            tgt:'>1.0x', prev:qrPrv.toFixed(2)+'x'},
    {l:'Cash Ratio',       v:(bs.cash/Math.max(bs.tCL,0.001)).toFixed(2)+'x', ok:bs.cash/Math.max(bs.tCL,0.001)>0.5, tgt:'>0.5x', prev:null},
    {l:'Debt Ratio',       v:(debtRatio*100).toFixed(1)+'%', ok:debtRatio<0.6,        tgt:'<60%',  prev:null},
    {l:'Debt / Equity',    v:debtToEquity.toFixed(2)+'x',    ok:debtToEquity<1.0,     tgt:'<1.0x', prev:null},
    {l:'Equity Ratio',     v:(equityRatio*100).toFixed(1)+'%',ok:equityRatio>0.4,     tgt:'>40%',  prev:null},
    {l:'Working Capital',  v:fM(wc),                         ok:wc>0,                 tgt:'> 0',   prev:fM(wcPrv)},
    {l:'WC Change vs Prior',v:(wcDiff>=0?'+':'')+fM(wcDiff), ok:wcDiff>=0,            tgt:'Positive',prev:null},
  ];

  const periodLabel = (periodOpts.find(o=>o.v===period)||{}).l || period;

  // ── Sub-components ─────────────────────────────────────────────────
  const BSRow = ({l,v,p,bold,indent,isLiab}) => {
    const chg = p!=null && p!==0 ? (v-p)/Math.abs(p)*100 : null;
    return (
      <tr>
        <td style={{padding:'5px 12px',paddingLeft:indent?28:12,color:bold?T.text:T.sub,fontSize:11,fontWeight:bold?600:400}}>{l}</td>
        <td style={{padding:'5px 12px',textAlign:'right',color:bold?(v<0?T.red:T.text):T.sub,fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:bold?600:400}}>{fM(v)}</td>
        <td style={{padding:'5px 12px',textAlign:'right',color:T.muted,fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>{p!=null?fM(p):''}</td>
        <td style={{padding:'5px 12px',textAlign:'right',fontSize:10,fontFamily:"'JetBrains Mono',monospace",
          color:chg!=null?clr(isLiab?-chg:chg):T.muted}}>
          {chg!=null?`${chg>=0?'+':''}${chg.toFixed(1)}%`:'-'}
        </td>
      </tr>
    );
  };
  const BSec = ({t,c}) => <tr><td colSpan={4} style={{padding:'10px 12px 4px',color:c||T.accent,fontSize:9,letterSpacing:3,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,textTransform:'uppercase'}}>{t}</td></tr>;
  const BDiv = () => <tr><td colSpan={4}><div style={{borderBottom:`1px solid ${T.border}`,margin:'2px 12px'}}/></td></tr>;
  const TRow = ({l,v,p,color}) => (
    <tr style={{background:`${color}10`}}>
      <td style={{padding:'7px 12px',color,fontSize:12,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{l}</td>
      <td style={{padding:'7px 12px',textAlign:'right',color,fontSize:12,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{fM(v)}</td>
      <td style={{padding:'7px 12px',textAlign:'right',color:T.muted,fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>{fM(p)}</td>
      <td style={{padding:'7px 12px',textAlign:'right',color:p&&p!==0?clr(v-p):T.muted,fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>{p&&p!==0?`${((v-p)/Math.abs(p)*100).toFixed(1)}%`:''}</td>
    </tr>
  );

  if(!bs) return (<div style={{padding:40,textAlign:'center',color:T.muted,fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>No balance sheet data available</div>);

  return (
    <div>
      {/* ── Header ── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>BALANCE SHEET</div>
          <div style={{color:T.muted,fontSize:11}}>Statement of Financial Position · {periodLabel} · Rp Milyar</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 12px',color:T.text,fontSize:11,fontFamily:"'JetBrains Mono',monospace",outline:'none'}}>
            {['2026','2025','2024','2023','2022','2021','2020','2019','2018','2017','2016','2015','2014','2013'].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          <select value={period} onChange={e=>setPeriod(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 12px',color:T.text,fontSize:11,fontFamily:"'JetBrains Mono',monospace",outline:'none'}}>
            {periodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
          </select>
          {/* Balance validation badge */}
          <div style={{padding:'5px 12px',borderRadius:6,
            background:isBalanced?`${T.green}15`:`${T.red}15`,
            border:`1px solid ${isBalanced?T.green:T.red}`,
            fontSize:10,color:isBalanced?T.green:T.red,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>
            {isBalanced ? '✓ BALANCED' : '⚠ IMBALANCE'}
          </div>
        </div>
      </div>

      {/* Balance error banner */}
      {!isBalanced && (
        <div style={{background:`${T.red}12`,border:`1px solid ${T.red}40`,borderRadius:8,
          padding:'10px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:18}}>⚠️</span>
          <div>
            <div style={{color:T.red,fontWeight:700,fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>ACCOUNTING EQUATION ERROR</div>
            <div style={{color:T.sub,fontSize:11,marginTop:2}}>{balanceErrMsg}</div>
          </div>
        </div>
      )}

      {/* ── Top KPI strip ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}} className="r-grid-4">
        {[
          {l:'Total Assets',      v:fM(bs.tA),  sub:`Chg: ${bs.tA>prv.tA?'+':''}${fM(bs.tA-prv.tA)}`,   c:T.accent},
          {l:'Total Liabilities', v:fM(bs.tL),  sub:`D/E: ${debtToEquity.toFixed(2)}x · ${leverageLabel.l}`, c:T.red},
          {l:'Total Equity',      v:fM(bs.tEq), sub:`Equity ratio: ${(equityRatio*100).toFixed(1)}%`,   c:T.green},
          {l:'Working Capital',   v:fM(wc),     sub:`Chg vs prior: ${wcDiff>=0?'+':''}${fM(wcDiff)}`,   c:wc>0?T.green:T.red},
        ].map(k=>(
          <div key={k.l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:'12px 16px'}}>
            <div style={{fontSize:9,color:T.muted,textTransform:'uppercase',letterSpacing:1}}>{k.l}</div>
            <div style={{fontSize:18,fontWeight:700,color:k.c,marginTop:4,fontFamily:"'JetBrains Mono',monospace"}}>{k.v}</div>
            <div style={{fontSize:10,color:T.muted,marginTop:2}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* ── Main grid: BS tables + right panel ── */}
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12,marginBottom:14}} className="r-grid-2">

        {/* BS Tables side by side */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}} className="r-grid-2">

          {/* ASSETS */}
          <Card style={{padding:0}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{background:T.border}}>
                  <th colSpan={4} style={{padding:'8px 12px',textAlign:'left',color:T.accent,fontSize:10,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace"}}> ASSETS</th>
                </tr>
                <tr style={{background:T.border}}>
                  {['Account','Current','Prior','Δ%'].map((h,i)=>(
                    <th key={i} style={{padding:'4px 12px',textAlign:i===0?'left':'right',color:T.muted,fontSize:9,letterSpacing:1,fontFamily:"'JetBrains Mono',monospace"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {/* ── 1. CURRENT ASSETS ── */}
                <BSec t="1. Current Assets"/>
                <BSRow l="Cash And Bank"               v={bs.cashOnly}  p={prv.cashOnly} indent bold/>
                <BSRow l="  Cash on Hand"              v={bs.cash110}   p={prv.cash110}  indent/>
                <BSRow l="  Cash at Bank"              v={bs.bank111}   p={prv.bank111}  indent/>
                <BSRow l="  Cash Clearance"            v={bs.clear112}  p={prv.clear112} indent/>
                <BSRow l="Short Terms Investment"      v={bs.stInv}     p={prv.stInv}    indent/>
                <BSRow l="Account Receivable (Net)"    v={bs.ar}        p={prv.ar}       indent bold/>
                <BSRow l="  A/R Trade"                 v={bs.arTrade}   p={prv.arTrade}  indent/>
                <BSRow l="  A/R Others"                v={bs.arOther}   p={prv.arOther}  indent/>
                <BSRow l="Inventories"                 v={bs.inv}       p={prv.inv}      indent/>
                <BSRow l="Prepaid Expenses"            v={bs.prepaid}   p={prv.prepaid}  indent/>
                <BSRow l="Deferred Income Tax"         v={bs.deferTax}  p={prv.deferTax} indent/>
                <BSRow l="Advance Payment"             v={bs.advPmt}    p={prv.advPmt}   indent/>
                <BSRow l="Total Current Assets"        v={bs.tCA}       p={prv.tCA}      bold/>
                <BDiv/>
                {/* ── 3. FIXED ASSETS ── */}
                <BSec t="3. Fixed Assets"/>
                <BSRow l="Property & Equipment"        v={bs.fixG}      p={prv.fixG}     indent/>
                <BSRow l="Acc.Depr. Property & Equip." v={bs.accD}      p={prv.accD}     indent/>
                <BSRow l="Intangible Assets"           v={bs.intangG}   p={prv.intangG}  indent/>
                <BSRow l="Acc.Amort. Intangible Assets" v={bs.intangA}  p={prv.intangA}  indent/>
                <BSRow l="Book Value"                  v={(bs.netF||0)+(bs.netIntang||0)} p={(prv.netF||0)+(prv.netIntang||0)} indent bold/>
                <BDiv/>
                {/* ── 4. OTHER ASSETS ── */}
                <BSec t="4. Other Assets"/>
                <BSRow l="Deferred Income Taxes - Assets" v={bs.otherAssets||0} p={prv.otherAssets||0} indent/>
                <BSRow l="Total Other Assets"          v={bs.otherAssets||0} p={prv.otherAssets||0} bold/>
                <BDiv/>
                <TRow l="TOTAL ASSETS" v={bs.tA} p={prv.tA} color={T.accent}/>
              </tbody>
            </table>
          </Card>

          {/* LIABILITIES + EQUITY */}
          <Card style={{padding:0}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{background:T.border}}>
                  <th colSpan={4} style={{padding:'8px 12px',textAlign:'left',color:T.secondary,fontSize:10,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace"}}> LIAB + EQUITY</th>
                </tr>
                <tr style={{background:T.border}}>
                  {['Account','Current','Prior','Δ%'].map((h,i)=>(
                    <th key={i} style={{padding:'4px 12px',textAlign:i===0?'left':'right',color:T.muted,fontSize:9,letterSpacing:1,fontFamily:"'JetBrains Mono',monospace"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {/* ── 5. CURRENT LIABILITIES ── */}
                <BSec t="5. Current Liabilities"/>
                <BSRow l="Account Payable Trade"       v={bs.apTrade}   p={prv.apTrade}  indent isLiab/>
                <BSRow l="Account Payable Tax"         v={bs.taxPay}    p={prv.taxPay}   indent isLiab/>
                <BSRow l="Accrued Expenses"            v={bs.accExp}    p={prv.accExp}   indent isLiab/>
                <BSRow l="Advance Deposit"             v={bs.advDep}    p={prv.advDep}   indent isLiab/>
                <BSRow l="Other Current Liabilities"   v={bs.consign}   p={prv.consign}  indent isLiab/>
                <BSRow l="Total Current Liabilities"   v={bs.tCL}       p={prv.tCL}      bold/>
                <BDiv/>
                {/* ── 6. OTHER LIABILITIES ── */}
                <BSec t="6. Other Liabilities"/>
                <BSRow l="Provision for Operating Equip." v={bs.provision} p={prv.provision} indent isLiab/>
                <BSRow l="Total Other Liabilities"     v={bs.tOtherL||bs.provision||0} p={prv.tOtherL||prv.provision||0} bold/>
                <BDiv/>
                {/* ── 7. AFFILIATED COMPANIES ── */}
                <BSec t="7. Due to Owner / Management Co."/>
                <BSRow l="Property Mngnt Fee PT.GDS"   v={bs.affiliated} p={prv.affiliated} indent isLiab/>
                <BSRow l="Total Affiliated Payable"    v={bs.affiliated} p={prv.affiliated} bold/>
                <BDiv/>
                <TRow l="TOTAL LIABILITIES" v={bs.tL} p={prv.tL} color={T.red}/>
                <BDiv/>
                {/* ── 9. OWNER EQUITY ── */}
                <BSec t="9. Owner Equity"/>
                <BSRow l="Share Capital"               v={bs.pic}       p={prv.pic}      indent/>
                <BSRow l="Total Capital Owning Company" v={bs.pic}      p={prv.pic}      bold/>
                <BDiv/>
                {/* ── 10. RETAINED EARNING ── */}
                <BSec t="10. Retained Earning"/>
                {bs.hasREDetail ? (<>
                  <BSRow l="Retained Earning"          v={bs.reBase}    p={prv.reBase}   indent/>
                  <BSRow l="Current Year Earning"      v={bs.reCurYear} p={prv.reCurYear} indent/>
                  <BSRow l="Prior Year Adjustment"     v={bs.rePriorAdj} p={prv.rePriorAdj} indent/>
                  <BSRow l="P&L Current Period"        v={bs.rePnL}     p={prv.rePnL}    indent/>
                </>) : (
                  <BSRow l="Retained Earnings"         v={bs.re}        p={prv.re}       indent/>
                )}
                <BSRow l="Total Retained Earning"      v={bs.re}        p={prv.re}       bold/>
                <BDiv/>
                <TRow l="TOTAL LIABILITIES & CAPITAL" v={bs.tLE} p={prv.tLE} color={T.accent}/>
              </tbody>
            </table>
          </Card>
        </div>

        {/* Right column: ratios + asset mix + capital structure */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>

          {/* CFO Ratios */}
          <Card>
            <SectionTitle>CFO ANALYTICS</SectionTitle>
            {ratios.map(r=>(
              <div key={r.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                padding:'5px 0',borderBottom:`1px solid ${T.border}`}}>
                <span style={{color:T.sub,fontSize:10}}>{r.l}</span>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  {r.prev&&<span style={{color:T.muted,fontSize:9}}>prev:{r.prev}</span>}
                  <span style={{color:T.muted,fontSize:9}}>{r.tgt}</span>
                  <span style={{color:r.ok?T.green:T.red,fontSize:11,fontWeight:700,
                    fontFamily:"'JetBrains Mono',monospace",minWidth:44,textAlign:'right'}}>{r.v}</span>
                  <span style={{fontSize:10}}>{r.ok?'✅':'⚠️'}</span>
                </div>
              </div>
            ))}
          </Card>

          {/* Asset Mix */}
          <Card>
            <SectionTitle>ASSET MIX</SectionTitle>
            {assetMix.map(a=>(
              <div key={a.l} style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{color:T.sub,fontSize:10}}>{a.l}</span>
                  <span style={{color:a.color,fontSize:10,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>
                    {fM(a.v)} · {a.pct.toFixed(1)}%
                  </span>
                </div>
                <div style={{height:5,background:T.border,borderRadius:3,overflow:'hidden'}}>
                  <div style={{width:`${Math.min(a.pct,100)}%`,height:'100%',background:a.color,borderRadius:3}}/>
                </div>
              </div>
            ))}
          </Card>
        </div>
      </div>

      {/* ── Bottom row: WC + Asset Efficiency + Leverage + Insights ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10,marginBottom:14}} className="r-grid-4">

        {/* Working Capital Analysis */}
        <Card>
          <SectionTitle>WORKING CAPITAL</SectionTitle>
          <div style={{marginBottom:10,padding:'8px 10px',background:wc>0?`${T.green}10`:`${T.red}10`,
            borderRadius:6,border:`1px solid ${wc>0?T.green:T.red}30`}}>
            <div style={{fontSize:9,color:T.muted,marginBottom:2}}>NET WORKING CAPITAL</div>
            <div style={{fontSize:16,fontWeight:700,color:wc>0?T.green:T.red,fontFamily:"'JetBrains Mono',monospace"}}>{fM(wc)}</div>
            <div style={{fontSize:9,color:wcDiff>=0?T.green:T.red,marginTop:1,fontWeight:600}}>
              {wcDiff>=0?'▲':'▼'} {fM(Math.abs(wcDiff))} vs prior
            </div>
          </div>
          {wcComponents.map(w=>{
            const chg = w.p>0 ? (w.v-w.p)/w.p*100 : 0;
            const okDir = w.asset ? w.v>=w.p : w.v<=w.p;
            return (
              <div key={w.l} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',
                borderBottom:`1px solid ${T.border}`}}>
                <span style={{color:T.sub,fontSize:9,lineHeight:1.3}}>{w.l}</span>
                <div style={{textAlign:'right'}}>
                  <div style={{color:T.text,fontSize:10,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{fM(w.v)}</div>
                  <div style={{fontSize:8,color:okDir?T.green:T.red}}>
                    {chg>=0?'+':''}{chg.toFixed(1)}%
                  </div>
                </div>
              </div>
            );
          })}
        </Card>

        {/* Asset Efficiency */}
        <Card>
          <SectionTitle>ASSET EFFICIENCY</SectionTitle>
          {[
            {
              l:'Asset Turnover',
              v:assetTurnover,
              fmt:v=>v!=null?v.toFixed(2)+'x':'—',
              tgt:0.4, tgtLabel:'>0.4x',
              ok:assetTurnover!=null&&assetTurnover>0.4,
              note:'Revenue / Total Assets',
            },
            {
              l:'Fixed Asset Turnover',
              v:fixedATurnover,
              fmt:v=>v!=null?v.toFixed(2)+'x':'—',
              tgt:0.6, tgtLabel:'>0.6x',
              ok:fixedATurnover!=null&&fixedATurnover>0.6,
              note:'Revenue / Net Fixed Assets',
            },
          ].map(m=>(
            <div key={m.l} style={{marginBottom:12,padding:'10px 12px',
              background:`${m.ok?T.green:T.yellow}08`,borderRadius:8,
              border:`1px solid ${m.ok?T.green:T.yellow}25`}}>
              <div style={{fontSize:9,color:T.muted,marginBottom:2}}>{m.l}</div>
              <div style={{fontSize:20,fontWeight:700,color:m.ok?T.green:T.yellow,fontFamily:"'JetBrains Mono',monospace"}}>{m.fmt(m.v)}</div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:3}}>
                <span style={{fontSize:9,color:T.muted}}>{m.note}</span>
                <span style={{fontSize:9,color:m.ok?T.green:T.yellow,fontWeight:600}}>{m.ok?'✓':'–'} {m.tgtLabel}</span>
              </div>
            </div>
          ))}
          {rev.rev > 0 && (
            <div style={{padding:'8px 10px',background:T.bg,borderRadius:6,border:`1px solid ${T.border}`}}>
              <div style={{fontSize:9,color:T.muted,marginBottom:2}}>Revenue (period)</div>
              <div style={{fontSize:13,fontWeight:700,color:T.accent,fontFamily:"'JetBrains Mono',monospace"}}>{fM(rev.rev)}</div>
              <div style={{fontSize:9,color:T.muted}}>Used for efficiency calc</div>
            </div>
          )}
        </Card>

        {/* Leverage Analysis */}
        <Card>
          <SectionTitle>LEVERAGE ANALYSIS</SectionTitle>
          <div style={{marginBottom:10,padding:'8px 12px',background:`${leverageLabel.c}10`,
            borderRadius:6,border:`1px solid ${leverageLabel.c}30`,textAlign:'center'}}>
            <div style={{fontSize:9,color:T.muted,marginBottom:2}}>CLASSIFICATION</div>
            <div style={{fontSize:14,fontWeight:800,color:leverageLabel.c,fontFamily:"'JetBrains Mono',monospace"}}>{leverageLabel.l}</div>
          </div>
          {[
            {l:'Debt Ratio',          v:(debtRatio*100).toFixed(1)+'%',   ok:debtRatio<0.6,   tgt:'<60%',  note:'Liab / Assets'},
            {l:'Debt / Equity',       v:debtToEquity.toFixed(2)+'x',      ok:debtToEquity<1,  tgt:'<1.0x', note:'Liab / Equity'},
            {l:'Equity Ratio',        v:(equityRatio*100).toFixed(1)+'%', ok:equityRatio>0.4, tgt:'>40%',  note:'Equity / Assets'},
            {l:'LT Debt / Assets',    v:(bs.ltD/Math.max(bs.tA,0.001)*100).toFixed(1)+'%', ok:bs.ltD/Math.max(bs.tA,0.001)<0.3, tgt:'<30%', note:'LTD / Assets'},
          ].map(l=>(
            <div key={l.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
              padding:'5px 0',borderBottom:`1px solid ${T.border}`}}>
              <div>
                <div style={{color:T.sub,fontSize:10}}>{l.l}</div>
                <div style={{color:T.muted,fontSize:8}}>{l.note}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:5}}>
                <span style={{color:T.muted,fontSize:8}}>{l.tgt}</span>
                <span style={{color:l.ok?T.green:T.red,fontSize:12,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{l.v}</span>
                <span style={{fontSize:10}}>{l.ok?'✅':'⚠️'}</span>
              </div>
            </div>
          ))}
        </Card>

        {/* Capital Structure + Insights */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <Card>
            <SectionTitle>CAPITAL STRUCTURE</SectionTitle>
            {capMix.map(l=>(
              <div key={l.l} style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{color:T.sub,fontSize:10}}>{l.l}</span>
                  <span style={{color:l.color,fontSize:10,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{l.pct.toFixed(1)}%</span>
                </div>
                <div style={{height:5,background:T.border,borderRadius:3,overflow:'hidden'}}>
                  <div style={{width:`${Math.min(l.pct,100)}%`,height:'100%',background:l.color,borderRadius:3}}/>
                </div>
                <div style={{fontSize:9,color:T.muted,marginTop:1}}>{fM(l.v)}</div>
              </div>
            ))}
          </Card>

          {/* Insights */}
          <Card>
            <SectionTitle>CFO INSIGHTS</SectionTitle>
            {[
              {icon:'🏗',  text:capStructInsight},
              {icon:'💧',  text:liqInsight},
              {icon:'📊',  text:wcInsight},
            ].map((ins,i)=>(
              <div key={i} style={{display:'flex',gap:8,marginBottom:8,padding:'7px 10px',
                background:`${T.accent}06`,borderRadius:6,
                borderLeft:`2px solid ${i===0?T.yellow:i===1?T.accent:T.green}`}}>
                <span style={{fontSize:14,lineHeight:1.4}}>{ins.icon}</span>
                <span style={{fontSize:10,color:T.sub,lineHeight:1.5}}>{ins.text}</span>
              </div>
            ))}
          </Card>
        </div>
      </div>
    </div>
  );
}
// ══════════════════════════════════════════════════════════════════

function CFPage({ tbVersion=0 }) {
  const [yr,setYr]         = useState('2026');
  const [period,setPeriod] = useState(()=>getLatestPeriod('2026'));

  const periodOpts = useMemo(() => getPeriodOpts(yr), [yr]);
  const handleYrChange = (v) => { setYr(v); setPeriod('full'); };

  const keys  = useMemo(() => getKeys(yr, period), [yr, period]);
  const isAnn = parseInt(yr) < 2024;

  // ── Current period P&L ─────────────────────────────────────────
  const cur = useMemo(() => {
    if (isAnn) return annPnl(parseInt(yr));
    return keys && keys.length > 0 ? aggKeys(keys) : null;
  }, [yr, keys, isAnn]);

  // ── BS snapshots (current & prior) ────────────────────────────
  const bsNowKey = useMemo(() => snapKey(yr, period),     [yr, period]);
  const bsPrvKey = useMemo(() => prevSnapKey(yr, period), [yr, period]);
  const bsNow = useMemo(() => bsCalc(BS_SNAPSHOTS[bsNowKey] || BS_SNAPSHOTS['dec25']), [bsNowKey]);
  const bsPrv = useMemo(() => bsCalc(BS_SNAPSHOTS[bsPrvKey] || BS_SNAPSHOTS['dec24']), [bsPrvKey]);

  // ── Prior-month comparison (one step back) ────────────────────
  const priorMonthPeriod = useMemo(() => {
    if (period === 'full' || period === 'ytd' || isAnn) return null;
    if (period.startsWith('m')) {
      const mi = parseInt(period.slice(1));
      if (mi <= 1) return null; // no prior month in same year
      return `m${mi - 1}`;
    }
    if (period.startsWith('q')) {
      const qn = parseInt(period.slice(1));
      if (qn <= 1) return null;
      return `q${qn - 1}`;
    }
    return null;
  }, [period, isAnn]);

  const priorMonthKeys = useMemo(() => priorMonthPeriod ? getKeys(yr, priorMonthPeriod) : null, [yr, priorMonthPeriod]);
  const priorMonthCur  = useMemo(() => priorMonthKeys && priorMonthKeys.length ? aggKeys(priorMonthKeys) : null, [priorMonthKeys]);
  const priorMonthBsNowKey = useMemo(() => priorMonthPeriod ? snapKey(yr, priorMonthPeriod) : null, [yr, priorMonthPeriod]);
  const priorMonthBsPrvKey = useMemo(() => priorMonthPeriod ? prevSnapKey(yr, priorMonthPeriod) : null, [yr, priorMonthPeriod]);
  const priorMonthBsNow = useMemo(() => priorMonthBsNowKey ? bsCalc(BS_SNAPSHOTS[priorMonthBsNowKey] || BS_SNAPSHOTS['dec25']) : null, [priorMonthBsNowKey]);
  const priorMonthBsPrv = useMemo(() => priorMonthBsPrvKey ? bsCalc(BS_SNAPSHOTS[priorMonthBsPrvKey] || BS_SNAPSHOTS['dec24']) : null, [priorMonthBsPrvKey]);

  // ── Prior year same period ────────────────────────────────────
  const priorYr = String(parseInt(yr) - 1);
  const priorYrKeys = useMemo(() => {
    if (isAnn) return null;
    if (!MON_YEARS.includes(priorYr)) return null;
    return getKeys(priorYr, period);
  }, [yr, period, isAnn]);
  const priorYrCur = useMemo(() => {
    if (priorYrKeys && priorYrKeys.length) return aggKeys(priorYrKeys);
    if (parseInt(priorYr) >= 2013) return annPnl(parseInt(priorYr));
    return null;
  }, [priorYrKeys, priorYr]);
  const priorYrBsNowKey = useMemo(() => {
    if (!MON_YEARS.includes(priorYr)) return null;
    return snapKey(priorYr, period);
  }, [priorYr, period]);
  const priorYrBsNow = useMemo(() => priorYrBsNowKey ? bsCalc(BS_SNAPSHOTS[priorYrBsNowKey] || BS_SNAPSHOTS['dec24']) : null, [priorYrBsNowKey]);
  const priorYrBsPrv = useMemo(() => {
    if (!priorYrBsNowKey) return null;
    const k = prevSnapKey(priorYr, period);
    return bsCalc(BS_SNAPSHOTS[k] || BS_SNAPSHOTS['dec23'] || BS_SNAPSHOTS['dec24']);
  }, [priorYr, period]);

  // ── CF calculator — USALI hotel format ────────────────────────
  const calcCF = (pnlData, bsEnd, bsStart) => {
    if (!pnlData || !bsEnd || !bsStart) return null;

    // ── A. OPERATING ACTIVITIES ──────────────────────────────────
    const nop      = pnlData.nop || 0;
    const depAmort = pnlData.deprTotal || (pnlData.depr||0)+(pnlData.amor||0);
    const incomeBeforeWC = nop + depAmort;  // subtotal before WC changes

    // Working Capital Changes (decrease in asset = cash in = positive)
    const dARtrade = (bsEnd.arTrade||bsEnd.ar||0) - (bsStart.arTrade||bsStart.ar||0);
    const dAROther = (bsEnd.arOther||0)            - (bsStart.arOther||0);
    const dInv     = (bsEnd.inv||0)    - (bsStart.inv||0);
    const dPrepaid = (bsEnd.prepaid||0) - (bsStart.prepaid||0);
    // Other Current Assets: Deferred Income Tax + Advance Payments — combined 1 line
    const dDeferTax= (bsEnd.deferTax||0) - (bsStart.deferTax||0);
    const dAdvPmt  = (bsEnd.advPmt||0)   - (bsStart.advPmt||0);
    const dOtherCA = dDeferTax + dAdvPmt;

    // Payables (increase = cash in = positive)
    const dAP      = (bsEnd.apTrade||bsEnd.ap||0) - (bsStart.apTrade||bsStart.ap||0);
    const dTax     = (bsEnd.taxPay||0)  - (bsStart.taxPay||0);
    const dAccExp  = (bsEnd.accExp||0)  - (bsStart.accExp||0);
    const dAdvDep  = (bsEnd.advDep||0)  - (bsStart.advDep||0);
    const dProvision=(bsEnd.provision||0)- (bsStart.provision||0);
    const dConsign  =(bsEnd.consign||0)  - (bsStart.consign||0);  // Other Current Liabilities

    const wcNet = -dARtrade - dAROther - dInv - dPrepaid - dOtherCA
                 + dAP + dTax + dAccExp + dAdvDep + dProvision + dConsign;

    const ops = nop + depAmort + wcNet;

    // ── B. INVESTING ACTIVITIES ──────────────────────────────────
    const dFixG   = (bsEnd.fixG||0) - (bsStart.fixG||0);
    const dIntang = ((bsEnd.intangG||0)+(bsEnd.intangA||0)) - ((bsStart.intangG||0)+(bsStart.intangA||0));
    const capex   = -(dFixG + dIntang);

    // ── C. FINANCING ACTIVITIES ──────────────────────────────────
    const fin = (bsEnd.affiliated||bsEnd.dTMgmt||0) - (bsStart.affiliated||bsStart.dTMgmt||0);

    const net = ops + capex + fin;

    // Reconcile vs cashAll (Cash & Bank + Short-Term Investment)
    const cashEnd   = bsEnd.cashAll  || bsEnd.cash  || 0;
    const cashStart = bsStart.cashAll || bsStart.cash || 0;
    const cashDelta = cashEnd - cashStart;

    return {
      nop, depAmort, incomeBeforeWC,
      dARtrade, dAROther, dInv, dPrepaid,
      dDeferTax, dAdvPmt, dOtherCA,
      dAP, dTax, dAccExp, dAdvDep, dProvision, dConsign, wcNet,
      ops, capex, fin, net, cashDelta,
      cashEnd, cashStart,
    };
  };

  const cf      = useMemo(() => calcCF(cur,          bsNow, bsPrv),          [cur, bsNow, bsPrv]);
  const cfPrMo  = useMemo(() => calcCF(priorMonthCur,priorMonthBsNow,priorMonthBsPrv), [priorMonthCur,priorMonthBsNow,priorMonthBsPrv]);
  const cfPrYr  = useMemo(() => calcCF(priorYrCur,   priorYrBsNow,  priorYrBsPrv),  [priorYrCur, priorYrBsNow, priorYrBsPrv]);

  // ── YTD CF (2026: cumulative Jan → latest available month) ──────
  const ytdCF = useMemo(() => {
    if (yr !== '2026') return null;
    // For monthly: show cumulative Jan–current. For ytd/full: show full YTD
    const ytdKeys = mKeys26_ytd.filter(k=>TB[k]);
    if (!ytdKeys.length) return null;
    // For single month view, only sum up to that month
    const maxIdx = period.startsWith('m') ? parseInt(period.slice(1)) : ytdKeys.length;
    const relevantKeys = ytdKeys.filter((_,i) => i < maxIdx);
    if (!relevantKeys.length) return null;
    const ytdPnl = aggKeys(relevantKeys);
    const ML2b   = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const latest26 = ML2b.map(m=>m+'26').filter(k=>BS_SNAPSHOTS[k]).pop() || 'feb26';
    const lastKey  = period.startsWith('m')
      ? (ML2b[parseInt(period.slice(1))-1]+'26')
      : latest26;
    const ytdBsNow = bsCalc(BS_SNAPSHOTS[lastKey] || BS_SNAPSHOTS[latest26]);
    const ytdBsPrv = bsCalc(BS_SNAPSHOTS['dec25']);
    return calcCF(ytdPnl, ytdBsNow, ytdBsPrv);
  }, [yr, period, tbVersion]);

  // ── Trend chart data ──────────────────────────────────────────
  const trendKeys = yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;
  const cfTrend = useMemo(() => {
    if (isAnn) return [];
    return trendKeys.filter(k=>TB[k]).map((k,i) => {
      const d   = pnl(TB[k]);
      // Simplified monthly OCF: NOP + D&A (no WC movement available at monthly granularity without consecutive BS)
      const ocf = +(d.nop + d.deprTotal).toFixed(3);
      return {name:ML[i], ocf, nop:+d.nop.toFixed(3), net:ocf};
    });
  }, [yr, isAnn]);

  // ── Liquidity classification ──────────────────────────────────
  const liquidityStatus = useMemo(() => {
    if (!cf) return null;
    const cash = cf.cashEnd;
    const negOpsMonths = cfTrend.filter(d=>d.ocf<0).length;
    if (cash > 1.5 && cf.ops > 0) return {l:'Healthy',    c:T.green,  icon:'✅'};
    if (cash > 0.5 && negOpsMonths < 3) return {l:'Watch',   c:T.yellow, icon:'⚠️'};
    return {l:'Critical', c:T.red,    icon:'🔴'};
  }, [cf, cfTrend]);

  // ── Auto insight ──────────────────────────────────────────────
  const cfInsights = useMemo(() => {
    if (!cf) return [];
    const lines = [];
    // Profit-to-cash conversion
    if (cf.nop < 0 && cf.ops > 0)
      lines.push({icon:'💡', text:`Operating cash flow is positive (${fC(cf.ops)}) despite negative NOP — D&A add-back (${fC(cf.depAmort)}) and working capital inflow are sustaining cash generation.`});
    else if (cf.nop > 0 && cf.ops < 0)
      lines.push({icon:'⚠️', text:`NOP is positive but operating CF is negative — working capital buildup (${fC(cf.wcNet)}) is consuming cash. Monitor AR and inventory levels.`});
    else if (cf.ops > 0)
      lines.push({icon:'✅', text:`Operating cash flow is positive at ${fC(cf.ops)}, aligned with net profit of ${fC(cf.nop)}. D&A adds back ${fC(cf.depAmort)}.`});
    else
      lines.push({icon:'🔴', text:`Operating cash flow is negative at ${fC(cf.ops)}. Net loss of ${fC(cf.nop)} is not fully offset by D&A or working capital movements.`});

    // WC driver
    const wcDrivers = [
      {l:'AR', v:cf.dAR}, {l:'Inventory', v:cf.dInv}, {l:'Prepaid', v:cf.dPre},
      {l:'AP', v:-cf.dAP}, {l:'Accruals', v:-cf.dAcc}
    ].sort((a,b)=>Math.abs(b.v)-Math.abs(a.v));
    const topWC = wcDrivers[0];
    if (topWC && Math.abs(topWC.v) > 0.01) {
      const dir = topWC.v > 0 ? 'increase (cash consumed)' : 'decrease (cash released)';
      lines.push({icon:'📊', text:`Largest WC driver: ${topWC.l} ${dir} of ${fC(Math.abs(topWC.v))}. Net WC impact on cash: ${fC(cf.wcNet)}.`});
    }

    // Investing / Financing
    if (cf.capex < -0.05)
      lines.push({icon:'🏗', text:`Capital expenditure of ${fC(Math.abs(cf.capex))} reflects fixed asset investment. Monitor CAPEX-to-OCF ratio for sustainability.`});
    if (Math.abs(cf.fin) > 0.05)
      lines.push({icon:'🏦', text:`Financing: ${cf.fin<0?'Payments to':'Receipts from'} Owner/Management Co. ${fC(Math.abs(cf.fin))} (Due to Management Co.)`});

    // Period comparison
    if (cfPrMo)
      lines.push({icon:'📈', text:`vs Prior Month: OCF ${cf.ops>=cfPrMo.ops?'improved':'declined'} by ${fC(Math.abs(cf.ops-cfPrMo.ops))} (from ${fC(cfPrMo.ops)} to ${fC(cf.ops)}).`});

    return lines;
  }, [cf, cfPrMo]);

  const periodLabel = (periodOpts.find(o=>o.v===period)||{}).l || period;

  // ── Sub-components ─────────────────────────────────────────────
  const CFR = ({l,v,indent,bold,isOut}) => (
    <tr>
      <td style={{padding:'5px 12px',paddingLeft:indent?32:12,color:bold?T.text:T.sub,fontSize:11,fontWeight:bold?600:400}}>{l}</td>
      <td style={{padding:'5px 12px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:bold?600:400,
        color:bold?(v>=0?T.green:T.red):(isOut?(v>0?T.red:T.green):(v>=0?T.green:T.red))}}>
        {fC(v)}
      </td>
    </tr>
  );
  const CSec = ({t,c}) => <tr><td colSpan={2} style={{padding:'9px 12px 4px',color:c||T.accent,fontSize:9,letterSpacing:3,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,textTransform:'uppercase'}}>{t}</td></tr>;
  const CDivider = () => <tr><td colSpan={2}><div style={{borderBottom:`1px solid ${T.border}`,margin:'2px 12px'}}/></td></tr>;

  if (!cf) return <div style={{padding:40,color:T.muted,textAlign:'center'}}>No data available for this period.</div>;

  const wc = cf.wcNet;

  if(!cf) return (<div style={{padding:40,textAlign:'center',color:T.muted,fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>No cash flow data available</div>);

  return (
    <div>
      {/* ── Header ── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>CASH FLOW STATEMENT</div>
          <div style={{color:T.muted,fontSize:11}}>Indirect Method · {periodLabel} · Rp Milyar</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'JetBrains Mono',monospace",outline:'none'}}>
            {['2026','2025','2024','2023','2022','2021','2020','2019','2018'].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          {!isAnn && (
            <select value={period} onChange={e=>setPeriod(e.target.value)}
              style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'JetBrains Mono',monospace",outline:'none'}}>
              {periodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
          {liquidityStatus && (
            <div style={{padding:'5px 12px',borderRadius:6,background:`${liquidityStatus.c}15`,
              border:`1px solid ${liquidityStatus.c}40`,fontSize:10,color:liquidityStatus.c,
              fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>
              {liquidityStatus.icon} {liquidityStatus.l}
            </div>
          )}
        </div>
      </div>

      {/* ── KPI strip with period comparison ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}} className="r-grid-4">
        {[
          {l:'Operating CF',  v:cf.ops,  prMo:(cfPrMo&&cfPrMo.ops),  prYr:(cfPrYr&&cfPrYr.ops)},
          {l:'Investing CF',  v:cf.capex,prMo:(cfPrMo&&cfPrMo.capex),prYr:(cfPrYr&&cfPrYr.capex)},
          {l:'Owner/Mgmt Co.(Fin.)',  v:cf.fin,  prMo:(cfPrMo&&cfPrMo.fin),  prYr:(cfPrYr&&cfPrYr.fin)},
          {l:'Net Cash Flow', v:cf.net,  prMo:(cfPrMo&&cfPrMo.net),  prYr:(cfPrYr&&cfPrYr.net)},
        ].map(k=>{
          const moChg = k.prMo!=null ? k.v - k.prMo : null;
          const yrChg = k.prYr!=null ? k.v - k.prYr : null;
          return (
            <div key={k.l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:'12px 14px'}}>
              <div style={{fontSize:9,color:T.muted,textTransform:'uppercase',letterSpacing:1}}>{k.l}</div>
              <div style={{fontSize:18,fontWeight:700,color:k.v>=0?T.green:T.red,marginTop:3,fontFamily:"'JetBrains Mono',monospace"}}>{fC(k.v)}</div>
              {moChg!=null && (
                <div style={{fontSize:9,color:moChg>=0?T.green:T.red,marginTop:2}}>
                  {moChg>=0?'▲':'▼'} {fC(Math.abs(moChg))} vs prev mo
                </div>
              )}
              {yrChg!=null && (
                <div style={{fontSize:9,color:yrChg>=0?T.green:T.red}}>
                  {yrChg>=0?'▲':'▼'} {fC(Math.abs(yrChg))} vs prev yr
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* ── Main layout: CF statement + right panels ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:12,marginBottom:14}} className="r-grid-2">

        {/* CF Statement */}
        <Card style={{padding:0}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:T.border}}>
                <th colSpan={2} style={{padding:'8px 12px',textAlign:'left',color:T.accent,fontSize:10,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace"}}> CASH FLOW — {periodLabel}</th>
              </tr>
            </thead>
            <tbody>
              <CSec t="A. Cash Flows from Operating Activities" c={T.accent}/>
              <CFR l="Income (Loss) After Tax"            v={cf.nop}          indent/>
              <CFR l="Depreciation / Amortisation"        v={cf.depAmort}     indent/>
              <tr>
                <td style={{padding:'3px 12px 3px 24px',color:T.muted,fontSize:10,fontStyle:'italic'}}>Income before changes in operating assets and liabilities</td>
                <td style={{padding:'3px 12px',textAlign:'right',color:T.sub,fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>{fC(cf.incomeBeforeWC)}</td>
              </tr>
              <CSec t="  Changes in operating assets and liabilities" c={T.muted}/>
              <CFR l="  Account Receivable Trade"         v={cf.dARtrade!=null?-cf.dARtrade:0}  indent isOut/>
              <CFR l="  Account Receivable Others"        v={cf.dAROther!=null?-cf.dAROther:0}  indent isOut/>
              <CFR l="  Inventories"                      v={cf.dInv!=null?-cf.dInv:0}          indent isOut/>
              <CFR l="  Prepaid Expenses"                 v={cf.dPrepaid!=null?-cf.dPrepaid:0}  indent isOut/>
              <CFR l="  Other Current Assets"             v={cf.dOtherCA!=null?-cf.dOtherCA:0}  indent isOut/>
              <CFR l="  Account Payable Trade"            v={cf.dAP||0}        indent/>
              <CFR l="  Taxes Payable"                    v={cf.dTax||0}       indent/>
              <CFR l="  Accrued Expenses"                 v={cf.dAccExp||0}    indent/>
              <CFR l="  Accrued Deposit"                  v={cf.dAdvDep||0}    indent/>
              <CFR l="  Provision & Reserve"              v={cf.dProvision||0} indent/>
              <CFR l="  Account Payable Others"           v={cf.dConsign||0}   indent/>
              <CDivider/>
              <CFR l="NET OPERATING CASH FLOW"            v={cf.ops}           bold/>

              <CSec t="B. Cash Flows from Investing Activities" c={T.yellow}/>
              <CFR l="Acquisition of Property & Equipment (Capex)" v={cf.capex} indent isOut/>
              <CDivider/>
              <CFR l="NET INVESTING CASH FLOW"            v={cf.capex}         bold/>

              <CSec t="C. Cash Flows from Financing Activities" c={T.purple||'#8B5CF6'}/>
              <CFR l="Cash Received from (Paid to) Stockholders" v={cf.fin}   indent/>
              <CDivider/>
              <CFR l="NET FINANCING CASH FLOW"            v={cf.fin}           bold/>

// Calculate dept P&L from a TB data object
// isBudget=true → use BUD26 aggregated field names (roomsPay, minorPay, etc.)
// isBudget=false → use granular TB fields (foPay, hkPay, laundryPay, etc.)
function calcDeptPL(tb, depts, isBudget) {
  if(!tb) return {};

  // BUD26 field → split ratios for FO vs HK (based on typical GDS Feb26 actual split)
  // FO: ~44% of roomsPay, HK: ~56% of roomsPay (from actual Feb26)
  const FO_RATIO = 0.44, HK_RATIO = 0.56;
  // FO: ~53% of roomsOther, HK: ~47%
  const FO_OTHER_RATIO = 0.53, HK_OTHER_RATIO = 0.47;

  return depts.reduce((acc, dept) => {
    let rev=0, cos=0, pay=0, other=0;

    if(isBudget) {
      // BUD26 has aggregated fields — map dept to BUD26 keys
      switch(dept.id) {
        case 'fo':
          rev   = tb.rooms||0;
          pay   = (tb.roomsPay||0)*FO_RATIO;
          other = (tb.roomsOther||0)*FO_OTHER_RATIO;
          break;
        case 'hk':
          pay   = (tb.roomsPay||0)*HK_RATIO;
          other = (tb.roomsOther||0)*HK_OTHER_RATIO;
          break;
        case 'fnb':
          rev   = tb.fnb||0;
          cos   = tb.cosFnb||0;
          pay   = tb.fnbPay||0;
          other = tb.fnbOther||0;
          break;
        case 'laundry':
          // Laundry not separate in BUD26 — use minor fraction
          rev   = 0; cos=0; pay=0; other=0;
          break;
        case 'minor':
          rev   = tb.minor||0;
          cos   = tb.cosMinor||0;
          pay   = (tb.minorPay||0);
          other = (tb.minorOther||0);
          break;
        case 'spa': case 'transport': case 'other':
          rev = tb.otherinc||0; // grouped in BUD26
          break;
        case 'ag':
          pay   = tb.agPay||0;   other = tb.agOther||0;   break;
        case 'hrd':
          pay   = tb.hrdPay||0;  other = tb.hrdOther||0;  break;
        case 'sm':
          pay   = tb.smPay||0;   other = tb.smOther||0;   break;
        case 'pomec':
          pay   = tb.pomecPay||0;
          other = (tb.pomecOther||0)+(tb.energy||0);
          break;
        default: break;
      }
    } else {
      // Granular TB fields from running import
      rev   = dept.rev.reduce((s,f)=>s+(tb[f]||0),0);
      cos   = dept.cos.reduce((s,f)=>s+(tb[f]||0),0);
      pay   = dept.pay.reduce((s,f)=>s+(tb[f]||0),0);
      other = dept.other.reduce((s,f)=>s+(tb[f]||0),0);
    }

    const totalExp = cos + pay + other;
    const profit   = rev - totalExp;
    acc[dept.id] = {rev, cos, pay, other, totalExp, profit};
    return acc;
  }, {});
}

    const keys = mKeys26_ytd.filter(k=>TB[k]);
    // Get the 2 closed months before current running month
    const beforeCurrent = keys.filter(k=>{
      const mo = parseInt(k.split('-')[1]);
      return parseInt(k.split('-')[0])===parseInt(year) && mo < parseInt(month);
    }).slice(-2);
    return beforeCurrent.map(k=>({key:k, label:ML[parseInt(k.split('-')[1])-1]+' '+k.split('-')[0], data:pnl(TB[k]), raw:TB[k]}));
  },[snap, tbVersion]);

  // ── Parse imported running TB ──────────────────────────────────
  const processRunningFile = React.useCallback(async (f) => {
    setParseErr('');
    setImporting(true);
    try {
      let rows = [];
      if(f.name.match(/\.xlsx?$/i) && typeof XLSX !== 'undefined') {
        const ab = await f.arrayBuffer();
        const wb = XLSX.read(ab,{type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const aoa = XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        let hdrIdx=-1;
        for(let ri=0;ri<Math.min(aoa.length,400);ri++){
          const rv=aoa[ri].map(v=>String(v||'').toLowerCase().trim());
          if(rv.some(v=>v==='account no'||v==='account'||v==='kode akun')){hdrIdx=ri;break;}
        }
        if(hdrIdx>=0){
          const hdrs=aoa[hdrIdx].map(v=>String(v||'').toLowerCase().trim());
          rows=aoa.slice(hdrIdx+1).map(rowArr=>{const o={};hdrs.forEach((h,ci)=>{o[h]=rowArr[ci]!==undefined?String(rowArr[ci]):'';});return o;});
        } else {
          const csv=XLSX.utils.sheet_to_csv(ws);
          rows=parseCSV(csv);
        }
      } else {
        const text=await f.text();
        rows=parseCSV(text);
      }
      if(!rows.length){setParseErr('File kosong atau tidak terbaca.');setImporting(false);return;}

      const {tb} = mapRowsToTB(rows);
      const d = pnl(tb);

      // Detect period from filename or use current month
      const detected = detectPeriodFromFilename(f.name);
      const now = new Date();
      const year  = detected ? detected.year  : String(now.getFullYear());
      const month = detected ? detected.month : String(now.getMonth()+1).padStart(2,'0');
      const moInt = parseInt(month);

      // Prompt user for day of month (stored in entry)
      const dayStr = window.prompt(`Data as of which date?\n(Month: ${ML[moInt-1]} ${year})`, String(now.getDate()));
      const day = parseInt(dayStr)||now.getDate();
      const totalDays = daysInMo(moInt);

      // Budget for this month
      const budKey = `${year}-${month}`;
      const budData = BUD26[budKey] ? pnl(BUD26[budKey]) : null;

      const entry = {
        id: Date.now(),
        fileName: f.name,
        year, month, day, totalDays,
        label: `${ML[moInt-1]} ${year} — per tgl ${day}`,
        importedAt: new Date().toLocaleString('id-ID',{dateStyle:'short',timeStyle:'short'}),
        tb, d,
        budKey, budData: budData ? {rev:budData.rev,gop:budData.gop,nop:budData.nop,
          // BUD26 stores occ as percentage directly (e.g. 45.7%), TB stores room-nights (occ_rooms)
          occ: (budData.occ||0), // already % in BUD26
          arr:budData.arr||0} : null,
        // KPI
        occ: tb.avail>0 ? tb.occ/tb.avail*100 : (tb.occ>0&&tb.occ<=100?tb.occ:0),
        arr: tb.arr||0,
      };

      const newHistory = [entry, ...history].slice(0,30);
      saveHistory(newHistory);
      setSelIdx(0);
    } catch(err){
      setParseErr('Error: '+err.message);
    }
    setImporting(false);
  },[history]);

  const handleDrop = React.useCallback((e)=>{
    e.preventDefault(); setDragOver(false);
    const f=e.dataTransfer.files[0]; if(f) processRunningFile(f);
  },[processRunningFile]);

  // ── Calculations from selected snapshot ─────────────────────────
  const calc = React.useMemo(()=>{
    if(!snap) return null;
    const {d, day, totalDays, budData, occ, arr} = snap;
    const moInt = parseInt(snap.month);

    // Prorated budget (budget × day/totalDays)
    const ratio = day/totalDays;
    const prorRev = budData ? budData.rev*ratio : null;
    const prorGOP = budData ? budData.gop*ratio : null;
    const prorNOP = budData ? budData.nop*ratio : null;

    // Variance vs prorated
    const varRevP   = prorRev  ? (d.rev -prorRev )/Math.abs(prorRev )*100 : null;
    const varGOPP   = prorGOP  ? (d.gop -prorGOP )/Math.abs(prorGOP )*100 : null;
    const varNOPP   = prorNOP  ? (d.nop -prorNOP )/Math.abs(prorNOP )*100 : null;

    // Month-end projection (pace = actual / days × total days)
    const projRev = d.rev/day*totalDays;
    const projGOP = d.gop/day*totalDays;
    const projNOP = d.nop/day*totalDays;
    const projOcc = occ; // OCC at current pace (already % cumulative)

    // Projection vs full month budget
    const projVsBudRevP = budData ? (projRev-budData.rev)/Math.abs(budData.rev)*100 : null;
    const projVsBudNOPP = budData ? (projNOP-budData.nop)/Math.abs(budData.nop)*100 : null;

    // ARR & OCC daily pace
    const dailyRev = d.rev/day;
    const budDailyRev = budData ? budData.rev/totalDays : null;

    // Variance decomposition: volume vs price
    // Volume effect = (actual_occ% - budget_occ%) × budget_arr × GDS_ROOMS × days
    const avail = GDS_ROOMS * totalDays;
    const actOccPct = occ; // cumulative so far
    const budOccPct = budData ? budData.occ : 0;
    const budArr = budData ? budData.arr : arr;
    const volEffect = budData ? (actOccPct - budOccPct)/100 * budArr * avail * ratio / 1e9 : null;
    const priceEffect = budData ? (arr - budArr) * actOccPct/100 * avail * ratio / 1e9 : null;

    // Catch-up requirement
    const remainDays = totalDays - day;
    const gap = budData ? budData.rev - projRev : null;
    const reqDailyRev = (gap!=null && remainDays>0) ? (d.rev + gap)/totalDays : null;
    const catchupFeasible = reqDailyRev!=null ? reqDailyRev/dailyRev : null;
    const catchupStatus = catchupFeasible==null ? null
      : catchupFeasible<=1.2 ? {l:'ON TRACK',   c:'green'}
      : catchupFeasible<=1.5 ? {l:'CHALLENGING', c:'yellow'}
      : {l:'UNLIKELY',    c:'red'};

    // RevPAR
    const revPAR = arr * actOccPct/100;
    const budRevPAR = budData ? budData.arr*(budData.occ||0)/100 : null;

    return {
      d, day, totalDays, ratio, moInt,
      prorRev, prorGOP, prorNOP,
      varRevP, varGOPP, varNOPP,
      projRev, projGOP, projNOP, projOcc,
      projVsBudRevP, projVsBudNOPP,
      dailyRev, budDailyRev,
      volEffect, priceEffect,
      gap, remainDays, reqDailyRev, catchupFeasible, catchupStatus,
      revPAR, budRevPAR,
      occ, arr, budData,
    };
  },[snap]);

  // ── Departmental P&L ──────────────────────────────────────────
  const deptActual = React.useMemo(()=>{
    if(!snap) return {};
    return calcDeptPL(snap.tb, GDS_DEPTS);
  },[snap]);

  const deptBudget = React.useMemo(()=>{
    if(!snap || !snap.budData) return {};
    const budKey = snap.budKey;
    const budRaw = BUD26[budKey];
    if(!budRaw) return {};
    return calcDeptPL(budRaw, GDS_DEPTS, true); // isBudget=true → uses BUD26 aggregated fields
  },[snap]);

  // ── Expense Control calculations ──────────────────────────────
  const expCalc = React.useMemo(()=>{
    if(!snap) return null;
    const budData = snap.budData;
    if(!budData) return null;

    // Expected revenue input (in billion)
    const expRevRaw = parseFloat(expRevInput);
    const expRev = !isNaN(expRevRaw) && expRevRaw > 0 ? expRevRaw/1000 : budData.rev;

    // Budget GOP margin
    const budGopMgn = budData.rev > 0 ? budData.gop/budData.rev : 0.35;
    const budExpTotal = budData.rev - budData.gop; // total expense budget (excl non-op)

    // Allowed total expense for expected revenue
    const allowedExp = expRev * (1 - budGopMgn);
    const expGap = allowedExp - budExpTotal; // negative = need to save

    // Per expense field using BUD26 legacy keys (what BUD26 actually has)
    const expFields = [
      {key:'roomsPay',   label:'Rooms Payroll (FO+HK)',  dept:'fo',      cat:'pay',   flex: SEMI_FIXED.foPay},
      {key:'roomsOther', label:'Rooms Other Exp',         dept:'hk',      cat:'other', flex: SEMI_FIXED.foOther},
      {key:'fnbPay',     label:'F&B Payroll',             dept:'fnb',     cat:'pay',   flex: SEMI_FIXED.fnbPay},
      {key:'fnbOther',   label:'F&B Other Exp',           dept:'fnb',     cat:'other', flex: SEMI_FIXED.fnbOther},
      {key:'cosFnb',     label:'F&B Cost of Sales',       dept:'fnb',     cat:'cos',   flex: SEMI_FIXED.cosFnb},
      {key:'minorPay',   label:'Minor/Laundry Payroll',   dept:'laundry', cat:'pay',   flex: SEMI_FIXED.laundryPay},
      {key:'agPay',      label:'A&G Payroll',             dept:'ag',      cat:'pay',   flex: SEMI_FIXED.agPay},
      {key:'agOther',    label:'A&G Other Exp',           dept:'ag',      cat:'other', flex: SEMI_FIXED.agOther},
      {key:'hrdPay',     label:'HRD Payroll',             dept:'hrd',     cat:'pay',   flex: SEMI_FIXED.hrdPay},
      {key:'hrdOther',   label:'HRD Other Exp',           dept:'hrd',     cat:'other', flex: SEMI_FIXED.hrdOther},
      {key:'smPay',      label:'S&M Payroll',             dept:'sm',      cat:'pay',   flex: SEMI_FIXED.smPay},
      {key:'smOther',    label:'S&M Other Exp',           dept:'sm',      cat:'other', flex: SEMI_FIXED.smOther},
      {key:'pomecPay',   label:'POMeC Payroll',           dept:'pomec',   cat:'pay',   flex: SEMI_FIXED.pomecPay},
      {key:'pomecOther', label:'POMeC Other Exp',         dept:'pomec',   cat:'other', flex: SEMI_FIXED.pomecOther},
      {key:'energy',     label:'Energy (Listrik/Air/Gas)', dept:'pomec',  cat:'energy', flex: SEMI_FIXED.energy},
    ];

    // Revenue scaling factor
    const scaleFactor = budData.rev > 0 ? expRev / budData.rev : 1;

    let lines = [];
    let totalBud = 0, totalAllowed = 0, totalActual = 0;

    const budRaw = BUD26[snap.budKey] || {};

    expFields.forEach(({key, label, dept, cat, flex}) => {
      const budV = budRaw[key] || 0;
      if(budV < 0.0001) return; // skip zero budget lines

      // Allowed = fixed part + variable part scaled by revenue
      const fixedPart  = budV * (1 - flex);
      const varPart    = budV * flex * scaleFactor;
      const autoAllowed = fixedPart + varPart;

      // Override
      const ov = expOverrides[key];
      const finalAllowed = ov != null ? ov : autoAllowed;

      // Actual pace (projected EOM from running TB)
      const actVal  = snap.tb ? (snap.tb[key]||0) : 0;
      const actPace = snap.day > 0 ? actVal / snap.day * snap.totalDays : 0;

      const saving = budV - finalAllowed;
      const paceVsAllowed = finalAllowed > 0.0001 ? (actPace/finalAllowed - 1)*100 : null;
      const status = paceVsAllowed == null ? null
        : paceVsAllowed <= 5  ? 'ok'
        : paceVsAllowed <= 15 ? 'warn'
        : 'danger';

      totalBud     += budV;
      totalAllowed += finalAllowed;
      totalActual  += actPace;

      lines.push({key, label, dept, cat, budV, autoAllowed, finalAllowed, ov,
        flex, actVal, actPace, saving, paceVsAllowed, status});
    });

    const totalSaving = totalBud - totalAllowed;
    const gopProjected = expRev - totalAllowed;
    const gopMgnProjected = expRev > 0 ? gopProjected/expRev*100 : 0;

    return {
      expRev, budGopMgn: budGopMgn*100, allowedExp, budExpTotal,
      expGap, scaleFactor, lines,
      totalBud, totalAllowed, totalActual,
      totalSaving, gopProjected, gopMgnProjected,
    };
  },[snap, expRevInput, expOverrides]);

  const fV=(v,fmt='M')=>{
    if(v==null||isNaN(v)) return '—';
    if(fmt==='%') return v.toFixed(1)+'%';
    if(fmt==='K') return (v/1e6).toFixed(0)+'K';
    const a=Math.abs(v)*1000;
    const s=a>=1?a.toFixed(1)+'M':(a*1000).toFixed(0)+'K';
    return v<0?'('+s+')':s;
  };
  const VarBadge=({v})=>{
    if(v==null) return null;
    const c=v>=0?T.green:T.red;
    return <span style={{color:c,fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",marginLeft:6}}>
      {v>=0?'▲':'▼'}{Math.abs(v).toFixed(1)}%
    </span>;
  };

  const TABS=[
    {k:'flash',      l:'⚡ Flash P&L'},
    {k:'dept',       l:'🏢 Departmental'},
    {k:'expcontrol', l:'🎯 Expense Control'},
    {k:'projection', l:'📈 Projection'},
    {k:'decomp',     l:'🔬 Decomposition'},
    {k:'catchup',    l:'⚠️ Catch-up'},
  ];

  return (
    <div>
    {/* Header */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
      <div>
        <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>RUNNING P&L</div>
        <div style={{color:T.muted,fontSize:11}}>Intra-month performance tracker · {history.length} snapshot{history.length!==1?'s':''} stored</div>
      </div>
      {history.length>0&&(
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{color:T.muted,fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}>VIEW:</span>
          <select value={selIdx} onChange={e=>setSelIdx(+e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.accent,fontSize:11,fontFamily:"'JetBrains Mono',monospace",outline:'none'}}>
            {history.map((h,i)=><option key={h.id} value={i}>{h.label}</option>)}
          </select>
          <button onClick={()=>{if(window.confirm('Hapus snapshot ini?')){const h=[...history];h.splice(selIdx,1);saveHistory(h);setSelIdx(0);}}}
            style={{padding:'6px 10px',borderRadius:5,border:`1px solid ${T.border}`,background:'transparent',color:T.red,fontSize:9,cursor:'pointer'}}>🗑</button>
        </div>
      )}
    </div>

    {/* Upload Zone */}
    {!snap&&(
      <div onDrop={handleDrop} onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
        style={{border:`2px dashed ${dragOver?T.accent:T.border}`,borderRadius:10,padding:'40px 20px',
          textAlign:'center',marginBottom:16,background:dragOver?`${T.accent}08`:'transparent',transition:'all 0.2s'}}>
        <div style={{fontSize:32,marginBottom:10}}>📥</div>
        <div style={{color:T.text,fontSize:14,fontWeight:600,marginBottom:6}}>Upload Running TB</div>
        <div style={{color:T.muted,fontSize:11,marginBottom:16}}>Drag & drop TB file (XLS/XLSX/CSV) · data bisa di-upload kapan saja dalam bulan berjalan</div>
        <label style={{cursor:'pointer',padding:'8px 20px',borderRadius:6,border:`1px solid ${T.accent}`,color:T.accent,fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>
          Pilih File
          <input type="file" accept=".csv,.xls,.xlsx" onChange={e=>{const f=e.target.files[0];if(f)processRunningFile(f);e.target.value='';}} style={{display:'none'}}/>
        </label>
        {parseErr&&<div style={{color:T.red,fontSize:11,marginTop:12}}>{parseErr}</div>}
      </div>
    )}

    {snap&&!calc&&<div style={{color:T.muted,padding:40,textAlign:'center'}}>Kalkulasi gagal — cek data TB.</div>}

    {snap&&calc&&(
      <div>
        {/* Upload more */}
        <div style={{display:'flex',gap:10,marginBottom:14,alignItems:'center',flexWrap:'wrap'}}>
          <label style={{cursor:'pointer',padding:'6px 14px',borderRadius:6,border:`1px solid ${T.border}`,color:T.sub,fontSize:10,fontFamily:"'JetBrains Mono',monospace",display:'inline-flex',alignItems:'center',gap:6}}>
            📥 Upload Baru
            <input type="file" accept=".csv,.xls,.xlsx" onChange={e=>{const f=e.target.files[0];if(f)processRunningFile(f);e.target.value='';}} style={{display:'none'}}/>
          </label>
          <div style={{color:T.muted,fontSize:9}}>
            {snap.label} · Diimpor: {snap.importedAt} · {snap.day}/{snap.totalDays} hari ({(snap.day/snap.totalDays*100).toFixed(0)}% bulan)
          </div>
        </div>

        {/* KPI Velocity Strip */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,marginBottom:14}} className="r-grid-5">
          {[
            {l:'OCC Pace',   v:calc.occ,                 bv:calc.budData?.occ,     fmt:'%', c:T.accent},
            {l:'ARR Pace',   v:calc.arr,                 bv:calc.budData?.arr,     fmt:'K', c:T.secondary},
            {l:'RevPAR',     v:calc.revPAR,              bv:calc.budRevPAR,        fmt:'K', c:T.purple||'#7C7CFF'},
            {l:'GOP Margin', v:calc.d.rev>0?calc.d.gopMgn:null, bv:calc.budData?calc.budData.gop/Math.max(calc.budData.rev,0.001)*100:null, fmt:'%', c:T.secondary},
            {l:'Daily Rev',  v:calc.dailyRev*1000,       bv:calc.budDailyRev?calc.budDailyRev*1000:null, fmt:'K', c:T.green},
          ].map(({l,v,bv,fmt,c})=>(
            <div key={l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:'10px 12px'}}>
              <div style={{fontSize:8,color:T.muted,letterSpacing:1,marginBottom:4,textTransform:'uppercase',fontFamily:"'JetBrains Mono',monospace"}}>{l}</div>
              <div style={{fontSize:13,fontWeight:700,color:c,fontFamily:"'JetBrains Mono',monospace"}}>{fV(v,fmt)}</div>
              {bv!=null&&<div style={{fontSize:8,color:T.muted}}>Bud: {fV(bv,fmt)} {v!=null&&bv!=null&&<VarBadge v={(v-bv)/Math.abs(bv)*100}/>}</div>}
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
          {TABS.map(({k,l})=>(
            <button key={k} onClick={()=>setActiveTab(k)}
              style={{padding:'5px 12px',borderRadius:5,border:`1px solid ${activeTab===k?T.accent:T.border}`,
              background:activeTab===k?`${T.accent}15`:'transparent',color:activeTab===k?T.accent:T.sub,
              cursor:'pointer',fontSize:10,fontFamily:"'JetBrains Mono',monospace",fontWeight:activeTab===k?700:400}}>
              {l}
            </button>
          ))}
        </div>

        {/* ── TAB: Flash P&L ── */}
        {activeTab==='flash'&&(
          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12}} className="r-grid-2">
            <Card style={{padding:0}}>
              <div style={{padding:'12px 16px',borderBottom:`1px solid ${T.border}`}}>
                <span style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace"}}>
                  FLASH P&L — {snap.label.toUpperCase()}
                </span>
              </div>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                <thead>
                  <tr style={{background:T===DARK?'rgba(255,255,255,0.03)':T.border}}>
                    {['Line Item','Actual','Prorated Budget','Variance','Var %'].map((h,i)=>(
                      <th key={i} style={{padding:'7px 12px',textAlign:i===0?'left':'right',color:T.muted,fontSize:8,letterSpacing:1,fontFamily:"'JetBrains Mono',monospace"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[
                    {l:'Revenue',    a:calc.d.rev,    b:calc.prorRev,  c:T.accent},
                    {l:'Cost of Sales',a:calc.d.cos,  b:calc.budData?calc.budData.rev*calc.ratio*(calc.budData.rev>0?calc.d.cos/calc.d.rev:0):null, c:T.muted},
                    {l:'Dept Payroll',a:calc.d.deptPay,b:null,         c:T.muted},
                    {l:'GOP',        a:calc.d.gop,    b:calc.prorGOP,  c:T.secondary},
                    {l:'NOP',        a:calc.d.nop,    b:calc.prorNOP,  c:calc.d.nop>=0?T.green:T.red},
                    {l:'GOP Margin', a:calc.d.rev>0?calc.d.gopMgn:null, b:calc.budData?calc.budData.gop/Math.max(calc.budData.rev,0.001)*100:null, c:T.secondary, fmt:'%'},
                    {l:'NOP Margin', a:calc.d.rev>0?calc.d.nopMgn:null, b:calc.budData?calc.budData.nop/Math.max(calc.budData.rev,0.001)*100:null, c:T.muted,     fmt:'%'},
                  ].map(({l,a,b,c,fmt})=>{
                    const va=b!=null&&a!=null?a-b:null;
                    const vp=b!=null&&a!=null&&Math.abs(b)>0.0001?(a-b)/Math.abs(b)*100:null;
                    const goodUp=['Revenue','GOP','NOP','GOP Margin','NOP Margin'].includes(l);
                    const vColor=va==null?T.muted:goodUp?(va>=0?T.green:T.red):(va<=0?T.green:T.red);
                    return (
                      <tr key={l} style={{borderBottom:`1px solid ${T.border}`}}>
                        <td style={{padding:'8px 12px',color:T.sub,fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700}}>{l}</td>
                        <td style={{padding:'8px 12px',textAlign:'right',color:c,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{fV(a,fmt)}</td>
                        <td style={{padding:'8px 12px',textAlign:'right',color:T.muted,fontFamily:"'JetBrains Mono',monospace"}}>{fV(b,fmt)}</td>
                        <td style={{padding:'8px 12px',textAlign:'right',color:vColor,fontFamily:"'JetBrains Mono',monospace"}}>{fV(va,fmt)}</td>
                        <td style={{padding:'8px 12px',textAlign:'right'}}>
                          {vp!=null&&<span style={{color:vColor,fontSize:9,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{vp>=0?'▲':'▼'}{Math.abs(vp).toFixed(1)}%</span>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </Card>

            {/* Prior months context */}
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <Card style={{padding:'14px 16px'}}>
                <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>PROGRESS</div>
                <div style={{marginBottom:8}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{color:T.sub,fontSize:10}}>Month Progress</span>
                    <span style={{color:T.accent,fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{snap.day}/{snap.totalDays} hari</span>
                  </div>
                  <div style={{height:6,background:T.border,borderRadius:3}}>
                    <div style={{width:`${snap.day/snap.totalDays*100}%`,height:'100%',background:T.accent,borderRadius:3}}/>
                  </div>
                </div>
                {calc.budData&&(

function KPIPage({ tbVersion=0 }) {
  const [yr,setYr]         = useState('2026');
  const [period,setPeriod] = useState(()=>getLatestPeriod('2026'));

  const periodOpts = useMemo(()=>getPeriodOpts(yr),[yr,tbVersion]);
  const handleYrChange = (v)=>{setYr(v);setPeriod('full');};

  const isAnn = parseInt(yr)<2024;

  // ── Current period data ──────────────────────────────────────────
  const keys = useMemo(()=>getKeys(yr,period),[yr,period,tbVersion]);
  const cur  = useMemo(()=>{
    if(isAnn) return annPnl(parseInt(yr));
    return keys&&keys.length>0?aggKeys(keys):null;
  },[yr,keys,isAnn,tbVersion]);

  const bsKey = useMemo(()=>snapKey(yr,period),    [yr,period]);
  const bs    = useMemo(()=>bsCalc(BS_SNAPSHOTS[bsKey]||BS_SNAPSHOTS['dec25']),[bsKey,tbVersion]);

  // ── Prior period data (for trend) ────────────────────────────────
  const prevPeriod = useMemo(()=>{
    if(isAnn||period==='full'||period==='ytd') return null;
    if(period.startsWith('m')){
      const mi=parseInt(period.slice(1));
      if(mi<=1) return null;
      return `m${mi-1}`;
    }
    if(period.startsWith('q')){
      const qn=parseInt(period.slice(1));
      return qn>1?`q${qn-1}`:null;
    }
    return null;
  },[period,isAnn,tbVersion]);

  const prevKeys = useMemo(()=>prevPeriod?getKeys(yr,prevPeriod):null,[yr,prevPeriod,tbVersion]);
  const prev     = useMemo(()=>{
    if(prevKeys&&prevKeys.length) return aggKeys(prevKeys);
    if(!prevPeriod&&!isAnn){
      // full year: compare to prior year
      const py=parseInt(yr)-1;
      if(py>=2013) return annPnl(py);
    }
    return null;
  },[prevKeys,prevPeriod,yr,isAnn,tbVersion]);

  const prevBsKey = useMemo(()=>prevPeriod?snapKey(yr,prevPeriod):null,[yr,prevPeriod,tbVersion]);
  const prevBs    = useMemo(()=>{
    if(prevBsKey) return bsCalc(BS_SNAPSHOTS[prevBsKey]||BS_SNAPSHOTS['dec25']);
    // full year: prior year BS
    const py=String(parseInt(yr)-1);
    const k=snapKey(py,'full');
    return bsCalc(BS_SNAPSHOTS[k]||BS_SNAPSHOTS['dec25']);
  },[prevBsKey,yr,tbVersion]);

  const periodLabel = (periodOpts.find(o=>o.v===period)||{}).l||period;

  const [activeTab, setActiveTab] = useState('scorecard');

  // ── USALI Industry Benchmarks (4-star city hotel Indonesia) ──────
  const USALI = {
    gopMgn:     {label:'GOP Margin',         benchmark:30, range:'28–40%',   src:'USALI/STR'},
    nopMgn:     {label:'NOP Margin',         benchmark:8,  range:'5–12%',    src:'USALI'},
    payRat:     {label:'Total Payroll/Rev',  benchmark:35, range:'28–42%',   src:'USALI'},
    utlRat:     {label:'Utility Ratio',      benchmark:6,  range:'4–8%',     src:'USALI'},
    mntRat:     {label:'Maint. Ratio',       benchmark:3,  range:'2–5%',     src:'USALI'},
    cosRat:     {label:'CoS F&B / F&B Rev',  benchmark:28, range:'25–33%',   src:'USALI'},
    deptPay:    {label:'Dept Payroll/Dept Rev',benchmark:40,range:'35–50%',  src:'USALI'},
    deptOther:  {label:'Dept Other/Dept Rev',benchmark:20, range:'15–28%',   src:'USALI'},
    ovhdPay:    {label:'Overhead Payroll',   benchmark:10, range:'8–13%',    src:'USALI'},
    ovhdOther:  {label:'Overhead Other',     benchmark:15, range:'12–20%',   src:'USALI'},
    occ:        {label:'Occupancy',          benchmark:65, range:'60–75%',   src:'STR Indonesia'},
    cr:         {label:'Current Ratio',      benchmark:1.5,range:'1.3–2.0x', src:'Hospitality Finance'},
    de:         {label:'Debt/Equity',        benchmark:1.5,range:'1.0–2.5x', src:'Hospitality Finance'},
    roa:        {label:'ROA',                benchmark:3,  range:'2–6%',     src:'USALI'},
    roe:        {label:'ROE',                benchmark:8,  range:'6–15%',    src:'USALI'},
    revpar:     {label:'RevPAR Growth',      benchmark:8,  range:'>5% YoY',  src:'STR Indonesia'},
  };

  // ── Validation helper ────────────────────────────────────────────
  const validate = (v, min, max, label) => {
    if(v===null||v===undefined||isNaN(v)) return {val:'—', warn:false};
    if(v<min||v>max) return {val:`${v.toFixed(1)}% ⚠`, warn:true, msg:`${label} out of range [${min}–${max}%]`};
    return {val:v.toFixed(1), warn:false};
  };

  // ── Trend arrow ──────────────────────────────────────────────────
  const trend = (cur, prev, inv=false) => {
    if(prev==null||cur==null) return {icon:'→', color:T.muted, label:'—'};
    const diff = cur - prev;
    const better = inv ? diff<=-0.3 : diff>=0.3;
    const worse  = inv ? diff>=0.3  : diff<=-0.3;
    if(better) return {icon:'↑', color:T.green,  label:`↑ +${Math.abs(diff).toFixed(1)}`};
    if(worse)  return {icon:'↓', color:T.red,    label:`↓ -${Math.abs(diff).toFixed(1)}`};
    return      {icon:'→', color:T.muted, label:'→ stable'};
  };

  // ── Health classification (3-tier) ───────────────────────────────
  const health = (v, thresholds) => {
    // thresholds: [{min, max, level}] or [{val, level}] for single-sided
    // level: 'green','yellow','red'
    for(const t of thresholds){
      if(t.min!==undefined && t.max!==undefined && v>=t.min && v<=t.max) return t.level;
      if(t.min!==undefined && t.max===undefined && v>=t.min) return t.level;
      if(t.max!==undefined && t.min===undefined && v<=t.max) return t.level;

    // Occupancy: ANN has occ in %, TB monthly has occ=room nights, avail=available nights

      ? (cur.occ!=null ? Math.min(Math.max(cur.occ,0),100) : null)

    const prevOccPct = prev
