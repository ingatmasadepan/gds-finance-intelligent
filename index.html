          : (prev.occ>100&&prev.avail>0 ? Math.min(prev.occ/prev.avail*100,100) : (prev.occ>0&&prev.occ<=100?prev.occ:null)))
      : null;

    // Prev period equivalents
    const pCR = prev&&prevBs ? prevBs.tCA/Math.max(prevBs.tCL,0.001) : null;
    const pQR = prev&&prevBs ? (prevBs.cash+prevBs.ar)/Math.max(prevBs.tCL,0.001) : null;
    const pROA= prev&&prevBs ? prev.nop/Math.max(prevBs.tA,0.001)*100 : null;
    const pROE= prev&&prevBs ? prev.nop/Math.max(prevBs.tEq,0.001)*100 : null;
    const pDE = prev&&prevBs ? prevBs.tL/Math.max(prevBs.tEq,0.001) : null;

      {
        cat:'Returns', color:T.secondary, icon:'💰',
        items:[
          {l:'Return on Assets',  val:roa, fmt:v=>v.toFixed(1)+'%', prev:pROA,
           hlth:health(roa, [{min:3,level:'green'},{min:0,max:2.9,level:'yellow'},{max:-0.001,level:'red'}]),
           tgt:'>3%', tgtN:3, inv:false, unit:'%'},
          {l:'Return on Equity',  val:roe, fmt:v=>v.toFixed(1)+'%', prev:pROE,
           hlth:health(roe, [{min:8,level:'green'},{min:0,max:7.9,level:'yellow'},{max:-0.001,level:'red'}]),
           tgt:'>8%', tgtN:8, inv:false, unit:'%'},
          {l:'Asset Turnover',    val:at,  fmt:v=>v.toFixed(2)+'x', prev:null,
           hlth:health(at,  [{min:0.5,level:'green'},{min:0.3,max:0.499,level:'yellow'},{max:0.299,level:'red'}]),
           tgt:'>0.5x', tgtN:0.5, inv:false, unit:'x'},
          {l:'EBITDA / Assets',   val:cur.gop/tA*100, fmt:v=>v.toFixed(1)+'%', prev:null,
           hlth:health(cur.gop/tA*100,[{min:8,level:'green'},{min:3,max:7.9,level:'yellow'},{max:2.9,level:'red'}]),
           tgt:'>8%', tgtN:8, inv:false, unit:'%'},
        ]
      },
      {
        cat:'Hotel Operations', color:T.orange||'#F97316', icon:'🏨',
        items:[
          // Revenue metrics
          {l:'Occupancy',        val:occPct,        fmt:v=>v!=null?v.toFixed(1)+'%':'—',   prev:prevOccPct,
           hlth:occPct!=null?health(occPct,[{min:65,level:'green'},{min:50,max:64.9,level:'yellow'},{max:49.9,level:'red'}]):'yellow',
           tgt:'>65%', tgtN:65, inv:false, unit:'%', usali:'60–75%'},
          {l:'ADR (Rp jt/malam)',
           val:(()=>{
             const oRooms=isAnn?cur.occ:cur.occ;
             const roomRev=cur.rooms||0;
             if(!oRooms||oRooms<=0) return null;
             return isAnn ? (roomRev/oRooms) : (roomRev*1000/oRooms);
           })(),
           fmt:v=>v!=null?'IDR '+Math.round(v*1000000).toLocaleString('id-ID'):'—', prev:null,
           hlth:(()=>{
             const oRooms=isAnn?cur.occ:cur.occ;
             const roomRev=cur.rooms||0;
             const adr=(!oRooms||oRooms<=0)?null:(isAnn?(roomRev/oRooms):(roomRev*1000/oRooms));
             if(adr==null) return 'yellow';
             return health(adr,[{min:0.8,level:'green'},{min:0.5,max:0.799,level:'yellow'},{max:0.499,level:'red'}]);
           })(),
           tgt:'>IDR 800.000', tgtN:0.8, inv:false, unit:'IDR', usali:'Market ADR'},
          {l:'RevPAR (Rp jt/kamar)',
           val:(()=>{
             const avl=isAnn?(168*365):cur.avail;
             const roomRev=cur.rooms||0;
             if(!avl||avl<=0) return null;
             return isAnn?(roomRev/avl*1000):(roomRev*1000/avl);
           })(),
           fmt:v=>v!=null?'IDR '+Math.round(v*1000000).toLocaleString('id-ID'):'—', prev:null,
           hlth:(()=>{
             const avl=isAnn?(168*365):cur.avail;
             const roomRev=cur.rooms||0;
             const rp=(!avl||avl<=0)?null:(isAnn?(roomRev/avl*1000):(roomRev*1000/avl));
             if(rp==null) return 'yellow';
             return health(rp,[{min:0.5,level:'green'},{min:0.3,max:0.499,level:'yellow'},{max:0.299,level:'red'}]);
           })(),
           tgt:'>IDR 500.000', tgtN:0.5, inv:false, unit:'IDR', usali:'Market RevPAR'},
          {l:'GOPPAR (Rp jt/kamar)',
           val:(()=>{
             const avl=isAnn?(168*365):cur.avail;
             if(!avl||avl<=0) return null;
             return isAnn?(cur.gop/avl*1000):(cur.gop*1000/avl);
           })(),
           fmt:v=>v!=null?'IDR '+Math.round(v*1000000).toLocaleString('id-ID'):'—', prev:null,
           hlth:(()=>{
             const avl=isAnn?(168*365):cur.avail;
             const gp=(!avl||avl<=0)?null:(isAnn?(cur.gop/avl*1000):(cur.gop*1000/avl));
             if(gp==null) return 'yellow';
             return health(gp,[{min:0.2,level:'green'},{min:0.05,max:0.199,level:'yellow'},{max:0.049,level:'red'}]);
           })(),
           tgt:'>IDR 200.000', tgtN:0.2, inv:false, unit:'IDR', usali:'USALI GOPPAR'},
          // Cost metrics
          {l:'Payroll Ratio',    val:cur.payRat||0, fmt:v=>v.toFixed(1)+'%', prev:(prev&&prev.payRat),
           hlth:health(cur.payRat||0,[{max:35,level:'green'},{min:35,max:42,level:'yellow'},{min:42.01,level:'red'}]),
           tgt:'<35%', tgtN:35, inv:true, unit:'%', usali:'28–42%'},
          {l:'CoS F&B / Rev F&B', val:cur.fnb>0?cur.cosFnb/cur.fnb*100:0, fmt:v=>v.toFixed(1)+'%', prev:(prev&&prev.fnb>0?prev.cosFnb/prev.fnb*100:null),
           hlth:health(cur.fnb>0?cur.cosFnb/cur.fnb*100:0,[{max:28,level:'green'},{min:28,max:33,level:'yellow'},{min:33.01,level:'red'}]),
           tgt:'<30%', tgtN:30, inv:true, unit:'%', usali:'25–32%'},
          {l:'Utility Ratio',    val:cur.utlRat||0, fmt:v=>v.toFixed(1)+'%', prev:(prev&&prev.utlRat),
           hlth:health(cur.utlRat||0,[{max:6,level:'green'},{min:6,max:9,level:'yellow'},{min:9.01,level:'red'}]),
           tgt:'<7%', tgtN:7, inv:true, unit:'%', usali:'4–8%'},
          {l:'Maint. Ratio',     val:cur.mntRat||0, fmt:v=>v.toFixed(1)+'%', prev:(prev&&prev.mntRat),
           hlth:health(cur.mntRat||0,[{max:3,level:'green'},{min:3,max:5,level:'yellow'},{min:5.01,level:'red'}]),
           tgt:'<4%', tgtN:4, inv:true, unit:'%', usali:'2–4%'},
        ]
      },
    ];
    return cats;
  },[cur,bs,prev,prevBs]);

  // ── Health Score ─────────────────────────────────────────────────
  const healthScore = useMemo(()=>{
    if(!kpiData) return null;
    const score = (items) => {
      const valid = items.filter(i=>i.val!=null&&i.val!==null&&typeof i.val==='number');
      const g=valid.filter(i=>i.hlth==='green').length;
      const y=valid.filter(i=>i.hlth==='yellow').length;
      const r=valid.filter(i=>i.hlth==='red').length;
      const total=Math.max(valid.length,1);
      const pct=Math.round((g*100+y*50)/(total*100)*100);
      const level=pct>=75?'green':pct>=50?'yellow':'red';
      return {g,y,r,pct,level};
    };
    const liq  = score(kpiData[0].items);
    const prof = score(kpiData[1].items);
    const lev  = score(kpiData[2].items);
    const ret  = score(kpiData[3].items);
    const ops  = score(kpiData[4].items);
    const all  = kpiData.flatMap(c=>c.items);
    const total= score(all);
    const result = {liq,prof,lev,ret,ops,total,
      okCount:all.filter(i=>i.hlth==='green').length,
      warnCount:all.filter(i=>i.hlth==='yellow').length,
      redCount:all.filter(i=>i.hlth==='red').length,
      allCount:all.length};
    // Export for Dashboard/AI
    window.__GDS_KPI_HEALTH = result;
    window.__GDS_KPI_SCORE  = total.pct;
    return result;
  },[kpiData]);

  // ── KPI Insights (Bahasa Indonesia, dynamic) ─────────────────────
  const kpiInsights = useMemo(()=>{
    if(!cur||!kpiData) return [];
    const lines=[];
    const gopMgn=cur.gopMgn, nopMgn=cur.nopMgn, payRat=cur.payRat||0;
    const cosRat=cur.fnb>0?cur.cosFnb/cur.fnb*100:0; // F&B CoS / F&B Revenue (USALI standard)
    const cr=bs.tCA/Math.max(bs.tCL,0.001);
    const de=bs.tL/Math.max(bs.tEq,0.001);
    const roa=cur.nop/Math.max(bs.tA,0.001)*100;
    const avl=isAnn?(168*365):(cur.avail||0);
    const occPctI=isAnn?(cur.occ!=null?Math.min(Math.max(cur.occ,0),100):null):(cur.avail>0?Math.min(cur.occ/cur.avail*100,100):null);
    const revpar=avl>0?(isAnn?cur.rooms/avl*1000:cur.rooms*1000/avl):null;

    // 1. NOP Margin
    if(nopMgn<0)
      lines.push({sev:'red',  msg:`NOP margin negatif ${nopMgn.toFixed(1)}% — kerugian operasional. Revenue ${fM(cur.rev)} tidak cukup menutup beban non-operasional. Audit beban depresiasi dan debt service segera.`});
    else if(nopMgn<5)
      lines.push({sev:'yellow',msg:`NOP margin ${nopMgn.toFixed(1)}% di bawah target 5%. Beban non-operasional memakan profitabilitas. Pantau ROI, fee manajemen, dan cicilan pinjaman.`});
    else if(nopMgn>=8)
      lines.push({sev:'green', msg:`NOP margin ${nopMgn.toFixed(1)}% — kinerja sangat baik, melampaui benchmark USALI 5–12%. Bottom-line GDS sehat dan sustainable.`});
    else
      lines.push({sev:'green', msg:`NOP margin ${nopMgn.toFixed(1)}% on-target. Profitabilitas berada dalam rentang sehat sesuai standar USALI.`});

    // 2. GOP Margin
    if(gopMgn<20)
      lines.push({sev:'red',  msg:`GOP margin ${gopMgn.toFixed(1)}% — kritis, jauh di bawah benchmark 28–35%. Struktur biaya operasional tidak efisien. Prioritaskan review payroll dan overhead per departemen.`});
    else if(gopMgn<28)
      lines.push({sev:'yellow',msg:`GOP margin ${gopMgn.toFixed(1)}% di bawah benchmark USALI 28%. Efisiensi operasional perlu ditingkatkan — fokus pada overhead dan biaya dept non-rooms.`});
    else if(gopMgn>=35)
      lines.push({sev:'green', msg:`GOP margin ${gopMgn.toFixed(1)}% melampaui benchmark USALI 35% — excellent. GDS menunjukkan efisiensi operasional kelas atas.`});

    // 3. Payroll
    if(payRat>38)
      lines.push({sev:'red',  msg:`Payroll ratio ${payRat.toFixed(1)}% sangat tinggi (benchmark <35%). Biaya SDM relatif terhadap revenue tidak sustainable — review headcount vs tingkat hunian.`});
    else if(payRat>35)
      lines.push({sev:'yellow',msg:`Payroll ratio ${payRat.toFixed(1)}% melebihi target 35%. Pertimbangkan flex staffing atau produktivitas review yang dikaitkan dengan occupancy.`});
    else if(payRat<30)
      lines.push({sev:'green', msg:`Payroll ratio ${payRat.toFixed(1)}% — efisiensi SDM sangat baik, di bawah benchmark bawah USALI 28–36%.`});

    // 4. Occupancy & RevPAR
    if(occPctI!=null&&occPctI<50)
      lines.push({sev:'red',  msg:`Occupancy ${occPctI.toFixed(1)}% — di bawah 50%, kritis. RevPAR dan GOPPAR akan tertekan berat. Fokus pada strategi distribusi, OTA, dan corporate rate.`});
    else if(occPctI!=null&&occPctI<65)
      lines.push({sev:'yellow',msg:`Occupancy ${occPctI.toFixed(1)}% di bawah benchmark STR Indonesia (60–75%). Ada ruang untuk push occupancy melalui channel mix dan pricing strategy.`});
    else if(occPctI!=null&&occPctI>=70)
      lines.push({sev:'green', msg:`Occupancy ${occPctI.toFixed(1)}% — kuat, di atas benchmark. Fokus beralih ke push ADR untuk maximize RevPAR.`});

    // 5. Liquidity
    if(cr<1.2)
      lines.push({sev:'red',  msg:`Current ratio ${cr.toFixed(2)}x — risiko likuiditas. Kewajiban lancar ${fM(bs.tCL)} lebih besar dari aset lancar. Monitor cash flow mingguan dan tunda pengeluaran besar.`});
    else if(cr<1.5)
      lines.push({sev:'yellow',msg:`Current ratio ${cr.toFixed(2)}x cukup namun di bawah target 1.5x. Jaga posisi kas dan hindari pengeluaran besar yang tidak direncanakan.`});

    // 6. CoS
    if(cosRat>33)
      lines.push({sev:'red',  msg:`F&B CoS ratio ${cosRat.toFixed(1)}% — terlalu tinggi (benchmark 25–32%). Review menu pricing, portion control, dan supplier contract F&B.`});
    else if(cosRat>30)
      lines.push({sev:'yellow',msg:`F&B CoS ratio ${cosRat.toFixed(1)}% mendekati batas atas benchmark. Monitor food cost dan minuman secara berkala.`});

    // 7. Prior period trend
    if(prev){
      const gopTrend=cur.gopMgn-(prev.gopMgn||0);
      const nopTrend=cur.nopMgn-(prev.nopMgn||0);
      const revTrend=prev.rev>0?(cur.rev-prev.rev)/prev.rev*100:null;
      if(Math.abs(gopTrend)>=2||Math.abs(nopTrend)>=2)
        lines.push({sev:gopTrend>=0?'green':'yellow',
          msg:`vs Periode sebelumnya: GOP margin ${gopTrend>=0?'naik':'turun'} ${Math.abs(gopTrend).toFixed(1)}pp, NOP margin ${nopTrend>=0?'naik':'turun'} ${Math.abs(nopTrend).toFixed(1)}pp.${revTrend!=null?' Revenue '+( revTrend>=0?'▲ +':'▼ ')+Math.abs(revTrend).toFixed(1)+'%.':''}`});
    }
    return lines.slice(0,6);
  },[cur,bs,kpiData,prev,isAnn]);

  // ── Trend chart ───────────────────────────────────────────────────
  const trendKeys = yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;
  const trendData = useMemo(()=>(!isAnn?trendKeys.filter(k=>TB[k]):[]).map((k,i)=>{
    const d=pnl(TB[k]);
    return {name:ML[i],gopMgn:+d.gopMgn.toFixed(1),nopMgn:+d.nopMgn.toFixed(1),payRat:+d.payRat.toFixed(1),utlRat:+d.utlRat.toFixed(1)};
  }),[yr,isAnn,tbVersion]);

  if(!cur||!kpiData||!healthScore)
    return <div style={{padding:40,color:T.muted,textAlign:'center'}}>No data available for this period.</div>;

  const scoreColor = (pct) => pct>=75?T.green:pct>=50?T.yellow:T.red;
  const TAB_S = (a) => ({padding:'6px 14px',borderRadius:6,border:'none',cursor:'pointer',
    fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",
    background:a?T.accent:T.border,color:a?'#060D0F':T.muted,transition:'all 0.15s'});

  return (
    <div>
      {/* ── Header ── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>FINANCIAL KPI MONITOR</div>
          <div style={{color:T.muted,fontSize:11}}>
            {periodLabel} · Overall Health: <span style={{color:scoreColor(healthScore.total.pct),fontWeight:700}}>{healthScore.total.pct}%</span>
            {' '}· {healthScore.okCount}✅ {healthScore.warnCount}⚠️ {healthScore.redCount}🔴 / {healthScore.allCount} KPIs
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'JetBrains Mono',monospace",outline:'none'}}>
            {['2026','2025','2024','2023','2022','2021','2020','2019','2018'].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          {!isAnn&&(
            <select value={period} onChange={e=>setPeriod(e.target.value)}
              style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'JetBrains Mono',monospace",outline:'none'}}>
              {periodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
        </div>
      </div>

      {/* ── Health Scorecard — 6 categories ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:8,marginBottom:14}} className="r-grid-5">
        {[
          {l:'Overall',      s:healthScore.total, icon:'🏥'},
          {l:'Liquidity',    s:healthScore.liq,   icon:'💧'},
          {l:'Profitability',s:healthScore.prof,  icon:'📈'},
          {l:'Leverage',     s:healthScore.lev,   icon:'🏦'},
          {l:'Returns',      s:healthScore.ret,   icon:'💰'},
          {l:'Operations',   s:healthScore.ops,   icon:'🏨'},
        ].map(({l,s,icon})=>(
          <div key={l} style={{background:T.card,borderTop:`2px solid ${scoreColor(s.pct)}`,borderBottom:`1px solid ${T.border}`,borderLeft:`1px solid ${T.border}`,borderRight:`1px solid ${T.border}`,borderRadius:8,padding:'10px 12px'}}>
            <div style={{fontSize:9,color:T.muted,textTransform:'uppercase',letterSpacing:0.8,marginBottom:3}}>{icon} {l}</div>
            <div style={{fontSize:20,fontWeight:800,color:scoreColor(s.pct),fontFamily:"'JetBrains Mono',monospace"}}>{s.pct}%</div>
            <div style={{height:3,background:T.border,borderRadius:2,overflow:'hidden',marginTop:4}}>
              <div style={{width:`${s.pct}%`,height:'100%',background:scoreColor(s.pct),borderRadius:2,transition:'width 0.5s'}}/>
            </div>
            <div style={{fontSize:8,color:T.muted,marginTop:3}}>🟢{s.g} 🟡{s.y} 🔴{s.r}</div>
          </div>
        ))}
      </div>

      {/* ── Tabs ── */}
      <div style={{display:'flex',gap:4,marginBottom:14,flexWrap:'wrap'}}>
        {[['scorecard','📊 Scorecard'],['trend','📈 Trend'],['usali','🌐 USALI Benchmark'],['insights','💡 Insights']].map(([tab,label])=>(
          <button key={tab} style={TAB_S(activeTab===tab)} onClick={()=>setActiveTab(tab)}>{label}</button>
        ))}
      </div>

      {/* ══ TAB: SCORECARD ══ */}
      {activeTab==='scorecard' && (
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12}} className="r-grid-2">
          {/* KPI Cards */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}} className="r-grid-2">
            {kpiData.map(cat=>(
              <Card key={cat.cat}>
                <div style={{color:cat.color,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,marginBottom:10,
                  display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span>{cat.icon} {cat.cat.toUpperCase()}</span>
                  <span style={{fontSize:10,padding:'2px 7px',borderRadius:4,background:`${scoreColor(healthScore[{Liquidity:'liq',Profitability:'prof',Leverage:'lev',Returns:'ret','Hotel Operations':'ops'}[cat.cat]]||healthScore.total).pct>=75?T.green:scoreColor(healthScore[{Liquidity:'liq',Profitability:'prof',Leverage:'lev',Returns:'ret','Hotel Operations':'ops'}[cat.cat]]||healthScore.total).pct>=50?T.yellow:T.red}15`,
                    color:scoreColor((healthScore[{Liquidity:'liq',Profitability:'prof',Leverage:'lev',Returns:'ret','Hotel Operations':'ops'}[cat.cat]]||healthScore.total).pct),fontWeight:700}}>
                    {(healthScore[{Liquidity:'liq',Profitability:'prof',Leverage:'lev',Returns:'ret','Hotel Operations':'ops'}[cat.cat]]||healthScore.total).pct}%
                  </span>
                </div>
                {cat.items.map(item=>{
                  const t = trend(item.val, item.prev, item.inv);
                  const hc= hColor(item.hlth);
                  const hi= hIcon(item.hlth);
                  const dispV = item.val==null ? '—' : item.fmt(item.val);
                  return (
                    <div key={item.l} style={{padding:'6px 0',borderBottom:`1px solid ${T.border}`}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{color:T.sub,fontSize:10,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.l}</div>
                          <div style={{color:T.muted,fontSize:8,marginTop:1}}>Target: {item.tgt}</div>
                        </div>
                        <div style={{textAlign:'right',marginLeft:6}}>
                          <div style={{display:'flex',alignItems:'center',gap:4}}>
                            <span style={{color:hc,fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{dispV}</span>
                            <span style={{fontSize:10}}>{hi}</span>
                          </div>
                          {item.prev!=null&&<div style={{fontSize:8,color:t.color,fontFamily:"'JetBrains Mono',monospace",marginTop:1}}>{t.label}</div>}
                        </div>
                      </div>
                      {item.unit!=='M'&&item.unit!=='Rp'&&item.unit!=='x'&&typeof item.val==='number'&&(
                        <div style={{height:3,background:T.border,borderRadius:2,overflow:'hidden',marginTop:3}}>
                          <div style={{width:`${Math.min(item.inv?Math.max(0,200-item.val/item.tgtN*100):Math.min(item.val/item.tgtN*100,100),100)}%`,
                            height:'100%',background:hc,borderRadius:2}}/>
                        </div>
                      )}
                    </div>
                  );
                })}
              </Card>
            ))}
          </div>

          {/* Right panel */}
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <Card>
              <SectionTitle>QUICK HEALTH CHECK</SectionTitle>
              {[
                {l:'Revenue',   v:fM(cur.rev),  lvl:cur.rev>0?'green':'red'},
                {l:'GOP',       v:fM(cur.gop),  lvl:cur.gopMgn>=30?'green':cur.gopMgn>=20?'yellow':'red'},
                {l:'NOP',       v:fM(cur.nop),  lvl:cur.nopMgn>=5?'green':cur.nopMgn>=0?'yellow':'red'},
                {l:'Cash',      v:fM(bs.cash),  lvl:bs.cash>1?'green':bs.cash>0?'yellow':'red'},
                {l:'Curr Ratio',v:(bs.tCA/Math.max(bs.tCL,0.001)).toFixed(2)+'x', lvl:(bs.tCA/Math.max(bs.tCL,0.001))>=1.5?'green':(bs.tCA/Math.max(bs.tCL,0.001))>=1.2?'yellow':'red'},
                {l:'D/E Ratio', v:(bs.tL/Math.max(bs.tEq,0.001)).toFixed(2)+'x',  lvl:(bs.tL/Math.max(bs.tEq,0.001))<1.5?'green':(bs.tL/Math.max(bs.tEq,0.001))<2.5?'yellow':'red'},

function ForecastPage({ tbVersion=0 }) {
  const [lang]       = React.useContext(LangContext);
  const [baseYear,   setBaseYear]   = useState('2025');
  const [activeView, setActiveView] = useState('chart');
  const [savedFcst,  setSavedFcst]  = useState(null);
  const [saveStatus, setSaveStatus] = useState('');
  const [showSetup,  setShowSetup]  = useState(false);
  // CAGR setup
  const [cagrFrom,   setCagrFrom]   = useState('2023');
  const [cagrTo,     setCagrTo]     = useState('2025');
  const [mulCon,     setMulCon]     = useState(0.7);
  const [mulBase,    setMulBase]    = useState(1.0);
  const [mulOpt,     setMulOpt]     = useState(1.3);
  // Outlook (My Forecast) — rolling actual lock
  const [usedGrowth, setUsedGrowth] = useState(8);
  const [usedCost,   setUsedCost]   = useState(4);
  const [usedName,   setUsedName]   = useState('Outlook');
  const [activeScenario, setActiveScenario] = useState('used');

  const FC_KEY = 'gds_forecast_v3';

  useEffect(()=>{
    try {
      const r = localStorage.getItem(FC_KEY);
      if(r){
        const p = JSON.parse(r);
        setSavedFcst(p);
        if(p.usedGrowth!=null) setUsedGrowth(p.usedGrowth);
        if(p.usedCost  !=null) setUsedCost(p.usedCost);
        if(p.usedName  !=null) setUsedName(p.usedName);
        if(p.baseYear  !=null) setBaseYear(p.baseYear);
        if(p.cagrFrom  !=null) setCagrFrom(p.cagrFrom);
        if(p.cagrTo    !=null) setCagrTo(p.cagrTo);
        if(p.mulCon    !=null) setMulCon(p.mulCon);
        if(p.mulBase   !=null) setMulBase(p.mulBase);
        if(p.mulOpt    !=null) setMulOpt(p.mulOpt);
      }
    } catch(e){}
  },[]);

  // ── CAGR auto-calculation from TB data ──────────────────────────
  const cagrData = useMemo(()=>{
    const getAnnRev = (yr) => {
      const yi = parseInt(yr);
      if(yi===2024){ const keys=mKeys24.filter(k=>TB[k]); if(keys.length===12) return keys.reduce((s,k)=>s+pnl(TB[k]).rev,0); }
      if(yi===2025){ const keys=mKeys25.filter(k=>TB[k]); if(keys.length===12) return keys.reduce((s,k)=>s+pnl(TB[k]).rev,0); }
      return pnl(ANN[yi]||{}).rev||0;
    };
    const getAnnCost = (yr) => {
      const yi = parseInt(yr);
      const getC = (d) => (d.cos||0)+(d.deptPay||0)+(d.deptOther||0)+(d.ovhdPay||0)+(d.ovhdOther||0);
      if(yi===2024){ const keys=mKeys24.filter(k=>TB[k]); if(keys.length===12) return keys.reduce((s,k)=>s+getC(pnl(TB[k])),0); }
      if(yi===2025){ const keys=mKeys25.filter(k=>TB[k]); if(keys.length===12) return keys.reduce((s,k)=>s+getC(pnl(TB[k])),0); }
      const d=pnl(ANN[yi]||{}); return getC(d);
    };
    const startRev  = getAnnRev(cagrFrom);
    const endRev    = getAnnRev(cagrTo);
    const startCost = getAnnCost(cagrFrom);
    const endCost   = getAnnCost(cagrTo);
    const yrs = parseInt(cagrTo) - parseInt(cagrFrom);
    if(!startRev||!endRev||yrs<=0) return {cagr:8,cagrCost:4,conG:5.6,baseG:8,optG:10.4,conC:5.2,baseC:4,optC:2.8};
    const cagr     = (Math.pow(endRev/startRev,   1/yrs)-1)*100;
    const cagrCost = (Math.pow(endCost/startCost || 1, 1/yrs)-1)*100;

    // ── Revenue scenario assignment ────────────────────────────────
    // Conservative = WORST revenue outcome (lowest absolute growth)
    // Optimistic   = BEST revenue outcome (highest absolute growth)
    // This is defined by OUTCOME, not by multiplier value.
    // When CAGR is positive: larger multiplier → better outcome
    // When CAGR is negative: larger multiplier → MORE negative → WORSE outcome
    // So we sort by outcome and assign Con/Base/Opt by rank, regardless of CAGR sign.
    const rawRevs = [
      {mul:'con',  val: cagr * mulCon},
      {mul:'base', val: cagr * mulBase},
      {mul:'opt',  val: cagr * mulOpt},
    ];
    // Sort ascending (worst = lowest revenue growth first)
    rawRevs.sort((a,b) => a.val - b.val);
    const conG  = +rawRevs[0].val.toFixed(1);  // worst revenue = Conservative
    const baseG = +rawRevs[1].val.toFixed(1);  // middle
    const optG  = +rawRevs[2].val.toFixed(1);  // best revenue  = Optimistic

    // Track which multiplier ended up in each scenario (for display clarity)
    const conMul  = rawRevs[0].mul;
    const baseMul = rawRevs[1].mul;
    const optMul  = rawRevs[2].mul;

    // ── Cost scenario assignment ─────────────────────────────────
    // Conservative = HIGHEST cost inflation (harder conditions)
    // Optimistic   = LOWEST cost inflation
    // Cost floor 2% min (Indonesian market realism)
    const costBase = Math.max(cagrCost, 2);
    const rawCosts = [
      {mul:'con',  val: costBase * mulCon},
      {mul:'base', val: costBase * mulBase},
      {mul:'opt',  val: costBase * mulOpt},
    ];
    // Sort descending (highest cost = most conservative)
    rawCosts.sort((a,b) => b.val - a.val);
    const conC  = +rawCosts[0].val.toFixed(1);  // highest cost = Conservative
    const baseC = +rawCosts[1].val.toFixed(1);
    const optC  = +rawCosts[2].val.toFixed(1);  // lowest cost  = Optimistic

    return {cagr, cagrCost, yrs, conG, baseG, optG, conC, baseC, optC, conMul, baseMul, optMul};
  },[cagrFrom, cagrTo, mulCon, mulBase, mulOpt, tbVersion]);

  // Reference scenarios — driven by CAGR
  const refScenarios = {
    conservative: {name:'Conservative', color:T.yellow, revGrowth:cagrData.conG,  costInfl:cagrData.conC},
    base:         {name:'Base Case',    color:T.accent,  revGrowth:cagrData.baseG, costInfl:cagrData.baseC},
    optimistic:   {name:'Optimistic',   color:T.green,   revGrowth:cagrData.optG,  costInfl:cagrData.optC},
  };

  // Actual months
  const actualKeys = mKeys26_ytd.filter(k=>TB[k]);
  const latestMo   = actualKeys.length;

  // Base period: avg monthly from selected base year, via pnl()
  const basePeriod = useMemo(()=>{
    let src;
    if(baseYear==='2024') src = mKeys24.filter(k=>TB[k]);
    else if(baseYear==='2025') src = mKeys25.filter(k=>TB[k]);
    else {
      const ann = pnl(ANN[parseInt(baseYear)]||{});
      const out={};
      Object.keys(ann).forEach(k=>{ out[k]=typeof ann[k]==='number'?ann[k]/12:ann[k]; });
      out.occ=ann.occ; out.arr=ann.arr;
      return out;
    }
    if(!src.length) return pnl({});
    const n=src.length;
    const rawSum={};
    src.forEach(k=>{
      Object.entries(TB[k]).forEach(([f,v])=>{ rawSum[f]=(rawSum[f]||0)+(typeof v==='number'?v:0); });
    });
    const rawAvg={};
    Object.keys(rawSum).forEach(k=>{ rawAvg[k]=rawSum[k]/n; });
    const base=pnl(rawAvg);
    base.occ = src.map(k=>{ const d=TB[k]; return d.avail>0?d.occ/d.avail*100:(d.occ>0&&d.occ<=100?d.occ:0); }).reduce((a,b)=>a+b,0)/n;
    base.arr = rawAvg.arr||0;
    return base;
  },[baseYear, tbVersion]);

  // Seasonal weights: rev + cost + occ (from base year monthly data)
  const seasonalWeights = useMemo(()=>{
    const srcKeys = baseYear==='2024'?mKeys24 : baseYear==='2025'?mKeys25 : mKeys24;
    const avail=srcKeys.filter(k=>TB[k]);
    if(!avail.length) return Array(12).fill({rev:1,cost:1,occ:1});
    const n=avail.length;
    const totalRev  = avail.map(k=>pnl(TB[k]).rev).reduce((a,b)=>a+b,0);
    const totalCost = avail.map(k=>{ const d=pnl(TB[k]); return d.cos+d.deptPay+d.deptOther+d.ovhdPay+d.ovhdOther; }).reduce((a,b)=>a+b,0);
    const avgRev=totalRev/n, avgCost=totalCost/n;
    const occArr=avail.map(k=>{ const d=TB[k]; return d.avail>0?d.occ/d.avail*100:(d.occ>0&&d.occ<=100?d.occ:0); });
    const avgOcc=occArr.reduce((a,b)=>a+b,0)/n;
    return Array.from({length:12},(_,i)=>{
      const k=srcKeys[i];
      if(!k||!TB[k]) return {rev:1,cost:1,occ:1};
      const d=pnl(TB[k]);
      const revW  = avgRev >0?d.rev/avgRev:1;
      const tc    = d.cos+d.deptPay+d.deptOther+d.ovhdPay+d.ovhdOther;
      const costW = avgCost>0?tc/avgCost:1;
      const moOcc = TB[k].avail>0?TB[k].occ/TB[k].avail*100:(TB[k].occ||0);
      const occW  = avgOcc>0?moOcc/avgOcc:1;
      return {rev:revW,cost:costW,occ:occW};
    });
  },[baseYear, tbVersion]);

  // Fixed charges (flat per month, not scaled)
  const fixedCharges = useMemo(()=>({
    depr:       basePeriod.deprTotal||(basePeriod.depr||0)+(basePeriod.amor||0),
    incentFee:  basePeriod.incentFee||0,
    mgmtFee:    basePeriod.mgmtFee||0,
    roi:        basePeriod.roi||0,
    roiSub:     basePeriod.roiSub||0,
    landTax:    basePeriod.landTax||0,
    insur:      basePeriod.insur||0,
    ownExp:     basePeriod.ownExp||0,
    otherNonOp: basePeriod.otherNonOp||0,
  }),[basePeriod]);

  // Base year full annual aggregate (for FY target calculation)
  const baseYearAnnual = useMemo(()=>{
    let srcKeys;
    if(baseYear==='2024') srcKeys=mKeys24.filter(k=>TB[k]);
    else if(baseYear==='2025') srcKeys=mKeys25.filter(k=>TB[k]);
    else return pnl(ANN[parseInt(baseYear)]||{});
    if(!srcKeys.length) return pnl({});
    return aggKeys(srcKeys);
  },[baseYear, tbVersion]);

  // Budget monthly
  const budMonthly = useMemo(()=>
    Array.from({length:12},(_,i)=>{ const k=`2026-${String(i+1).padStart(2,'0')}`; return BUD26[k]?pnl(BUD26[k]):null; })
  ,[]);

  // ── Scenario forecast (static reference — no rolling lock) ──────
  const calcScenario = (rg, ci) => {
    const rows=[];
    for(let mo=1;mo<=12;mo++){
      const moIdx=mo-1;
      const k=`2026-${String(mo).padStart(2,'0')}`;
      const isActual=TB[k]!=null;
      const row={name:ML[moIdx], mo, isActual};
      const sw=seasonalWeights[moIdx]||{rev:1,cost:1,occ:1};
      const b=budMonthly[moIdx];
      if(b){ row.budRev=+b.rev.toFixed(4); row.budGOP=+b.gop.toFixed(4); row.budNOP=+b.nop.toFixed(4); row.budOcc=+(b.occ||0).toFixed(1); }
      if(isActual){
        const d=pnl(TB[k]);
        row.actRev=+d.rev.toFixed(4); row.actGOP=+d.gop.toFixed(4); row.actNOP=+d.nop.toFixed(4);
        row.actOCF=+(d.nop+(d.deprTotal||0)).toFixed(4);
        const occPct=TB[k].avail>0?TB[k].occ/TB[k].avail*100:(TB[k].occ>0&&TB[k].occ<=100?TB[k].occ:0);
        row.actOcc=+occPct.toFixed(1);
      }
      const gf=Math.pow(1+rg/100,1);
      const cf=Math.pow(1+ci/100,1);
      const rev   = basePeriod.rev*gf*sw.rev;
      const cos   = (basePeriod.cos||0)*cf*sw.cost;
      const dPay  = (basePeriod.deptPay||0)*cf*sw.cost;
      const dOth  = (basePeriod.deptOther||0)*cf*sw.cost;
      const oPay  = (basePeriod.ovhdPay||0)*cf*sw.cost;
      const oOth  = (basePeriod.ovhdOther||0)*cf*sw.cost;
      const fx    = fixedCharges;
      const gop   = rev-cos-dPay-dOth-oPay-oOth;
      const nonOp = fx.depr+fx.incentFee+fx.mgmtFee+fx.roi+fx.roiSub+fx.landTax+fx.insur+fx.ownExp+fx.otherNonOp;
      const nop   = gop-nonOp;
      const occBase=basePeriod.occ||0;
      const projOcc=Math.min(Math.max(occBase*sw.occ*(1+rg/100*0.5),0),100);
      row.fcRev=+rev.toFixed(4); row.fcGOP=+gop.toFixed(4); row.fcNOP=+nop.toFixed(4);
      row.fcOCF=+(nop+fx.depr).toFixed(4); row.fcOcc=+projOcc.toFixed(1);
      rows.push(row);
    }
    return rows;
  };

  // ── Outlook = rolling actual lock (My Forecast) ─────────────────
  // Actual months locked; remaining = (FY target - YTD actual) distributed by seasonal weight
  const calcOutlook = (rg, ci) => {
    const getC=(d)=>(d.cos||0)+(d.deptPay||0)+(d.deptOther||0)+(d.ovhdPay||0)+(d.ovhdOther||0);
    const baseRevFY  = baseYearAnnual.rev  || basePeriod.rev*12;
    const baseCostFY = getC(baseYearAnnual) || getC(basePeriod)*12;
    const targetRevFY  = baseRevFY  * (1+rg/100);
    const targetCostFY = baseCostFY * (1+ci/100);

    // YTD actual
    const ytdActRev  = actualKeys.reduce((s,k)=>s+pnl(TB[k]).rev,0);
    const ytdActCost = actualKeys.reduce((s,k)=>s+getC(pnl(TB[k])),0);

    // Remaining to distribute
    const remRev  = targetRevFY  - ytdActRev;
    const remCost = targetCostFY - ytdActCost;

    // Forecast months and their seasonal weight sums
    const fcMonths = Array.from({length:12},(_,i)=>i+1).filter(mo=>!TB[`2026-${String(mo).padStart(2,'0')}`]);
    const fcRevWSum  = fcMonths.reduce((s,mo)=>s+(seasonalWeights[mo-1]?.rev ||1),0)||1;
    const fcCostWSum = fcMonths.reduce((s,mo)=>s+(seasonalWeights[mo-1]?.cost||1),0)||1;

    const rows=[];
    for(let mo=1;mo<=12;mo++){
      const moIdx=mo-1;
      const k=`2026-${String(mo).padStart(2,'0')}`;
      const isActual=TB[k]!=null;
      const sw=seasonalWeights[moIdx]||{rev:1,cost:1,occ:1};
      const b=budMonthly[moIdx];
      const row={name:ML[moIdx], mo, isActual};
      if(b){ row.budRev=+b.rev.toFixed(4); row.budGOP=+b.gop.toFixed(4); row.budNOP=+b.nop.toFixed(4); row.budOcc=+(b.occ||0).toFixed(1); }
      if(isActual){
        const d=pnl(TB[k]);
        row.actRev=+d.rev.toFixed(4); row.actGOP=+d.gop.toFixed(4); row.actNOP=+d.nop.toFixed(4);
        row.actOCF=+(d.nop+(d.deprTotal||0)).toFixed(4);
        const occPct=TB[k].avail>0?TB[k].occ/TB[k].avail*100:(TB[k].occ>0&&TB[k].occ<=100?TB[k].occ:0);
        row.actOcc=+occPct.toFixed(1);
        row.fcRev=row.actRev; row.fcGOP=row.actGOP; row.fcNOP=row.actNOP;
        row.fcOCF=row.actOCF; row.fcOcc=row.actOcc;
      } else {
        const revShare  = sw.rev  / fcRevWSum;
        const costShare = sw.cost / fcCostWSum;
        const fcRev  = remRev  * revShare;
        const fcCost = remCost * costShare;
        const fx=fixedCharges;
        const fcGop = fcRev - fcCost;
        const nonOp = fx.depr+fx.incentFee+fx.mgmtFee+fx.roi+fx.roiSub+fx.landTax+fx.insur+fx.ownExp+fx.otherNonOp;
        const fcNop = fcGop - nonOp;
        const occBase=basePeriod.occ||0;
        const fcOcc=Math.min(Math.max(occBase*sw.occ*(1+rg/100*0.5),0),100);
        row.fcRev=+fcRev.toFixed(4); row.fcGOP=+fcGop.toFixed(4); row.fcNOP=+fcNop.toFixed(4);
        row.fcOCF=+(fcNop+fx.depr).toFixed(4); row.fcOcc=+fcOcc.toFixed(1);
      }
      rows.push(row);
    }
    return rows;
  };

  // Calculate all scenario datasets
  const refData = useMemo(()=>({
    conservative: calcScenario(refScenarios.conservative.revGrowth, refScenarios.conservative.costInfl),
    base:         calcScenario(refScenarios.base.revGrowth,         refScenarios.base.costInfl),
    optimistic:   calcScenario(refScenarios.optimistic.revGrowth,   refScenarios.optimistic.costInfl),
  }),[basePeriod, seasonalWeights, fixedCharges, latestMo, cagrData]);

  // Outlook = rolling actual lock
  const usedData = useMemo(()=>
    calcOutlook(usedGrowth, usedCost)
  ,[usedGrowth, usedCost, basePeriod, baseYearAnnual, seasonalWeights, fixedCharges, latestMo]);

  // Annual summaries
  const annSum = (rows) => ({
    rev: rows.reduce((s,r)=>s+(r.isActual?r.actRev||0:r.fcRev||0),0),
    gop: rows.reduce((s,r)=>s+(r.isActual?r.actGOP||0:r.fcGOP||0),0),
    nop: rows.reduce((s,r)=>s+(r.isActual?r.actNOP||0:r.fcNOP||0),0),
    ocf: rows.reduce((s,r)=>s+(r.isActual?r.actOCF||0:r.fcOCF||0),0),
    occ: rows.reduce((s,r)=>s+(r.isActual?r.actOcc||0:r.fcOcc||0),0)/12,
  });

  const summaries = useMemo(()=>({
    conservative: annSum(refData.conservative),
    base:         annSum(refData.base),
    optimistic:   annSum(refData.optimistic),
    used:         annSum(usedData),
    budget: {
      rev: budMonthly.reduce((s,b)=>s+((b&&b.rev)||0),0),
      gop: budMonthly.reduce((s,b)=>s+((b&&b.gop)||0),0),
      nop: budMonthly.reduce((s,b)=>s+((b&&b.nop)||0),0),
      occ: budMonthly.reduce((s,b)=>s+((b&&b.occ)||0),0)/12,
    },
  }),[refData, usedData, budMonthly]);

  // Merge chart data (actual + all forecasts per month)
  const chartData = useMemo(()=>usedData.map((r,i)=>({
    name: r.name, mo: r.mo, isActual: r.isActual,
    actRev: r.actRev, actGOP: r.actGOP, actNOP: r.actNOP, actOCF: r.actOCF, actOcc: r.actOcc,
    budRev: r.budRev, budOcc: r.budOcc,
    conRev: refData.conservative[i].fcRev, conNOP: refData.conservative[i].fcNOP, conOcc: refData.conservative[i].fcOcc,
    baseRev:refData.base[i].fcRev,         baseNOP:refData.base[i].fcNOP,         baseOcc:refData.base[i].fcOcc,
    optRev: refData.optimistic[i].fcRev,   optNOP: refData.optimistic[i].fcNOP,   optOcc: refData.optimistic[i].fcOcc,
    usedRev:r.fcRev, usedGOP:r.fcGOP, usedNOP:r.fcNOP, usedOCF:r.fcOCF, usedOcc:r.fcOcc,
  })),[refData, usedData]);

  // Save
  const handleSave = () => {
    setSaveStatus('saving');
    const payload={
      savedAt:new Date().toISOString(), savedBy:'Financial Controller',
      version:((savedFcst&&savedFcst.version)||0)+1,
      baseYear, usedGrowth, usedCost, usedName,
      cagrFrom, cagrTo, mulCon, mulBase, mulOpt,
      annSummary: summaries,
      monthly: usedData.reduce((obj,r)=>{obj[r.mo]=r;return obj;},{}),
    };
    try {
      localStorage.setItem(FC_KEY, JSON.stringify(payload));
      setSavedFcst(payload);
      // Sync to Dashboard FORECAST_SC_REF
      if(window.FORECAST_SC_REF){
        const mk=(sc)=>summaries[sc];
        window.FORECAST_SC_REF['A_Base']=[{year:2026,
          occ:+(mk('base').occ||55).toFixed(1), gopPct:mk('base').rev>0?(mk('base').gop/mk('base').rev*100).toFixed(1):33,
          rev:+(mk('base').rev||0).toFixed(3), gop:+(mk('base').gop||0).toFixed(3), nop:+(mk('base').nop||0).toFixed(3)}];
        window.FORECAST_SC_REF['B_Optimistic']=[{year:2026,
          occ:+(mk('optimistic').occ||58).toFixed(1),
          rev:+(mk('optimistic').rev||0).toFixed(3), gop:+(mk('optimistic').gop||0).toFixed(3), nop:+(mk('optimistic').nop||0).toFixed(3)}];
        window.FORECAST_SC_REF['C_Pessimistic']=[{year:2026,
          occ:+(mk('conservative').occ||46).toFixed(1),
          rev:+(mk('conservative').rev||0).toFixed(3), gop:+(mk('conservative').gop||0).toFixed(3), nop:+(mk('conservative').nop||0).toFixed(3)}];
      }
      setSaveStatus('saved');
      // Trigger App to re-render all modules with new forecast data
      try {
        window.dispatchEvent(new CustomEvent('gds-forecast-saved'));
        window.dispatchEvent(new CustomEvent('gds-budget-saved'));
      } catch(e){}
      setTimeout(()=>setSaveStatus(''),3000);
    } catch(e){ setSaveStatus(''); }
  };

  const fmtDate=(iso)=>iso?new Date(iso).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}):'';

  const SCENARIO_TABS = [
    {k:'conservative', label:'Conservative', color:T.yellow},
    {k:'base',         label:'Base Case',    color:T.accent},
    {k:'optimistic',   label:'Optimistic',   color:T.green},
    {k:'used',         label:usedName||'Outlook', color:'#C084FC'},
  ];
  const activeColor = (SCENARIO_TABS.find(t=>t.k===activeScenario)||{}).color||T.accent;

  // Summary card helper
  const SumCard = ({label, val, bud, color, fmt='M'}) => {
    const diff=(val!=null&&bud!=null)?val-bud:null;
    return (
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:'10px 14px'}}>
        <div style={{fontSize:9,color:T.muted,textTransform:'uppercase',letterSpacing:1,marginBottom:3}}>{label}</div>
        <div style={{fontSize:15,fontWeight:700,color:color||T.text,fontFamily:"'JetBrains Mono',monospace"}}>
          {fmt==='%'?`${(val||0).toFixed(1)}%`:fM(val||0)}
        </div>
        {bud!=null&&<div style={{fontSize:9,color:T.muted}}>Bud: {fmt==='%'?`${bud.toFixed(1)}%`:fM(bud)}</div>}
        {diff!=null&&<div style={{fontSize:9,color:diff>=0?T.green:T.red}}>{diff>=0?'▲':'▼'} {fmt==='%'?`${Math.abs(diff).toFixed(1)}pp`:fM(Math.abs(diff))}</div>}
      </div>
    );
  };

  return (
    <div>
    {/* ── Header ── */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:10}}>
      <div>
        <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>FORECAST ENGINE</div>
        <div style={{color:T.muted,fontSize:11}}>
          2026 · Actual {latestMo>0?`Jan–${ML[latestMo-1]}`:'(no actual)'} · Outlook {latestMo<12?`${ML[latestMo]}–Dec`:'Full Year'} · Base: {baseYear}
        </div>
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <button onClick={()=>setShowSetup(s=>!s)}
          style={{padding:'6px 12px',borderRadius:6,border:`1px solid ${showSetup?T.accent:T.border}`,
          background:showSetup?`${T.accent}15`:'transparent',color:showSetup?T.accent:T.sub,
          cursor:'pointer',fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>
          ⚙ Setup
        </button>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{color:T.muted,fontSize:9,fontFamily:"'JetBrains Mono',monospace",letterSpacing:1}}>SEASONALITY</span>
          <select value={baseYear} onChange={e=>setBaseYear(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.accent,fontSize:11,fontFamily:"'JetBrains Mono',monospace",outline:'none'}}>
            {['2023','2024','2025'].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        </div>
        <div style={{display:'flex',gap:4}}>
          {['chart','table'].map(v=>(
            <button key={v} onClick={()=>setActiveView(v)}
              style={{padding:'6px 12px',borderRadius:6,border:`1px solid ${activeView===v?T.accent:T.border}`,
              background:activeView===v?`${T.accent}20`:'transparent',color:activeView===v?T.accent:T.sub,
              cursor:'pointer',fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>
              {v==='chart'?'📊 Chart':'📋 Table'}
            </button>
          ))}
        </div>
        <button onClick={handleSave} disabled={saveStatus==='saving'}
          style={{padding:'7px 16px',borderRadius:6,border:'none',
          background:saveStatus==='saved'?T.green:'#C084FC',
          color:'#060D0F',cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>
          {saveStatus==='saving'?'⟳ Saving…':saveStatus==='saved'?'✓ Saved':'💾 Save Outlook'}
        </button>
      </div>
    </div>

    {/* ── CAGR Setup Panel ── */}
    {showSetup&&(
      <Card style={{marginBottom:14,padding:'16px 20px',border:`1px solid ${T.accent}30`}}>
        <div style={{color:T.accent,fontSize:10,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginBottom:14,fontWeight:700}}>
          ⚙ FORECAST SETUP — CAGR REFERENCE
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16}} className="r-grid-3">
          {/* CAGR Range */}
          <div>
            <div style={{color:T.muted,fontSize:9,letterSpacing:1,marginBottom:8,fontFamily:"'JetBrains Mono',monospace"}}>CAGR PERIOD</div>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
              <select value={cagrFrom} onChange={e=>setCagrFrom(e.target.value)}
                style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:5,padding:'5px 8px',color:T.text,fontSize:11,outline:'none',flex:1}}>
                {['2019','2020','2021','2022','2023','2024'].map(y=><option key={y}>{y}</option>)}
              </select>
              <span style={{color:T.muted,fontSize:10}}>→</span>
              <select value={cagrTo} onChange={e=>setCagrTo(e.target.value)}
                style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:5,padding:'5px 8px',color:T.text,fontSize:11,outline:'none',flex:1}}>
                {['2023','2024','2025'].map(y=><option key={y}>{y}</option>)}
              </select>
            </div>
            <div style={{background:T.bg,borderRadius:6,padding:'8px 10px',border:`1px solid ${T.border}`}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                <span style={{color:T.muted,fontSize:9}}>Revenue CAGR</span>
                <span style={{color:T.green,fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{cagrData.cagr>=0?'+':''}{cagrData.cagr.toFixed(1)}%</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:T.muted,fontSize:9}}>Cost CAGR</span>
                <span style={{color:T.yellow,fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{cagrData.cagrCost>=0?'+':''}{cagrData.cagrCost.toFixed(1)}%</span>
              </div>
              <div style={{color:T.muted,fontSize:8,marginTop:4}}>{cagrData.yrs||0} year{(cagrData.yrs||0)>1?'s':''} period</div>
            </div>
          </div>

          {/* Scenario Multipliers */}
          <div>
            <div style={{color:T.muted,fontSize:9,letterSpacing:1,marginBottom:8,fontFamily:"'JetBrains Mono',monospace"}}>SCENARIO MULTIPLIERS</div>
            {[
              {l:'Conservative',color:T.yellow,val:mulCon,set:setMulCon,min:0.3,max:0.9,step:0.05},
              {l:'Base Case',   color:T.accent, val:mulBase,set:setMulBase,min:0.8,max:1.2,step:0.05},
              {l:'Optimistic',  color:T.green,  val:mulOpt,set:setMulOpt, min:1.1,max:2.0,step:0.05},
            ].map(({l,color,val,set,min,max,step})=>{
              const ownRev  = cagrData.cagr  * val;
              const ownCost = Math.max(2, Math.abs(cagrData.cagrCost) * val);
              return (
              <div key={l} style={{marginBottom:6}}>\n                <div style={{display:'flex',justifyContent:'space-between',marginBottom:1}}>
                  <span style={{color:T.muted,fontSize:9}}>{l}</span>
                  <span style={{color,fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>
                    ×{val.toFixed(2)} → Rev {ownRev>=0?'+':''}{ownRev.toFixed(1)}% / Cost +{ownCost.toFixed(1)}%
                  </span>
                </div>
                <input type="range" min={min} max={max} step={step} value={val}
                  onChange={e=>set(+e.target.value)}
                  style={{width:'100%',accentColor:color,height:3}}/>
              </div>
            )})}
          </div>

          {/* Resulting Growth Rates */}
          <div>
            <div style={{color:T.muted,fontSize:9,letterSpacing:1,marginBottom:8,fontFamily:"'JetBrains Mono',monospace"}}>RESULTING GROWTH RATES</div>
            {[
              {l:'Conservative', revG:cagrData.conG, costG:cagrData.conC, color:T.yellow},
              {l:'Base Case',    revG:cagrData.baseG,costG:cagrData.baseC,color:T.accent},
              {l:'Optimistic',   revG:cagrData.optG, costG:cagrData.optC, color:T.green},
            ].map(({l,revG,costG,color})=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:`1px solid ${T.border}`}}>
                <span style={{color,fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}>{l}</span>
                <span style={{color:T.sub,fontSize:9}}>Rev {revG>=0?'+':''}{revG.toFixed(1)}% / Cost {costG>=0?'+':''}{costG.toFixed(1)}%</span>
              </div>
            ))}
            <div style={{marginTop:8,color:T.muted,fontSize:8,lineHeight:1.6}}>
              Multiplier applied to Revenue CAGR · Result shown = scenario outcome after ranking<br/>
              Conservative = worst revenue · Optimistic = best revenue (by outcome, regardless of CAGR sign)<br/>
              Cost: Conservative = highest cost inflation · floor 2% min
            </div>
          </div>
        </div>
      </Card>
    )}

    {/* ── Saved banner ── */}
    {savedFcst&&(
      <div style={{background:`${'#C084FC'}10`,border:`1px solid ${'#C084FC'}30`,borderRadius:8,

    {/* ── Insight ── */}

      <div style={{color:T.sub,fontSize:12,lineHeight:1.8}}>

          const baseDiff=(summaries.base&&summaries.base.rev)>0?(s.rev-summaries.base.rev)/summaries.base.rev*100:0;

            `vs Budget: ${bDiff>=0?'above':'below'} by ${Math.abs(bDiff).toFixed(1)}%. `+

            <div style={{fontSize:10,color:T.accent,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{x.v}</div>
          </div>
        ))}
      </div>
    </Card>

    {/* ── Gap Table: Actual vs Budget / Actual vs Outlook / Budget vs Outlook ── */}
    {(()=>{
      const bud = summaries.budget||{rev:0,gop:0,nop:0,occ:0};
      const out = summaries.used||{rev:0,gop:0,nop:0,occ:0};
      // YTD actual
      const ytdRev  = actualKeys.reduce((s,k)=>s+pnl(TB[k]).rev,0);
      const ytdGOP  = actualKeys.reduce((s,k)=>s+pnl(TB[k]).gop,0);
      const ytdNOP  = actualKeys.reduce((s,k)=>s+pnl(TB[k]).nop,0);
      // YTD budget
      const ytdBudRev = actualKeys.reduce((s,k)=>{ const b=BUD26[k]; return s+(b?pnl(b).rev:0); },0);
      const ytdBudGOP = actualKeys.reduce((s,k)=>{ const b=BUD26[k]; return s+(b?pnl(b).gop:0); },0);
      const ytdBudNOP = actualKeys.reduce((s,k)=>{ const b=BUD26[k]; return s+(b?pnl(b).nop:0); },0);
      // Remaining
      const remRev  = out.rev  - ytdRev;
      const remGOP  = out.gop  - ytdGOP;
      const remNOP  = out.nop  - ytdNOP;
      const remBudRev = bud.rev - ytdBudRev;
      const remBudGOP = bud.gop - ytdBudGOP;
      const remBudNOP = bud.nop - ytdBudNOP;

      const fG = (a,b) => {
        if(!b) return null;
        const p = (a-b)/Math.abs(b)*100;
        return <span style={{color:p>=0?T.green:T.red,fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}>{p>=0?'▲':'▼'}{Math.abs(p).toFixed(1)}%</span>;

        </td>
      );
      const GapCell = ({a,b}) => <td style={{padding:'7px 10px',textAlign:'right'}}>{fG(a,b)}</td>;

      return (
        <Card style={{padding:0}}>
          <div style={{padding:'12px 16px 8px',borderBottom:`1px solid ${T.border}`}}>
            <span style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>
              GAP ANALYSIS — ACTUAL · BUDGET · OUTLOOK
            </span>
          </div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:10}}>
              <thead>
                <tr style={{background:T===DARK?'rgba(255,255,255,0.03)':T.border}}>
                  {['','YTD Actual','YTD Budget','Act vs Bud','Remaining (Out)','Remaining (Bud)','Full Year Out','Full Year Bud','Out vs Bud'].map((h,i)=>(
                    <th key={i} style={{padding:'7px 10px',textAlign:i===0?'left':'right',color:T.muted,fontSize:8,letterSpacing:1,fontFamily:"'JetBrains Mono',monospace"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {[
                  {l:'Revenue',color:T.accent,  ytdA:ytdRev,  ytdB:ytdBudRev, remA:remRev,  remB:remBudRev, fyA:out.rev, fyB:bud.rev},
                  {l:'GOP',    color:T.secondary,ytdA:ytdGOP,  ytdB:ytdBudGOP, remA:remGOP,  remB:remBudGOP, fyA:out.gop, fyB:bud.gop},
                  {l:'NOP',    color:(out.nop>=0?T.green:T.red),ytdA:ytdNOP,ytdB:ytdBudNOP,remA:remNOP,remB:remBudNOP,fyA:out.nop,fyB:bud.nop},
                ].map(({l,color,ytdA,ytdB,remA,remB,fyA,fyB})=>(
                  <tr key={l} style={{borderBottom:`1px solid ${T.border}`}}>
                    <td style={{padding:'7px 10px',color:T.sub,fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700}}>{l}</td>
                    <Cell v={ytdA} color={color}/>
                    <Cell v={ytdB}/>
                    <GapCell a={ytdA} b={ytdB}/>
                    <Cell v={remA} color={'#C084FC'}/>
                    <Cell v={remB}/>
                    <Cell v={fyA} color={'#C084FC'}/>
                    <Cell v={fyB}/>
                    <GapCell a={fyA} b={fyB}/>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{padding:'8px 16px',borderTop:`1px solid ${T.border}`,display:'flex',gap:16,flexWrap:'wrap'}}>
            <span style={{color:T.muted,fontSize:9}}>YTD = {latestMo} month{latestMo!==1?'s':''} actual (locked)</span>
            <span style={{color:'#C084FC',fontSize:9}}>Outlook = {usedName} (+{usedGrowth}% rev · +{usedCost}% cost)</span>
            <span style={{color:T.muted,fontSize:9}}>Remaining = Full Year target minus YTD actual</span>
          </div>
        </Card>
      );
    })()}
    </div>
  );
}


function AIPage({ tbVersion=0 }) {
  // ── Period state ──────────────────────────────────────────────
  const [lang] = React.useContext(LangContext); // i18n re-render trigger
  const [yr,      setYr]      = useState('2026');
  const [period,  setPeriod]  = useState(()=>getLatestPeriod('2026'));
  const [running, setRunning] = useState(false);
  const [generated, setGenerated] = useState(true);
  const [activeTab, setActiveTab] = useState('summary');
  const [aiLoading, setAiLoading] = useState(false);
  const [aiInsight, setAiInsight] = useState(null);
  const [showAITab, setShowAITab] = useState(false);

  // ── Executive Summary state (editable + saveable) ─────────────
  const [execText,     setExecText]     = useState('');
  const [execEdited,   setExecEdited]   = useState('');
  const [execSaved,    setExecSaved]    = useState({});   // {periodKey: text}
  const [execDirty,    setExecDirty]    = useState(false);
  const [execEditMode, setExecEditMode] = useState(false);

  // ── Period resolution ─────────────────────────────────────────
  const periodOpts = useMemo(() => getPeriodOpts(yr), [yr]);
  const handleYrChange = (v) => { setYr(v); setPeriod('full'); setGenerated(false); };

  const isAnn   = parseInt(yr) < 2024;
  const keys    = useMemo(() => getKeys(yr, period),    [yr, period]);
  const periodLabel = (periodOpts.find(o=>o.v===period)||{}).l || period;
  const periodKey   = `${yr}-${period}`;

  // ── Current P&L ───────────────────────────────────────────────
  const cur = useMemo(() => {
    if (isAnn) return annPnl(parseInt(yr));
    return keys && keys.length > 0 ? aggKeys(keys) : null;
  }, [yr, keys, isAnn]);

  // ── Balance Sheet ─────────────────────────────────────────────
  const bsKey = useMemo(() => snapKey(yr, period),     [yr, period]);
  const bsPrvKey = useMemo(() => prevSnapKey(yr, period), [yr, period]);
  const bs    = useMemo(() => {
    const ML2b=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const latest26 = ML2b.map(m=>m+'26').filter(k=>BS_SNAPSHOTS[k]).pop() || 'feb26';
    const fbk = BS_SNAPSHOTS[bsKey] ? bsKey : (yr==='2026' ? latest26 : snapKey(String(parseInt(yr)-1),'full'));
    return bsCalc(BS_SNAPSHOTS[fbk] || BS_SNAPSHOTS['dec25']);
  }, [bsKey, tbVersion]);
  const bsPrv = useMemo(() => bsCalc(BS_SNAPSHOTS[bsPrvKey] || BS_SNAPSHOTS['dec25']), [bsPrvKey]);

  // ── Budget ────────────────────────────────────────────────────
  const bud = useMemo(() => {
    if (yr === '2026' && !isAnn && keys && keys.length) return aggKeys(keys, BUD26);
    return null;
  }, [yr, isAnn, keys]);

  // ── Prior year same period ────────────────────────────────────
  const prior = useMemo(() => {
    if (isAnn) return annPnl(parseInt(yr) - 1);
    const py = String(parseInt(yr) - 1);
    const pKeys = getKeys(py, period);
    if (pKeys && pKeys.length) return aggKeys(pKeys);
    if (parseInt(py) >= 2013) return annPnl(parseInt(py));
    return null;
  }, [yr, period, isAnn]);

  // ── Cash Flow (derived inline, read-only) ────────────────────
  const cf = useMemo(() => {
    if (!cur || !bs || !bsPrv) return null;
    const dAR  = (bs.arTrade||bs.ar||0) - (bsPrv.arTrade||bsPrv.ar||0)
               + (bs.arOther||0) - (bsPrv.arOther||0);
    const dInv = (bs.inv||0)  - (bsPrv.inv||0);
    const dPre = (bs.prepaid||0) - (bsPrv.prepaid||0)
               + (bs.deferTax||0) - (bsPrv.deferTax||0)
               + (bs.advPmt||0)   - (bsPrv.advPmt||0);
    const dAP  = (bs.apTrade||bs.ap||0) - (bsPrv.apTrade||bsPrv.ap||0);
    const dAcc = (bs.accExp||0)  - (bsPrv.accExp||0)
               + (bs.taxPay||0)  - (bsPrv.taxPay||0)
               + (bs.advDep||0)  - (bsPrv.advDep||0)
               + (bs.provision||0) - (bsPrv.provision||0);
    const wcNet = -dAR - dInv - dPre + dAP + dAcc;
    const ops   = (cur.nop || 0) + (cur.deprTotal || 0) + wcNet;
    const capex = -(bs.fixG - bsPrv.fixG);
    const fin   = -((bs.ltD || 0) - (bsPrv.ltD || 0));
    const net   = ops + capex + fin;
    return { ops, capex, fin, net, wcNet, cashEnd: bs.cash, cashStart: bsPrv.cash };
  }, [cur, bs, bsPrv]);

  // ── Macro signals ─────────────────────────────────────────────
  // ── Macro signals ─────────────────────────────────────────────
  const macro = useMemo(() => {
    const src = (typeof window !== 'undefined' && window.__GDS_MACRO_SIGNALS) || null;
    const m = src&&src.monetary||[]; const t = src&&src.tourism||[]; const e = src&&src.economic||[]; const h = src&&src.hospitality||[];
    return {
      biRate:    (m[0]&&m[0].num)||5.75,
      inflation: (m[1]&&m[1].num)||1.65,
      usdIdr:    (m[2]&&m[2].num)||16947,
      intlArr:   (t[0]&&t[0].num)||18.2,
      gdp:       (e[0]&&e[0].num)||5.11,
      revpar:    (h[1]&&h[1].num)||9.1,
      sentiment: (typeof window !== 'undefined' && window.__GDS_MACRO_SENTIMENT)||'Neutral',
      biDisp:    (m[0]&&m[0].display)||'5.75%',
      cpiDisp:   (m[1]&&m[1].display)||'1.65%',
      idrDisp:   (m[2]&&m[2].display)||'16,947',
    };
  }, [generated]); // refreshes on Run Analysis

  // ── KPI Health from KPI module ────────────────────────────────
  const kpiHealth = useMemo(() => {
    return {
      score:     (typeof window !== 'undefined' && window.__GDS_KPI_SCORE)  || null,
      health:    (typeof window !== 'undefined' && window.__GDS_KPI_HEALTH) || null,
    };
  }, [generated]);

  // ────────────────────────────────────────────────────────────────
  // COMPUTED RATIOS
  // ────────────────────────────────────────────────────────────────
  const ratios = useMemo(() => {
    if (!cur) return {};
    const cr    = bs.tCA / Math.max(bs.tCL, 0.001);
    const de    = bs.tL  / Math.max(bs.tEq, 0.001);
    const roa   = cur.nop / Math.max(bs.tA, 0.001) * 100;
    const ic    = cur.gop / Math.max(Math.abs(cur.interest || 0.001), 0.001);
    const revVsBud   = bud  ? (cur.rev - bud.rev)   / Math.max(bud.rev,   0.001) * 100 : null;
    const revVsPrior = prior ? (cur.rev - prior.rev) / Math.max(prior.rev, 0.001) * 100 : null;
    const gopDelta   = prior ? cur.gopMgn - (prior.gopMgn || 0) : null;
    const nopDelta   = prior ? cur.nopMgn - (prior.nopMgn || 0) : null;
    return { cr, de, roa, ic, revVsBud, revVsPrior, gopDelta, nopDelta };
  }, [cur, bs, bud, prior]);

  // ────────────────────────────────────────────────────────────────
  // EXECUTIVE SUMMARY GENERATOR
  // ────────────────────────────────────────────────────────────────
  const buildExecSummary = useCallback(() => {
    if (!cur) return '';
    const { cr, de, roa, revVsBud, revVsPrior, gopDelta } = ratios;
    const revDir = revVsPrior != null ? (revVsPrior >= 0 ? `grew ${revVsPrior.toFixed(1)}%` : `declined ${Math.abs(revVsPrior).toFixed(1)}%`) : 'was recorded';
    const gopCond = cur.gopMgn >= 35 ? 'strong' : cur.gopMgn >= 28 ? 'moderate' : 'pressured';
    const nopCond = cur.nop >= 0 ? `positive at ${fM(cur.nop)}` : `a loss of ${fM(Math.abs(cur.nop))}`;
    const liqCond = cr >= 1.5 ? 'healthy' : cr >= 1.0 ? 'adequate' : 'tight';
    const budPhrase = revVsBud != null
      ? `Revenue ${revVsBud >= 0 ? 'exceeded' : 'missed'} budget by ${Math.abs(revVsBud).toFixed(1)}%, `
      : '';
    const macroPhrase = macro.usdIdr > 16200
      ? 'IDR depreciation pressure and rising energy costs warrant cost monitoring. '
      : 'External macro conditions remain broadly stable. ';
    const trendPhrase = gopDelta != null
      ? `GOP margin ${gopDelta >= 0 ? 'improved' : 'declined'} ${Math.abs(gopDelta).toFixed(1)}pp versus prior period. `
      : '';

    return (
      `Grand Darmo Suite by Amithya recorded total revenue of ${fM(cur.rev)} for ${periodLabel}, ` +
      `of which rooms contributed ${fM(cur.rooms)} (${cur.roomsMix.toFixed(0)}% mix) ` +
      `and F&B contributed ${fM(cur.fnb)} (${cur.fnbMix.toFixed(0)}% mix). ` +
      `Revenue ${revDir} versus the prior comparable period. ` +
      `${budPhrase}` +
      `Gross Operating Profit stood at ${fM(cur.gop)} — a ${gopCond} ${cur.gopMgn.toFixed(1)}% margin. ` +
      `${trendPhrase}` +
      `Net Operating Profit was ${nopCond} (${cur.nopMgn.toFixed(1)}% margin). ` +
      `Payroll ratio of ${cur.payRat.toFixed(1)}% was ${cur.payRat <= 35 ? 'within' : 'above'} the 35% benchmark. ` +
      `Balance Sheet reflects total assets of ${fM(bs.tA)}, with ${liqCond} liquidity (current ratio ${cr.toFixed(2)}x) ` +
      `and D/E ratio of ${de.toFixed(2)}x. ` +
      `ROA of ${roa.toFixed(1)}% indicates ${roa > 5 ? 'adequate' : 'pressured'} asset utilisation. ` +
      `${macroPhrase}` +
      `International tourism growth of ${macro.intlArr}% and BI rate held at ${macro.biRate}% provide a supportive demand environment for the hospitality sector.`
    );
  }, [cur, bs, bud, prior, ratios, macro, periodLabel]);

  // ── Auto-generate summary on period change ────────────────────
  useEffect(() => {
    if (!cur) return;
    const text = buildExecSummary();
    setExecText(text);
    if (execSaved[periodKey]) {
      setExecEdited(execSaved[periodKey]);
    } else {
      setExecEdited(text);
    }
    setExecDirty(false);
    setExecEditMode(false);
  }, [periodKey, generated]);

  // Expose to Reports module via window store
  useEffect(() => {
    const final = execSaved[periodKey] || execText;
    if (typeof window !== 'undefined') {
      window.__GDS_AI_SUMMARY = window.__GDS_AI_SUMMARY || {};
      window.__GDS_AI_SUMMARY[periodKey] = final;
    }
  }, [execSaved, execText, periodKey]);

  // ── AI-powered deep insight via Pollinations ────────────────
  const fetchAIInsight = async () => {
    if (!cur) return;
    const isLocal = ['file:','content:','about:','null'].includes(window.location.protocol)||!window.location.hostname;
    setAiLoading(true);

Berikan analisis dalam format JSON (tanpa markdown, tanpa backtick):

      if (isLocal) {

          ['⚠️','Warnings', counts.warning,  T.yellow],
          ['💡','Insights', counts.info,     T.accent],
          ['✅','Positive', counts.success,  T.green],

          <div key={l} style={{background:`${c}10`,border:`1px solid ${c}30`,borderRadius:8,padding:'10px 14px',display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:20}}>{icon}</span>
            <div>
              <div style={{color:T.muted,fontSize:9,textTransform:'uppercase',letterSpacing:1}}>{l}</div>

          </div>

      <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>

        {TAB('insights', '💡 Key Insights')}
        {TAB('risks',    '⚠️ Risk Detection')}
        {TAB('recs',     '🎯 Recommendations')}

        <div style={{padding:40,textAlign:'center',color:T.muted,background:T.card,borderRadius:12,border:`1px solid ${T.border}`}}>

        </div>

        <div style={{padding:40,textAlign:'center',color:T.muted,background:T.card,borderRadius:12,border:`1px solid ${T.border}`}}>
          <div style={{fontSize:32,marginBottom:12}}>⚙️</div>
          <div style={{color:T.accent,fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Analyzing financial data…</div>
        </div>
      ) : (
        <>
          {/* ══ TAB: EXECUTIVE SUMMARY ══ */}
          {activeTab==='summary' && (
            <div>
              <Card>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div>
                    <div style={{color:T.text,fontSize:13,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>EXECUTIVE FINANCIAL SUMMARY</div>
                    <div style={{color:T.muted,fontSize:10,marginTop:2}}>{periodLabel} · Auto-generated · Editable</div>
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    {execEditMode ? (
                      <>
                        <button onClick={handleSaveExec}
                          style={{padding:'5px 12px',borderRadius:5,border:'none',background:T.green,color:'#fff',
                            fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",cursor:'pointer'}}>
                          💾 Save
                        </button>
                        <button onClick={handleResetExec}
                          style={{padding:'5px 12px',borderRadius:5,border:`1px solid ${T.border}`,background:'none',

                          ↺ Reset
                        </button>
                      </>
                    ) : (
                      <button onClick={()=>setExecEditMode(true)}
                        style={{padding:'5px 12px',borderRadius:5,border:`1px solid ${T.border}`,background:'none',
                          color:T.sub,fontSize:10,fontFamily:"'JetBrains Mono',monospace",cursor:'pointer'}}>
                        ✏️ Edit
                      </button>
                    )}
                    {execSaved[periodKey] && (
                      <span style={{fontSize:9,color:T.green,fontFamily:"'JetBrains Mono',monospace",padding:'5px 8px',
                        background:`${T.green}15`,borderRadius:5,border:`1px solid ${T.green}30`}}>✓ Saved</span>
                    )}
                  </div>
                </div>

                {execEditMode ? (
                  <textarea
                    value={execEdited}
                    onChange={e=>{setExecEdited(e.target.value);setExecDirty(true);}}

                      fontFamily:'inherit',outline:'none',resize:'vertical'}}
                  />
                ) : (
                  <div style={{color:T.sub,fontSize:12,lineHeight:1.9,padding:'4px 0',

                    {execEdited || execText}

                )}

                <div style={{marginTop:12,display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}} className="r-grid-5">
