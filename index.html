    {id:'pl',    name:'Profit & Loss',    icon:'≋', desc:'Full income statement with margins & budget'},
    {id:'bs',    name:'Balance Sheet',    icon:'◫', desc:'Statement of financial position'},
    {id:'cf',    name:'Cash Flow',        icon:'⟲', desc:'Indirect method cash flow statement'},
    {id:'kpi',   name:'KPI Summary',      icon:'◈', desc:'All financial ratios & scorecard'},
    {id:'budget',name:'Budget vs Actual', icon:'⊞', desc:'2026 variance analysis'},
    {id:'board', name:'Board Pack',       icon:'⊟', desc:'Complete executive board report'},
  ];

  // ── Period options ──────────────────────────────────────────────
  const subPeriodOpts = useMemo(() => {
    const yr = selPeriod;
    if (parseInt(yr) < 2024) return [{v:'full', l:`Full Year ${yr}`}];
    if (yr === '2026') return [
      {v:'ytd',  l:'YTD Jan–Feb 2026 (Latest)'},
      {v:'m1',   l:'January 2026'},
      {v:'m2',   l:'February 2026'},
    ];
    // 2024 or 2025
    const months = ML.map((m,i)=>{
      const k = `${yr}-${String(i+1).padStart(2,'0')}`;
      return TB[k] ? {v:`m${i+1}`, l:`${m} ${yr}`} : null;
    }).filter(Boolean);
    return [
      {v:'full', l:`Full Year ${yr}`},
      {v:'q1',   l:`Q1 ${yr} (Jan–Mar)`},
      {v:'q2',   l:`Q2 ${yr} (Apr–Jun)`},
      {v:'q3',   l:`Q3 ${yr} (Jul–Sep)`},
      {v:'q4',   l:`Q4 ${yr} (Oct–Dec)`},
      ...months,
    ];
  }, [selPeriod]);

  const handleYrChange = (v) => {
    setSelPeriod(v);
    setSelSubPeriod(v === '2026' ? 'ytd' : 'full');
    setSummaryDirty(false);
  };

  // ── Period key for saving summaries ────────────────────────────
  const periodKey = `${selPeriod}_${selSubPeriod}`;

  // ── Auto-generate summary when period changes ───────────────────
  useEffect(() => {
    const yr = selPeriod;
    const sp = selSubPeriod;
    const isAnn = parseInt(yr) < 2024;
    let keys;
    if (isAnn) keys = null;
    else if (yr === '2026') keys = sp==='m1'?['2026-01']:sp==='m2'?['2026-02']:['2026-01','2026-02'];
    else if (sp==='full') keys = yr==='2025'?mKeys25:mKeys24;
    else if (sp.startsWith('q')) {
      const qn = parseInt(sp.slice(1)); const base=(qn-1)*3;
      keys = [1,2,3].map(i=>`${yr}-${String(base+i).padStart(2,'0')}`).filter(k=>TB[k]);
    } else {
      const mn = sp.slice(1).padStart(2,'0');
      keys = [`${yr}-${mn}`];
    }
    const d   = isAnn ? annPnl(parseInt(yr)) : (keys&&keys.length ? aggKeys(keys) : annPnl(parseInt(yr)));
    const bsK = yr==='2026'?(sp==='m1'?'jan26':'feb26'):`dec${yr.slice(2)}`;
    const bs  = bsCalc(BS_SNAPSHOTS[bsK]||BS_SNAPSHOTS['feb26']);
    const bud = (yr==='2026'&&keys) ? aggKeys(keys,BUD26) : null;
    const cr  = bs.tCA / Math.max(bs.tCL,0.001);
    const de  = bs.tL  / Math.max(bs.tEq,0.001);
    const roa = d.nop  / Math.max(bs.tA,0.001)*100;
    const budVarPct = bud ? ((d.rev-bud.rev)/Math.max(bud.rev,0.001)*100) : null;

    const getPerLabel = () => {
      if (yr==='2026') return sp==='m1'?'Jan 2026':sp==='m2'?'Feb 2026':'YTD Jan–Feb 2026';
      if (sp==='full') return `Full Year ${yr}`;
      if (sp.startsWith('q')) return `Q${sp.slice(1)} ${yr}`;
      const mn = parseInt(sp.slice(1))-1;
      return `${ML[mn]} ${yr}`;
    };
    const pl = getPerLabel();
    const fM2 = (v) => {
      if(!v && v!==0) return '—';
      const a=Math.abs(v)*1000;
      const s=a>=1?a.toFixed(1)+'M':(a*1000).toFixed(0)+'K';
      return v<0?`(${s})`:s;
    };
    const fP2 = (v) => (!v&&v!==0)?'—':v.toFixed(1)+'%';

    const auto = `Grand Darmo Suite by Amithya recorded total revenue of ${fM2(d.rev)} for ${pl}, ` +
      `with GOP/EBITDA of ${fM2(d.gop)} (${fP2(d.gopMgn)} margin) and Net Operating Profit of ${fM2(d.nop)} (${fP2(d.nopMgn)} margin). ` +
      (budVarPct!==null ? `Revenue ${budVarPct>=0?'exceeded':'missed'} budget by ${Math.abs(budVarPct).toFixed(1)}%. ` : '') +
      `Payroll ratio stood at ${fP2(d.payRat)}, ${d.payRat<35?'within':'above'} the 35% benchmark. ` +
      `Total assets: ${fM2(bs.tA)}, equity: ${fM2(bs.tEq)}, current ratio ${cr.toFixed(2)}x, D/E ${de.toFixed(2)}x. ` +
      `ROA at ${fP2(roa)} indicates ${roa>5?'adequate':'pressured'} asset utilisation. ` +
      `External macro remains ${de<1&&cr>1.2?'broadly supportive':'cautious'} — BI rate 5.75%, IDR showing mild depreciation pressure against USD.`;

    setSummaryText(auto);
    // Load saved summary if exists, else use auto
    if (savedSummaries[periodKey]) {
      setEditedSummary(savedSummaries[periodKey]);
    } else {
      setEditedSummary(auto);
    }
    setSummaryDirty(false);
  }, [selPeriod, selSubPeriod]);

  const handleSaveSummary = () => {
    setSavedSummaries(prev => ({...prev, [periodKey]: editedSummary}));
    setSummaryDirty(false);
  };

  const handleResetSummary = () => {
    setEditedSummary(summaryText);
    setSummaryDirty(false);
  };

  const finalSummary = savedSummaries[periodKey] || summaryText;

  const handleExport = () => {
    var html = generateReportHTML(selPeriod, selSubPeriod, selReport, theme, finalSummary);
    var w = window.open('','_blank','width=1100,height=900');
    if (w) { w.document.write(html); w.document.close(); }
    else alert('Pop-up diblokir. Mohon izinkan pop-up untuk site ini.');
  };

  const wordCount = editedSummary.split(/\s+/).filter(Boolean).length;
  const isSaved   = savedSummaries[periodKey] === editedSummary;

  return (
    <div>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>REPORT GENERATOR</div>
          <div style={{color:T.muted,fontSize:11}}>Professional board reports · Print / PDF export · Executive-ready</div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'5fr 3fr',gap:16}}>
        {/* LEFT COLUMN */}
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {/* Report type cards */}
          <div>
            <div style={{color:T.muted,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",marginBottom:8,textTransform:'uppercase'}}>Report Type</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              {reports.map(r=>(
                <div key={r.id}
                  onClick={()=>setSelReport(r.id)}
                  style={{background:selReport===r.id?`${T.accent}12`:T.card,
                    border:`${selReport===r.id?2:1}px solid ${selReport===r.id?T.accent:T.border}`,
                    borderRadius:10,padding:'14px 16px',cursor:'pointer',transition:'all 0.15s',userSelect:'none'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <span style={{color:selReport===r.id?T.accent:T.muted,fontSize:18}}>{r.icon}</span>
                    <span style={{color:selReport===r.id?T.text:T.sub,fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{r.name}</span>
                  </div>
                  <div style={{color:T.muted,fontSize:10,lineHeight:1.4}}>{r.desc}</div>
                  {selReport===r.id && (
                    <div style={{marginTop:8,display:'inline-block',padding:'2px 8px',borderRadius:4,
                      background:`${T.accent}20`,color:T.accent,fontSize:9,fontFamily:"'IBM Plex Mono'",fontWeight:700,letterSpacing:1}}>
                      ● SELECTED
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>

          {/* Executive Summary editor */}
          <Card style={{padding:'18px 20px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{color:T.muted,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",textTransform:'uppercase',display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:14,height:2,background:T.accent}}/>
                Executive Summary
              </div>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                {summaryDirty && (
                  <button onClick={handleResetSummary}
                    style={{padding:'4px 10px',borderRadius:5,border:`1px solid ${T.border}`,background:'transparent',
                      color:T.muted,cursor:'pointer',fontSize:10,fontFamily:"'IBM Plex Mono'"}}>
                    ↺ Reset
                  </button>
                )}
                <button onClick={handleSaveSummary}
                  style={{padding:'5px 12px',borderRadius:5,border:'none',
                    background:isSaved?`${T.green}20`:T.accent,
                    color:isSaved?T.green:'#080C12',
                    cursor:'pointer',fontSize:10,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>
                  {isSaved ? '✓ Saved' : '💾 Save Summary'}
                </button>
              </div>
            </div>
            <div style={{marginBottom:8,padding:'8px 12px',background:`${T.accent}08`,borderRadius:6,
              border:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{color:T.muted,fontSize:10}}>
                {isSaved ? `✓ Saved for ${selPeriod} ${selSubPeriod}` : savedSummaries[periodKey] ? '⚠ Unsaved changes' : 'Auto-generated · Edit freely'}
              </span>
              <span style={{color:wordCount>150?T.red:wordCount>120?T.yellow:T.green,fontSize:10,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>
                {wordCount} words
              </span>
            </div>
            <textarea
              value={editedSummary}
              onChange={e=>{setEditedSummary(e.target.value);setSummaryDirty(e.target.value!==summaryText);}}
              style={{width:'100%',minHeight:140,background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,
                padding:'12px 14px',color:T.text,fontSize:12,fontFamily:"'IBM Plex Sans', sans-serif",
                lineHeight:1.8,resize:'vertical',outline:'none',boxSizing:'border-box'}}
              placeholder="Executive summary will be auto-generated when you select a period…"
            />
            <div style={{marginTop:6,color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'"}}>
              Saved summary will be used in the Board Pack report. Recommended: 120–150 words.
            </div>
          </Card>
        </div>

        {/* RIGHT COLUMN — Settings & Export */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Card>
            <div style={{color:T.muted,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",marginBottom:14,display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:14,height:2,background:T.accent}}/>
              EXPORT SETTINGS
            </div>

            {/* Report type dropdown (synced) */}
            <div style={{marginBottom:12}}>
              <label style={{color:T.muted,fontSize:9,letterSpacing:2,display:'block',marginBottom:6,fontFamily:"'IBM Plex Mono'"}}>REPORT TYPE</label>
              <select value={selReport} onChange={e=>setSelReport(e.target.value)}
                style={{width:'100%',background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,
                  padding:'8px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
                {reports.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
              </select>
            </div>

            {/* Year selector */}
            <div style={{marginBottom:10}}>
              <label style={{color:T.muted,fontSize:9,letterSpacing:2,display:'block',marginBottom:6,fontFamily:"'IBM Plex Mono'"}}>YEAR</label>
              <select value={selPeriod} onChange={e=>handleYrChange(e.target.value)}
                style={{width:'100%',background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,
                  padding:'8px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
                {['2026','2025','2024','2023','2022','2021','2020','2019','2018','2017','2016','2015','2014','2013'].map(y=>(
                  <option key={y} value={y}>{y}</option>
                ))}
              </select>
            </div>

            {/* Sub-period selector */}
            <div style={{marginBottom:12}}>
              <label style={{color:T.muted,fontSize:9,letterSpacing:2,display:'block',marginBottom:6,fontFamily:"'IBM Plex Mono'"}}>PERIOD</label>
              <select value={selSubPeriod} onChange={e=>setSelSubPeriod(e.target.value)}
                style={{width:'100%',background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,
                  padding:'8px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
                {subPeriodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
              </select>
            </div>

            {/* Theme */}
            <div style={{marginBottom:16}}>
              <label style={{color:T.muted,fontSize:9,letterSpacing:2,display:'block',marginBottom:6,fontFamily:"'IBM Plex Mono'"}}>REPORT THEME</label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                {[['dark','◑ Dark'],['light','☀ Light']].map(([v,l])=>(
                  <button key={v} onClick={()=>setTheme(v)}
                    style={{padding:'8px',background:theme===v?T.accent:'transparent',
                      border:`1px solid ${theme===v?T.accent:T.border}`,borderRadius:6,
                      color:theme===v?'#080C12':T.sub,cursor:'pointer',fontSize:10,
                      fontFamily:"'IBM Plex Mono'",fontWeight:700}}>
                    {l}
                  </button>
                ))}
              </div>
            </div>

            {/* Export button */}
            <button onClick={handleExport}
              style={{width:'100%',background:'linear-gradient(135deg,#00D4FF,#00897B)',
                border:'none',borderRadius:8,padding:'14px',color:'#080C12',
                fontSize:13,fontWeight:800,cursor:'pointer',letterSpacing:1,
                fontFamily:"'IBM Plex Mono'",boxShadow:'0 4px 12px rgba(0,212,255,0.3)'}}>
              ⊟ GENERATE &amp; PRINT
            </button>
            <div style={{marginTop:8,color:T.muted,fontSize:9,textAlign:'center',fontFamily:"'IBM Plex Mono'",lineHeight:1.7}}>
              Opens in new tab · Use browser print dialog<br/>
              Save as PDF via print → Save as PDF
            </div>
          </Card>

          {/* Summary saved status */}
          <Card style={{padding:'14px 16px'}}>
            <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'IBM Plex Mono'",marginBottom:10}}>SAVED SUMMARIES</div>
            {Object.keys(savedSummaries).length === 0 ? (
              <div style={{color:T.muted,fontSize:11,textAlign:'center',padding:'12px 0'}}>No saved summaries yet</div>
            ) : (
              Object.entries(savedSummaries).map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                  padding:'6px 0',borderBottom:`1px solid ${T.border}`,cursor:'pointer'}}
                  onClick={()=>{
                    const [y,sp]=k.split('_');
                    setSelPeriod(y);
                    setSelSubPeriod(sp);
                  }}>
                  <span style={{color:T.sub,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>{k}</span>
                  <span style={{color:T.green,fontSize:9}}>✓ saved</span>
                </div>
              ))
            )}
          </Card>
        </div>
      </div>
    </div>
  );
}

// ROLE & AUTH CONSTANTS

const ROLE_PAGES = {
  MASTER: ['dashboard','pl','bs','cf','budget','kpi','forecast','ai','macro','reports','users'],
  OWNER:  ['dashboard','pl','bs','cf','forecast','ai','macro','reports'],
  GM:     ['dashboard','budget','kpi','macro'],
  HOD:    ['dashboard','kpi'],
};

const LS_KEY = 'gds_users_v1';

function loadUsers() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  // Default users — first load
  return [
    { id:'u1', username:'sanda',   password:'accurate26',       role:'MASTER', name:'System Administrator', active:true, createdAt:'2026-01-01' },
    { id:'u2', username:'owning',  password:'gdsowning26',      role:'OWNER',  name:'Property Owner',       active:true, createdAt:'2026-01-01' },
    { id:'u3', username:'gm',      password:'gdsgm26',          role:'GM',     name:'General Manager',      active:true, createdAt:'2026-01-01' },
    { id:'u4', username:'hod',     password:'oneteamonespirit', role:'HOD',    name:'Head of Department',   active:true, createdAt:'2026-01-01' },
  ];
}

function saveUsers(users) {
  localStorage.setItem(LS_KEY, JSON.stringify(users));
}

function UserManagementPage({ currentUser }) {
  const [users, setUsers]         = useState(loadUsers);
  const [modal, setModal]         = useState(null); // 'add' | 'edit' | 'password' | 'delete'
  const [selected, setSelected]   = useState(null);
  const [toast, setToast]         = useState(null);
  const [form, setForm]           = useState({});
  const [showPw, setShowPw]       = useState(false);

  const ROLES = ['MASTER','OWNER','GM','HOD'];
  const ROLE_COLORS = { MASTER:'#00D4FF', OWNER:'#D4A847', GM:'#00897B', HOD:'#8B5CF6' };

  function showToast(msg, type='success') {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }

  function persist(updated) {
    setUsers(updated);
    saveUsers(updated);
  }

  function openAdd() {
    setForm({ username:'', password:'', name:'', role:'GM', active:true });
    setModal('add');
    setShowPw(false);
  }

  function openEdit(u) {
    setSelected(u);
    setForm({ username:u.username, name:u.name, role:u.role, active:u.active });
    setModal('edit');
  }

  function openPassword(u) {
    setSelected(u);
    setForm({ password:'' });
    setModal('password');
    setShowPw(false);
  }

  function openDelete(u) {
    setSelected(u);
    setModal('delete');
  }

  function handleAdd() {
    if (!form.username.trim() || !form.password.trim() || !form.name.trim()) {
      showToast('Semua field wajib diisi.', 'error'); return;
    }
    if (users.find(u => u.username === form.username.trim())) {
      showToast('Username sudah dipakai.', 'error'); return;
    }
    if (form.password.length < 6) {
      showToast('Password minimal 6 karakter.', 'error'); return;
    }
    const newUser = {
      id: 'u' + Date.now(),
      username:  form.username.trim().toLowerCase(),
      password:  form.password,
      name:      form.name.trim(),
      role:      form.role,
      active:    true,
      createdAt: new Date().toISOString().slice(0,10),
    };
    persist([...users, newUser]);
    setModal(null);
    showToast(`User "${newUser.username}" berhasil ditambahkan.`);
  }

  function handleEdit() {
    if (!form.name.trim()) { showToast('Nama tidak boleh kosong.', 'error'); return; }
    if (selected.username === currentUser.username && form.role !== 'MASTER') {
      showToast('Tidak bisa mengubah role akun sendiri.', 'error'); return;
    }
    const updated = users.map(u => u.id === selected.id
      ? { ...u, name:form.name.trim(), role:form.role, active:form.active }
      : u
    );
    persist(updated);
    setModal(null);
    showToast('User berhasil diupdate.');
  }

  function handlePassword() {
    if (form.password.length < 6) {
      showToast('Password minimal 6 karakter.', 'error'); return;
    }
    const updated = users.map(u => u.id === selected.id ? { ...u, password:form.password } : u);
    persist(updated);
    setModal(null);
    showToast(`Password "${selected.username}" berhasil diganti.`);
  }

  function handleDelete() {
    if (selected.username === currentUser.username) {
      showToast('Tidak bisa menghapus akun sendiri.', 'error'); setModal(null); return;
    }
    persist(users.filter(u => u.id !== selected.id));
    setModal(null);
    showToast(`User "${selected.username}" dihapus.`);
  }

  function toggleActive(u) {
    if (u.username === currentUser.username) { showToast('Tidak bisa menonaktifkan akun sendiri.', 'error'); return; }
    const updated = users.map(x => x.id === u.id ? { ...x, active: !x.active } : x);
    persist(updated);
    showToast(`${u.username} ${!u.active ? 'diaktifkan' : 'dinonaktifkan'}.`);
  }

  const inp = {
    background: T.bg, border:`1px solid ${T.border}`, borderRadius:6,
    color: T.text, padding:'9px 12px', fontSize:12, width:'100%',
    fontFamily:"'IBM Plex Mono',monospace", outline:'none',
  };
  const btn = (color, bg) => ({
    background: bg||'transparent', border:`1px solid ${color}`, borderRadius:6,
    color, padding:'7px 14px', fontSize:11, cursor:'pointer',
    fontFamily:"'IBM Plex Mono',monospace", fontWeight:600,
  });

  return (
    <div>
      {/* Toast */}
      {toast && (
        <div style={{ position:'fixed', top:20, right:24, zIndex:9999, background: toast.type==='error'?T.red:T.green, color:'#fff', padding:'10px 20px', borderRadius:8, fontSize:12, fontFamily:"'IBM Plex Mono',monospace", boxShadow:'0 4px 20px rgba(0,0,0,0.4)' }}>
          {toast.type==='error' ? '✕ ' : '✓ '}{toast.msg}
        </div>
      )}

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
        <div>
          <div style={{ color:T.text, fontSize:18, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace" }}>User Management</div>
          <div style={{ color:T.muted, fontSize:11, marginTop:4 }}>{users.length} user terdaftar · Disimpan di browser</div>
        </div>
        <button onClick={openAdd} style={{ ...btn(T.accent), background:`${T.accent}22`, padding:'9px 20px', fontSize:12 }}>
          + Tambah User
        </button>
      </div>

      {/* Role Legend */}
      <div style={{ display:'flex', gap:8, marginBottom:20, flexWrap:'wrap' }}>
        {ROLES.map(r => (
          <div key={r} style={{ display:'flex', alignItems:'center', gap:6, background:T.card, border:`1px solid ${T.border}`, borderRadius:6, padding:'5px 12px' }}>
            <div style={{ width:8, height:8, borderRadius:'50%', background:ROLE_COLORS[r] }}/>
            <span style={{ color:T.sub, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>{r}</span>
            <span style={{ color:T.muted, fontSize:9 }}>— {ROLE_PAGES[r].length} modul</span>
          </div>
        ))}
      </div>

      {/* User Table */}
      <Card style={{ padding:0, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ borderBottom:`1px solid ${T.border}` }}>
              {['USERNAME','NAMA','ROLE','STATUS','DIBUAT','AKSI'].map(h => (
                <th key={h} style={{ padding:'12px 16px', textAlign:'left', color:T.muted, fontSize:9, letterSpacing:2, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {users.map((u, i) => (
              <tr key={u.id} style={{ borderBottom: i<users.length-1?`1px solid ${T.border}`:'none', background: u.username===currentUser.username?`${T.accent}08`:'transparent' }}>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <div style={{ width:28, height:28, borderRadius:6, background:`${ROLE_COLORS[u.role]}22`, border:`1px solid ${ROLE_COLORS[u.role]}44`, display:'flex', alignItems:'center', justifyContent:'center', color:ROLE_COLORS[u.role], fontSize:11, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace" }}>
                      {u.username[0].toUpperCase()}
                    </div>
                    <span style={{ color:T.text, fontSize:12, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>
                      {u.username}
                      {u.username===currentUser.username && <span style={{ color:T.accent, fontSize:9, marginLeft:6 }}>▶ ANDA</span>}
                    </span>
                  </div>
                </td>
                <td style={{ padding:'13px 16px', color:T.sub, fontSize:12, fontFamily:"'IBM Plex Sans',sans-serif" }}>{u.name}</td>
                <td style={{ padding:'13px 16px' }}>
                  <Chip color={ROLE_COLORS[u.role]}>{u.role}</Chip>
                </td>
                <td style={{ padding:'13px 16px' }}>
                  <div onClick={() => toggleActive(u)} style={{ cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5, background: u.active?`${T.green}22`:`${T.red}22`, border:`1px solid ${u.active?T.green:T.red}44`, borderRadius:20, padding:'3px 10px' }}>
                    <div style={{ width:6, height:6, borderRadius:'50%', background: u.active?T.green:T.red }}/>
                    <span style={{ color: u.active?T.green:T.red, fontSize:9, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>{u.active?'AKTIF':'NONAKTIF'}</span>
                  </div>
                </td>
                <td style={{ padding:'13px 16px', color:T.muted, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>{u.createdAt}</td>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', gap:6 }}>
                    <button onClick={() => openEdit(u)} style={{ ...btn(T.accent), padding:'4px 10px', fontSize:10 }} title="Edit profil">✎ Edit</button>
                    <button onClick={() => openPassword(u)} style={{ ...btn(T.yellow), padding:'4px 10px', fontSize:10 }} title="Ganti password">🔑 PW</button>
                    {u.username !== currentUser.username && (
                      <button onClick={() => openDelete(u)} style={{ ...btn(T.red), padding:'4px 10px', fontSize:10 }} title="Hapus user">✕</button>
                    )}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>

      <div style={{ marginTop:12, color:T.muted, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>
        ⓘ Data user tersimpan di localStorage browser ini. Bersih saat clear browser data.
      </div>

      {/* ── MODAL ───────────────────────────────── */}
      {modal && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000 }}>
          <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:12, padding:28, width:420, maxWidth:'90vw' }}>

            {/* ADD USER */}
            {modal === 'add' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:20 }}>+ Tambah User Baru</div>
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>USERNAME</div>
                  <input style={inp} value={form.username} onChange={e=>setForm({...form,username:e.target.value.toLowerCase().replace(/\s/g,'')})} placeholder="cth: finance_mgr" />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>NAMA LENGKAP</div>
                  <input style={inp} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="cth: Budi Santoso" />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>PASSWORD</div>
                  <div style={{ position:'relative' }}>
                    <input style={inp} type={showPw?'text':'password'} value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Min. 6 karakter" />
                    <button onClick={()=>setShowPw(!showPw)} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:T.muted, cursor:'pointer', fontSize:12 }}>{showPw?'🙈':'👁'}</button>
                  </div>
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>ROLE & AKSES MODUL</div>
                  <select style={inp} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                    {ROLES.map(r=><option key={r} value={r}>{r} — {ROLE_PAGES[r].length} modul</option>)}
                  </select>
                  <div style={{ color:T.muted, fontSize:10, marginTop:5 }}>Akses: {ROLE_PAGES[form.role].join(', ')}</div>
                </div>
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleAdd} style={{ ...btn(T.accent), background:`${T.accent}22` }}>Simpan User</button>
              </div>
            </>}

            {/* EDIT USER */}
            {modal === 'edit' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:20 }}>✎ Edit User — {selected?.username}</div>
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>NAMA LENGKAP</div>
                  <input style={inp} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>ROLE</div>
                  <select style={inp} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}
                    disabled={selected?.username === currentUser.username}>
                    {ROLES.map(r=><option key={r} value={r}>{r} — {ROLE_PAGES[r].length} modul</option>)}
                  </select>
                  <div style={{ color:T.muted, fontSize:10, marginTop:5 }}>Akses: {ROLE_PAGES[form.role].join(', ')}</div>
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:8, letterSpacing:1 }}>STATUS</div>
                  <div style={{ display:'flex', gap:10 }}>
                    {[true,false].map(v=>(
                      <button key={String(v)} onClick={()=>setForm({...form,active:v})}
                        style={{ ...btn(v?T.green:T.red), background:form.active===v?(v?`${T.green}22`:`${T.red}22`):'transparent', flex:1 }}>
                        {v?'✓ AKTIF':'✕ NONAKTIF'}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleEdit} style={{ ...btn(T.accent), background:`${T.accent}22` }}>Simpan Perubahan</button>
              </div>
            </>}

            {/* CHANGE PASSWORD */}
            {modal === 'password' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:6 }}>🔑 Ganti Password</div>
              <div style={{ color:T.muted, fontSize:11, marginBottom:20 }}>User: <span style={{ color:T.accent }}>{selected?.username}</span></div>
              <div>
                <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>PASSWORD BARU</div>
                <div style={{ position:'relative' }}>
                  <input style={inp} type={showPw?'text':'password'} value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Min. 6 karakter" autoFocus />
                  <button onClick={()=>setShowPw(!showPw)} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:T.muted, cursor:'pointer', fontSize:12 }}>{showPw?'🙈':'👁'}</button>
                </div>
                {form.password.length > 0 && form.password.length < 6 && (
                  <div style={{ color:T.red, fontSize:10, marginTop:4 }}>Terlalu pendek — minimal 6 karakter</div>
                )}
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handlePassword} style={{ ...btn(T.yellow), background:`${T.yellow}22` }}>Ganti Password</button>
              </div>
            </>}

            {/* DELETE */}
            {modal === 'delete' && <>
              <div style={{ color:T.red, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:8 }}>✕ Hapus User</div>
              <div style={{ color:T.sub, fontSize:12, marginBottom:20, lineHeight:1.6 }}>
                Yakin hapus user <span style={{ color:T.accent, fontFamily:"'IBM Plex Mono',monospace" }}>{selected?.username}</span> ({selected?.name})?<br/>
                <span style={{ color:T.red, fontSize:11 }}>Tindakan ini tidak bisa dibatalkan.</span>
              </div>
              <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleDelete} style={{ ...btn(T.red), background:`${T.red}22` }}>Ya, Hapus</button>
              </div>
            </>}

          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════
function App() {
  const [user,setUser]=useState(null);
  const [dark,setDark]=useState(true);
  const [page,setPage]=useState('dashboard');
  const [sideOpen, setSideOpen] = React.useState(false);
  T = dark?DARK:LIGHT;

  if(!user) return <LoginPage onLogin={u=>{setUser(u);setPage(u.pages[0]||'dashboard');}}/>;

  const pageMap = {
    dashboard:<DashboardPage/>,
    pl:<PLPage/>,
    bs:<BSPage/>,
    cf:<CFPage/>,
    budget:<BudgetPage/>,
    kpi:<KPIPage/>,
    forecast:<ForecastPage/>,
    ai:<AIPage/>,
    macro:<MacroPage/>,
    reports:<ReportsPage dark={dark}/>,
    users:<UserManagementPage currentUser={user}/>,
  };

  return (
    <div style={{display:'flex',background:T.bg,minHeight:'100vh',color:T.text,fontFamily:"'IBM Plex Sans',sans-serif",position:'relative'}}>
      {/* Mobile overlay */}
      <div className={sideOpen?'gds-overlay show':'gds-overlay'} onClick={()=>setSideOpen(false)}/>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        html,body,#root{height:100%}
        ::-webkit-scrollbar{width:4px;height:4px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:${T.border};border-radius:4px}
        input[type=range]{height:4px;cursor:pointer}
        select option{background:${T.card};color:${T.text}}

        /* ── SIDEBAR ──────────────────────────────────────────── */
        .gds-sidebar{
          flex-shrink:0;
          transition:transform 0.28s cubic-bezier(.4,0,.2,1);
          z-index:200;
        }
        /* ── OVERLAY ────────────────────────────────────────────── */
        .gds-overlay{
          display:none;position:fixed;inset:0;
          background:rgba(0,0,0,0.55);
          z-index:199;
          backdrop-filter:blur(2px);
        }
        .gds-overlay.show{display:block}
        /* ── MAIN AREA ──────────────────────────────────────────── */
        .gds-main{min-width:0;flex:1;display:flex;flex-direction:column;overflow:hidden;max-height:100vh}
        .gds-content{flex:1;overflow:auto;padding:24px;background:${T.bg}}

        /* ── HAMBURGER ──────────────────────────────────────────── */
        .gds-hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px;border-radius:6px}
        .gds-hamburger span{display:block;width:20px;height:2px;background:${T.text};border-radius:2px;transition:all 0.2s}

        /* ── DESKTOP ────────────────────────────────────────────── */
        @media(min-width:769px){
          .gds-sidebar{position:relative;transform:none!important}
        }

        /* ── MOBILE ─────────────────────────────────────────────── */
        @media(max-width:768px){
          .gds-sidebar{
            position:fixed!important;top:0;left:0;
            height:100vh;
            transform:translateX(-220px);
          }
          .gds-sidebar.open{transform:translateX(0)!important}
          .gds-hamburger{display:flex!important}
          .gds-content{padding:12px!important}
          .gds-page-title{font-size:13px!important}
        }

        /* ── RESPONSIVE GRIDS ───────────────────────────────────── */
        @media(max-width:900px){
          .r-grid-4{grid-template-columns:repeat(2,1fr)!important}
          .r-grid-2{grid-template-columns:1fr!important}
          .r-grid-21{grid-template-columns:1fr!important}
          .r-grid-12{grid-template-columns:1fr!important}
          .r-grid-5{grid-template-columns:repeat(2,1fr)!important}
        }
        @media(max-width:500px){
          .r-grid-4{grid-template-columns:1fr 1fr!important}
          .r-grid-5{grid-template-columns:1fr 1fr!important}
          .hide-xs{display:none!important}
        }

        @media print{
          body{background:#fff!important;color:#000!important}
          .gds-sidebar,.gds-hamburger{display:none!important}
          *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
        }
      `}</style>
      <Sidebar user={user} active={page} setPage={p=>{if(user.pages.includes(p)){setPage(p);setSideOpen(false);}}} dark={dark} open={sideOpen}/>
      <div className="gds-main">
        <TopBar page={page} dark={dark} setDark={setDark} onLogout={()=>setUser(null)} onMenu={()=>setSideOpen(o=>!o)}/>
        <main className="gds-content">
          {pageMap[page]||<DashboardPage/>}
        </main>
      </div>
    </div>
  );
}

if(!window.__gds_root){
  const _container = document.getElementById('root');
  window.__gds_root = ReactDOM.createRoot(_container);
}
window.__gds_root.render(React.createElement(App));
</script>
  <script>
    window.addEventListener('error', function(e){
      var d=document.getElementById('status');
      var b=document.getElementById('bar');
      if(d) d.textContent='JS ERROR: '+e.message+' @ '+(e.filename||'').split('/').pop()+':'+e.lineno;
      if(b){b.style.width='100%';b.style.background='#EF4444';}
    });
    function setBar(p,m){document.getElementById('bar').style.width=p+'%';if(m)document.getElementById('status').textContent=m;}
    function hide(){var e=document.getElementById('loading');e.style.opacity='0';setTimeout(function(){e.style.display='none'},500);}
    function err(m){document.getElementById('status').style.color='#EF4444';document.getElementById('status').textContent=m;console.error('GDS:',m);}
    window.addEventListener('load',function(){
      setBar(30,'Memeriksa library...');
      try{
        if(!window.React) return err('React gagal dimuat');
        if(!window.ReactDOM) return err('ReactDOM gagal dimuat');
        if(!window.Recharts) return err('Recharts gagal dimuat');
        if(!window.Babel) return err('Babel gagal dimuat');
        setBar(60,'Kompilasi JSX...');
        var src=document.getElementById('app-src').textContent;
        var out=Babel.transform(src,{presets:['react']});
        setBar(90,'Menjalankan...');
        setTimeout(function(){
          try{eval(out.code);setBar(100);hide();}
          catch(e){err('Runtime: '+e.message+' | '+e.stack?.split('\n')[1]);console.error(e);}
        },100);
      }catch(e){err('Compile: '+e.message);console.error(e);}
    });
  </script>
</body>
</html>
