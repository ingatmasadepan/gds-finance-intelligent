          /* Content takes full width */
          .gds-main{width:100%}
          .gds-content{padding:12px!important}
          /* Responsive grids */
          .r-grid-4,.r-grid-5,.r-grid-3{
            grid-template-columns:1fr 1fr!important;
          }
          .r-grid-2{
            grid-template-columns:1fr!important;
          }
        }

        /* ── SMALL PHONE (≤480px) ─────────────────────────── */
        @media(max-width:480px){
          .gds-content{padding:8px!important}
          .hide-xs{display:none!important}
          .r-grid-4,.r-grid-5{grid-template-columns:1fr 1fr!important}
          .r-grid-3,.r-grid-2{grid-template-columns:1fr!important}
        }

        /* ── GENERAL ──────────────────────────────────────── */
        /* Horizontal scroll for wide tables */
        table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
        /* KPI card top glow line */
        .kpi-top-accent{position:absolute;top:0;left:0;right:0;height:1px;border-radius:inherit;}

        /* ── PRINT ────────────────────────────────────────── */
        /* ── SPECIFIC MOBILE COMPONENT FIXES ─────────────── */
        @media(max-width:768px){
          /* Prevent donut/pie chart overflow */
          .recharts-wrapper{max-width:100%!important;overflow:hidden!important}
          /* Scrollable tables */
          .gds-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
          /* Card padding on mobile */
          .gds-card-mob{padding:10px 12px!important}
          /* KPI score numbers - slightly smaller */
          .kpi-score-num{font-size:28px!important}
          /* Fix select/dropdown widths */
          select{max-width:100%!important}
          /* Ensure no child overflows parent */
          .gds-content *{max-width:100%;word-break:break-word}
          /* Exception: numbers and charts */
          .gds-content .recharts-wrapper,
          .gds-content canvas,
          .gds-content svg{max-width:100%!important;height:auto!important}
        }
        @media(max-width:480px){
          /* Stack page header buttons */
          .gds-page-header{flex-wrap:wrap!important;gap:8px!important}
          /* Smaller text in tight spaces */
          .gds-content{font-size:11px}
          /* Smaller chart heights on phone */
          .recharts-responsive-container{min-height:160px!important}
          /* Period selectors stack */
          .gds-period-row{flex-wrap:wrap!important;gap:6px!important}
        }
        @keyframes slideIn{from{opacity:0;transform:translateY(-10px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        /* Deep Ocean atmosphere — dark mode only */
        .gds-dark-atmosphere{
          position:fixed;inset:0;pointer-events:none;z-index:0;
          background:
            radial-gradient(ellipse 70% 50% at 85% 15%,rgba(0,180,200,0.04) 0%,transparent 55%),
            radial-gradient(ellipse 60% 60% at 15% 85%,rgba(0,100,120,0.05) 0%,transparent 60%);
        }
        .gds-content *{position:relative;}
        /* ── GLOW EFFECTS ────────────────────────────────────── */
        .gds-card-hover:hover{
          border-color:rgba(0,200,212,0.25)!important;
          box-shadow:0 0 0 1px rgba(0,200,212,0.08),0 8px 32px rgba(0,200,212,0.08)!important;
        }
        /* Chart styling */
        .recharts-cartesian-grid-horizontal line{stroke:rgba(20,48,56,0.8)!important;}
        .recharts-cartesian-grid-vertical line{display:none!important;}
        .recharts-tooltip-wrapper{filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5));}
        /* Scrollbar ocean theme */
        ::-webkit-scrollbar-thumb{background:rgba(0,200,212,0.2)!important;border-radius:4px!important;}
        ::-webkit-scrollbar-thumb:hover{background:rgba(0,200,212,0.35)!important;}
        /* Section title upgrade */
        .gds-section-accent{
          display:flex;align-items:center;gap:8px;
          color:#3A5A64;font-size:9px;letter-spacing:3px;
          text-transform:uppercase;font-family:"'JetBrains Mono',monospace";
          margin-bottom:14px;
        }
        .gds-section-accent::before{
          content:'';width:3px;height:14px;
          background:linear-gradient(180deg,#00D4FF,#00BFA6);
          border-radius:2px;box-shadow:0 0 8px rgba(0,200,212,0.4);
        }
        .gds-section-accent::after{
          content:'';flex:1;height:1px;
          background:linear-gradient(90deg,rgba(0,200,212,0.2),transparent);
        }
        @media print{
          body{background:#fff!important;color:#000!important}
          .gds-sidebar,.gds-hamburger,.gds-overlay{display:none!important}
          *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
        }
      `}</style>
      <Sidebar user={user} active={page} setPage={p=>{if(user.pages.includes(p)){setPage(p);setSideOpen(false);}}} dark={dark} open={sideOpen} onClose={()=>setSideOpen(false)}/>
      <div className="gds-main">
        <TopBar page={page} dark={dark} setDark={setDark} onLogout={()=>setUser(null)} onMenu={()=>setSideOpen(o=>!o)} lastUpdated={lastUpdated} recalcKey={recalcKey}/>
        <main className="gds-content">
          {pageMap[page]||<DashboardPage/>}
        </main>
      </div>
    </div>
    </LangContext.Provider>
  );
}

// ── Pollinations AI helper — GET endpoint (CORS-safe) ──────────
window.pollinationsAI = async function(prompt, timeoutMs) {
  timeoutMs = timeoutMs || 20000;
  var encoded = encodeURIComponent(prompt);
  var url = 'https://text.pollinations.ai/' + encoded + '?model=openai&json=true&seed=' + Date.now();
  var ctrl = new AbortController();
  var tid = setTimeout(function(){ ctrl.abort(); }, timeoutMs);
  try {
    var r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(tid);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var text = await r.text();
    try { return JSON.parse(text); } catch(e) {}
    var m = text.match(/\{[\s\S]*\}/) || text.match(/\[[\s\S]*\]/);
    if (m) return JSON.parse(m[0]);
    throw new Error('No JSON found in response');
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
};

    window.addEventListener('load',function(){
      setBar(30,'Checking libraries...');
      try{
        if(!window.React) return err('React gagal dimuat');
        if(!window.ReactDOM) return err('ReactDOM gagal dimuat');
        if(!window.Recharts) return err('Recharts gagal dimuat');
        if(!window.Babel) return err('Babel gagal dimuat');
        setBar(60,'Compiling JSX...');
        var src=document.getElementById('app-src').textContent;
        var out=Babel.transform(src,{presets:['react'],compact:false,minified:false});
        setBar(90,'Running...');
        setTimeout(function(){
          try{eval(out.code);setBar(100);hide();}
          catch(e){err('Runtime: '+e.message+' | '+e.stack?.split('\n')[1]);console.error(e);}
        },100);
      }catch(e){err('Compile: '+e.message);console.error(e);}
    });
  </script>
