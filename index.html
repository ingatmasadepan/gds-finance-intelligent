function BudgetPage() {
  const [period, setPeriod] = useState('ytd');

  const periodOpts = [
    {v:'m1',  l:'Jan 2026'},
    {v:'m2',  l:'Feb 2026'},
    {v:'ytd', l:'YTD Jan–Feb'},
  ];

  const budKeys = useMemo(() => {
    if (period==='m1') return ['2026-01'];
    if (period==='m2') return ['2026-02'];
    return ['2026-01','2026-02'];
  }, [period]);

  const act = useMemo(() => aggKeys(budKeys),        [budKeys]);
  const bud = useMemo(() => aggKeys(budKeys, BUD26), [budKeys]);

  const periodLabel = periodOpts.find(o=>o.v===period)?.l || period;

  // ── Helpers ───────────────────────────────────────────────────────
  const varAbs  = (a,b) => a - b;
  const varPct  = (a,b) => b!==0 ? (a-b)/Math.abs(b)*100 : 0;
  const ratioAct= (v)   => act.rev>0 ? v/act.rev*100 : 0;   // % of actual revenue
  const ratioBud= (v)   => bud.rev>0 ? v/bud.rev*100 : 0;   // % of budget revenue

  // Risk colour — variance %
  const riskColor = (vp, inv) => {
    const abs = Math.abs(vp);
    const bad = inv ? vp > 0 : vp < 0; // cost over = bad, revenue under = bad
    if (!bad) return T.green;
    if (abs <= 5)  return T.green;
    if (abs <= 10) return T.yellow;
    return T.red;
  };
  // Risk colour for ratio gap (cost ratios: higher actual = worse)
  const ratioRiskColor = (ratioDiff) => {
    if (ratioDiff <= 0)  return T.green;
    if (ratioDiff <= 3)  return T.yellow;
    return T.red;
  };

  // ── Table rows ────────────────────────────────────────────────────
  // isMargin=true → skip % variance, show margin instead
  const rows = [
    {l:'ROOM REVENUE',     a:act.rooms,    b:bud.rooms,    inv:false, indent:false, bold:false},
    {l:'F&B REVENUE',      a:act.fnb,      b:bud.fnb,      inv:false, indent:false, bold:false},
    {l:'MINOR OPERATED',   a:act.minor,    b:bud.minor,    inv:false, indent:false, bold:false},
    {l:'OTHER INCOME',     a:act.otherinc, b:bud.otherinc, inv:false, indent:false, bold:false},
    {l:'TOTAL REVENUE',    a:act.rev,      b:bud.rev,      inv:false, indent:false, bold:true,  sep:true},
    {l:'Cost of Sales',    a:act.cos,      b:bud.cos,      inv:true,  indent:true,  bold:false},
    {l:'Dept Payroll',     a:act.deptPay,  b:bud.deptPay,  inv:true,  indent:true,  bold:false},
    {l:'Dept Other Exp',   a:act.deptOther,b:bud.deptOther,inv:true,  indent:true,  bold:false},
    {l:'Overhead Payroll', a:act.ovhdPay,  b:bud.ovhdPay,  inv:true,  indent:true,  bold:false},
    {l:'Overhead Other',   a:act.ovhdOther,b:bud.ovhdOther,inv:true,  indent:true,  bold:false},
    {l:'GOP / EBITDA',     a:act.gop,      b:bud.gop,      inv:false, indent:false, bold:true,  sep:true, isMargin:true},
    {l:'Mgmt & Incent. Fee',a:act.incentFee+act.mgmtFee, b:bud.incentFee+bud.mgmtFee, inv:true, indent:true, bold:false},
    {l:'Depreciation',     a:act.deprTotal,b:bud.deprTotal,inv:true,  indent:true,  bold:false},
    {l:'Non-Op Expenses',  a:act.roi+act.ownExp+act.otherNonOp, b:bud.roi+bud.ownExp+bud.otherNonOp, inv:true, indent:true, bold:false},
    {l:'NET OP. PROFIT',   a:act.nop,      b:bud.nop,      inv:false, indent:false, bold:true,  sep:true, isMargin:true},
  ];

  // ── Margin comparison panel ────────────────────────────────────────
  const margins = [
    {l:'GOP Margin',  act:act.gopMgn,  bud:bud.gopMgn,  color:T.secondary},
    {l:'NOP Margin',  act:act.nopMgn,  bud:bud.nopMgn,  color:T.green},
    {l:'Payroll Ratio',act:act.payRat, bud:bud.payRat,  color:T.yellow, inverted:true},
    {l:'Cost Ratio',  act:act.cosRat,  bud:act.rev>0?bud.cos/bud.rev*100:0, color:T.orange||'#F97316', inverted:true},
  ];

  // ── Variance Driver Insight ────────────────────────────────────────
  const insights = useMemo(() => {
    const lines = [];
    const revVar   = act.rev   - bud.rev;
    const gopVar   = act.gop   - bud.gop;
    const nopVar   = act.nop   - bud.nop;
    const payVar   = act.deptPay - bud.deptPay;
    const cosVar   = act.cos   - bud.cos;
    const revVp    = bud.rev>0   ? revVar/bud.rev*100     : 0;
    const gopVp    = bud.gop!==0 ? gopVar/Math.abs(bud.gop)*100 : 0;
    const nopVp    = bud.nop!==0 ? nopVar/Math.abs(bud.nop)*100 : 0;

    // Revenue
    const roomVar  = act.rooms - bud.rooms;
    const fnbVar   = act.fnb   - bud.fnb;
    const mainRevDriver = Math.abs(roomVar) >= Math.abs(fnbVar) ? 'Room Revenue' : 'F&B Revenue';
    const mainRevVarAmt = Math.abs(roomVar) >= Math.abs(fnbVar) ? roomVar : fnbVar;
    lines.push({
      sev: Math.abs(revVp)<=5?'success': Math.abs(revVp)<=10?'warning':'danger',
      msg: `Revenue ${revVar>=0?'exceeded':'missed'} budget by ${fM(Math.abs(revVar))} (${revVp>=0?'+':''}${revVp.toFixed(1)}%). `
         + `Primary driver: ${mainRevDriver} (${mainRevVarAmt>=0?'+':''}${fM(mainRevVarAmt)}).`
    });

    // Payroll ratio check
    const payRatAct = act.payRat || 0;
    const payRatBud = bud.payRat || 0;
    const payRatDiff = payRatAct - payRatBud;
    if (Math.abs(payVar/Math.max(bud.deptPay,0.001)*100) > 2 || Math.abs(payRatDiff) > 1) {
      lines.push({
        sev: payVar<=0?'success': payRatDiff>3?'danger':'warning',
        msg: `Dept payroll ${payVar<=0?'under':'over'} budget by ${fM(Math.abs(payVar))} in absolute value. `
           + `Payroll ratio: Actual ${payRatAct.toFixed(1)}% vs Budget ${payRatBud.toFixed(1)}% `
           + `(${payRatDiff>=0?'+':''}${payRatDiff.toFixed(1)}pp). `
           + (payRatDiff > 2 && revVar < 0 ? 'Ratio elevated due to lower revenue base despite controlled payroll.' : '')
      });
    }

    // CoS
    const cosRatAct = act.rev>0 ? act.cos/act.rev*100 : 0;
    const cosRatBud = bud.rev>0 ? bud.cos/bud.rev*100 : 0;
    if (Math.abs(cosVar/Math.max(bud.cos,0.001)*100) > 3) {
      lines.push({
        sev: cosVar<=0?'success':'warning',
        msg: `Cost of Sales ${cosVar<=0?'below':'above'} budget by ${fM(Math.abs(cosVar))}. `
           + `CoS ratio: ${cosRatAct.toFixed(1)}% vs Budget ${cosRatBud.toFixed(1)}% `
           + `(${(cosRatAct-cosRatBud)>=0?'+':''}${(cosRatAct-cosRatBud).toFixed(1)}pp).`
      });
    }

    // GOP impact
    lines.push({
      sev: gopVar>=0?'success': Math.abs(gopVp)<=10?'warning':'danger',
      msg: `GOP ${gopVar>=0?'above':'below'} budget by ${fM(Math.abs(gopVar))} `
         + `(${gopVp>=0?'+':''}${gopVp.toFixed(1)}%). `
         + `Actual GOP margin: ${act.gopMgn.toFixed(1)}% vs Budget: ${bud.gopMgn.toFixed(1)}% `
         + `(${(act.gopMgn-bud.gopMgn)>=0?'+':''}${(act.gopMgn-bud.gopMgn).toFixed(1)}pp).`
    });

    // NOP
    lines.push({
      sev: nopVar>=0?'success': Math.abs(nopVp)<=10?'warning':'danger',
      msg: `NOP ${nopVar>=0?'above':'below'} budget by ${fM(Math.abs(nopVar))}. `
         + `Actual NOP margin: ${act.nopMgn.toFixed(1)}% vs Budget: ${bud.nopMgn.toFixed(1)}% `
         + `(${(act.nopMgn-bud.nopMgn)>=0?'+':''}${(act.nopMgn-bud.nopMgn).toFixed(1)}pp). `
         + (act.nop<0 && bud.nop>0 ? '⚠ Budget targeted positive NOP — revenue shortfall drove a net loss.' : '')
    });

    return lines;
  }, [act, bud, period]);

  const sevColor = {warning:T.yellow, info:T.accent, danger:T.red, success:T.green};
  const sevIcon  = {warning:'⚠️', info:'ℹ️', danger:'🔴', success:'✅'};

  // ── Chart data ────────────────────────────────────────────────────
  const chartData = useMemo(() => {
    const keys = period==='m1'?['2026-01']:period==='m2'?['2026-02']:['2026-01','2026-02'];
    return keys.map((k,i) => {
      const a = TB[k]    ? pnl(TB[k])    : null;
      const b = BUD26[k] ? pnl(BUD26[k]) : null;
      return {
        name: ML[i],
        actRev: a?+a.rev.toFixed(3):null, budRev: b?+b.rev.toFixed(3):null,
        actGOP: a?+a.gop.toFixed(3):null, budGOP: b?+b.gop.toFixed(3):null,
        actNOP: a?+a.nop.toFixed(3):null, budNOP: b?+b.nop.toFixed(3):null,
        actPayRat: a?+a.payRat.toFixed(1):null, budPayRat: b?+b.payRat.toFixed(1):null,
        actGopMgn: a?+a.gopMgn.toFixed(1):null, budGopMgn: b?+b.gopMgn.toFixed(1):null,
        actNopMgn: a?+a.nopMgn.toFixed(1):null, budNopMgn: b?+b.nopMgn.toFixed(1):null,
      };
    });
  }, [period]);

  return (
    <div>
      {/* ── Header ── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>BUDGET CONTROL</div>
          <div style={{color:T.muted,fontSize:11}}>Actual vs Budget · 2026 · {periodLabel} · Rp Milyar</div>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {periodOpts.map(o=>(
            <button key={o.v} onClick={()=>setPeriod(o.v)}
              style={{padding:'6px 14px',borderRadius:6,border:`1px solid ${period===o.v?T.accent:T.border}`,
                background:period===o.v?`${T.accent}20`:'transparent',color:period===o.v?T.accent:T.sub,
                cursor:'pointer',fontSize:11,fontFamily:"'IBM Plex Mono'",fontWeight:period===o.v?700:400}}>
              {o.l}
            </button>
          ))}
        </div>
      </div>

      {/* ── KPI summary strip ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
        {[
          {l:'Revenue Variance',  v:act.rev-bud.rev,  pct:varPct(act.rev,bud.rev),   inv:false},
          {l:'GOP Variance',      v:act.gop-bud.gop,  pct:varPct(act.gop,bud.gop),   inv:false},
          {l:'NOP Variance',      v:act.nop-bud.nop,  pct:varPct(act.nop,bud.nop),   inv:false},
          {l:'Payroll Ratio Δ',   v:null, pct:(act.payRat||0)-(bud.payRat||0), isRatio:true, unit:'pp'},
        ].map(k=>{
          const col = k.isRatio
            ? ratioRiskColor(k.pct)
            : riskColor(k.pct, k.inv);
          return (
            <div key={k.l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:'12px 14px',
              borderLeft:`3px solid ${col}`}}>
              <div style={{fontSize:9,color:T.muted,textTransform:'uppercase',letterSpacing:1}}>{k.l}</div>
              {!k.isRatio && <div style={{fontSize:17,fontWeight:700,color:col,marginTop:3,fontFamily:"'IBM Plex Mono'"}}>{fC(k.v)}</div>}
              <div style={{fontSize:k.isRatio?17:11,fontWeight:k.isRatio?700:400,color:col,marginTop:k.isRatio?3:1,fontFamily:"'IBM Plex Mono'"}}>
                {k.pct>=0?'+':''}{k.pct.toFixed(1)}{k.unit||'%'}
              </div>
              <div style={{fontSize:9,color:T.muted,marginTop:1}}>
                {Math.abs(k.pct)<=5?'✓ Within ±5%':Math.abs(k.pct)<=10?'⚠ ±5–10% band':'🔴 >±10% alert'}
              </div>
            </div>
          );
        })}
      </div>

      {/* ── Main layout: table + right panels ── */}
      <div style={{display:'grid',gridTemplateColumns:'3fr 2fr',gap:12,marginBottom:14}}>

        {/* Enhanced Budget Table */}
        <Card style={{padding:0}}>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:11,minWidth:640}}>
              <thead>
                <tr style={{background:T.border}}>
                  <th style={{padding:'8px 12px',textAlign:'left',color:T.muted,fontSize:9,letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>LINE ITEM</th>
                  <th style={{padding:'8px 10px',textAlign:'right',color:T.muted,fontSize:9,letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>ACTUAL</th>
                  <th style={{padding:'8px 10px',textAlign:'right',color:T.muted,fontSize:9,letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>BUDGET</th>
                  <th style={{padding:'8px 10px',textAlign:'right',color:T.muted,fontSize:9,letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>VAR</th>
                  <th style={{padding:'8px 8px', textAlign:'right',color:T.muted,fontSize:9,letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>VAR%</th>
                  <th style={{padding:'8px 8px', textAlign:'right',color:T.accent,fontSize:9,letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>ACT%</th>
                  <th style={{padding:'8px 8px', textAlign:'right',color:T.muted,fontSize:9,letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>BUD%</th>
                  <th style={{padding:'8px 8px', textAlign:'right',color:T.muted,fontSize:9,letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>Δ%</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((row,i)=>{
                  const v   = varAbs(row.a, row.b);
                  const vp  = varPct(row.a, row.b);
                  // For cost rows: use absolute value for ratio
                  const aAbs = Math.abs(row.a);
                  const bAbs = Math.abs(row.b);
                  const rA  = ratioAct(aAbs);
                  const rB  = ratioBud(bAbs);
                  const rD  = rA - rB;
                  const isProfit = row.isMargin;
                  // Colour
                  const varCol  = isProfit
                    ? (v>=0?T.green:T.red)
                    : riskColor(vp, row.inv);
                  const ratCol  = isProfit ? T.muted : ratioRiskColor(row.inv ? rD : -rD);

                  return (
                    <tr key={i} style={{
                      borderBottom:`1px solid ${row.sep?T.border:'transparent'}`,
                      background:row.highlight||isProfit?(v>=0?`${T.green}06`:`${T.red}05`):'transparent',
                    }}>
                      <td style={{padding:`${row.sep?'8px':'5px'} 12px`,paddingLeft:row.indent?28:12,
                        color:row.bold?T.text:T.sub,fontWeight:row.bold?700:400,
                        fontFamily:row.bold?"'IBM Plex Mono'":'inherit',fontSize:row.bold?11:10}}>
                        {row.l}
                      </td>
                      <td style={{padding:'5px 10px',textAlign:'right',fontFamily:"'IBM Plex Mono'",fontWeight:row.bold?700:400,fontSize:11}}>{fC(row.a)}</td>
                      <td style={{padding:'5px 10px',textAlign:'right',color:T.muted,fontFamily:"'IBM Plex Mono'",fontSize:11}}>{fC(row.b)}</td>
                      <td style={{padding:'5px 10px',textAlign:'right',color:varCol,fontFamily:"'IBM Plex Mono'",fontWeight:row.bold?700:400,fontSize:11}}>{fC(v)}</td>
                      <td style={{padding:'5px 8px', textAlign:'right',color:varCol,fontFamily:"'IBM Plex Mono'",fontSize:10}}>
                        {isProfit
                          ? <span style={{fontSize:9,color:T.muted}}>—</span>
                          : `${vp>=0?'+':''}${vp.toFixed(1)}%`}
                      </td>
                      <td style={{padding:'5px 8px', textAlign:'right',color:T.accent,fontFamily:"'IBM Plex Mono'",fontSize:10,fontWeight:600}}>
                        {isProfit
                          ? <span style={{color:v>=0?T.green:T.red,fontWeight:700}}>{(aAbs/Math.max(act.rev,0.001)*100).toFixed(1)}%</span>
                          : `${rA.toFixed(1)}%`}
                      </td>
                      <td style={{padding:'5px 8px', textAlign:'right',color:T.muted,fontFamily:"'IBM Plex Mono'",fontSize:10}}>
                        {isProfit
                          ? `${(bAbs/Math.max(bud.rev,0.001)*100).toFixed(1)}%`
                          : `${rB.toFixed(1)}%`}
                      </td>
                      <td style={{padding:'5px 8px', textAlign:'right',fontFamily:"'IBM Plex Mono'",fontSize:10,fontWeight:600,
                        color:isProfit?T.muted:ratCol}}>
                        {isProfit
                          ? <span style={{fontSize:9,color:T.muted}}>—</span>
                          : `${rD>=0?'+':''}${rD.toFixed(1)}pp`}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{padding:'6px 12px',fontSize:9,color:T.muted,borderTop:`1px solid ${T.border}`,fontFamily:"'IBM Plex Mono'"}}>
            ACT% = % of actual revenue · BUD% = % of budget revenue · Δ% = ratio difference (pp) · 🟢&lt;3pp · 🟡3–5pp · 🔴&gt;5pp
          </div>
        </Card>

        {/* Right column */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>

          {/* Margin Comparison Panel */}
          <Card>
            <SectionTitle>MARGIN & RATIO COMPARISON</SectionTitle>
            {margins.map(m=>{
              const diff = m.act - m.bud;
              const ok   = m.inverted ? diff<=0 : diff>=0;
              const col  = m.inverted ? ratioRiskColor(diff) : (ok?T.green:T.red);
              return (
                <div key={m.l} style={{marginBottom:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                    <span style={{color:T.sub,fontSize:10}}>{m.l}</span>
                    <span style={{color:col,fontSize:9,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>
                      {diff>=0?'+':''}{diff.toFixed(1)}pp {ok?'✅':'⚠️'}
                    </span>
                  </div>
                  <div style={{display:'flex',gap:6,marginBottom:4}}>
                    <div style={{flex:1,background:`${m.color}15`,borderRadius:4,padding:'4px 8px',textAlign:'center'}}>
                      <div style={{fontSize:8,color:T.muted}}>Actual</div>
                      <div style={{fontSize:13,fontWeight:700,color:m.color,fontFamily:"'IBM Plex Mono'"}}>{m.act.toFixed(1)}%</div>
                    </div>
                    <div style={{flex:1,background:`${T.muted}15`,borderRadius:4,padding:'4px 8px',textAlign:'center'}}>
                      <div style={{fontSize:8,color:T.muted}}>Budget</div>
                      <div style={{fontSize:13,fontWeight:700,color:T.muted,fontFamily:"'IBM Plex Mono'"}}>{m.bud.toFixed(1)}%</div>
                    </div>
                  </div>
                  <div style={{height:4,background:T.border,borderRadius:2,overflow:'hidden'}}>
                    <div style={{width:`${Math.min(Math.abs(m.act),100)}%`,height:'100%',background:col,borderRadius:2}}/>
                  </div>
                </div>
              );
            })}
          </Card>

          {/* Charts */}
          <Card>
            <SectionTitle>REVENUE: ACTUAL vs BUDGET</SectionTitle>
            <ResponsiveContainer width="100%" height={130}>
              <BarChart data={chartData} margin={{top:4,right:4,bottom:4,left:4}}>
                <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
                <XAxis dataKey="name" tick={{fill:T.muted,fontSize:9}} tickLine={false}/>
                <YAxis tick={{fill:T.muted,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v.toFixed(1)}M`}/>
                <Tooltip contentStyle={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}} formatter={(v,n)=>[`${v?.toFixed(3)}M`,n]}/>
                <Legend iconType="circle" iconSize={7} wrapperStyle={{fontSize:9}}/>
                <Bar dataKey="actRev" name="Actual"  fill={T.accent}        radius={[2,2,0,0]}/>
                <Bar dataKey="budRev" name="Budget"  fill={`${T.accent}35`} radius={[2,2,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </Card>

          <Card>
            <SectionTitle>MARGIN TREND: ACTUAL vs BUDGET</SectionTitle>
            <ResponsiveContainer width="100%" height={130}>
              <BarChart data={chartData} margin={{top:4,right:4,bottom:4,left:4}}>
                <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
                <XAxis dataKey="name" tick={{fill:T.muted,fontSize:9}} tickLine={false}/>
                <YAxis tick={{fill:T.muted,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v}%`}/>
                <Tooltip contentStyle={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}} formatter={(v,n)=>[`${v?.toFixed(1)}%`,n]}/>
                <Legend iconType="circle" iconSize={7} wrapperStyle={{fontSize:9}}/>
                <Bar dataKey="actGopMgn" name="Act GOP%"  fill={T.secondary}        radius={[2,2,0,0]}/>
                <Bar dataKey="budGopMgn" name="Bud GOP%"  fill={`${T.secondary}35`} radius={[2,2,0,0]}/>
                <Bar dataKey="actNopMgn" name="Act NOP%"  fill={T.green}            radius={[2,2,0,0]}/>
                <Bar dataKey="budNopMgn" name="Bud NOP%"  fill={`${T.green}35`}     radius={[2,2,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </Card>
        </div>
      </div>

      {/* ── Variance Driver Insights ── */}
      <Card>
        <SectionTitle>VARIANCE DRIVER INSIGHTS — {periodLabel}</SectionTitle>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:8}}>
          {insights.map((ins,i)=>(
            <div key={i} style={{display:'flex',gap:10,padding:'10px 14px',
              background:`${sevColor[ins.sev]}08`,borderRadius:8,
              borderLeft:`3px solid ${sevColor[ins.sev]}`}}>
              <span style={{fontSize:16,lineHeight:1.5}}>{sevIcon[ins.sev]}</span>
              <span style={{color:T.sub,fontSize:11,lineHeight:1.6}}>{ins.msg}</span>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}
// ══════════════════════════════════════════════════════════════════

function KPIPage() {
  const [yr,setYr]         = useState('2025');
  const [period,setPeriod] = useState('full');

  const periodOpts = useMemo(()=>getPeriodOpts(yr),[yr]);
  const handleYrChange = (v)=>{setYr(v);setPeriod('full');};

  const isAnn = parseInt(yr)<2024;

  // ── Current period data ──────────────────────────────────────────
  const keys = useMemo(()=>getKeys(yr,period),[yr,period]);
  const cur  = useMemo(()=>{
    if(isAnn) return annPnl(parseInt(yr));
    return keys&&keys.length>0?aggKeys(keys):null;
  },[yr,keys,isAnn]);

  const bsKey = useMemo(()=>snapKey(yr,period),    [yr,period]);
  const bs    = useMemo(()=>bsCalc(BS_SNAPSHOTS[bsKey]||BS_SNAPSHOTS['dec25']),[bsKey]);

  // ── Prior period data (for trend) ────────────────────────────────
  const prevPeriod = useMemo(()=>{
    if(isAnn||period==='full'||period==='ytd') return null;
    if(period.startsWith('m')){
      const mi=parseInt(period.slice(1));
      if(mi<=1) return null;
      return `m${mi-1}`;
    }
    if(period.startsWith('q')){
      const qn=parseInt(period.slice(1));
      return qn>1?`q${qn-1}`:null;
    }
    return null;
  },[period,isAnn]);

  const prevKeys = useMemo(()=>prevPeriod?getKeys(yr,prevPeriod):null,[yr,prevPeriod]);
  const prev     = useMemo(()=>{
    if(prevKeys&&prevKeys.length) return aggKeys(prevKeys);
    if(!prevPeriod&&!isAnn){
      // full year: compare to prior year
      const py=parseInt(yr)-1;
      if(py>=2013) return annPnl(py);
    }
    return null;
  },[prevKeys,prevPeriod,yr,isAnn]);

  const prevBsKey = useMemo(()=>prevPeriod?snapKey(yr,prevPeriod):null,[yr,prevPeriod]);
  const prevBs    = useMemo(()=>{
    if(prevBsKey) return bsCalc(BS_SNAPSHOTS[prevBsKey]||BS_SNAPSHOTS['dec25']);
    // full year: prior year BS
    const py=String(parseInt(yr)-1);
    const k=snapKey(py,'full');
    return bsCalc(BS_SNAPSHOTS[k]||BS_SNAPSHOTS['dec25']);
  },[prevBsKey,yr]);

  const periodLabel = periodOpts.find(o=>o.v===period)?.l||period;

  // ── Validation helper ────────────────────────────────────────────
  const validate = (v, min, max, label) => {
    if(v===null||v===undefined||isNaN(v)) return {val:'—', warn:false};
    if(v<min||v>max) return {val:`${v.toFixed(1)}% ⚠`, warn:true, msg:`${label} out of range [${min}–${max}%]`};
    return {val:v.toFixed(1), warn:false};
  };

  // ── Trend arrow ──────────────────────────────────────────────────
  const trend = (cur, prev, inv=false) => {
    if(prev==null||cur==null) return {icon:'→', color:T.muted, label:'—'};
    const diff = cur - prev;
    const better = inv ? diff<=-0.3 : diff>=0.3;
    const worse  = inv ? diff>=0.3  : diff<=-0.3;
    if(better) return {icon:'↑', color:T.green,  label:`↑ +${Math.abs(diff).toFixed(1)}`};
    if(worse)  return {icon:'↓', color:T.red,    label:`↓ -${Math.abs(diff).toFixed(1)}`};
    return      {icon:'→', color:T.muted, label:'→ stable'};
  };

  // ── Health classification (3-tier) ───────────────────────────────
  const health = (v, thresholds) => {
    // thresholds: [{min, max, level}] or [{val, level}] for single-sided
    // level: 'green','yellow','red'
    for(const t of thresholds){
      if(t.min!==undefined && t.max!==undefined && v>=t.min && v<=t.max) return t.level;
      if(t.min!==undefined && t.max===undefined && v>=t.min) return t.level;
      if(t.max!==undefined && t.min===undefined && v<=t.max) return t.level;
    }
    return 'red';
  };
  const hColor = (level) => ({green:T.green, yellow:T.yellow, red:T.red}[level]||T.muted);
  const hIcon  = (level) => ({green:'✅', yellow:'⚠️', red:'🔴'}[level]||'—');

  // ── All KPI definitions ──────────────────────────────────────────
  const kpiData = useMemo(()=>{
    if(!cur) return null;

    const tCA=bs.tCA, tCL=Math.max(bs.tCL,0.001), tA=Math.max(bs.tA,0.001), tEq=Math.max(bs.tEq,0.001);
    const cr=(tCA/tCL), qr=((bs.cash+bs.ar)/tCL), cashr=(bs.cash/tCL);
    const de=(bs.tL/tEq), ltde=(bs.ltD/tEq), ltda=(bs.ltD/tA);
    const eqR=(bs.tEq/tA);
    const roa=(cur.nop/tA*100), roe=(cur.nop/tEq*100);
    const at=(cur.rev/tA);
    // Occupancy: ANN has occ in %, TB monthly has occ=room nights, avail=available nights
    const occPct = isAnn
      ? (cur.occ!=null ? Math.min(Math.max(cur.occ,0),100) : null)
      : (cur.avail>0   ? Math.min(cur.occ/cur.avail*100, 100) : null);
    const prevOccPct = prev
      ? (isAnn
          ? (prev.occ!=null ? Math.min(Math.max(prev.occ,0),100) : null)
          : (prev.avail>0   ? Math.min(prev.occ/prev.avail*100, 100) : null))
      : null;

    // Prev period equivalents
    const pCR = prev&&prevBs ? prevBs.tCA/Math.max(prevBs.tCL,0.001) : null;
    const pQR = prev&&prevBs ? (prevBs.cash+prevBs.ar)/Math.max(prevBs.tCL,0.001) : null;
    const pROA= prev&&prevBs ? prev.nop/Math.max(prevBs.tA,0.001)*100 : null;
    const pROE= prev&&prevBs ? prev.nop/Math.max(prevBs.tEq,0.001)*100 : null;
    const pDE = prev&&prevBs ? prevBs.tL/Math.max(prevBs.tEq,0.001) : null;

    const cats = [
      {
        cat:'Liquidity', color:T.accent, icon:'💧',
        items:[
          {l:'Current Ratio',    val:cr,              fmt:v=>v.toFixed(2)+'x',   prev:pCR,
           hlth:health(cr,   [{min:1.5,level:'green'},{min:1.2,max:1.499,level:'yellow'},{max:1.199,level:'red'}]),
           tgt:'≥1.5x', tgtN:1.5, inv:false, unit:'x'},
          {l:'Quick Ratio',      val:qr,              fmt:v=>v.toFixed(2)+'x',   prev:pQR,
           hlth:health(qr,   [{min:1.0,level:'green'},{min:0.7,max:0.999,level:'yellow'},{max:0.699,level:'red'}]),
           tgt:'≥1.0x', tgtN:1.0, inv:false, unit:'x'},
          {l:'Cash Ratio',       val:cashr,           fmt:v=>v.toFixed(2)+'x',   prev:null,
           hlth:health(cashr,[{min:0.5,level:'green'},{min:0.3,max:0.499,level:'yellow'},{max:0.299,level:'red'}]),
           tgt:'≥0.5x', tgtN:0.5, inv:false, unit:'x'},
          {l:'Working Capital',  val:bs.tCA-bs.tCL,   fmt:v=>fM(v),              prev:prev&&prevBs?prevBs.tCA-prevBs.tCL:null,
           hlth:(bs.tCA-bs.tCL)>0?'green':'red', tgt:'>0', tgtN:0, inv:false, unit:'M'},
        ]
      },
      {
        cat:'Profitability', color:T.green, icon:'📈',
        items:[
          {l:'GOP Margin',       val:cur.gopMgn,      fmt:v=>v.toFixed(1)+'%',   prev:prev?.gopMgn,
           hlth:health(cur.gopMgn,[{min:30,level:'green'},{min:20,max:29.9,level:'yellow'},{max:19.9,level:'red'}]),
           tgt:'≥30%', tgtN:30, inv:false, unit:'%'},
          {l:'NOP Margin',       val:cur.nopMgn,      fmt:v=>v.toFixed(1)+'%',   prev:prev?.nopMgn,
           hlth:health(cur.nopMgn,[{min:5,level:'green'},{min:0,max:4.9,level:'yellow'},{max:-0.001,level:'red'}]),
           tgt:'≥5%', tgtN:5, inv:false, unit:'%'},
          {l:'EBITDA Margin',    val:cur.rev>0?cur.gop/cur.rev*100:0, fmt:v=>v.toFixed(1)+'%', prev:prev&&prev.rev>0?prev.gop/prev.rev*100:null,
           hlth:health(cur.rev>0?cur.gop/cur.rev*100:0,[{min:30,level:'green'},{min:20,max:29.9,level:'yellow'},{max:19.9,level:'red'}]),
           tgt:'≥30%', tgtN:30, inv:false, unit:'%'},
          {l:'Net Profit Margin',val:cur.rev>0?cur.nop/cur.rev*100:0, fmt:v=>v.toFixed(1)+'%', prev:prev&&prev.rev>0?prev.nop/prev.rev*100:null,
           hlth:health(cur.rev>0?cur.nop/cur.rev*100:0,[{min:5,level:'green'},{min:0,max:4.9,level:'yellow'},{max:-0.001,level:'red'}]),
           tgt:'≥5%', tgtN:5, inv:false, unit:'%'},
        ]
      },
      {
        cat:'Leverage', color:T.yellow, icon:'🏦',
        items:[
          {l:'Debt / Equity',    val:de,   fmt:v=>v.toFixed(2)+'x', prev:pDE,
           hlth:health(de,  [{max:0.8,level:'green'},{min:0.8,max:1.2,level:'yellow'},{min:1.201,level:'red'}]),
           tgt:'<1.0x', tgtN:1.0, inv:true, unit:'x'},
          {l:'LT Debt / Equity', val:ltde, fmt:v=>v.toFixed(2)+'x', prev:null,
           hlth:health(ltde,[{max:0.5,level:'green'},{min:0.5,max:0.8,level:'yellow'},{min:0.801,level:'red'}]),
           tgt:'<0.5x', tgtN:0.5, inv:true, unit:'x'},
          {l:'LT Debt / Assets', val:ltda*100, fmt:v=>v.toFixed(1)+'%', prev:null,
           hlth:health(ltda*100,[{max:25,level:'green'},{min:25,max:40,level:'yellow'},{min:40.01,level:'red'}]),
           tgt:'<30%', tgtN:30, inv:true, unit:'%'},
          {l:'Equity Ratio',     val:eqR*100, fmt:v=>v.toFixed(1)+'%', prev:null,
           hlth:health(eqR*100,[{min:50,level:'green'},{min:35,max:49.9,level:'yellow'},{max:34.9,level:'red'}]),
           tgt:'>40%', tgtN:40, inv:false, unit:'%'},
        ]
      },
      {
        cat:'Returns', color:T.secondary, icon:'💰',
        items:[
          {l:'Return on Assets',  val:roa, fmt:v=>v.toFixed(1)+'%', prev:pROA,
           hlth:health(roa, [{min:5,level:'green'},{min:0,max:4.9,level:'yellow'},{max:-0.001,level:'red'}]),
           tgt:'>5%', tgtN:5, inv:false, unit:'%'},
          {l:'Return on Equity',  val:roe, fmt:v=>v.toFixed(1)+'%', prev:pROE,
           hlth:health(roe, [{min:10,level:'green'},{min:0,max:9.9,level:'yellow'},{max:-0.001,level:'red'}]),
           tgt:'>10%', tgtN:10, inv:false, unit:'%'},
          {l:'Asset Turnover',    val:at,  fmt:v=>v.toFixed(2)+'x', prev:null,
           hlth:health(at,  [{min:0.5,level:'green'},{min:0.3,max:0.499,level:'yellow'},{max:0.299,level:'red'}]),
           tgt:'>0.5x', tgtN:0.5, inv:false, unit:'x'},
          {l:'EBITDA / Assets',   val:cur.gop/tA*100, fmt:v=>v.toFixed(1)+'%', prev:null,
           hlth:health(cur.gop/tA*100,[{min:8,level:'green'},{min:3,max:7.9,level:'yellow'},{max:2.9,level:'red'}]),
           tgt:'>8%', tgtN:8, inv:false, unit:'%'},
        ]
      },
      {
        cat:'Hotel Operations', color:T.orange||'#F97316', icon:'🏨',
        items:[
          {l:'Payroll Ratio',    val:cur.payRat||0, fmt:v=>v.toFixed(1)+'%', prev:prev?.payRat,
           hlth:health(cur.payRat||0,[{max:32,level:'green'},{min:32,max:38,level:'yellow'},{min:38.01,level:'red'}]),
           tgt:'<35%', tgtN:35, inv:true, unit:'%'},
          {l:'Utility Ratio',    val:cur.utlRat||0, fmt:v=>v.toFixed(1)+'%', prev:prev?.utlRat,
           hlth:health(cur.utlRat||0,[{max:6,level:'green'},{min:6,max:9,level:'yellow'},{min:9.01,level:'red'}]),
           tgt:'<7%', tgtN:7, inv:true, unit:'%'},
          {l:'Maint. Ratio',     val:cur.mntRat||0, fmt:v=>v.toFixed(1)+'%', prev:prev?.mntRat,
           hlth:health(cur.mntRat||0,[{max:3,level:'green'},{min:3,max:5,level:'yellow'},{min:5.01,level:'red'}]),
           tgt:'<4%', tgtN:4, inv:true, unit:'%'},
          {l:'Occupancy',        val:occPct,        fmt:v=>v!=null?v.toFixed(1)+'%':'—', prev:prevOccPct,
           hlth:occPct!=null?health(occPct,[{min:65,level:'green'},{min:50,max:64.9,level:'yellow'},{max:49.9,level:'red'}]):'yellow',
           tgt:'>55%', tgtN:55, inv:false, unit:'%'},
        ]
      },
    ];
    return cats;
  },[cur,bs,prev,prevBs]);

  // ── Health Score ─────────────────────────────────────────────────
  const healthScore = useMemo(()=>{
    if(!kpiData) return null;
    const score = (items) => {
      const g=items.filter(i=>i.hlth==='green').length;
      const y=items.filter(i=>i.hlth==='yellow').length;
      const r=items.filter(i=>i.hlth==='red').length;
      const total=items.length;
      const pct=Math.round((g*100+y*50)/Math.max(total*100,1)*100);
      const level=pct>=75?'green':pct>=50?'yellow':'red';
      return {g,y,r,pct,level};
    };
    const liq  = score(kpiData[0].items);
    const prof = score(kpiData[1].items);
    const ops  = score(kpiData[4].items);
    const all  = kpiData.flatMap(c=>c.items);
    const total= score(all);
    return {liq,prof,ops,total,
      okCount:all.filter(i=>i.hlth==='green').length,
      warnCount:all.filter(i=>i.hlth==='yellow').length,
      redCount:all.filter(i=>i.hlth==='red').length,
      allCount:all.length};
  },[kpiData]);

  // ── KPI Insights ─────────────────────────────────────────────────
  const kpiInsights = useMemo(()=>{
    if(!cur||!kpiData) return [];
    const lines=[];
    const gopMgn=cur.gopMgn, nopMgn=cur.nopMgn, payRat=cur.payRat||0;
    const cr=bs.tCA/Math.max(bs.tCL,0.001);

    if(nopMgn<0)
      lines.push({sev:'red', msg:`NOP margin is negative at ${nopMgn.toFixed(1)}%. Revenue of ${fM(cur.rev)} is insufficient to cover below-the-line charges. Review debt service and depreciation load.`});
    else if(nopMgn<5)
      lines.push({sev:'yellow', msg:`NOP margin of ${nopMgn.toFixed(1)}% is below the 5% target. Monitor non-operating expenses to protect bottom-line profitability.`});
    else
      lines.push({sev:'green', msg:`NOP margin of ${nopMgn.toFixed(1)}% is on target. Profitability is tracking within the healthy range.`});

    if(gopMgn<20)
      lines.push({sev:'red', msg:`GOP margin ${gopMgn.toFixed(1)}% — critical. Operating cost structure is consuming most revenue. Prioritise cost reduction across dept payroll and overhead.`});
    else if(gopMgn<30)
      lines.push({sev:'yellow', msg:`GOP margin ${gopMgn.toFixed(1)}% is below 30% benchmark. Operational efficiency needs improvement — review overhead and department expenses.`});

    if(payRat>38)
      lines.push({sev:'red', msg:`Payroll ratio ${payRat.toFixed(1)}% is critically above 35% target. Staffing cost relative to revenue is unsustainable — review headcount vs occupancy.`});
    else if(payRat>35)
      lines.push({sev:'yellow', msg:`Payroll ratio ${payRat.toFixed(1)}% exceeds 35% target. Consider productivity review or flex staffing model tied to occupancy levels.`});

    if(cr<1.2)
      lines.push({sev:'red', msg:`Current ratio ${cr.toFixed(2)}x is below 1.2 — liquidity risk. Current liabilities ${fM(bs.tCL)} exceed current assets. Monitor cash flow weekly.`});
    else if(cr<1.5)
      lines.push({sev:'yellow', msg:`Current ratio ${cr.toFixed(2)}x is adequate but below 1.5x target. Maintain cash position and avoid large unplanned expenditures.`});

    if(prev){
      const gopTrend=cur.gopMgn-(prev.gopMgn||0);
      const nopTrend=cur.nopMgn-(prev.nopMgn||0);
      if(Math.abs(gopTrend)>=2||Math.abs(nopTrend)>=2)
        lines.push({sev:gopTrend>=0?'green':'yellow',
          msg:`vs Prior period: GOP margin ${gopTrend>=0?'improved':'declined'} ${Math.abs(gopTrend).toFixed(1)}pp, NOP margin ${nopTrend>=0?'improved':'declined'} ${Math.abs(nopTrend).toFixed(1)}pp.`});
    }
    return lines.slice(0,5);
  },[cur,bs,kpiData,prev]);

  // ── Trend chart ───────────────────────────────────────────────────
  const trendKeys = yr==='2026'?['2026-01','2026-02']:yr==='2025'?mKeys25:mKeys24;
  const trendData = useMemo(()=>(!isAnn?trendKeys.filter(k=>TB[k]):[]).map((k,i)=>{
    const d=pnl(TB[k]);
    return {name:ML[i],gopMgn:+d.gopMgn.toFixed(1),nopMgn:+d.nopMgn.toFixed(1),payRat:+d.payRat.toFixed(1),utlRat:+d.utlRat.toFixed(1)};
  }),[yr,isAnn]);

  if(!cur||!kpiData||!healthScore)
    return <div style={{padding:40,color:T.muted,textAlign:'center'}}>No data for selected period.</div>;

  const scoreColor = (pct) => pct>=75?T.green:pct>=50?T.yellow:T.red;

  return (
    <div>
      {/* ── Header ── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>FINANCIAL KPI MONITOR</div>
          <div style={{color:T.muted,fontSize:11}}>Health Dashboard · {periodLabel} · {healthScore.okCount}/{healthScore.allCount} green</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
            {['2026','2025','2024','2023','2022','2021','2020','2019','2018'].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          {!isAnn&&(
            <select value={period} onChange={e=>setPeriod(e.target.value)}
              style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
              {periodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
        </div>
      </div>

      {/* ── Financial Health Scorecard ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
        {[
          {l:'Overall Health', s:healthScore.total, icon:'🏥'},
          {l:'Liquidity Score',s:healthScore.liq,   icon:'💧'},
          {l:'Profitability',  s:healthScore.prof,  icon:'📈'},
          {l:'Operations',     s:healthScore.ops,   icon:'🏨'},
        ].map(({l,s,icon})=>(
          <div key={l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:'12px 14px',
            borderLeft:`3px solid ${scoreColor(s.pct)}`}}>
            <div style={{fontSize:9,color:T.muted,textTransform:'uppercase',letterSpacing:1,marginBottom:3}}>{icon} {l}</div>
            <div style={{fontSize:22,fontWeight:800,color:scoreColor(s.pct),fontFamily:"'IBM Plex Mono'"}}>{s.pct}%</div>
            <div style={{height:4,background:T.border,borderRadius:2,overflow:'hidden',marginTop:4}}>
              <div style={{width:`${s.pct}%`,height:'100%',background:scoreColor(s.pct),borderRadius:2}}/>
            </div>
            <div style={{fontSize:9,color:T.muted,marginTop:3}}>
              🟢{s.g} 🟡{s.y} 🔴{s.r}
            </div>
          </div>
        ))}
      </div>

      {/* ── KPI Grid + right panel ── */}
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12,marginBottom:14}}>

        {/* KPI Cards */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {kpiData.map(cat=>(
            <Card key={cat.cat}>
              <div style={{color:cat.color,fontSize:9,letterSpacing:2,fontFamily:"'IBM Plex Mono'",fontWeight:700,marginBottom:10}}>
                {cat.icon} {cat.cat.toUpperCase()}
              </div>
              {cat.items.map(item=>{
                const t = trend(item.val, item.prev, item.inv);
                const hc= hColor(item.hlth);
                const hi= hIcon(item.hlth);
                const dispVal = item.validate?.warn
                  ? <span style={{color:T.yellow}}>{item.fmt(item.val)} ⚠</span>
                  : <span>{item.fmt(item.val)}</span>;
                return (
                  <div key={item.l} style={{padding:'6px 0',borderBottom:`1px solid ${T.border}`}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                      <div style={{flex:1}}>
                        <div style={{color:T.sub,fontSize:10}}>{item.l}</div>
                        <div style={{color:T.muted,fontSize:8,marginTop:1}}>Target: {item.tgt}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{display:'flex',alignItems:'center',gap:5}}>
                          <span style={{color:hc,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{dispVal}</span>
                          <span style={{fontSize:11}}>{hi}</span>
                        </div>
                        {item.prev!=null&&(
                          <div style={{fontSize:8,color:t.color,fontFamily:"'IBM Plex Mono'",marginTop:1}}>
                            {t.label}
                          </div>
                        )}
                      </div>
                    </div>
                    {/* Mini progress bar: actual vs target */}
                    {item.unit!=='M'&&item.unit!=='x'&&typeof item.val==='number'&&(
                      <div style={{height:3,background:T.border,borderRadius:2,overflow:'hidden',marginTop:4}}>
                        <div style={{
                          width:`${Math.min(item.inv?Math.max(0,100-(item.val/item.tgtN*100-100)):Math.min(item.val/item.tgtN*100,120),100)}%`,
                          height:'100%',background:hc,borderRadius:2
                        }}/>
                      </div>
                    )}
                  </div>
                );
              })}
            </Card>
          ))}
        </div>

        {/* Right: trend chart + health check */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Card>
            <SectionTitle>MARGIN TREND — {yr}</SectionTitle>
            {trendData.length>0?(
              <ResponsiveContainer width="100%" height={180}>
                <LineChart data={trendData} margin={{top:4,right:8,bottom:4,left:8}}>
                  <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
                  <XAxis dataKey="name" tick={{fill:T.muted,fontSize:9}} tickLine={false}/>
                  <YAxis tick={{fill:T.muted,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v}%`}/>
                  <Tooltip contentStyle={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}} formatter={(v,n)=>[`${v}%`,n]}/>
                  <Legend iconType="circle" iconSize={7} wrapperStyle={{fontSize:9}}/>
                  <Line type="monotone" dataKey="gopMgn" stroke={T.green}  name="GOP%"     strokeWidth={2} dot={{r:3}}/>
                  <Line type="monotone" dataKey="nopMgn" stroke={T.secondary} name="NOP%" strokeWidth={2} dot={{r:3}}/>
                  <Line type="monotone" dataKey="payRat" stroke={T.red}    name="Payroll%" strokeWidth={1.5} dot={{r:3}} strokeDasharray="4 2"/>
                  <ReferenceLine y={30} stroke={T.green}  strokeDasharray="3 3" label={{value:'30%',fill:T.muted,fontSize:8,position:'right'}}/>
                  <ReferenceLine y={35} stroke={T.yellow} strokeDasharray="3 3" label={{value:'35%',fill:T.muted,fontSize:8,position:'right'}}/>
                  <ReferenceLine y={0}  stroke={T.red}    strokeDasharray="3 3"/>
                </LineChart>
              </ResponsiveContainer>
            ):(
              <div style={{height:180,display:'flex',alignItems:'center',justifyContent:'center',color:T.muted,fontSize:11}}>
                No monthly trend for annual view
              </div>
            )}
          </Card>

          <Card>
            <SectionTitle>QUICK HEALTH CHECK</SectionTitle>
            {[
              {l:'Revenue',    v:fM(cur.rev),  ok:cur.rev>0,      lvl:cur.rev>0?'green':'red'},
              {l:'GOP',        v:fM(cur.gop),  ok:cur.gop>0,      lvl:cur.gopMgn>=30?'green':cur.gopMgn>=20?'yellow':'red'},
              {l:'NOP',        v:fM(cur.nop),  ok:cur.nop>0,      lvl:cur.nopMgn>=5?'green':cur.nopMgn>=0?'yellow':'red'},
              {l:'Cash (BS)',  v:fM(bs.cash),  ok:bs.cash>0,      lvl:bs.cash>1?'green':bs.cash>0?'yellow':'red'},
              {l:'WC',         v:fM(bs.tCA-bs.tCL), ok:bs.tCA>bs.tCL, lvl:bs.tCA-bs.tCL>0.5?'green':bs.tCA>bs.tCL?'yellow':'red'},
              {l:'D/E Ratio',  v:(bs.tL/Math.max(bs.tEq,0.001)).toFixed(2)+'x', ok:bs.tL/Math.max(bs.tEq,0.001)<1, lvl:bs.tL/Math.max(bs.tEq,0.001)<0.8?'green':bs.tL/Math.max(bs.tEq,0.001)<1.2?'yellow':'red'},
            ].map(r=>(
              <div key={r.l} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:`1px solid ${T.border}`}}>
                <span style={{color:T.sub,fontSize:10}}>{r.l}</span>
                <div style={{display:'flex',alignItems:'center',gap:5}}>
                  <span style={{color:hColor(r.lvl),fontSize:11,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{r.v}</span>
                  <span style={{fontSize:10}}>{hIcon(r.lvl)}</span>
                </div>
              </div>
            ))}
          </Card>
        </div>
      </div>

      {/* ── KPI Insight Summary ── */}
      {kpiInsights.length>0&&(
        <Card>
          <SectionTitle>KPI HEALTH INSIGHTS — {periodLabel}</SectionTitle>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:8}}>
            {kpiInsights.map((ins,i)=>{
              const c={red:T.red,yellow:T.yellow,green:T.green}[ins.sev]||T.accent;
              const icon={red:'🔴',yellow:'⚠️',green:'✅'}[ins.sev]||'💡';
              return (
                <div key={i} style={{display:'flex',gap:10,padding:'10px 14px',
                  background:`${c}08`,borderRadius:8,borderLeft:`3px solid ${c}`}}>
                  <span style={{fontSize:16,lineHeight:1.5}}>{icon}</span>
                  <span style={{color:T.sub,fontSize:11,lineHeight:1.6}}>{ins.msg}</span>
                </div>
              );
            })}
          </div>
        </Card>
      )}
    </div>
  );
}

function ForecastPage() {
  // ── State ─────────────────────────────────────────────────────────
  const [scenario,   setScenario]   = useState('base');
  const [horizon,    setHorizon]    = useState(12);
  const [pattern,    setPattern]    = useState('2025');  // seasonal pattern source
  const [revGrowth,  setRevGrowth]  = useState({conservative:3, base:8, optimistic:15});
  const [costInfl,   setCostInfl]   = useState({conservative:6, base:4, optimistic:2});
  const [savedFcst,  setSavedFcst]  = useState(null);   // loaded from localStorage
  const [saveStatus, setSaveStatus] = useState('');      // '' | 'saving' | 'saved'
  const [activeView, setActiveView] = useState('chart'); // 'chart' | 'table'

  const FC_STORAGE_KEY = 'gds_forecast_v1';

  const scenarios = {
    conservative:{name:'Conservative', color:T.yellow,  desc:'Slow recovery, cost pressure'},
    base:        {name:'Base Case',    color:T.accent,  desc:'Moderate growth, stable costs'},
    optimistic:  {name:'Optimistic',   color:T.green,   desc:'Strong demand, efficiency gains'},
  };

  // ── Load saved forecast on mount ─────────────────────────────────
  useEffect(()=>{
    try {
      const raw = localStorage.getItem(FC_STORAGE_KEY);
      if(raw) setSavedFcst(JSON.parse(raw));
    } catch(e) {}
  },[]);

  // ── Base period: average of latest actual months ──────────────────
  const actualKeys = mKeys26_ytd.filter(k=>TB[k]);
  const latestMo   = actualKeys.length; // 2 = Feb 2026
  const startFcMo  = latestMo + 1;      // forecast starts Mar = month 3

  const basePeriod = useMemo(()=>{
    const ytd = aggKeys(actualKeys);
    const n   = actualKeys.length || 1;
    const out = {};
    Object.keys(ytd).forEach(k=>{ out[k] = ytd[k]/n; });
    return out;
  },[]);

  // ── Seasonal weights from selected pattern ────────────────────────
  const seasonalWeights = useMemo(()=>{
    const srcKeys = pattern==='2024' ? mKeys24 :
                    pattern==='2025' ? mKeys25 :
                    mKeys26_ytd; // 2026 YTD actual only
    const available = srcKeys.filter(k=>TB[k]);
    if(!available.length) return Array(12).fill(1.0);
    const total = aggKeys(available).rev || 1;
    const n     = available.length;
    // Build 12-month seasonal index; missing months default to average
    return Array.from({length:12},(_,i)=>{
      const k = srcKeys[i];
      return (k && TB[k]) ? pnl(TB[k]).rev/(total/n) : 1.0;
    });
  },[pattern]);

  // ── Budget monthly data (full 2026) ───────────────────────────────
  const budMonthly = useMemo(()=>{
    return Array.from({length:12},(_,i)=>{
      const k=`2026-${String(i+1).padStart(2,'0')}`;
      return BUD26[k] ? pnl(BUD26[k]) : null;
    });
  },[]);

  // ── Forecast data engine ──────────────────────────────────────────
  const forecastData = useMemo(()=>{
    // Full 2026 view: Jan-Feb = actual, Mar-Dec = forecast
    const rows = [];
    for(let mo=1; mo<=12; mo++){
      const moIdx = mo-1;
      const k     = `2026-${String(mo).padStart(2,'0')}`;
      const isActual = TB[k] != null;
      const label = ML[moIdx];
      const row   = {name:label, mo, isActual};

      if(isActual){
        // Use real data
        const d = pnl(TB[k]);
        row.actRev = +d.rev.toFixed(3);
        row.actGOP = +d.gop.toFixed(3);
        row.actNOP = +d.nop.toFixed(3);
      }

      // Budget
      const b = budMonthly[moIdx];
      if(b){ row.budRev=+b.rev.toFixed(3); row.budGOP=+b.gop.toFixed(3); row.budNOP=+b.nop.toFixed(3); }

      if(!isActual){
        // Forecast for each scenario
        const fcPeriod = mo - latestMo; // periods ahead from base
        Object.keys(scenarios).forEach(sc=>{
          const rg = revGrowth[sc]/100;
          const ci = costInfl[sc]/100;
          const gf = Math.pow(1+rg, fcPeriod/12);
          const cf = Math.pow(1+ci, fcPeriod/12);
          const seasonal = seasonalWeights[moIdx] || 1;
          const rev  = basePeriod.rev * gf * seasonal;
          const cos  = (basePeriod.cos||0) * cf;
          const dPay = (basePeriod.deptPay||0) * cf;
          const dOth = (basePeriod.deptOther||0) * cf;
          const oPay = (basePeriod.ovhdPay||0) * cf;
          const oOth = (basePeriod.ovhdOther||0) * cf;
          const dp   = basePeriod.deprTotal||0;
          const fee  = (basePeriod.incentFee||0)+(basePeriod.mgmtFee||0);
          const gop  = rev - cos - dPay - dOth - oPay - oOth;
          const nop  = gop - dp - fee - (basePeriod.roi||0) - (basePeriod.ownExp||0);
          row[`${sc}Rev`] = +rev.toFixed(3);
          row[`${sc}GOP`] = +gop.toFixed(3);
          row[`${sc}NOP`] = +nop.toFixed(3);
          // Simple operating CF = NOP + D&A
          row[`${sc}OCF`] = +(nop + dp).toFixed(3);
        });
      } else {
        // Actual OCF = NOP + D&A
        const d=pnl(TB[k]);
        row.actOCF = +(d.nop+(d.deprTotal||0)).toFixed(3);
      }
      rows.push(row);
    }
    return rows;
  },[revGrowth,costInfl,seasonalWeights,basePeriod,budMonthly,latestMo]);

  // Full year summaries
  const annSummary = useMemo(()=>{
    const out={};
    Object.keys(scenarios).forEach(sc=>{
      out[sc]={
        rev: forecastData.reduce((s,r)=> s+(r.isActual?r.actRev||0:r[`${sc}Rev`]||0),0),
        gop: forecastData.reduce((s,r)=> s+(r.isActual?r.actGOP||0:r[`${sc}GOP`]||0),0),
        nop: forecastData.reduce((s,r)=> s+(r.isActual?r.actNOP||0:r[`${sc}NOP`]||0),0),
        ocf: forecastData.reduce((s,r)=> s+(r.isActual?r.actOCF||0:r[`${sc}OCF`]||0),0),
      };
    });
    // Budget full year
    out.budget = {
      rev: budMonthly.reduce((s,b)=>s+(b?.rev||0),0),
      gop: budMonthly.reduce((s,b)=>s+(b?.gop||0),0),
      nop: budMonthly.reduce((s,b)=>s+(b?.nop||0),0),
    };
    return out;
  },[forecastData,budMonthly]);

  // Forecast vs budget variance for insight
  const fcVsBud = annSummary[scenario] && annSummary.budget ? {
    rev: annSummary[scenario].rev - annSummary.budget.rev,
    gop: annSummary[scenario].gop - annSummary.budget.gop,
    nop: annSummary[scenario].nop - annSummary.budget.nop,
  } : null;

  // ── Forecast accuracy monitoring (actual vs forecast-of-prior-version) ──
  const monitorRows = useMemo(()=>{
    return forecastData.filter(r=>r.isActual).map(r=>{
      const fcRev = r[`${scenario}Rev`] || r.actRev;
      const var_  = r.actRev - (savedFcst?.monthly?.[r.mo]?.[scenario+'Rev'] || r.actRev);
      return {
        mo:r.name, actual:r.actRev, forecast:savedFcst?.monthly?.[r.mo]?.[scenario+'Rev']||null,
        budget:r.budRev||null, varFc:var_,
      };
    });
  },[forecastData,savedFcst,scenario]);

  // ── Forecast narrative insight ────────────────────────────────────
  const fcInsight = useMemo(()=>{
    const s=annSummary[scenario];
    if(!s) return '';
    const revGr = revGrowth[scenario];
    const costGr= costInfl[scenario];
    const nopMgn= s.rev>0?(s.nop/s.rev*100):0;
    const budRevDiff = fcVsBud ? (fcVsBud.rev/Math.max(annSummary.budget.rev,0.001)*100) : 0;
    const peakMos = seasonalWeights.map((w,i)=>({w,mo:ML[i]})).sort((a,b)=>b.w-a.w).slice(0,3).map(x=>x.mo).join(', ');
    return `Under the ${scenarios[scenario].name} scenario, full-year 2026 revenue is projected at ${fM(s.rev)} ` +
      `with ${revGr}% annualised growth assumption. Seasonal pattern (${pattern} source) shows peak demand in ${peakMos}. ` +
      `Cost inflation of ${costGr}% per year ${costGr>5?'creates margin pressure':costGr>3?'moderately impacts margins':'is well-controlled'}. ` +
      `Full-year GOP is forecast at ${fM(s.gop)} and NOP at ${fM(s.nop)} (${nopMgn.toFixed(1)}% margin). ` +
      (fcVsBud ? `Forecast revenue is ${budRevDiff>=0?'above':'below'} budget by ${Math.abs(budRevDiff).toFixed(1)}%. ` : '') +
      `Cash flow outlook: operating CF ${s.ocf>=0?'remains positive at '+fM(s.ocf):'turns negative at '+fM(s.ocf)} — ` +
      `${s.ocf<0?'liquidity monitoring recommended during low-season months':'cash position supports operational requirements'}.`;
  },[scenario,annSummary,revGrowth,costInfl,seasonalWeights,pattern,fcVsBud]);

  // ── Save forecast ─────────────────────────────────────────────────
  const handleSave = () => {
    setSaveStatus('saving');
    const monthly={};
    forecastData.forEach(r=>{ monthly[r.mo]=r; });
    const payload = {
      savedAt:    new Date().toISOString(),
      savedBy:    'Financial Controller',
      year:       '2026',
      scenario,
      pattern,
      revGrowth:  {...revGrowth},
      costInfl:   {...costInfl},
      annSummary: {...annSummary},
      monthly,
      version:    (savedFcst?.version||0)+1,
    };
    try {
      localStorage.setItem(FC_STORAGE_KEY, JSON.stringify(payload));
      setSavedFcst(payload);
      setSaveStatus('saved');
      setTimeout(()=>setSaveStatus(''),3000);
    } catch(e) { setSaveStatus(''); }
  };

  const fmtDate = (iso) => iso ? new Date(iso).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';

  const activeColor = scenarios[scenario].color;

  return (
    <div>
      {/* ── Header ── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>FORECAST ENGINE</div>
          <div style={{color:T.muted,fontSize:11}}>
            2026 Full-Year Projection · Actual Jan–{ML[latestMo-1]} + Forecast {ML[latestMo]}–Dec · {scenarios[scenario].name}
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {/* Pattern selector */}
          <select value={pattern} onChange={e=>setPattern(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
            <option value="2025">2025 Seasonal Pattern</option>
            <option value="2024">2024 Seasonal Pattern</option>
            <option value="2026">2026 YTD Pattern</option>
          </select>
          {/* Horizon */}
          <div style={{display:'flex',gap:4}}>
            {['chart','table'].map(v=>(
              <button key={v} onClick={()=>setActiveView(v)}
                style={{padding:'6px 12px',borderRadius:6,border:`1px solid ${activeView===v?T.accent:T.border}`,
                  background:activeView===v?`${T.accent}20`:'transparent',color:activeView===v?T.accent:T.sub,
                  cursor:'pointer',fontSize:11,fontFamily:"'IBM Plex Mono'"}}>
                {v==='chart'?'📊 Chart':'📋 Table'}
              </button>
            ))}
          </div>
          {/* Save button */}
          <button onClick={handleSave} disabled={saveStatus==='saving'}
            style={{padding:'7px 16px',borderRadius:6,border:'none',
              background:saveStatus==='saved'?T.green:T.accent,
              color:'#080C12',cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>
            {saveStatus==='saving'?'⟳ Saving…':saveStatus==='saved'?'✓ Saved':'💾 Save Forecast'}
          </button>
        </div>
      </div>

      {/* ── Saved forecast metadata ── */}
      {savedFcst && (
        <div style={{background:`${T.accent}08`,border:`1px solid ${T.accent}20`,borderRadius:8,
          padding:'8px 16px',marginBottom:14,display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{color:T.accent,fontSize:10,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>📁 SAVED FORECAST</span>
          <span style={{color:T.muted,fontSize:10}}>v{savedFcst.version} · {savedFcst.scenario?.toUpperCase()} · {fmtDate(savedFcst.savedAt)}</span>
          <span style={{color:T.muted,fontSize:10}}>By: {savedFcst.savedBy}</span>
          <span style={{color:T.muted,fontSize:10}}>Rev Growth: {savedFcst.revGrowth?.[savedFcst.scenario]}% · Cost: {savedFcst.costInfl?.[savedFcst.scenario]}%</span>
        </div>
      )}

function AIPage() {
  const [yr,setYr]         = useState('2026');
  const [period,setPeriod] = useState('m2');
  const [running,setRunning] = useState(false);
  const [generated,setGenerated] = useState(true);

  const periodOpts = useMemo(()=>getPeriodOpts(yr),[yr]);
  const handleYrChange = (v)=>{setYr(v);setPeriod('full');setGenerated(false);};

  const isAnn = parseInt(yr)<2024;
  const keys  = useMemo(()=>getKeys(yr,period),[yr,period]);
  const cur   = useMemo(()=>{
    if(isAnn) return annPnl(parseInt(yr));
    return keys&&keys.length>0?aggKeys(keys):null;
  },[yr,keys,isAnn]);

  const bsKey = useMemo(()=>snapKey(yr,period),[yr,period]);
  const bs    = bsCalc(BS_SNAPSHOTS[bsKey]||BS_SNAPSHOTS['feb26']);
  const bud   = yr==='2026'&&!isAnn ? aggKeys(keys,BUD26) : null;
  const prior = useMemo(()=>{
    if(isAnn) return annPnl(parseInt(yr)-1);
    const py=String(parseInt(yr)-1);
    const pKeys=getKeys(py,period);
    return pKeys&&pKeys.length?aggKeys(pKeys):null;
  },[yr,period,isAnn]);

  const periodLabel = periodOpts.find(o=>o.v===period)?.l||period;

  const insights = useMemo(()=>{
    if(!cur) return [];
    const list=[];
    // Performance
    const revVsBud = bud ? (cur.rev-bud.rev)/Math.max(bud.rev,0.001)*100 : null;
    const revVsPrior = prior ? (cur.rev-prior.rev)/Math.max(prior.rev,0.001)*100 : null;
    list.push({
      sev: cur.gopMgn>30?'success':cur.gopMgn>20?'info':'warning',
      cat:'Performance',
      title:`GOP Margin: ${cur.gopMgn.toFixed(1)}%`,
      msg: `Gross Operating Profit margin ${cur.gopMgn>30?'above':'below'} 30% threshold.${revVsPrior!=null?' Revenue '+( revVsPrior>=0?'up':'down')+' '+Math.abs(revVsPrior).toFixed(1)+'% vs prior period.':''} ${cur.gopMgn<20?'Immediate cost review recommended.':cur.gopMgn<30?'Monitor closely.':'Performance within target.'}`
    });
    // Revenue vs budget
    if(revVsBud!==null) list.push({
      sev: revVsBud>=-5?'info':'warning',
      cat:'Budget Variance',
      title:`Revenue ${revVsBud>=0?'+':''}${revVsBud.toFixed(1)}% vs Budget`,
      msg: `Actual revenue ${fM(cur.rev)} vs budget ${fM(bud.rev)}. ${Math.abs(revVsBud)<5?'Within acceptable variance band.':revVsBud<0?'Underperformance requires corrective action — review room rate strategy and F&B pricing.':'Positive variance. Review whether budget was set conservatively.'}`
    });
    // Cost anomaly
    const payRat = cur.payRat||0;
    list.push({
      sev: payRat<32?'success':payRat<38?'info':'warning',
      cat:'Cost Anomaly',
      title:`Payroll Ratio: ${payRat.toFixed(1)}%`,
      msg: `Departmental payroll at ${payRat.toFixed(1)}% of revenue. ${payRat>38?'ALERT: Significantly above 35% benchmark. Review staffing level vs. occupancy. Consider flex staffing model.':payRat>32?'Above optimal range. Monitor closely against occupancy correlation.':'Well controlled payroll. Consistent with high efficiency operation.'}`
    });
    // Liquidity
    const cr = bs.tCA/Math.max(bs.tCL,0.001);
    list.push({
      sev: cr>1.5?'success':cr>1.0?'info':'warning',
      cat:'Liquidity Risk',
      title:`Current Ratio: ${cr.toFixed(2)}x`,
      msg: `Current assets ${fM(bs.tCA)} vs current liabilities ${fM(bs.tCL)}. Working capital: ${fM(bs.tCA-bs.tCL)}. ${cr<1.0?'RISK: Current ratio below 1.0. Immediate liquidity management required.':cr<1.5?'Adequate but tight. Maintain cash position; avoid large unplanned capex.':'Healthy liquidity position supports operational flexibility.'}`
    });
    // Margin trend
    if(prior) {
      const gopDelta = cur.gopMgn - (prior.gopMgn||0);
      list.push({
        sev: gopDelta>=0?'success':'warning',
        cat:'Margin Trend',
        title:`GOP Margin ${gopDelta>=0?'improved':'declined'} ${Math.abs(gopDelta).toFixed(1)}pp`,
        msg: `Compared to prior period: GOP ${gopDelta>=0?'+':''}${gopDelta.toFixed(1)}pp, NOP ${(cur.nopMgn-(prior.nopMgn||0))>=0?'+':''}${(cur.nopMgn-(prior.nopMgn||0)).toFixed(1)}pp. ${gopDelta<-5?'Significant margin compression — investigate revenue mix and cost drivers.':gopDelta<0?'Mild compression. Review utility and overhead costs.':'Margin improvement reflects operational efficiency or revenue growth.'}`
      });
    }
    // NOP
    list.push({
      sev: cur.nop>0?'success':cur.nopMgn>-10?'warning':'danger',
      cat: cur.nop>0?'Profit':'Profit Alert',
      title:`NOP: ${fM(cur.nop)} (${cur.nopMgn.toFixed(1)}% margin)`,
      msg: `${cur.nop>0?`Net Operating Profit positive at ${fM(cur.nop)}.`:`Net Operating Loss of ${fM(Math.abs(cur.nop))}.`} ${cur.nop<0?'Non-operating charges (depreciation, management fees, financing) exceed GOP. Review debt structure and fee arrangements.':'Below-the-line charges absorbed. Consider debt refinancing to improve NOP margin.'}`
    });
    return list;
  },[cur,bs,bud,prior,yr,period]);

  const sevColor={'danger':T.red,'warning':T.yellow,'info':T.accent,'success':T.green};
  const sevIcon ={'danger':'🔴','warning':'⚠️','info':'💡','success':'✅'};

  const runAnalysis = () => {
    setRunning(true);
    setTimeout(()=>{setRunning(false);setGenerated(true);},1200);
  };

  const counts = {
    critical: insights.filter(a=>a.sev==='danger').length,
    warning:  insights.filter(a=>a.sev==='warning').length,
    info:     insights.filter(a=>a.sev==='info').length,
    success:  insights.filter(a=>a.sev==='success').length,
  };

  return (
    <div>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>AI INTELLIGENCE</div>
          <div style={{color:T.muted,fontSize:11}}>Automated financial insights · {periodLabel}</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
            {['2026','2025','2024','2023','2022'].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          {!isAnn && (
            <select value={period} onChange={e=>{setPeriod(e.target.value);setGenerated(false);}}
              style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
              {periodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
          <button onClick={runAnalysis} disabled={running}
            style={{padding:'6px 16px',borderRadius:6,border:'none',
              background:running?T.border:T.accent,color:running?T.muted:'#080C12',
              cursor:running?'not-allowed':'pointer',fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>
            {running?'Analyzing…':'▶ Run Analysis'}
          </button>
        </div>
      </div>

      {/* Summary strip */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}} className="r-grid-4">
        {[['🔴','Critical',counts.critical,T.red],['⚠️','Warnings',counts.warning,T.yellow],['💡','Insights',counts.info,T.accent],['✅','Positive',counts.success,T.green]].map(([ic,l,n,c])=>(
          <div key={l} style={{background:`${c}10`,border:`1px solid ${c}30`,borderRadius:8,padding:'12px 16px',display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:22}}>{ic}</span>
            <div>
              <div style={{color:T.muted,fontSize:9,textTransform:'uppercase',letterSpacing:1}}>{l}</div>
              <div style={{color:c,fontSize:22,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{n}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Insight cards */}
      {!cur ? (
        <div style={{padding:40,textAlign:'center',color:T.muted}}>No data for selected period.</div>
      ) : !generated ? (
        <div style={{padding:40,textAlign:'center',color:T.muted}}>
          <div style={{fontSize:32,marginBottom:12}}>🤖</div>
          <div>Select period and click <b style={{color:T.accent}}>Run Analysis</b></div>
        </div>
      ) : running ? (
        <div style={{padding:40,textAlign:'center',color:T.muted}}>
          <div style={{fontSize:32,marginBottom:12,animation:'spin 1s linear infinite'}}>⚙️</div>
          <div style={{color:T.accent}}>Analyzing financial data…</div>
        </div>
      ) : (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="r-grid-2">
          {insights.map((ins,i)=>(
            <div key={i} style={{background:`${sevColor[ins.sev]}08`,border:`1px solid ${sevColor[ins.sev]}25`,
              borderRadius:10,padding:'14px 16px',borderLeft:`3px solid ${sevColor[ins.sev]}`}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <span style={{fontSize:16}}>{sevIcon[ins.sev]}</span>
                <span style={{color:sevColor[ins.sev],fontSize:9,fontFamily:"'IBM Plex Mono'",letterSpacing:2,fontWeight:700}}>{ins.cat.toUpperCase()}</span>
              </div>
              <div style={{color:T.text,fontSize:12,fontWeight:600,marginBottom:6}}>{ins.title}</div>
              <div style={{color:T.sub,fontSize:11,lineHeight:1.6}}>{ins.msg}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// GENERATE REPORT HTML — Board-quality financial report
// ══════════════════════════════════════════════════════════════════
function generateReportHTML(selPeriod, selSubPeriod, selReport, theme, execSummaryText) {
  // ── 1. Resolve period keys ─────────────────────────────────────
  var yr = selPeriod;
  var isAnn = parseInt(yr) < 2024;
  var keys;
  if (isAnn) {
    keys = null; // annual
  } else if (yr === '2026') {
    if      (selSubPeriod === 'm1')  keys = ['2026-01'];
    else if (selSubPeriod === 'm2')  keys = ['2026-02'];
    else                             keys = ['2026-01','2026-02']; // ytd
  } else if (yr === '2025') {
    if      (selSubPeriod === 'q1')  keys = ['2025-01','2025-02','2025-03'];
    else if (selSubPeriod === 'q2')  keys = ['2025-04','2025-05','2025-06'];
    else if (selSubPeriod === 'q3')  keys = ['2025-07','2025-08','2025-09'];
    else if (selSubPeriod === 'q4')  keys = ['2025-10','2025-11','2025-12'];
    else if (selSubPeriod && selSubPeriod.startsWith('m')) {
      var mn = selSubPeriod.slice(1).padStart(2,'0');
      keys = [`2025-${mn}`];
    } else keys = mKeys25;
  } else if (yr === '2024') {
    if (selSubPeriod && selSubPeriod.startsWith('m')) {
      var mn = selSubPeriod.slice(1).padStart(2,'0');
      keys = [`2024-${mn}`];
    } else keys = mKeys24;
  } else {
    keys = null;
  }

  var d = isAnn ? annPnl(parseInt(yr)) : (keys && keys.length ? aggKeys(keys) : annPnl(parseInt(yr)));

  // ── 2. Balance Sheet snapshots ──────────────────────────────────
  var bsNowKey, bsPrvKey;
  if (yr === '2026') {
    bsNowKey = (selSubPeriod === 'm1') ? 'jan26' : 'feb26';
    bsPrvKey = (selSubPeriod === 'm1') ? 'dec25' : 'jan26';
  } else {
    var y2 = yr.slice(2);
    var py2 = String(parseInt(yr)-1).slice(2);
    bsNowKey = `dec${y2}`;
    bsPrvKey = `dec${py2}`;
  }
  var bs  = bsCalc(BS_SNAPSHOTS[bsNowKey] || BS_SNAPSHOTS['feb26']);
  var bsp = bsCalc(BS_SNAPSHOTS[bsPrvKey] || BS_SNAPSHOTS['dec25']);

  // ── 3. Budget data ──────────────────────────────────────────────
  var budKeys = (yr === '2026') ? (keys || ['2026-01','2026-02']) : null;
  var bud = budKeys ? aggKeys(budKeys, BUD26) : null;

  // ── 4. Theme colours ────────────────────────────────────────────
  var isDark = theme === 'dark';
  var C = {
    bg:   isDark ? '#080C12' : '#ffffff',
    page: isDark ? '#0a0f1a' : '#f8fafc',
    card: isDark ? '#0D1520' : '#ffffff',
    bdr:  isDark ? '#1A2535' : '#e2e8f0',
    txt:  isDark ? '#E2E8F0' : '#0f172a',
    sub:  isDark ? '#94A3B8' : '#475569',
    mut:  isDark ? '#4A5568' : '#94a3b8',
    acc:  isDark ? '#00D4FF' : '#0284c7',
    sec:  isDark ? '#00B4A0' : '#0d9488',
    grn:  isDark ? '#22C55E' : '#16a34a',
    red:  isDark ? '#EF4444' : '#dc2626',
    yel:  isDark ? '#EAB308' : '#ca8a04',
    hdr:  isDark ? '#060A10' : '#1e293b',
    cvr1: isDark ? '#080C12' : '#0f172a',
    cvr2: isDark ? '#0D1520' : '#1e293b',
  };

  // ── 5. Helpers ──────────────────────────────────────────────────
  function fV(v) {
    if (v === undefined || v === null || isNaN(v)) return '—';
    var abs = Math.abs(v) * 1000;
    var s;
    if (abs >= 1000000)      s = (abs/1000000).toFixed(2) + 'T';
    else if (abs >= 1000)    s = (abs/1000).toFixed(1) + 'B';
    else if (abs >= 1)       s = abs.toFixed(1) + 'M';
    else                     s = (abs * 1000).toFixed(0) + 'K';
    return v < 0 ? '(' + s + ')' : s;
  }
  function fP(v) { return (v === undefined || isNaN(v)) ? '—' : v.toFixed(1) + '%'; }
  function vP(a, b) { return (b && b !== 0) ? ((a-b)/Math.abs(b)*100).toFixed(1) + '%' : '—'; }
  function gc(v, pos) { return (pos ? v >= 0 : v <= 0) ? C.grn : C.red; }
  function badge(ok) { return ok ? `<span style="color:${C.grn};font-weight:700">✓ PASS</span>` : `<span style="color:${C.red};font-weight:700">✗ FAIL</span>`; }

  // Period label
  var perLabel;
  if (yr === '2026') {
    if      (selSubPeriod === 'm1')  perLabel = 'January 2026';
    else if (selSubPeriod === 'm2')  perLabel = 'February 2026';
    else                             perLabel = 'YTD Jan–Feb 2026';
  } else if (!isAnn && selSubPeriod && selSubPeriod !== 'full') {
    if (selSubPeriod.startsWith('q')) {
      var qn = selSubPeriod.slice(1);
      perLabel = `Q${qn} ${yr}`;
    } else {
      var mn2 = parseInt(selSubPeriod.slice(1)) - 1;
      perLabel = ML[mn2] + ' ' + yr;
    }
  } else {
    perLabel = 'Full Year ' + yr;
  }

  var dateStr = new Date().toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'});

  // ── 6. Executive Summary text ───────────────────────────────────
  var cr = bs.tCA / Math.max(bs.tCL, 0.001);
  var de = bs.tL  / Math.max(bs.tEq, 0.001);
  var roa = d.nop / Math.max(bs.tA, 0.001) * 100;
  var ic  = d.gop / Math.max(Math.abs(d.interest || 1), 0.001);
  var budVarPct = bud ? ((d.rev - bud.rev) / Math.max(bud.rev, 0.001) * 100) : null;

  var autoSummary = execSummaryText || (
    `Grand Darmo Suite by Amithya recorded total revenue of ${fV(d.rev)} for ${perLabel}, ` +
    `with Gross Operating Profit (GOP) of ${fV(d.gop)} (${fP(d.gopMgn)} margin) and ` +
    `Net Operating Profit of ${fV(d.nop)} (${fP(d.nopMgn)} margin). ` +
    (budVarPct !== null ? `Revenue ${budVarPct >= 0 ? 'exceeded' : 'missed'} budget by ${Math.abs(budVarPct).toFixed(1)}%, ` : '') +
    `reflecting ${d.gopMgn > 30 ? 'solid' : 'challenged'} operating performance. ` +
    `Payroll ratio stood at ${fP(d.payRat)}, ${d.payRat < 35 ? 'within' : 'above'} the 35% benchmark. ` +
    `The Balance Sheet remains ${Math.abs(bs.tA - (bs.tL + bs.tEq)) < 0.01 ? 'balanced' : 'under review'} with total assets of ${fV(bs.tA)}, ` +
    `current ratio ${cr.toFixed(2)}x, and D/E ratio ${de.toFixed(2)}x. ` +
    `ROA at ${fP(roa)} indicates ${roa > 5 ? 'adequate' : 'pressured'} asset utilisation. ` +
    `External macro conditions remain broadly ${de < 1 && cr > 1.2 ? 'supportive' : 'cautious'} with BI rate at 5.75% and IDR showing mild depreciation pressure.`
  );

  // ── 7. Monthly trend data for sparkline tables ──────────────────
  var trendKeys = yr === '2026' ? mKeys26_ytd : yr === '2025' ? mKeys25 : yr === '2024' ? mKeys24 : null;
  var trendRows = '';
  if (trendKeys) {
    trendKeys.filter(k => TB[k]).forEach(function(k, i) {
      var td = pnl(TB[k]);
      var mo = ML[i];
      trendRows += `<tr><td>${mo}</td><td class="num">${fV(td.rev)}</td><td class="num" style="color:${td.gopMgn>30?C.grn:C.yel}">${fP(td.gopMgn)}</td><td class="num" style="color:${td.nopMgn>0?C.grn:C.red}">${fP(td.nopMgn)}</td><td class="num">${fP(td.payRat)}</td></tr>`;
    });
  }

  // ── 8. CSS ──────────────────────────────────────────────────────
  var css = `
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:${C.bg};color:${C.txt};font-family:'Segoe UI',Arial,sans-serif;font-size:13px;line-height:1.5;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .cover{background:linear-gradient(135deg,${C.cvr1} 0%,${C.cvr2} 60%,#0a2a3a 100%);padding:56px 48px 48px;border-bottom:3px solid ${C.acc};page-break-after:always}
    .cover-logo{font-size:9px;letter-spacing:5px;color:${C.mut};margin-bottom:14px;text-transform:uppercase}
    .cover-title{font-size:30px;font-weight:800;letter-spacing:3px;color:${C.acc};margin-bottom:4px;font-family:monospace}
    .cover-sub{font-size:11px;letter-spacing:3px;color:${C.sub};margin-bottom:32px}
    .cover-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:24px}
    .cm{background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.18);border-radius:8px;padding:14px 16px}
    .cm-l{font-size:8px;letter-spacing:3px;color:${C.mut};margin-bottom:5px;text-transform:uppercase}
    .cm-v{font-size:18px;font-weight:800;color:${C.acc};font-family:monospace}
    .cm-s{font-size:10px;color:${C.sub};margin-top:2px}
    .cover-gen{margin-top:28px;font-size:9px;color:${C.mut};letter-spacing:1px}
    .page{max-width:960px;margin:0 auto;padding:40px 48px}
    .sec-title{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:${C.acc};margin:36px 0 14px;padding-bottom:8px;border-bottom:2px solid ${C.bdr};font-family:monospace;display:flex;align-items:center;gap:10px}
    .sec-title::before{content:'';display:inline-block;width:18px;height:2px;background:${C.acc}}
    .exec-box{background:${C.card};border:1px solid ${C.bdr};border-left:4px solid ${C.acc};border-radius:0 8px 8px 0;padding:20px 24px;margin-bottom:8px;font-size:13px;color:${C.sub};line-height:1.8}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    .kpi-card{background:${C.card};border:1px solid ${C.bdr};border-radius:8px;padding:14px 16px}
    .kpi-label{font-size:8px;letter-spacing:2px;color:${C.mut};text-transform:uppercase;margin-bottom:5px}
    .kpi-val{font-size:20px;font-weight:800;font-family:monospace}
    .kpi-sub{font-size:10px;color:${C.sub};margin-top:3px}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}

  // ── 9. Section builders ─────────────────────────────────────────

function ReportsPage() {
